<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chomp Alley</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: #0a0716;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  #wrap:fullscreen, #wrap:-webkit-full-screen {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0a0716;
  }
  #stage { position: relative; }
  canvas {
    background: #0a0716;
    border-radius: 6px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
  }
  .kbz-btn {
    position: absolute;
    z-index: 5;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4);
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.55);
    color: #f0eaff;
    border-radius: 999px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    font-family: inherit;
  }
  #muteBtn {
    top: calc(4px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    width: calc(24px * var(--game-scale, 1));
    height: calc(24px * var(--game-scale, 1));
    font-size: calc(12px * var(--game-scale, 1));
  }
  #fsEnterBtn, #fsExitBtn {
    top: calc(4px * var(--game-scale, 1));
    right: calc(4px * var(--game-scale, 1));
    width: calc(24px * var(--game-scale, 1));
    height: calc(24px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
  }
  #fsExitBtn { display: none; }
  /* Covers the whole bottom control band rather than a fixed-position stick,
     so a touch anywhere down there anchors the joystick where the thumb
     actually landed - see the floating-anchor requirement in the brief. */
  #joystickZone {
    position: absolute;
    z-index: 5;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,7,22,0.78);
    color: #f0eaff;
    text-align: center;
    z-index: 10;
    padding: 0 calc(20px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 8px; font-size: calc(26px * var(--game-scale, 1)); letter-spacing: 1px; }
  #overlay p { margin: 4px 0; font-size: calc(13px * var(--game-scale, 1)); color: #b7a9d9; }
  #startBtn {
    margin-top: calc(20px * var(--game-scale, 1));
    font-family: inherit;
    font-weight: bold;
    font-size: calc(15px * var(--game-scale, 1));
    padding: calc(10px * var(--game-scale, 1)) calc(28px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid #7cff6b;
    background: rgba(124,255,107,0.16);
    color: #a8ffa0;
    cursor: pointer;
  }
  #startBtn:active { background: rgba(124,255,107,0.35); }
  #backToArcade {
    display: none;
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(12px * var(--game-scale, 1));
    color: #8a7fae;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  /* Lighter than #overlay on purpose - a quick beat between lives, not the
     full pre-run title screen. Board stays dimly visible underneath so the
     reset layout reads as "known" rather than hidden behind a blackout. */
  #readyOverlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    align-items: center;
    justify-content: center;
    background: rgba(10,7,22,0.45);
    color: #f0eaff;
    text-align: center;
    z-index: 8;
    cursor: pointer;
  }
  #readyOverlay p { margin: 0; }
  #readyOverlay .readyTitle {
    font-size: calc(24px * var(--game-scale, 1));
    font-weight: bold;
    letter-spacing: 1px;
    margin-bottom: calc(6px * var(--game-scale, 1)) !important;
  }
  #readyOverlay .readyHint {
    font-size: calc(12px * var(--game-scale, 1));
    color: #b7a9d9;
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="360" height="540"></canvas>

    <button id="muteBtn" class="kbz-btn" type="button">🔊</button>
    <button id="fsEnterBtn" class="kbz-btn" type="button">⛶</button>
    <button id="fsExitBtn" class="kbz-btn" type="button">✕</button>

    <div id="joystickZone"></div>

    <div id="overlay">
      <h1 id="ovTitle">CHOMP ALLEY</h1>
      <p id="ovSubtitle">Gobble every pellet in the alley. Four ghosts are hunting - keep moving.</p>
      <p id="ovScore" style="display:none;"></p>
      <button id="startBtn" type="button" data-kb-play>Start</button>
      <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
    </div>

    <div id="readyOverlay">
      <div>
        <p class="readyTitle">Ready?</p>
        <p class="readyHint">Tap to continue</p>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const overlay = document.getElementById('overlay');
const ovTitle = document.getElementById('ovTitle');
const ovSubtitle = document.getElementById('ovSubtitle');
const ovScore = document.getElementById('ovScore');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');
const fsEnterBtn = document.getElementById('fsEnterBtn');
const fsExitBtn = document.getElementById('fsExitBtn');
const joystickZoneEl = document.getElementById('joystickZone');
const readyOverlayEl = document.getElementById('readyOverlay');

const W = canvas.width, H = canvas.height;

function isFs() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }

function fitCanvas() {
  const reserved = isFs() ? 0 : (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  wrap.style.setProperty('--game-scale', scale);
  positionJoystickZone();
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);

// ==================== Fullscreen (self-contained, same pattern as Fuseblock) ====================
function fsSupported() {
  return !!(wrap.requestFullscreen || wrap.webkitRequestFullscreen);
}
function requestFs() {
  if (wrap.requestFullscreen) wrap.requestFullscreen().catch(() => {});
  else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
}
function exitFs() {
  if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}
function syncFsButtons() {
  fsEnterBtn.style.display = isFs() ? 'none' : (fsSupported() ? 'flex' : 'none');
  fsExitBtn.style.display = isFs() ? 'flex' : 'none';
  fitCanvas();
}
if (!fsSupported()) fsEnterBtn.style.display = 'none';
fsEnterBtn.addEventListener('click', requestFs);
fsExitBtn.addEventListener('click', exitFs);
document.addEventListener('fullscreenchange', syncFsButtons);
document.addEventListener('webkitfullscreenchange', syncFsButtons);

// ==================== Maze ====================
// Validated in a standalone BFS/loop/dead-end script before being used here:
// general graph (all tiles, box included) fully connected at 184/184, 48
// independent loops, zero non-tunnel dead-ends.
//
// Column 6 (the wall bounding the left prong of the ghost-box antechamber,
// col 7) was originally a solid wall from row 3 to row 15, while its mirror
// column 12 (bounding the right prong, col 11) had gaps at rows 5/7/11/13 -
// so the left prong was a one-way dead-end shaft with no exit to its own
// side, while the right prong already had one. Opened col 6 at those same
// four rows to match, giving both prongs a side exit the way the layout's
// symmetry always implied they should have.
//
// The ghost box (row 9, cols 7-12) originally had two entrances - row 8
// (north) and row 10 (south), mirror images of each other. Closed the south
// one (row 10, cols 7-9) so there's a single door, matching a real cage
// with one way in/out rather than a walk-through room. Re-validated after
// the close: player-graph still fully connected (178/178, 46 loops, zero
// dead-ends) with the box itself excluded from player-walkable tiles, and
// the ghost-graph (box included, only the one door) still fully connected
// separately (184/184).
const MAZE = [
  "0000000000000000000",
  "0311111111111111130",
  "0111111111111111110",
  "0100010001000100010",
  "0100010001000100010",
  "0111111101011111110",
  "0000010101010000000",
  "0111111111011111110",
  "0100000111000010010",
  "9999910444444019999",
  "0100000000000010010",
  "0111111111011111110",
  "0000010101010000000",
  "0111111101011111110",
  "0100010001000100010",
  "0100010001000100010",
  "0111111111111111110",
  "0311111111111111130"
];
const ROWS = MAZE.length, COLS = MAZE[0].length;
const TUNNEL_ROW = MAZE.findIndex(r => r.includes('9'));
const TILE = 18;
const boardW = COLS * TILE, boardH = ROWS * TILE;
const HUD_TOP = 46;
const CONTROL_BAND_H = 170;
const boardAvailH = H - HUD_TOP - CONTROL_BAND_H;
const OFFSET_X = Math.floor((W - boardW) / 2);
const OFFSET_Y = HUD_TOP + Math.floor((boardAvailH - boardH) / 2);

function cellX(c) { return OFFSET_X + c * TILE; }
function cellY(r) { return OFFSET_Y + r * TILE; }
function cellCenterX(c) { return cellX(c) + TILE / 2; }
function cellCenterY(r) { return cellY(r) + TILE / 2; }

function inBounds(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }
function tileAt(r, c) { return MAZE[r][c]; }
function isBoxCell(r, c) { return inBounds(r, c) && tileAt(r, c) === '4'; }
// blockBox is true only for the player - the box interior is a real wall
// for player collision (the cage is a genuine barrier, not just visual),
// while ghosts still treat it as ordinary floor so they can spawn, wait,
// and route through it via the single door.
function isWalkable(r, c, blockBox) {
  if (!inBounds(r, c)) return false;
  if (tileAt(r, c) === '0') return false;
  if (blockBox && isBoxCell(r, c)) return false;
  return true;
}

const DIRS = {
  up: { dr: -1, dc: 0 }, down: { dr: 1, dc: 0 },
  left: { dr: 0, dc: -1 }, right: { dr: 0, dc: 1 }
};
const DIR_LIST = [DIRS.up, DIRS.down, DIRS.left, DIRS.right];

// Handles the tunnel row wraparound (col 0 <-> col COLS-1); any other
// row simply can't produce an out-of-range column since walls line
// every non-tunnel row's edges. The wrap itself is a player-only escape
// hatch - ghosts can walk the tunnel corridor like any other floor tile,
// but allowWrap=false stops them completing the edge-to-edge jump, so a
// chase into the tunnel dead-ends for them right at the mouth.
function stepCoords(r, c, dir, allowWrap) {
  let nr = r + dir.dr, nc = c + dir.dc;
  let wrapped = false;
  if (allowWrap && r === TUNNEL_ROW) {
    if (nc < 0) { nc = COLS - 1; wrapped = true; }
    else if (nc >= COLS) { nc = 0; wrapped = true; }
  }
  return { r: nr, c: nc, wrapped };
}
function canStep(r, c, dir, allowWrap, blockBox) {
  const next = stepCoords(r, c, dir, allowWrap);
  return isWalkable(next.r, next.c, blockBox);
}

const PLAYER_SPAWN = { r: 16, c: 9 };
const GHOST_SPAWN_ROW = 9;

// Each corner doubles as a scatter-phase home AND (for Wisp) a flee
// candidate - one shared list rather than two separate ones.
const CORNERS = [{ r: 1, c: 1 }, { r: 1, c: 17 }, { r: 16, c: 1 }, { r: 16, c: 17 }];

// Four distinct pathing personalities, per the build brief:
// - chase:   always paths straight at the player's current tile (Ember)
// - ambush:  paths at a tile projected ahead of the player's facing (Glint)
// - flipper: direct-chases when far, patrols/wanders when close (Drift)
// - avoider: always paths toward whichever corner is farthest from the
//            player, so it hovers at the edges rather than engaging (Wisp)
//
// releasePellets/releaseTime: staggered release from the box at the start
// of each life - a ghost joins the hunt once EITHER threshold is crossed,
// whichever comes first. Pellets-eaten rewards active play with a longer
// ghost-free window; the time fallback stops a player stalling indefinitely
// to keep the roster small forever. Ember's pellet threshold is effectively
// disabled (Infinity) since the brief frames it as a near-immediate,
// time-only release rather than pellet-gated like the other three.
const GHOST_DEFS = [
  { id: 'ember', color: 'ember', personality: 'chase',   home: CORNERS[0], spawnC: 9,  releasePellets: Infinity, releaseTime: 1 },
  { id: 'glint', color: 'glint', personality: 'ambush',  home: CORNERS[1], spawnC: 8,  releasePellets: 14,       releaseTime: 8 },
  { id: 'drift', color: 'drift', personality: 'flipper', home: CORNERS[2], spawnC: 10, releasePellets: 30,       releaseTime: 15 },
  { id: 'wisp',  color: 'wisp',  personality: 'avoider', home: CORNERS[3], spawnC: 11, releasePellets: 50,       releaseTime: 22 }
];

let pellets, totalPellets, remainingPellets;
function setupPellets() {
  pellets = [];
  totalPellets = 0;
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) {
      const ch = tileAt(r, c);
      let type = null;
      if (ch === '1') type = 'pellet';
      else if (ch === '3') type = 'power';
      row.push(type);
      if (type) totalPellets++;
    }
    pellets.push(row);
  }
  // The player's own spawn tile is consumed before the player ever moves -
  // clear it up front so it neither inflates the win count nor hands out a
  // free point at the start of every run.
  if (pellets[PLAYER_SPAWN.r][PLAYER_SPAWN.c]) {
    pellets[PLAYER_SPAWN.r][PLAYER_SPAWN.c] = null;
    totalPellets--;
  }
  remainingPellets = totalPellets;
}

// ==================== Static maze layer (walls+floor never change mid-run,
// pellets/entities are drawn fresh each frame on top) ====================
const COL = {
  bgTop: '#140f28', bgBottom: '#0a0716',
  floor: '#150f2a',
  wallFill: '#5b3aa8', wallTop: '#8b63e0', wallEdge: '#2c1a5c',
  pellet: '#ffe66d', power: '#ff9f4a',
  player: '#7cff6b', playerDark: '#2f6b28',
  ember: '#ff4d4d', emberDark: '#8a1f1f',
  glint: '#3fd9ff', glintDark: '#0e4a57',
  drift: '#ff9f40', driftDark: '#7a3c0f',
  wisp: '#c77dff', wispDark: '#4a1f70',
  frightened: '#2b3fd6', frightenedWarn: '#e8ecff',
  eyesWhite: '#f0eaff', eyesPupil: '#1a1330',
  boxFloor: '#1f1638', boxBars: '#8b7aa8',
  textMain: '#f0eaff', textDim: '#8a7fae', textAlert: '#ff6b6b'
};

const bgGradient = ctx.createLinearGradient(0, 0, 0, H);
bgGradient.addColorStop(0, COL.bgTop);
bgGradient.addColorStop(1, COL.bgBottom);

let mazeLayer = null;
// Box perimeter is found dynamically from the maze data (not hardcoded
// coordinates) so this stays correct if the layout ever changes. The
// "door" is any open floor tile directly above the box's top row - the
// one deliberate gap in an otherwise fully wall-bounded cage.
function drawBoxCage(octx) {
  let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!isBoxCell(r, c)) continue;
      minR = Math.min(minR, r); maxR = Math.max(maxR, r);
      minC = Math.min(minC, c); maxC = Math.max(maxC, c);
    }
  }
  if (!isFinite(minR)) return;
  const bx = minC * TILE, by = minR * TILE;
  const bw = (maxC - minC + 1) * TILE, bh = (maxR - minR + 1) * TILE;

  octx.fillStyle = COL.boxFloor;
  octx.fillRect(bx, by, bw, bh);

  octx.strokeStyle = COL.boxBars;
  octx.lineWidth = 2;
  // Left/right/bottom are always solid - real walls sit there already, this
  // just makes the enclosure pop visually. The top edge is NOT one solid
  // line straight across: a continuous stroke over the door would read as
  // closed even though it's walkable, so it's split per-column into solid
  // wall segments and bar-line door segments to match what's actually there.
  octx.beginPath();
  octx.moveTo(bx + 1, by + 1);
  octx.lineTo(bx + 1, by + bh - 1);
  octx.lineTo(bx + bw - 1, by + bh - 1);
  octx.lineTo(bx + bw - 1, by + 1);
  octx.stroke();

  for (let c = minC; c <= maxC; c++) {
    const cx = c * TILE;
    if (isWalkable(minR - 1, c)) {
      for (const frac of [0.3, 0.7]) {
        octx.beginPath();
        octx.moveTo(cx + TILE * frac, by - 3);
        octx.lineTo(cx + TILE * frac, by + 4);
        octx.stroke();
      }
    } else {
      octx.beginPath();
      octx.moveTo(cx, by + 1);
      octx.lineTo(cx + TILE, by + 1);
      octx.stroke();
    }
  }
}

function buildMazeLayer() {
  const off = document.createElement('canvas');
  off.width = boardW; off.height = boardH;
  const octx = off.getContext('2d');
  octx.fillStyle = COL.floor;
  octx.fillRect(0, 0, boardW, boardH);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (tileAt(r, c) !== '0') continue;
      const x = c * TILE, y = r * TILE;
      octx.fillStyle = COL.wallEdge;
      octx.fillRect(x, y, TILE, TILE);
      octx.fillStyle = COL.wallFill;
      octx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
      octx.fillStyle = COL.wallTop;
      octx.fillRect(x + 1, y + 1, TILE - 2, 3);
    }
  }
  drawBoxCage(octx);
  mazeLayer = off;
}
buildMazeLayer();

// ==================== Entities ====================
// Discrete per-tile stepping (like Fuseblock's bots): logical position moves
// a full cell at a time on a cooldown, px/py tween smoothly across that same
// window for the draw call - keeps chase logic simple and grid-exact while
// still reading as continuous motion.
function makeEntity(spawn, tileTime, canWrap, blockBox) {
  return {
    r: spawn.r, c: spawn.c, prevR: spawn.r, prevC: spawn.c,
    dir: { dr: 0, dc: 0 }, moveCooldown: 0, tileTime,
    px: cellCenterX(spawn.c), py: cellCenterY(spawn.r),
    wrapStep: false, canWrap: !!canWrap, blockBox: !!blockBox
  };
}

let player, ghosts = [];
let playerTileTime = 0.15;
// Ghosts start at ~80% of the player's speed (tileTime is seconds/tile, so
// a *larger* value is slower) - chasers you can out-leg in open corridors,
// so getting caught is about routing/turns, not raw speed disadvantage.
let ghostTileTime = 0.188;
const GHOST_TILE_TIME_FLOOR = 0.12;
const GHOST_SPEEDUP_PER_CLEAR = 0.008;

// Brief window of contact-immunity at the very start of a run only (not on
// every respawn - the post-death "Ready?" pause already gives that beat).
const START_GRACE = 1.5;
let invulnerableT = 0;

// Staggered ghost release, reset at the start of every life (not just once
// per run) - see updateGhostRelease().
let pelletsEatenThisLife = 0;
let lifeElapsedT = 0;

// Frightened state: a single global countdown (not per-ghost) - any ghost
// that isn't currently eaten is frightened exactly when this is > 0. Also
// shortens slightly each maze clear, per the brief.
let frightenedT = 0;
let frightenedDuration = 7;
const FRIGHTENED_DURATION_FLOOR = 3;
const FRIGHTENED_DURATION_SHRINK_PER_CLEAR = 0.3;
const FRIGHTENED_SPEED_MULT = 1.6; // frightened ghosts are noticeably slower
const EYES_TILE_TIME = 0.08; // eaten ghosts race back to the box fast
const EYES_RESPAWN_COOLDOWN = 2; // sits in the box briefly before rejoining
let eatenComboCount = 0;
const GHOST_EAT_SCORES = [200, 400, 800, 1600];

function resetEntities() {
  player = makeEntity(PLAYER_SPAWN, playerTileTime, true, true);
  ghosts = GHOST_DEFS.map((def) => {
    const g = makeEntity({ r: GHOST_SPAWN_ROW, c: def.spawnC }, ghostTileTime, false, false);
    g.id = def.id;
    g.color = def.color;
    g.personality = def.personality;
    g.home = def.home;
    g.boxR = GHOST_SPAWN_ROW;
    g.boxC = def.spawnC;
    g.wanderDir = { dr: 0, dc: 0 };
    g.wanderTimer = 0;
    g.released = false;
    g.releasePellets = def.releasePellets;
    g.releaseTime = def.releaseTime;
    g.eaten = false;
    g.respawnCooldownT = 0;
    g.bobPhase = Math.random() * Math.PI * 2;
    return g;
  });
  pelletsEatenThisLife = 0;
  lifeElapsedT = 0;
  frightenedT = 0;
  eatenComboCount = 0;
}
function ghostMode(g) {
  if (g.eaten) return 'eyes';
  if (frightenedT > 0) return 'frightened';
  return 'normal';
}

// Live input intent - joystick or keyboard, whichever fired last. An ordered
// list (dominant axis first) rather than a single direction, so a diagonal-
// ish held drag still turns the player the instant the dominant axis is
// blocked but the secondary one is open (see candidateDirsFromDelta).
let desiredDirs = [];

// `speed` (seconds/tile) is only consulted at the instant a new tween
// begins, locked into entity.tileTime for that tween's whole duration -
// a mode change (e.g. normal -> frightened) mid-tween must never rewrite
// the denominator an in-flight px/py interpolation is already using, or
// the sprite visibly jumps.
function stepEntity(entity, wantedDirs, dt, speed) {
  if (entity.moveCooldown > 0) {
    entity.moveCooldown = Math.max(0, entity.moveCooldown - dt);
  }
  if (entity.moveCooldown <= 0) {
    let dir = null;
    if (wantedDirs) {
      for (const d of wantedDirs) {
        if (d && canStep(entity.r, entity.c, d, entity.canWrap, entity.blockBox)) { dir = d; break; }
      }
    }
    if (!dir && (entity.dir.dr || entity.dir.dc) && canStep(entity.r, entity.c, entity.dir, entity.canWrap, entity.blockBox)) dir = entity.dir;
    if (dir) {
      const next = stepCoords(entity.r, entity.c, dir, entity.canWrap);
      entity.prevR = entity.r; entity.prevC = entity.c;
      entity.r = next.r; entity.c = next.c;
      entity.dir = dir;
      entity.tileTime = speed;
      entity.moveCooldown = speed;
      entity.wrapStep = next.wrapped;
      if (next.wrapped) {
        // Snap instantly across the wrap rather than tweening the whole
        // board width - a tunnel is a warp, not a long sprint.
        entity.px = cellCenterX(entity.c);
        entity.py = cellCenterY(entity.r);
        entity.prevR = entity.r; entity.prevC = entity.c;
      }
    } else {
      entity.dir = { dr: 0, dc: 0 };
    }
  }
  if (!entity.wrapStep) {
    const progress = entity.moveCooldown > 0 ? 1 - (entity.moveCooldown / entity.tileTime) : 1;
    entity.px = cellCenterX(entity.prevC) + (cellCenterX(entity.c) - cellCenterX(entity.prevC)) * progress;
    entity.py = cellCenterY(entity.prevR) + (cellCenterY(entity.r) - cellCenterY(entity.prevR)) * progress;
  }
  entity.wrapStep = false;
}

// ==================== Ghost pathing: BFS shortest path to a target tile,
// recomputed at every decision point (small board, trivially cheap). ====================
// allowWrap defaults to false since every ghost is meant to be locked out
// of the tunnel edge-jump - the player's escape hatch stays an escape only
// if the pathfinding never routes a chaser through it either.
function bfsNextDir(fromR, fromC, toR, toC, allowWrap) {
  if (fromR === toR && fromC === toC) return null;
  const key = (r, c) => r * COLS + c;
  const visited = new Set([key(fromR, fromC)]);
  const queue = [{ r: fromR, c: fromC, first: null }];
  let qi = 0;
  while (qi < queue.length) {
    const cur = queue[qi++];
    for (const d of DIR_LIST) {
      if (!canStep(cur.r, cur.c, d, allowWrap)) continue;
      const next = stepCoords(cur.r, cur.c, d, allowWrap);
      const k = key(next.r, next.c);
      if (visited.has(k)) continue;
      const first = cur.first || d;
      if (next.r === toR && next.c === toC) return first;
      visited.add(k);
      queue.push({ r: next.r, c: next.c, first });
    }
  }
  return null;
}
function manhattan(r1, c1, r2, c2) { return Math.abs(r1 - r2) + Math.abs(c1 - c2); }

// Walks up to `steps` tiles in a straight line from (r,c), stopping at the
// last open tile before a wall/boundary rather than landing past one - a
// literal "N tiles ahead" projection would often land inside a wall, which
// bfsNextDir can never path to (it only terminates on an exact, walkable
// target tile).
function projectAhead(r, c, dir, steps) {
  let tr = r, tc = c;
  for (let i = 0; i < steps; i++) {
    const nr = tr + dir.dr, nc = tc + dir.dc;
    if (!isWalkable(nr, nc)) break;
    tr = nr; tc = nc;
  }
  return { r: tr, c: tc };
}

function farthestCorner(fromR, fromC) {
  let best = CORNERS[0], bestDist = -1;
  for (const corner of CORNERS) {
    const d = manhattan(fromR, fromC, corner.r, corner.c);
    if (d > bestDist) { bestDist = d; best = corner; }
  }
  return best;
}

// Drift's "patrol" sub-state: semi-random wander, independent of the BFS
// chase targeting every other personality uses. Re-rolls a direction when
// the current one runs out or is blocked, same shape as Fuseblock's bots.
function wanderDir(g, dt) {
  g.wanderTimer -= dt;
  const stuck = !(g.wanderDir.dr || g.wanderDir.dc) || !canStep(g.r, g.c, g.wanderDir, g.canWrap);
  if (g.wanderTimer <= 0 || stuck) {
    const options = DIR_LIST.filter(d => canStep(g.r, g.c, d, g.canWrap));
    if (options.length > 0) g.wanderDir = options[Math.floor(Math.random() * options.length)];
    g.wanderTimer = 0.6 + Math.random() * 0.8;
  }
  return [g.wanderDir];
}

const GLINT_AMBUSH_DIST = 4;
const DRIFT_FAR_THRESHOLD = 8;

// Scatter/chase alternation: every ghost retreats to its own home corner on
// a timer, then re-engages with its personality logic, then back again.
// Permanent chase mode makes the game feel impossible rather than
// relentless-but-fair - this is what keeps it fair over a long run.
const SCATTER_DURATION = 7, CHASE_DURATION = 20;
let ghostPhase = 'scatter';
let ghostPhaseT = 0;
function resetGhostPhase() { ghostPhase = 'scatter'; ghostPhaseT = 0; }
function updateGhostPhase(dt) {
  ghostPhaseT += dt;
  const duration = ghostPhase === 'scatter' ? SCATTER_DURATION : CHASE_DURATION;
  if (ghostPhaseT >= duration) {
    ghostPhase = ghostPhase === 'scatter' ? 'chase' : 'scatter';
    ghostPhaseT = 0;
  }
}

// Staggered release: a ghost still waiting sits in the box (drawn, but
// stepEntity is never called on it - see update()) until either threshold
// crosses. Once released it just plugs straight into whatever scatter/chase
// phase is already in progress - this only changes WHEN a ghost joins, not
// how it behaves once active.
function updateGhostRelease(dt) {
  lifeElapsedT += dt;
  for (const g of ghosts) {
    if (g.released) continue;
    if (pelletsEatenThisLife >= g.releasePellets || lifeElapsedT >= g.releaseTime) {
      g.released = true;
    }
  }
}

function ghostDesiredDir(g, dt) {
  if (ghostPhase === 'scatter') {
    return [bfsNextDir(g.r, g.c, g.home.r, g.home.c, g.canWrap)];
  }
  if (g.personality === 'chase') {
    return [bfsNextDir(g.r, g.c, player.r, player.c, g.canWrap)];
  }
  if (g.personality === 'ambush') {
    const facing = (player.dir.dr || player.dir.dc) ? player.dir : { dr: 0, dc: 0 };
    const target = projectAhead(player.r, player.c, facing, GLINT_AMBUSH_DIST);
    return [bfsNextDir(g.r, g.c, target.r, target.c, g.canWrap)];
  }
  if (g.personality === 'flipper') {
    const dist = manhattan(g.r, g.c, player.r, player.c);
    if (dist > DRIFT_FAR_THRESHOLD) return [bfsNextDir(g.r, g.c, player.r, player.c, g.canWrap)];
    return wanderDir(g, dt);
  }
  if (g.personality === 'avoider') {
    const target = farthestCorner(player.r, player.c);
    return [bfsNextDir(g.r, g.c, target.r, target.c, g.canWrap)];
  }
  return [null];
}

// ==================== Joystick input ====================
// Fixed-position virtual joystick: the base sits at one constant screen
// location (bottom-center of the control band) and never moves - a stable
// physical reference point the thumb can return to by feel, like a
// hardware stick, rather than a floating anchor that drifts with touch.
// The touch-DETECTION zone still covers the whole control band (so the
// player doesn't need to precisely land on the graphic to start a touch),
// but once active, direction is always measured relative to the fixed
// anchor, never the touch's own start point.
const JOY_ANCHOR_X = W / 2, JOY_ANCHOR_Y = H - CONTROL_BAND_H / 2;
const JOY_DEADZONE = 5, JOY_MAX_RADIUS = 34; // short throw - full direction strength well within a thumb's resting reach
let joystick = { active: false, pointerId: null, curX: JOY_ANCHOR_X, curY: JOY_ANCHOR_Y };

function positionJoystickZone() {
  const scale = parseFloat(getComputedStyle(wrap).getPropertyValue('--game-scale')) || (canvas.getBoundingClientRect().width / W) || 1;
  joystickZoneEl.style.left = '0px';
  joystickZoneEl.style.top = (H - CONTROL_BAND_H) * scale + 'px';
  joystickZoneEl.style.width = W * scale + 'px';
  joystickZoneEl.style.height = CONTROL_BAND_H * scale + 'px';
}

function clientToCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / W;
  return { x: (clientX - rect.left) / scale, y: (clientY - rect.top) / scale };
}

// Dominant-axis resolution with a fallback to the secondary axis, not a
// one-shot angle-snap: a held drag at, say, 11 o'clock has real leftward
// AND upward intent, so if the dominant axis (up) is blocked but the
// secondary one (left) is open, the player should still turn - without
// needing the drag to straighten toward a near-perfect cardinal angle.
// Recomputed fresh from the live raw dx/dy on every pointer event.
function candidateDirsFromDelta(dx, dy) {
  const adx = Math.abs(dx), ady = Math.abs(dy);
  const horiz = adx >= JOY_DEADZONE ? (dx > 0 ? DIRS.right : DIRS.left) : null;
  const vert = ady >= JOY_DEADZONE ? (dy > 0 ? DIRS.down : DIRS.up) : null;
  if (!horiz && !vert) return [];
  if (!horiz) return [vert];
  if (!vert) return [horiz];
  return adx >= ady ? [horiz, vert] : [vert, horiz];
}

function updateJoystickFromPoint(clientX, clientY) {
  const p = clientToCanvas(clientX, clientY);
  const dx = p.x - JOY_ANCHOR_X, dy = p.y - JOY_ANCHOR_Y;
  const dist = Math.hypot(dx, dy);
  const clampedDist = Math.min(dist, JOY_MAX_RADIUS);
  const ang = Math.atan2(dy, dx);
  joystick.curX = JOY_ANCHOR_X + Math.cos(ang) * clampedDist;
  joystick.curY = JOY_ANCHOR_Y + Math.sin(ang) * clampedDist;
  desiredDirs = candidateDirsFromDelta(dx, dy);
}

joystickZoneEl.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  joystick.active = true;
  joystick.pointerId = e.pointerId;
  try { joystickZoneEl.setPointerCapture(e.pointerId); } catch (err) {}
  updateJoystickFromPoint(e.clientX, e.clientY);
});
joystickZoneEl.addEventListener('pointermove', (e) => {
  if (!joystick.active || e.pointerId !== joystick.pointerId) return;
  updateJoystickFromPoint(e.clientX, e.clientY);
});
function releaseJoystick(e) {
  if (e.pointerId !== joystick.pointerId) return;
  joystick.active = false;
  joystick.pointerId = null;
  joystick.curX = JOY_ANCHOR_X;
  joystick.curY = JOY_ANCHOR_Y;
  desiredDirs = [];
}
joystickZoneEl.addEventListener('pointerup', releaseJoystick);
joystickZoneEl.addEventListener('pointercancel', releaseJoystick);
window.addEventListener('blur', () => {
  joystick.active = false;
  joystick.curX = JOY_ANCHOR_X;
  joystick.curY = JOY_ANCHOR_Y;
  desiredDirs = [];
});

const KEY_DIR = {
  ArrowUp: DIRS.up, KeyW: DIRS.up, ArrowDown: DIRS.down, KeyS: DIRS.down,
  ArrowLeft: DIRS.left, KeyA: DIRS.left, ArrowRight: DIRS.right, KeyD: DIRS.right
};
document.addEventListener('keydown', (e) => {
  if (KEY_DIR[e.code]) {
    e.preventDefault();
    if (state === 'lifeReady') dismissReadyOverlay();
    desiredDirs = [KEY_DIR[e.code]];
  }
});

// ==================== Audio ====================
let audioCtx = null;
let muted = sessionStorage.getItem('chompAlleyMuted') === '1';
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
let pelletToneToggle = false;
function playPelletEat() {
  pelletToneToggle = !pelletToneToggle;
  tone(pelletToneToggle ? 480 : 380, 0.06, 'square', 0.08);
}
function playDeath() {
  tone(320, 0.14, 'sawtooth', 0.15);
  tone(220, 0.16, 'sawtooth', 0.14, 0.12);
  tone(120, 0.22, 'sawtooth', 0.13, 0.26);
}
function playClear() {
  tone(523, 0.1, 'triangle', 0.14, 0);
  tone(659, 0.1, 'triangle', 0.14, 0.1);
  tone(784, 0.1, 'triangle', 0.14, 0.2);
  tone(1047, 0.22, 'triangle', 0.15, 0.3);
}

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  try { sessionStorage.setItem('chompAlleyMuted', muted ? '1' : '0'); } catch (e) {}
  updateMuteBtn();
});

// ==================== Run state ====================
let state = 'ready'; // ready | playing | dying | lifeReady | levelClear | over
let score = 0, lives = 3, level = 1, attemptNum = 0;
let bestScore = 0, bestLevel = 1;
let deathT = 0, clearT = 0;
const DEATH_ANIM = 0.9, CLEAR_BANNER = 1.4;
let gameClock = 0;

function loadBest() {
  bestScore = parseInt(sessionStorage.getItem('chompAlleyBestScore_classic') || '0', 10);
  bestLevel = parseInt(sessionStorage.getItem('chompAlleyBestLevel_classic') || '1', 10);
}
function saveBest() {
  try {
    sessionStorage.setItem('chompAlleyBestScore_classic', bestScore);
    sessionStorage.setItem('chompAlleyBestLevel_classic', bestLevel);
  } catch (e) {}
}
function recordProgress() {
  if (score > bestScore) bestScore = score;
  if (level > bestLevel) bestLevel = level;
  saveBest();
}

function setupMaze() {
  setupPellets();
  resetEntities();
  resetGhostPhase();
  desiredDirs = [];
}

function resetRun() {
  loadBest();
  score = 0; lives = 3; level = 1;
  playerTileTime = 0.15;
  ghostTileTime = 0.188;
  frightenedDuration = 7;
  setupMaze();
}

resetRun();

function beginPlay() {
  resetRun();
  attemptNum++;
  state = 'playing';
  invulnerableT = START_GRACE;
  overlay.style.display = 'none';
  ensureAudio();
}

function showOverlay(title, subtitle, scoreText) {
  ovTitle.textContent = title;
  ovSubtitle.textContent = subtitle;
  if (scoreText) { ovScore.textContent = scoreText; ovScore.style.display = 'block'; }
  else { ovScore.style.display = 'none'; }
  startBtn.textContent = state === 'ready' ? 'Start' : 'Retry';
  backToArcade.style.display = state === 'ready' ? 'none' : 'inline-block';
  overlay.style.display = 'flex';
}
startBtn.addEventListener('click', beginPlay);
showOverlay('CHOMP ALLEY', 'Gobble every pellet in the alley. Four ghosts are hunting - keep moving.');

function loseLife() {
  state = 'dying';
  deathT = 0;
  playDeath();
}
function showReadyOverlay() { readyOverlayEl.style.display = 'flex'; }
function dismissReadyOverlay() {
  if (state !== 'lifeReady') return;
  readyOverlayEl.style.display = 'none';
  state = 'playing';
}
readyOverlayEl.addEventListener('pointerdown', (e) => { e.preventDefault(); dismissReadyOverlay(); });

function finishDeath() {
  lives--;
  if (lives <= 0) {
    recordProgress();
    state = 'over';
    showOverlay('CAUGHT!', 'Attempt #' + attemptNum, 'Score: ' + score + '   Best: ' + bestScore + '   Best level: ' + bestLevel);
  } else {
    resetEntities();
    resetGhostPhase();
    desiredDirs = [];
    state = 'lifeReady';
    showReadyOverlay();
  }
}
function clearMaze() {
  state = 'levelClear';
  clearT = 0;
  playClear();
}
function startNextMaze() {
  level++;
  ghostTileTime = Math.max(GHOST_TILE_TIME_FLOOR, ghostTileTime - GHOST_SPEEDUP_PER_CLEAR);
  frightenedDuration = Math.max(FRIGHTENED_DURATION_FLOOR, frightenedDuration - FRIGHTENED_DURATION_SHRINK_PER_CLEAR);
  setupMaze();
  state = 'playing';
}

function eatGhost(g) {
  g.eaten = true;
  eatenComboCount++;
  const idx = Math.min(eatenComboCount - 1, GHOST_EAT_SCORES.length - 1);
  score += GHOST_EAT_SCORES[idx];
  playPelletEat();
}

function triggerFrightened() {
  frightenedT = frightenedDuration;
  eatenComboCount = 0;
  for (const g of ghosts) {
    if (g.eaten) continue; // already-eaten eyes keep racing home, unaffected
    // Direction instantly reverses the moment frightened triggers - flip
    // both the entity's actual heading AND the wander target it'll read on
    // its very next decision, or wanderDir() would just re-roll randomly
    // and the reversal would never actually show up in its movement.
    const rev = { dr: -g.dir.dr, dc: -g.dir.dc };
    g.dir = rev;
    g.wanderDir = rev;
    g.wanderTimer = 0.6 + Math.random() * 0.8;
  }
}

function checkContact() {
  if (invulnerableT > 0) return;
  for (const g of ghosts) {
    if (!g.released || g.respawnCooldownT > 0) continue;
    const dist = Math.hypot(player.px - g.px, player.py - g.py);
    if (dist >= TILE * 0.55) continue;
    const mode = ghostMode(g);
    if (mode === 'eyes') continue; // harmless, already eaten
    if (mode === 'frightened') { eatGhost(g); continue; }
    loseLife();
    return;
  }
}
function checkPelletPickup() {
  const type = pellets[player.r][player.c];
  if (!type) return;
  pellets[player.r][player.c] = null;
  remainingPellets--;
  pelletsEatenThisLife++;
  score += type === 'power' ? 50 : 10;
  playPelletEat();
  if (type === 'power') triggerFrightened();
  if (remainingPellets <= 0) clearMaze();
}

function update(dt) {
  gameClock += dt;
  if (state === 'dying') {
    deathT += dt;
    if (deathT >= DEATH_ANIM) finishDeath();
    return;
  }
  if (state === 'levelClear') {
    clearT += dt;
    if (clearT >= CLEAR_BANNER) startNextMaze();
    return;
  }
  if (state !== 'playing') return;
  if (invulnerableT > 0) invulnerableT = Math.max(0, invulnerableT - dt);
  if (frightenedT > 0) frightenedT = Math.max(0, frightenedT - dt);
  updateGhostPhase(dt);
  updateGhostRelease(dt);
  stepEntity(player, desiredDirs, dt, playerTileTime);
  for (const g of ghosts) {
    if (!g.released) continue;
    if (g.eaten && g.r === g.boxR && g.c === g.boxC) {
      // Arrived home - respawns normally after a short cooldown rather
      // than instantly rejoining the hunt.
      g.eaten = false;
      g.respawnCooldownT = EYES_RESPAWN_COOLDOWN;
    }
    if (g.respawnCooldownT > 0) {
      g.respawnCooldownT = Math.max(0, g.respawnCooldownT - dt);
      continue;
    }
    const mode = ghostMode(g);
    if (mode === 'eyes') {
      stepEntity(g, [bfsNextDir(g.r, g.c, g.boxR, g.boxC, g.canWrap)], dt, EYES_TILE_TIME);
    } else if (mode === 'frightened') {
      stepEntity(g, wanderDir(g, dt), dt, ghostTileTime * FRIGHTENED_SPEED_MULT);
    } else {
      stepEntity(g, ghostDesiredDir(g, dt), dt, ghostTileTime);
    }
  }
  checkPelletPickup();
  checkContact();
}

// ==================== Draw ====================
function drawBackground() {
  ctx.fillStyle = bgGradient;
  ctx.fillRect(0, 0, W, H);
}
function drawMazeLayer() {
  ctx.drawImage(mazeLayer, OFFSET_X, OFFSET_Y);
}
function drawPellets() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const type = pellets[r][c];
      if (!type) continue;
      const x = cellCenterX(c), y = cellCenterY(r);
      if (type === 'power') {
        const pulse = 3.2 + Math.sin(gameClock * 6) * 1.1;
        ctx.fillStyle = COL.power;
        ctx.beginPath();
        ctx.arc(x, y, pulse, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = COL.pellet;
        ctx.beginPath();
        ctx.arc(x, y, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function facingAngle(dir) {
  if (dir.dc === 1) return 0;
  if (dir.dc === -1) return Math.PI;
  if (dir.dr === 1) return Math.PI / 2;
  if (dir.dr === -1) return -Math.PI / 2;
  return 0;
}

function drawPlayer() {
  if (state === 'dying') return;
  const r = TILE * 0.42;
  const mouthPhase = (Math.sin(gameClock * 12) + 1) / 2;
  const mouthAngle = 0.08 + mouthPhase * 0.55;
  const facing = facingAngle(player.dir);
  ctx.save();
  if (invulnerableT > 0) ctx.globalAlpha = 0.55 + 0.45 * Math.sin(gameClock * 22);
  ctx.translate(player.px, player.py);
  ctx.rotate(facing);
  ctx.fillStyle = COL.player;
  ctx.beginPath();
  ctx.arc(0, 0, r, mouthAngle, Math.PI * 2 - mouthAngle);
  ctx.lineTo(0, 0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawDeathAnim() {
  if (state !== 'dying') return;
  const t = Math.min(1, deathT / DEATH_ANIM);
  const r = TILE * 0.42 * (1 - t);
  if (r <= 0) return;
  ctx.save();
  ctx.globalAlpha = 1 - t;
  ctx.fillStyle = COL.player;
  ctx.beginPath();
  ctx.arc(player.px, player.py, r, 0, Math.PI * 2 * (1 - t));
  ctx.fill();
  ctx.restore();
}

// Eaten ghosts render as eyes only (no body) racing back to the box - a
// distinct silhouette so "already harmless" reads at a glance mid-chase.
function drawGhostEyes(g) {
  const r = TILE * 0.42;
  const dir = g.dir;
  const eyeOffX = dir.dc * 1.6, eyeOffY = dir.dr * 1.6;
  ctx.save();
  ctx.translate(g.px, g.py);
  for (const s of [-1, 1]) {
    ctx.fillStyle = COL.eyesWhite;
    ctx.beginPath();
    ctx.arc(s * r * 0.42, -r * 0.15, r * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COL.eyesPupil;
    ctx.beginPath();
    ctx.arc(s * r * 0.42 + eyeOffX, -r * 0.15 + eyeOffY, r * 0.14, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawGhost(g) {
  const mode = ghostMode(g);
  if (mode === 'eyes') { drawGhostEyes(g); return; }
  let bodyColor, darkColor;
  if (mode === 'frightened') {
    // Flashes between two blues in the last 2s as a fairness cue - the
    // window closing shouldn't be a silent surprise mid-chase.
    const warn = frightenedT < 2 && Math.floor(frightenedT * 6) % 2 === 0;
    bodyColor = warn ? COL.frightenedWarn : COL.frightened;
    darkColor = COL.eyesPupil;
  } else {
    bodyColor = COL[g.color];
    darkColor = COL[g.color + 'Dark'];
  }
  const r = TILE * 0.42;
  // Still waiting on its release timer - a small idle bob (draw-only, never
  // touches the real logical position) so it visibly reads as alive and
  // caged rather than a static prop.
  const bob = !g.released ? Math.sin(gameClock * 4 + g.bobPhase) * 2 : 0;
  ctx.save();
  ctx.translate(g.px, g.py + bob);
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(0, -r * 0.1, r, Math.PI, 0, false);
  ctx.lineTo(r, r * 0.75);
  const bumps = 4;
  for (let i = 0; i < bumps; i++) {
    const bx0 = r - (2 * r / bumps) * i;
    const bx1 = bx0 - r / bumps;
    const midX = (bx0 + bx1) / 2;
    ctx.quadraticCurveTo(midX, r * 0.45, bx1, r * 0.75);
  }
  ctx.closePath();
  ctx.fill();

  const dir = g.dir;
  const eyeOffX = dir.dc * 1.6, eyeOffY = dir.dr * 1.6;
  for (const s of [-1, 1]) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s * r * 0.42, -r * 0.15, r * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = darkColor;
    ctx.beginPath();
    ctx.arc(s * r * 0.42 + eyeOffX, -r * 0.15 + eyeOffY, r * 0.14, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// Always visible, even before the first touch - a fixed landmark the thumb
// can find and return to by feel, the way a hardware stick's base never
// moves. Brightens once actually held so touch feedback is still clear.
function drawJoystick() {
  ctx.save();
  ctx.globalAlpha = joystick.active ? 0.6 : 0.3;
  ctx.strokeStyle = 'rgba(240,234,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(JOY_ANCHOR_X, JOY_ANCHOR_Y, JOY_MAX_RADIUS, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = joystick.active ? 'rgba(124,255,107,0.6)' : 'rgba(124,255,107,0.3)';
  ctx.beginPath();
  ctx.arc(joystick.curX, joystick.curY, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawLifeIcon(x, y) {
  ctx.fillStyle = COL.player;
  ctx.beginPath();
  ctx.arc(x, y, 6, 0.35, Math.PI * 2 - 0.35);
  ctx.lineTo(x, y);
  ctx.closePath();
  ctx.fill();
}

function drawHUD() {
  ctx.textAlign = 'left';
  ctx.font = 'bold 13px Arial';
  ctx.fillStyle = COL.textMain;
  ctx.fillText('SCORE ' + score, 12, 20);

  ctx.textAlign = 'right';
  ctx.fillText('LEVEL ' + level, W - 12, 20);

  for (let i = 0; i < 3; i++) {
    ctx.globalAlpha = i < lives ? 1 : 0.25;
    drawLifeIcon(W / 2 - 20 + i * 20, 34);
  }
  ctx.globalAlpha = 1;
}

function drawClearBanner() {
  if (state !== 'levelClear') return;
  const t = clearT / CLEAR_BANNER;
  const alpha = t < 0.15 ? t / 0.15 : (t > 0.8 ? (1 - t) / 0.2 : 1);
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
  ctx.fillStyle = 'rgba(10,7,22,0.75)';
  ctx.fillRect(0, H / 2 - 30, W, 60);
  ctx.fillStyle = COL.power;
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('ALLEY CLEARED!', W / 2, H / 2 + 2);
  ctx.font = '11px Arial';
  ctx.fillStyle = COL.textMain;
  ctx.fillText('The ghosts are getting faster...', W / 2, H / 2 + 20);
  ctx.restore();
}

function draw() {
  drawBackground();
  drawMazeLayer();
  drawPellets();
  for (const g of ghosts) drawGhost(g);
  drawPlayer();
  drawDeathAnim();
  drawJoystick();
  drawHUD();
  drawClearBanner();
}

// ==================== Loop ====================
let lastT = null;
function loop(ts) {
  if (lastT === null) lastT = ts;
  const dt = Math.min(0.05, (ts - lastT) / 1000);
  lastT = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
fitCanvas();
requestAnimationFrame(loop);
</script>
