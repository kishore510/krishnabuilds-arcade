<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jungle Runner</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0e1a10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: linear-gradient(#2d5a3d, #1a3324 70%);
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
  }
  #overlay h1 { margin: 0 0 8px; font-size: calc(30px * var(--game-scale, 1)); }
  #overlay p { margin: 4px 0; font-size: calc(15px * var(--game-scale, 1)); opacity: 0.9; }
  #diffButtons {
    display: flex;
    gap: calc(14px * var(--game-scale, 1));
    margin-top: calc(18px * var(--game-scale, 1));
    pointer-events: auto;
  }
  #diffButtons button {
    font-family: inherit;
    font-size: calc(15px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(22px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  #diffButtons button:active { background: rgba(255,255,255,0.3); }
  #diffButtons button.selected {
    background: #ffb703;
    border-color: #ffb703;
    color: #04121c;
  }
  #backToArcade {
    display: none;
    margin-top: calc(18px * var(--game-scale, 1));
    font-size: calc(14px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Jungle Runner</h1>
    <p id="subtitle">Choose a mode to start</p>
    <p id="scoreLine" style="display:none;"></p>
    <div id="diffButtons">
      <button id="easyBtn" type="button">Easy</button>
      <button id="hardBtn" type="button">Hard</button>
    </div>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const easyBtn = document.getElementById('easyBtn');
const hardBtn = document.getElementById('hardBtn');
const diffButtons = document.getElementById('diffButtons');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;
const GROUND_Y = H - 60;
const MONKEY_X = 110;
const MONKEY_R = 17;
const GRAVITY = 0.9;
const JUMP_VELOCITY = -14.2;
const OBST_WIDTH = 46;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

// --- Speed ramps the longer the run lasts, but is clamped at speedMax so
// it never becomes unreactable. Obstacle gap is a pixel distance, not a
// time interval, so as speed climbs the player naturally gets less
// reaction time without the spacing itself becoming unfair. ---
const DIFFICULTY_PRESETS = {
  easy: { speedStart: 3.2, speedMax: 6.6, ramp: 0.0009, gapMin: 300, gapMax: 460 },
  hard: { speedStart: 4.4, speedMax: 9.0, ramp: 0.0014, gapMin: 230, gapMax: 370 }
};
const OBST_HEIGHTS = { gap: 6, log: 30, vine: 48 };

let difficulty = 'easy';
let preset = DIFFICULTY_PRESETS.easy;
let monkey, obstacles, distance, best, state, scrollSpeed, frame;
let bgTrees = [], canopyVines = [];

// --- Audio: generated on the fly with the Web Audio API, no external files ---
let audioCtx = null;
let muted = sessionStorage.getItem('jungleRunnerMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playJump() { tone(440, 0.08, 'sine', 0.1); }
function playHit() { tone(160, 0.35, 'sawtooth', 0.15); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('jungleRunnerMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest(diff) { return parseInt(sessionStorage.getItem('jungleRunnerBest_' + diff) || '0', 10); }
function saveBest(diff, v) { try { sessionStorage.setItem('jungleRunnerBest_' + diff, v); } catch (e) {} }

function initBg() {
  bgTrees = [];
  let x = -20;
  while (x < W + 60) {
    bgTrees.push({ x, r: 34 + Math.random() * 20 });
    x += 60 + Math.random() * 50;
  }
  canopyVines = [];
  let vx = 40;
  while (vx < W) {
    canopyVines.push({ x: vx, sway: Math.random() * Math.PI * 2, len: 70 + Math.random() * 40 });
    vx += 100 + Math.random() * 80;
  }
}

function reset() {
  monkey = { y: GROUND_Y - MONKEY_R, vy: 0, jumping: false, rot: 0 };
  obstacles = [];
  distance = 0;
  frame = 0;
  scrollSpeed = 0;
  state = 'ready';
  initBg();
  title.textContent = 'Jungle Runner';
  subtitle.textContent = 'Choose a mode to start';
  scoreLine.style.display = 'none';
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'none';
  best = loadBest(difficulty);
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function updateDiffButtonStyles() {
  easyBtn.classList.toggle('selected', difficulty === 'easy');
  hardBtn.classList.toggle('selected', difficulty === 'hard');
}

function startGame(diff) {
  difficulty = diff;
  preset = DIFFICULTY_PRESETS[diff];
  best = loadBest(difficulty);
  scrollSpeed = preset.speedStart;
  distance = 0;
  monkey = { y: GROUND_Y - MONKEY_R, vy: 0, jumping: false, rot: 0 };
  obstacles = [];
  frame = 0;
  spawnObstacle(W + 200);
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

function spawnObstacle(x) {
  const kinds = ['gap', 'log', 'log', 'vine'];
  const kind = kinds[Math.floor(Math.random() * kinds.length)];
  obstacles.push({ x: x !== undefined ? x : W + 40, kind });
}

function jump() {
  if (state === 'playing' && !monkey.jumping) {
    monkey.vy = JUMP_VELOCITY;
    monkey.jumping = true;
    playJump();
  } else if (state === 'over') {
    reset();
  }
}

function update() {
  if (state !== 'playing') return;
  frame++;
  scrollSpeed = Math.min(preset.speedMax, scrollSpeed + preset.ramp);
  distance += scrollSpeed * 0.045;

  monkey.vy += GRAVITY;
  monkey.y += monkey.vy;
  if (monkey.y >= GROUND_Y - MONKEY_R) {
    monkey.y = GROUND_Y - MONKEY_R;
    monkey.vy = 0;
    monkey.jumping = false;
  }
  monkey.rot = monkey.jumping ? clampNum(monkey.vy / 16, -0.5, 0.5) : 0;

  for (const o of obstacles) o.x -= scrollSpeed;
  if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < W - randRange(preset.gapMin, preset.gapMax)) {
    spawnObstacle();
  }
  obstacles = obstacles.filter(o => o.x > -OBST_WIDTH);

  for (const t of bgTrees) t.x -= scrollSpeed * 0.35;
  bgTrees = bgTrees.filter(t => t.x > -60);
  if (bgTrees.length === 0 || bgTrees[bgTrees.length - 1].x < W - 40) {
    const lastX = bgTrees.length ? bgTrees[bgTrees.length - 1].x : W;
    bgTrees.push({ x: lastX + 60 + Math.random() * 50, r: 34 + Math.random() * 20 });
  }

  for (const v of canopyVines) v.x -= scrollSpeed * 0.6;
  canopyVines = canopyVines.filter(v => v.x > -20);
  if (canopyVines.length === 0 || canopyVines[canopyVines.length - 1].x < W - 60) {
    const lastX = canopyVines.length ? canopyVines[canopyVines.length - 1].x : W;
    canopyVines.push({ x: lastX + 100 + Math.random() * 80, sway: Math.random() * Math.PI * 2, len: 70 + Math.random() * 40 });
  }

  for (const o of obstacles) {
    const topY = GROUND_Y - OBST_HEIGHTS[o.kind];
    const withinX = MONKEY_X + MONKEY_R > o.x && MONKEY_X - MONKEY_R < o.x + OBST_WIDTH;
    if (withinX && monkey.y + MONKEY_R > topY) {
      endGame();
      return;
    }
  }
}

function clampNum(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function randRange(lo, hi) { return lo + Math.random() * (hi - lo); }

function endGame() {
  state = 'over';
  playHit();
  const distInt = Math.round(distance);
  if (distInt > best) { best = distInt; saveBest(difficulty, best); }
  title.textContent = 'Ouch!';
  subtitle.textContent = 'Choose a mode to run again';
  scoreLine.style.display = 'block';
  scoreLine.textContent = distInt + ' m   Best (' + (difficulty === 'easy' ? 'Easy' : 'Hard') + '): ' + best + ' m';
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'inline-block';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

easyBtn.addEventListener('click', () => startGame('easy'));
hardBtn.addEventListener('click', () => startGame('hard'));

function drawBg() {
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  for (const t of bgTrees) {
    ctx.beginPath();
    ctx.ellipse(t.x, 130, t.r * 0.55, t.r, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.strokeStyle = 'rgba(80,140,70,0.55)';
  ctx.lineWidth = 4;
  for (const v of canopyVines) {
    const sway = Math.sin(frame * 0.02 + v.sway) * 12;
    ctx.beginPath();
    ctx.moveTo(v.x, 0);
    ctx.quadraticCurveTo(v.x + sway, v.len * 0.6, v.x, v.len);
    ctx.stroke();
  }
}

function drawGround() {
  ctx.fillStyle = '#5a3d24';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#3f2a18';
  ctx.fillRect(0, GROUND_Y, W, 8);
  // gaps: erase the ground strip under them
  for (const o of obstacles) {
    if (o.kind === 'gap') {
      ctx.clearRect(o.x, GROUND_Y, OBST_WIDTH, H - GROUND_Y);
      ctx.fillStyle = '#0e1a10';
      ctx.fillRect(o.x, GROUND_Y, OBST_WIDTH, H - GROUND_Y);
    }
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    if (o.kind === 'log') {
      ctx.fillStyle = '#6b4a2f';
      ctx.beginPath();
      ctx.ellipse(o.x + OBST_WIDTH / 2, GROUND_Y - 14, OBST_WIDTH / 2 - 4, 15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#4a3018';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(o.x + OBST_WIDTH / 2, GROUND_Y - 14, 6, 9, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (o.kind === 'vine') {
      const sway = Math.sin(frame * 0.15) * 4;
      ctx.strokeStyle = '#4a8a4f';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(o.x + OBST_WIDTH / 2 + sway, 0);
      ctx.lineTo(o.x + OBST_WIDTH / 2, GROUND_Y - OBST_HEIGHTS.vine);
      ctx.stroke();
      ctx.fillStyle = '#3a6a3f';
      ctx.beginPath();
      ctx.arc(o.x + OBST_WIDTH / 2, GROUND_Y - OBST_HEIGHTS.vine, 9, 0, Math.PI * 2);
      ctx.fill();
    }
    // 'gap' obstacles need no extra drawing - the missing ground is the obstacle
  }
}

function drawMonkey() {
  ctx.save();
  ctx.translate(MONKEY_X, monkey.y);
  ctx.rotate(monkey.rot);
  const bob = monkey.jumping ? 0 : Math.sin(frame * 0.35) * 2;
  ctx.translate(0, bob);

  const armSwing = monkey.jumping ? -18 : Math.sin(frame * 0.35) * 10;
  ctx.strokeStyle = '#8a5a34';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-14, -4); ctx.lineTo(-24, -16 + armSwing * 0.3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14, -4); ctx.lineTo(24, 8 - armSwing * 0.3); ctx.stroke();

  ctx.fillStyle = '#8a5a34';
  ctx.beginPath();
  ctx.ellipse(0, 0, MONKEY_R, MONKEY_R + 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#d9b78a';
  ctx.beginPath();
  ctx.ellipse(0, 4, 9, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#241608';
  ctx.beginPath();
  ctx.arc(-4, 0, 2, 0, Math.PI * 2);
  ctx.arc(4, 0, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#8a5a34';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(10, 10);
  ctx.quadraticCurveTo(30, 14 + Math.sin(frame * 0.3) * 3, 26, -6);
  ctx.stroke();
  ctx.restore();
}

function drawHud() {
  ctx.font = 'bold 20px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const distText = Math.round(distance) + ' m';
  ctx.strokeText(distText, 12, 34);
  ctx.fillText(distText, 12, 34);
  ctx.textAlign = 'right';
  ctx.font = 'bold 13px Arial';
  const bestText = 'Best: ' + best + ' m';
  ctx.strokeText(bestText, W - 12, 26);
  ctx.fillText(bestText, W - 12, 26);
}

function loop() {
  update();
  drawBg();
  drawGround();
  drawObstacles();
  drawMonkey();
  drawHud();
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousedown', jump);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, { passive: false });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
});

reset();
loop();
</script>
<script src="../../assets/version.js"></script>
<script src="../../assets/game-embed.js" data-coffee-url="https://buymeacoffee.com/Krishnabuilds"></script>
</body>
</html>
