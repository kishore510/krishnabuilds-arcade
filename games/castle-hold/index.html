<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Castle Hold</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1c1408;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #cfe3f2;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(27px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.9; max-width: calc(320px * var(--game-scale, 1)); }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  #startBtn {
    margin-top: calc(16px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #ffd76a;
    color: #3a2400;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #ffe28a; }
  #backToArcade {
    display: none;
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
  #rotateHint {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1c1408;
    color: white;
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  #rotateHint .icon { font-size: 48px; margin-bottom: 12px; animation: rotateWiggle 1.6s ease-in-out infinite; }
  #rotateHint p { font-size: 16px; font-weight: bold; max-width: 260px; }
  @keyframes rotateWiggle {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }
</style>
</head>
<body>
<div id="rotateHint">
  <div class="icon">📱</div>
  <p>Rotate your device to landscape to play Castle Hold</p>
</div>
<div id="wrap">
  <canvas id="game" width="640" height="360"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Castle Hold</h1>
    <p id="subtitle">Hold the line. Man the tiers with archers, gunmen and cannon, and deploy spearmen or cavalry at the gate.</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');
const rotateHint = document.getElementById('rotateHint');

// H is a fixed "world height" (360 logical units) so the castle/HUD never
// change size - W is deliberately mutable and re-derived from the device's
// actual aspect ratio on every fit, so the canvas fills the WHOLE landscape
// viewport instead of being letterboxed inside a fixed 640x360 rectangle.
// Everything the castle needs (wall, tiers, gate) is anchored near x=0, so
// widening W just reveals more open battlefield on the right - exactly the
// side a wider screen should get more of. Clamped so a pathological window
// shape doesn't produce a degenerate battlefield.
let W = canvas.width;
const H = canvas.height;
const GROUND_Y = H - 70;
const MIN_WORLD_W = 480, MAX_WORLD_W = 960;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availW = window.innerWidth;
  const availH = window.innerHeight - reserved;
  const targetW = clamp(Math.round(H * (availW / availH)), MIN_WORLD_W, MAX_WORLD_W);
  if (targetW !== W) {
    W = targetW;
    canvas.width = W;
  }
  const scale = Math.min(availW / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
function checkOrientation() {
  const portrait = window.innerWidth < window.innerHeight;
  rotateHint.style.display = portrait ? 'flex' : 'none';
}
function handleResize() { fitCanvas(); checkOrientation(); }
window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', handleResize);
window.addEventListener('kb-navbar-ready', fitCanvas);
handleResize();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('castleHoldMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playBowFire() { tone(700, 0.05, 'triangle', 0.07); }
function playArrowHit() { tone(240, 0.07, 'square', 0.09); }
function playCannonFire() { tone(80, 0.1, 'square', 0.16); }
function playCannonHit() { tone(70, 0.22, 'square', 0.18); tone(50, 0.28, 'sawtooth', 0.15, 0.04); }
function playMeleeClash() { tone(320, 0.05, 'square', 0.08); }
function playUnitFall() { tone(150, 0.16, 'sawtooth', 0.12); }
function playEnemyDie() { tone(180, 0.12, 'sawtooth', 0.1); }
function playWallThud() { tone(90, 0.18, 'square', 0.16); tone(60, 0.22, 'sine', 0.14, 0.05); }
function playGold() { tone(880, 0.06, 'triangle', 0.07); }
function playInvalid() { tone(160, 0.08, 'square', 0.08); }
function playWin() {
  tone(523, 0.14, 'triangle', 0.14);
  tone(659, 0.14, 'triangle', 0.13, 0.13);
  tone(784, 0.18, 'triangle', 0.13, 0.26);
  tone(1047, 0.28, 'triangle', 0.14, 0.4);
}
function playLose() { tone(200, 0.3, 'sawtooth', 0.14); tone(140, 0.4, 'sawtooth', 0.12, 0.15); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('castleHoldMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest() { return parseInt(sessionStorage.getItem('castleHoldBest') || '0', 10); }
function saveBest(v) { try { sessionStorage.setItem('castleHoldBest', v); } catch (e) {} }

// --- Castle geometry (matches the concept art) ---
const WALL_X = 0, WALL_W = 165, WALL_TOP = 40;
const TOWER_X = WALL_W - 46, TOWER_W = 54, TOWER_TOP = 8;
const MID_Y = WALL_TOP + 70;
const WALL_FRONT_X = WALL_W; // enemies are "at the wall" once they reach this x

// Tier 3 (top battlement): archers only - long range, thins enemies out early.
const TIER3_SLOTS = [
  { x: 22, y: 30, unit: null, cooldown: 0 },
  { x: 58, y: 30, unit: null, cooldown: 0 },
  { x: 132, y: 22, unit: null, cooldown: 0 }
];
// Tier 2 (mid gallery): gunman OR cannon, player's choice per slot.
const TIER2_SLOTS = [
  { x: 40, y: 100, unit: null, cooldown: 0 },
  { x: 100, y: 98, unit: null, cooldown: 0 }
];
// Ground, just outside the gate: spearman OR cavalry, player's choice per
// slot. Listed RIGHTMOST-first - that's the order an enemy walking
// right-to-left actually reaches them in, which the melee-engagement logic
// below relies on.
const GROUND_SLOTS = [
  { x: 210, y: GROUND_Y, unit: null, busy: false, hp: 0, maxHp: 0, atkCooldown: 0 },
  { x: 178, y: GROUND_Y, unit: null, busy: false, hp: 0, maxHp: 0, atkCooldown: 0 },
  { x: 146, y: GROUND_Y, unit: null, busy: false, hp: 0, maxHp: 0, atkCooldown: 0 }
];
const ENGAGE_DIST = 10, QUEUE_GAP = 20;
const PROJECTILE_SPEED = 620; // px/s

// Ranged units all share the same targeting (nearest enemy in range) and
// projectile-travel logic - only these numbers differ. Melee units instead
// hold their GROUND_SLOTS position and trade blows with whatever enemy is
// currently engaged there (see updateEnemies).
const UNIT_DEFS = {
  archer:   { cost: 40, kind: 'ranged', range: 430, fireInterval: 0.9, damage: 14, color: '#3a5a8a' },
  gunman:   { cost: 60, kind: 'ranged', range: 320, fireInterval: 1.1, damage: 20, color: '#6a5a3a' },
  cannon:   { cost: 90, kind: 'ranged', range: 260, fireInterval: 1.8, damage: 24, color: '#3a3f48', splash: 34 },
  spearman: { cost: 50, kind: 'melee', hp: 40, damage: 8, attackInterval: 0.8, color: '#5a6a3a' },
  cavalry:  { cost: 70, kind: 'melee', hp: 55, damage: 14, attackInterval: 0.7, color: '#6b4a2f' }
};

const ENEMY_DEFS = {
  footman:  { hp: 30, speed: 44, wallDamage: 9, meleeDamage: 6, atkInterval: 1.0, goldReward: 8 },
  horseman: { hp: 45, speed: 95, wallDamage: 14, meleeDamage: 10, atkInterval: 0.9, goldReward: 14 }
};

// PHASE 2 is still a single test wave (the full 10-12 wave scripted system
// with between-wave breathers is phase 3) - but it escalates internally:
// footmen only at first, horsemen mixed in with rising probability as the
// wave progresses, so even this one wave has a building-difficulty arc
// rather than a flat drip of identical enemies.
const WAVE_TOTAL = 16;
const SPAWN_INTERVAL = 1.5;
const CASTLE_MAX_HP = 100;
const START_GOLD = 110;

let castleHP = CASTLE_MAX_HP;
let gold = START_GOLD;
let enemies = [];
let projectiles = [];
let particles = [];
let popups = [];
let killCount = 0;
let spawned = 0;
let spawnTimer = 0;
let shake = 0;
let activeMenu = null; // { slot, kind: 'tier2'|'ground', options, x, y, _rects }
let state = 'menu'; // menu | playing | over

function showMenu() {
  state = 'menu';
  title.textContent = 'Castle Hold';
  subtitle.textContent = 'Hold the line. Man the tiers with archers, gunmen and cannon, and deploy spearmen or cavalry at the gate.';
  scoreLine.style.display = 'none';
  const best = loadBest();
  bestLine.textContent = best > 0 ? 'Best: ' + best + ' kills' : '';
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  overlay.style.display = 'flex';
}

function startGame() {
  castleHP = CASTLE_MAX_HP;
  gold = START_GOLD;
  enemies = [];
  projectiles = [];
  particles = [];
  popups = [];
  killCount = 0;
  spawned = 0;
  spawnTimer = 1;
  shake = 0;
  activeMenu = null;
  TIER3_SLOTS.forEach((s) => { s.unit = null; s.cooldown = 0; });
  TIER2_SLOTS.forEach((s) => { s.unit = null; s.cooldown = 0; });
  GROUND_SLOTS.forEach((s) => { s.unit = null; s.busy = false; s.hp = 0; s.maxHp = 0; s.atkCooldown = 0; });
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

startBtn.addEventListener('click', () => {
  if (state !== 'menu' && state !== 'over') return;
  // Must be called synchronously from this user-gesture handler, before
  // anything async, or Fullscreen/orientation-lock requests get rejected.
  window.kbEnterFullscreen?.(document.documentElement);
  startGame();
});
backToArcade.addEventListener('click', () => { window.kbExitFullscreen?.(); });

function pointerToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function slotHit(p, slot, radius) { return Math.hypot(p.x - slot.x, p.y - slot.y) <= radius; }

function openMenuForSlot(slot, kind) {
  const options = kind === 'tier2'
    ? [{ type: 'gunman' }, { type: 'cannon' }]
    : [{ type: 'spearman' }, { type: 'cavalry' }];
  activeMenu = { slot, kind, options, x: slot.x, y: slot.y, _rects: null };
}

function placeUnit(slot, kind, type) {
  const def = UNIT_DEFS[type];
  if (gold < def.cost) { playInvalid(); addPopup(slot.x, slot.y - 20, 'Need ' + def.cost + 'g', '#ff8a4a'); return; }
  gold -= def.cost;
  slot.unit = { type };
  if (kind === 'ranged-slot') {
    slot.cooldown = 0.2;
  } else {
    slot.hp = def.hp;
    slot.maxHp = def.hp;
    slot.atkCooldown = 0.2;
    slot.busy = false;
  }
  playGold();
}

canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing') return;
  const p = pointerToCanvas(e);

  if (activeMenu) {
    const hit = activeMenu._rects && activeMenu._rects.find((r) => p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h);
    if (hit) placeUnit(activeMenu.slot, activeMenu.kind === 'tier2' ? 'ranged-slot' : 'ground-slot', hit.type);
    activeMenu = null;
    return;
  }

  for (const slot of TIER3_SLOTS) {
    if (slotHit(p, slot, 16)) {
      if (!slot.unit) placeUnit(slot, 'ranged-slot', 'archer');
      return;
    }
  }
  for (const slot of TIER2_SLOTS) {
    if (slotHit(p, slot, 16)) {
      if (!slot.unit) openMenuForSlot(slot, 'tier2');
      return;
    }
  }
  for (const slot of GROUND_SLOTS) {
    if (slotHit(p, { x: slot.x, y: slot.y - 12 }, 16)) {
      if (!slot.unit) openMenuForSlot(slot, 'ground');
      return;
    }
  }
});

function addPopup(x, y, text, color) { popups.push({ x, y, text, color, t: 0 }); }
function addBurst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 30 + Math.random() * 70;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0, maxLife: 300 + Math.random() * 200, color, size: 2 + Math.random() * 2 });
  }
}

// Footmen only at first; horsemen mixed in with rising probability as the
// wave progresses, so difficulty ramps even within this single test wave.
function spawnEnemy() {
  const progress = spawned / WAVE_TOTAL;
  const horsemanChance = clamp(progress * 0.6, 0, 0.5);
  const type = Math.random() < horsemanChance ? 'horseman' : 'footman';
  const def = ENEMY_DEFS[type];
  enemies.push({
    type, x: W + 20, y: GROUND_Y, hp: def.hp, maxHp: def.hp, speed: def.speed,
    dead: false, bob: Math.random() * 10, meleeSlot: null, atkCooldown: 0.3,
    queueOffset: Math.random() * 16
  });
}

function updateRangedSlots(slots, dt) {
  for (const slot of slots) {
    if (!slot.unit) continue;
    const def = UNIT_DEFS[slot.unit.type];
    slot.cooldown -= dt;
    if (slot.cooldown > 0) continue;
    let target = null, bestDist = def.range;
    for (const en of enemies) {
      if (en.dead) continue;
      const d = en.x - slot.x;
      if (d >= 0 && d <= bestDist) { bestDist = d; target = en; }
    }
    if (target) {
      slot.cooldown = def.fireInterval;
      if (def.splash) playCannonFire(); else playBowFire();
      projectiles.push({ x: slot.x, y: slot.y, targetRef: target, damage: def.damage, spawnX: slot.x, spawnY: slot.y, splash: def.splash || 0 });
    }
  }
}

function updateProjectiles(dt) {
  for (const p of projectiles) {
    if (p.done) continue;
    const en = p.targetRef;
    if (!en || en.dead) { p.done = true; continue; }
    const dx = en.x - p.x, dy = (en.y - 14) - p.y;
    const dist = Math.hypot(dx, dy);
    const step = PROJECTILE_SPEED * dt;
    if (dist <= step) {
      p.done = true;
      if (p.splash > 0) {
        for (const other of enemies) {
          if (other.dead || Math.abs(other.x - en.x) > p.splash) continue;
          other.hp -= p.damage;
          if (other.hp <= 0 && !other.dead) killEnemy(other);
        }
        addBurst(en.x, en.y - 10, '#5a5f68', 16);
        playCannonHit();
      } else {
        en.hp -= p.damage;
        addBurst(en.x, en.y - 14, '#e8834a', 6);
        playArrowHit();
        if (en.hp <= 0 && !en.dead) killEnemy(en);
      }
    } else {
      p.x += (dx / dist) * step;
      p.y += (dy / dist) * step;
    }
  }
  projectiles = projectiles.filter((p) => !p.done);
}

function killEnemy(en) {
  en.dead = true;
  killCount++;
  const reward = ENEMY_DEFS[en.type].goldReward;
  gold += reward;
  addBurst(en.x, en.y - 10, '#8a3a3a', 12);
  addPopup(en.x, en.y - 24, '+' + reward + 'g', '#ffd76a');
  playEnemyDie();
  if (en.meleeSlot) { en.meleeSlot.busy = false; en.meleeSlot = null; }
}

// Ground units block: an enemy reaching an occupied slot stops and trades
// blows with it instead of walking through. If the slot's unit dies, the
// enemy resumes advancing (and may hit the next slot, or the wall). If the
// slot is already fighting someone else, the enemy just queues behind it.
function updateEnemies(dt) {
  for (const en of enemies) {
    if (en.dead) continue;
    const def = ENEMY_DEFS[en.type];

    if (en.meleeSlot) {
      const slot = en.meleeSlot;
      if (!slot.unit) { en.meleeSlot = null; continue; }
      en.atkCooldown -= dt;
      if (en.atkCooldown <= 0) {
        en.atkCooldown = def.atkInterval;
        slot.hp -= def.meleeDamage;
        playMeleeClash();
        addBurst(slot.x, slot.y - 14, '#c0392b', 4);
        if (slot.hp <= 0) {
          addPopup(slot.x, slot.y - 26, slot.unit.type + ' fell!', '#ff8a4a');
          slot.unit = null; slot.busy = false; slot.hp = 0;
          en.meleeSlot = null;
          playUnitFall();
        }
      }
      continue;
    }

    en.x -= en.speed * dt;

    let blocked = false;
    for (const slot of GROUND_SLOTS) {
      if (!slot.unit) continue;
      if (en.x <= slot.x + ENGAGE_DIST) {
        blocked = true;
        if (!slot.busy) {
          slot.busy = true;
          en.meleeSlot = slot;
          en.atkCooldown = UNIT_DEFS[slot.unit.type].attackInterval * 0.5;
        } else {
          en.x = slot.x + ENGAGE_DIST + QUEUE_GAP + en.queueOffset;
        }
        break;
      }
    }
    if (blocked) continue;

    if (en.x <= WALL_FRONT_X + 14) {
      castleHP -= def.wallDamage;
      en.dead = true;
      shake = 0.25;
      playWallThud();
      addBurst(WALL_FRONT_X + 10, en.y - 10, '#c0392b', 10);
      if (castleHP <= 0) { castleHP = 0; endGame(false); return; }
    }
  }
  enemies = enemies.filter((en) => !en.dead);
}

function checkWaveComplete() {
  if (spawned >= WAVE_TOTAL && enemies.length === 0 && state === 'playing') {
    endGame(true);
  }
}

function endGame(won) {
  state = 'over';
  if (won) {
    playWin();
    const best = loadBest();
    const isNewBest = killCount > best;
    if (isNewBest) saveBest(killCount);
    title.textContent = 'The line held!';
    subtitle.textContent = 'Every enemy stopped before the gate.';
    scoreLine.style.display = 'block';
    scoreLine.textContent = 'Kills: ' + killCount + ' · Castle HP left: ' + Math.round(castleHP) + '%';
    bestLine.textContent = isNewBest ? '🏆 New best!' : 'Best: ' + best + ' kills';
  } else {
    playLose();
    title.textContent = 'The castle has fallen';
    subtitle.textContent = 'Enemies broke through the gate.';
    scoreLine.style.display = 'block';
    scoreLine.textContent = 'Kills: ' + killCount;
    const best = loadBest();
    bestLine.textContent = best > 0 ? 'Best: ' + best + ' kills' : '';
  }
  startBtn.textContent = 'Play Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

function update(dt) {
  particles.forEach((p) => { p.life += dt * 1000; p.vy += 160 * dt; p.x += p.vx * dt; p.y += p.vy * dt; });
  particles = particles.filter((p) => p.life < p.maxLife);
  popups.forEach((p) => { p.t += dt * 1000; });
  popups = popups.filter((p) => p.t < 900);
  if (shake > 0) shake -= dt;

  if (state !== 'playing') return;

  if (spawned < WAVE_TOTAL) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) { spawnEnemy(); spawned++; spawnTimer = SPAWN_INTERVAL; }
  }
  updateRangedSlots(TIER3_SLOTS, dt);
  updateRangedSlots(TIER2_SLOTS, dt);
  updateEnemies(dt);
  updateProjectiles(dt);
  checkWaveComplete();
}

// --- Rendering (matches the concept art's palette/silhouette) ---
let skyGrad = null, groundGrad = null;
function buildGradients() {
  skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#cfe3f2'); skyGrad.addColorStop(1, '#e8d9b0');
  groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  groundGrad.addColorStop(0, '#c9a86a'); groundGrad.addColorStop(1, '#a8824a');
}
buildGradients();

function drawBackdrop() {
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, GROUND_Y);
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = 'rgba(180,160,110,0.5)';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.quadraticCurveTo(W * 0.3125, GROUND_Y - 50, W * 0.625, GROUND_Y);
  ctx.quadraticCurveTo(W * 0.8125, GROUND_Y - 40, W, GROUND_Y);
  ctx.fill();
}

function drawCastle() {
  let stone = ctx.createLinearGradient(0, WALL_TOP, 0, GROUND_Y);
  stone.addColorStop(0, '#9aa0a8'); stone.addColorStop(1, '#767b84');
  ctx.fillStyle = stone;
  ctx.fillRect(WALL_X, WALL_TOP, WALL_W, GROUND_Y - WALL_TOP);
  ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1;
  for (let y = WALL_TOP + 22; y < GROUND_Y; y += 22) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(WALL_W, y); ctx.stroke(); }
  for (let y = WALL_TOP; y < GROUND_Y; y += 22) {
    const off = ((y - WALL_TOP) / 22) % 2 === 0 ? 0 : 20;
    for (let x = off; x < WALL_W; x += 40) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + 22); ctx.stroke(); }
  }

  ctx.fillStyle = '#767b84'; ctx.fillRect(0, WALL_TOP, WALL_W, 8);
  ctx.fillStyle = '#8a9098';
  for (let x = 4; x < WALL_W; x += 24) ctx.fillRect(x, WALL_TOP - 14, 15, 16);

  ctx.fillStyle = '#6b7078'; ctx.fillRect(0, MID_Y, WALL_W + 16, 12);
  ctx.fillStyle = '#8a9098';
  for (let x = 6; x < WALL_W + 16; x += 24) ctx.fillRect(x, MID_Y - 12, 14, 12);
  ctx.fillStyle = '#2a2f36';
  for (let x = 24; x < WALL_W; x += 42) ctx.fillRect(x, MID_Y + 26, 6, 16);

  const towerTop = TOWER_TOP;
  let tstone = ctx.createLinearGradient(0, towerTop, 0, GROUND_Y);
  tstone.addColorStop(0, '#9aa0a8'); tstone.addColorStop(1, '#6b7078');
  ctx.fillStyle = tstone; ctx.fillRect(TOWER_X, towerTop, TOWER_W, GROUND_Y - towerTop);
  ctx.fillStyle = '#767b84'; ctx.fillRect(TOWER_X, towerTop, TOWER_W, 8);
  ctx.fillStyle = '#8a9098';
  for (let x = TOWER_X + 4; x < TOWER_X + TOWER_W; x += 18) ctx.fillRect(x, towerTop - 13, 12, 15);
  ctx.fillStyle = '#2a2f36';
  ctx.fillRect(TOWER_X + 16, towerTop + 26, 7, 18);
  ctx.fillRect(TOWER_X + 16, towerTop + 60, 7, 18);
  ctx.fillStyle = '#b0403a';
  ctx.beginPath();
  ctx.moveTo(TOWER_X - 4, towerTop - 12); ctx.lineTo(TOWER_X + TOWER_W + 4, towerTop - 12);
  ctx.lineTo(TOWER_X + TOWER_W / 2, towerTop - 40); ctx.fill();
  ctx.strokeStyle = '#3a2a18'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(TOWER_X + TOWER_W / 2, towerTop - 40); ctx.lineTo(TOWER_X + TOWER_W / 2, towerTop - 58); ctx.stroke();
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(TOWER_X + TOWER_W / 2, towerTop - 58);
  ctx.lineTo(TOWER_X + TOWER_W / 2 + 24, towerTop - 51);
  ctx.lineTo(TOWER_X + TOWER_W / 2, towerTop - 44);
  ctx.fill();

  ctx.fillStyle = '#3a2818';
  ctx.beginPath();
  ctx.moveTo(46, GROUND_Y); ctx.lineTo(46, GROUND_Y - 58);
  ctx.arc(78, GROUND_Y - 58, 32, Math.PI, 0); ctx.lineTo(110, GROUND_Y); ctx.fill();
  ctx.strokeStyle = '#6b5030'; ctx.lineWidth = 3;
  for (let x = 54; x <= 102; x += 12) { ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x, GROUND_Y - 70); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(46, GROUND_Y - 52); ctx.lineTo(110, GROUND_Y - 52); ctx.stroke();
}

function drawArcherFigure(x, y) {
  ctx.fillStyle = '#3a5a8a'; ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#e8e0c0'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x + 5, y, 7, -1, 1); ctx.stroke();
}
function drawGunmanFigure(x, y) {
  ctx.fillStyle = '#6a5a3a'; ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 12, y - 3); ctx.stroke();
}
function drawCannonFigure(x, y) {
  ctx.fillStyle = '#3a3f48'; ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillRect(x, y - 4, 16, 7);
}
function drawSpearmanFigure(x, y) {
  ctx.fillStyle = '#5a6a3a'; ctx.beginPath(); ctx.arc(x, y - 10, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillRect(x - 2, y - 6, 4, 14);
  ctx.strokeStyle = '#c0c0c0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x + 6, y - 20); ctx.lineTo(x + 6, y + 8); ctx.stroke();
}
function drawCavalryFigure(x, y) {
  ctx.fillStyle = '#6b4a2f'; ctx.beginPath(); ctx.ellipse(x, y, 15, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillRect(x - 12, y + 4, 3, 9); ctx.fillRect(x + 9, y + 4, 3, 9);
  ctx.beginPath(); ctx.ellipse(x - 13, y - 6, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3a5a8a'; ctx.beginPath(); ctx.arc(x, y - 9, 5, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#c0c0c0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x, y - 9); ctx.lineTo(x - 16, y - 14); ctx.stroke();
}
const RANGED_FIGURE_DRAWERS = { archer: drawArcherFigure, gunman: drawGunmanFigure, cannon: drawCannonFigure };
const MELEE_FIGURE_DRAWERS = { spearman: drawSpearmanFigure, cavalry: drawCavalryFigure };

function drawEmptySlotMarker(x, y) {
  ctx.strokeStyle = 'rgba(255,215,106,0.85)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,215,106,0.25)';
  ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,215,106,0.95)';
  ctx.font = 'bold 9px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('+', x, y + 3);
}

function drawTier3Slots() {
  for (const slot of TIER3_SLOTS) {
    if (slot.unit) RANGED_FIGURE_DRAWERS[slot.unit.type](slot.x, slot.y);
    else drawEmptySlotMarker(slot.x, slot.y);
  }
}
function drawTier2Slots() {
  for (const slot of TIER2_SLOTS) {
    if (slot.unit) RANGED_FIGURE_DRAWERS[slot.unit.type](slot.x, slot.y);
    else drawEmptySlotMarker(slot.x, slot.y);
  }
}
function drawGroundSlots() {
  for (const slot of GROUND_SLOTS) {
    if (slot.unit) {
      MELEE_FIGURE_DRAWERS[slot.unit.type](slot.x, slot.y);
      if (slot.hp < slot.maxHp) {
        const w = 26;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(slot.x - w / 2, slot.y - 32, w, 4);
        ctx.fillStyle = '#5cc85c'; ctx.fillRect(slot.x - w / 2, slot.y - 32, w * clamp(slot.hp / slot.maxHp, 0, 1), 4);
      }
    } else {
      drawEmptySlotMarker(slot.x, slot.y - 12);
    }
  }
}

function drawFootman(en, y) {
  ctx.fillStyle = '#8a3a3a';
  ctx.beginPath(); ctx.arc(en.x, y - 10, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillRect(en.x - 3, y - 6, 6, 14);
  ctx.strokeStyle = '#c0c0c0'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(en.x - 6, y - 12); ctx.lineTo(en.x - 12, y - 18); ctx.stroke();
}
function drawHorseman(en, y) {
  ctx.fillStyle = '#5a3a2a'; ctx.beginPath(); ctx.ellipse(en.x, y, 15, 7, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillRect(en.x - 12, y + 4, 3, 9); ctx.fillRect(en.x + 9, y + 4, 3, 9);
  ctx.beginPath(); ctx.ellipse(en.x + 13, y - 6, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#8a3a3a'; ctx.beginPath(); ctx.arc(en.x, y - 9, 5, 0, Math.PI * 2); ctx.fill();
}
const ENEMY_DRAWERS = { footman: drawFootman, horseman: drawHorseman };

function drawEnemy(en) {
  const y = en.y + Math.sin((en.bob + performance.now() / 140)) * 1.4;
  ENEMY_DRAWERS[en.type](en, y);
  if (en.hp < en.maxHp) {
    const w = 22;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(en.x - w / 2, y - 30, w, 4);
    ctx.fillStyle = '#5cc85c'; ctx.fillRect(en.x - w / 2, y - 30, w * clamp(en.hp / en.maxHp, 0, 1), 4);
  }
}

function drawMenu() {
  if (!activeMenu) return;
  const bw = 82, bh = 28, gap = 5;
  const totalH = activeMenu.options.length * bh + (activeMenu.options.length - 1) * gap;
  const mx = clamp(activeMenu.x - bw / 2, 6, W - bw - 6);
  const my = clamp(activeMenu.y + 16, 6, H - totalH - 6);
  activeMenu._rects = activeMenu.options.map((opt, i) => ({ x: mx, y: my + i * (bh + gap), w: bw, h: bh, type: opt.type }));
  for (const r of activeMenu._rects) {
    const def = UNIT_DEFS[r.type];
    ctx.fillStyle = 'rgba(15,15,20,0.92)';
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeStyle = gold >= def.cost ? 'rgba(255,215,106,0.9)' : 'rgba(180,80,80,0.9)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
    ctx.fillText(r.type[0].toUpperCase() + r.type.slice(1), r.x + r.w / 2, r.y + 12);
    ctx.fillStyle = '#ffd76a'; ctx.font = 'bold 10px Arial';
    ctx.fillText(def.cost + 'g', r.x + r.w / 2, r.y + 24);
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    if (p.splash > 0) {
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
      continue;
    }
    const en = p.targetRef;
    const tx = en && !en.dead ? en.x : p.x, ty = en && !en.dead ? en.y - 14 : p.y;
    const dx = tx - p.spawnX, dy = ty - p.spawnY;
    const dist = Math.hypot(dx, dy) || 1;
    const ux = dx / dist, uy = dy / dist;
    ctx.strokeStyle = '#4a3a20'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x - ux * 12, p.y - uy * 12);
    ctx.lineTo(p.x + ux * 4, p.y + uy * 4);
    ctx.stroke();
  }
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 1 - t;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}
function drawPopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 12px Arial';
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 3;
  for (const p of popups) {
    const t = p.t / 900;
    ctx.globalAlpha = 1 - t;
    ctx.strokeText(p.text, p.x, p.y - t * 24);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - t * 24);
    ctx.globalAlpha = 1;
  }
}

function drawHud() {
  // Top-center, not top-left - top-left is where the tier-3 archer slots
  // live on the wall, and an opaque HP bar there was sitting right on top
  // of (and blocking taps on) the first two slots. Sits below y=32 so it
  // also clears the floating mute button, which is centered at the very
  // top of the canvas by its own CSS.
  const hpBarW = 160, hpBarX = W / 2 - hpBarW / 2, hpBarY = 34;
  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(hpBarX, hpBarY, hpBarW, 20);
  ctx.fillStyle = castleHP > 40 ? '#5cc85c' : '#e05a4a';
  ctx.fillRect(hpBarX + 2, hpBarY + 2, (hpBarW - 4) * clamp(castleHP / CASTLE_MAX_HP, 0, 1), 16);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
  ctx.fillText('CASTLE  ' + Math.round(castleHP) + '%', W / 2, hpBarY + 14);

  ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(W - 170, 10, 160, 44);
  ctx.fillStyle = '#ffd76a'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'left';
  ctx.fillText('Gold: ' + gold, W - 160, 28);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial';
  ctx.fillText('Kills: ' + killCount + ' / ' + WAVE_TOTAL, W - 160, 46);

  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Tap a glowing wall or ground slot to place a defender', W / 2, H - 10);
}

function draw() {
  ctx.save();
  const mag = shake > 0 ? shake * 8 : 0;
  if (mag > 0) ctx.translate((Math.random() * 2 - 1) * mag, (Math.random() * 2 - 1) * mag);
  drawBackdrop();
  drawCastle();
  drawGroundSlots();
  drawTier3Slots();
  drawTier2Slots();
  if (state !== 'menu') {
    for (const en of enemies) drawEnemy(en);
    drawProjectiles();
    drawParticles();
    drawPopups();
    drawHud();
    drawMenu();
  }
  ctx.restore();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
