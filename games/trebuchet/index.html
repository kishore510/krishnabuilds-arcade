<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trebuchet</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1a1710;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #8fd3e8;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(27px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.9; }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  .rowLabel {
    font-size: calc(10.5px * var(--game-scale, 1));
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
    margin-top: calc(8px * var(--game-scale, 1));
  }
  .btnRow {
    display: flex;
    gap: calc(8px * var(--game-scale, 1));
    margin-top: calc(5px * var(--game-scale, 1));
    pointer-events: auto;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btnRow button {
    font-family: inherit;
    font-size: calc(12.5px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(7px * var(--game-scale, 1)) calc(15px * var(--game-scale, 1));
    border-radius: calc(18px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  .btnRow button:active { background: rgba(255,255,255,0.3); }
  .btnRow button.selected { background: #ffb703; border-color: #ffb703; color: #04121c; }
  #startBtn {
    margin-top: calc(16px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #c9853a;
    color: #2a1a00;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #e8b96b; }
  #backToArcade {
    display: none;
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Trebuchet</h1>
    <p id="subtitle">Defend the castle — pull back, let fly, break every wave</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <div class="rowLabel">Difficulty</div>
    <div class="btnRow" id="diffButtons">
      <button data-d="easy" type="button">Easy</button>
      <button data-d="hard" type="button">Hard</button>
    </div>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');
const diffButtons = document.getElementById('diffButtons');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('trebuchetMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playThwack() { tone(160, 0.09, 'square', 0.15); tone(90, 0.14, 'sine', 0.12, 0.02); }
function playWhoosh() {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  const now = audioCtx.currentTime;
  osc.frequency.setValueAtTime(700, now);
  osc.frequency.exponentialRampToValueAtTime(140, now + 0.5);
  gain.gain.setValueAtTime(0.06, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.55);
}
function playImpact() { tone(150, 0.1, 'square', 0.13); tone(90, 0.16, 'sawtooth', 0.11, 0.04); }
function playKill() { tone(700, 0.08, 'triangle', 0.1); tone(1000, 0.1, 'triangle', 0.08, 0.05); }
function playCastleHit() { tone(180, 0.16, 'sawtooth', 0.15); tone(110, 0.22, 'square', 0.13, 0.06); }
function playUpgrade() { tone(500, 0.07, 'triangle', 0.1); tone(750, 0.08, 'triangle', 0.09, 0.05); tone(1000, 0.1, 'triangle', 0.08, 0.11); }
function playDenied() { tone(160, 0.09, 'square', 0.08); }
function playWaveStart() { tone(520, 0.08, 'triangle', 0.1); tone(700, 0.09, 'triangle', 0.09, 0.06); }
function playWaveClear() {
  tone(523, 0.14, 'triangle', 0.14);
  tone(659, 0.14, 'triangle', 0.13, 0.13);
  tone(784, 0.16, 'triangle', 0.13, 0.26);
  tone(1047, 0.26, 'triangle', 0.14, 0.4);
}
function playVictory() {
  tone(660, 0.12, 'triangle', 0.13); tone(880, 0.14, 'triangle', 0.12, 0.09);
  tone(1100, 0.16, 'triangle', 0.11, 0.19); tone(1320, 0.22, 'triangle', 0.1, 0.32);
}
function playFail() { tone(200, 0.2, 'sawtooth', 0.12); tone(140, 0.3, 'sawtooth', 0.1, 0.1); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('trebuchetMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest(diff) { return parseInt(sessionStorage.getItem('trebuchetBest_' + diff) || '0', 10); }
function saveBest(diff, v) { try { sessionStorage.setItem('trebuchetBest_' + diff, v); } catch (e) {} }

// --- World / layout ---
// The old version's physics bugs all lived in the block-resting/collision
// system (stones toppling stacked blocks that had to come to rest without
// jittering forever). Redesigning this as a castle defense game removes that
// whole subsystem: a shot is now pure ballistic flight that explodes once on
// impact - there is nothing left that ever needs to "settle."
const GRAVITY = 640;
const HUD_H = 34;
const TRAY_H = 56;
const GROUND_Y = H - TRAY_H - 6;
const CASTLE_X = 6, CASTLE_W = 76;
const GATE_X = CASTLE_X + CASTLE_W + 4;
const LAUNCHER = { x: 142, y: GROUND_Y - 26 };
const MAX_PULL = 70;
const MAX_LAUNCH_SPEED = 480;
const MIN_ANGLE = -1.5, MAX_ANGLE = -0.12; // radians, always up-and-right toward the enemy side
const PROJECTILE_R = 9;

const ENEMY_TYPES = {
  raider:    { hp: 1, speed: 60, dmg: 6,  size: 11, color: '#e6543b', darkColor: '#7a1f16' },
  brute:     { hp: 3, speed: 40, dmg: 12, size: 14, color: '#c9853a', darkColor: '#6b4a1e' },
  siegeCart: { hp: 6, speed: 25, dmg: 26, size: 18, color: '#7a7a86', darkColor: '#33333c' }
};

const WAVE_MIXES = [
  { raider: 1 },
  { raider: 0.8, brute: 0.2 },
  { raider: 0.6, brute: 0.4 },
  { raider: 0.5, brute: 0.35, siegeCart: 0.15 },
  { raider: 0.4, brute: 0.35, siegeCart: 0.25 },
  { raider: 0.3, brute: 0.4, siegeCart: 0.3 },
  { raider: 0.25, brute: 0.35, siegeCart: 0.4 },
  { raider: 0.2, brute: 0.3, siegeCart: 0.5 }
];
const WAVE_COUNT = 8;

const DIFFICULTY_PRESETS = {
  easy: { startHp: 120, killReward: 9, hpStep: 0.2, speedStep: 0.05, intervalBase: 1.5, intervalStep: 0.07, intervalMin: 0.75 },
  hard: { startHp: 90, killReward: 6, hpStep: 0.3, speedStep: 0.08, intervalBase: 1.2, intervalStep: 0.06, intervalMin: 0.6 }
};

function buildWaves(preset) {
  const waves = [];
  for (let i = 0; i < WAVE_COUNT; i++) {
    waves.push({
      count: 5 + Math.round(i * 1.6),
      interval: clamp(preset.intervalBase - i * preset.intervalStep, preset.intervalMin, preset.intervalBase),
      hpMult: 1 + i * preset.hpStep,
      speedMult: 1 + i * preset.speedStep,
      mix: WAVE_MIXES[i]
    });
  }
  return waves;
}

function pickType(mix) {
  const total = Object.values(mix).reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (const key in mix) { r -= mix[key]; if (r <= 0) return key; }
  return Object.keys(mix)[0];
}

// --- Upgrades: bought with gold earned from kills, any time mid-run ---
const UPGRADES = {
  reload: { name: 'Reload', maxLevel: 3, baseCost: 30, costMul: 1.9 },
  blast: { name: 'Blast', maxLevel: 3, baseCost: 35, costMul: 1.9 },
  power: { name: 'Power', maxLevel: 3, baseCost: 40, costMul: 1.9 }
};
const UPGRADE_ORDER = ['reload', 'blast', 'power'];
let upgradeLevels = { reload: 0, blast: 0, power: 0 };
function reloadDuration() { return Math.max(0.55, 1.5 - upgradeLevels.reload * 0.3); }
function currentSplashRadius() { return 32 + upgradeLevels.blast * 11; }
function shotDamage() { return 1 + upgradeLevels.power; }
function upgradeCost(key) {
  const u = UPGRADES[key];
  const lvl = upgradeLevels[key];
  if (lvl >= u.maxLevel) return null;
  return Math.round(u.baseCost * Math.pow(u.costMul, lvl));
}

const TRAY_BTN_W = 104, TRAY_BTN_GAP = 6, TRAY_BTN_H = TRAY_H - 14;
const TRAY_ROW_W = UPGRADE_ORDER.length * TRAY_BTN_W + (UPGRADE_ORDER.length - 1) * TRAY_BTN_GAP;
const TRAY_ROW_X = (W - TRAY_ROW_W) / 2;
const TRAY_BUTTONS = {};
UPGRADE_ORDER.forEach((key, i) => {
  TRAY_BUTTONS[key] = { x: TRAY_ROW_X + i * (TRAY_BTN_W + TRAY_BTN_GAP), y: H - TRAY_H + 7, w: TRAY_BTN_W, h: TRAY_BTN_H };
});
function pointInRect(x, y, r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
function trayButtonAt(x, y) {
  for (const key of UPGRADE_ORDER) if (pointInRect(x, y, TRAY_BUTTONS[key])) return key;
  return null;
}
function buyUpgrade(key) {
  const cost = upgradeCost(key);
  if (cost === null || gold < cost) { playDenied(); return; }
  gold -= cost;
  upgradeLevels[key]++;
  playUpgrade();
}

// --- Run state ---
let difficulty = 'easy', preset = DIFFICULTY_PRESETS.easy, WAVES = buildWaves(preset);
let enemies = [], projectile = null, particles = [], popups = [], fx = [];
let gold = 0, kills = 0, wavesCleared = 0, castleHp = 100, castleFlash = 0;
let waveIndex = 0, waveState = 'countdown', countdownTimer = 0, enemiesToSpawn = 0, spawnTimer = 0;
const COUNTDOWN_DURATION = 3, WAVE_CLEARED_PAUSE = 1.4;
const SCORE_PER_KILL = 10, SCORE_PER_WAVE = 60;
let aiming = false, aimAngle = -0.6, aimPower = 0, aimPointerId = null;
let reloadTimer = 0;
let shakeTimer = 0, shakeMag = 0, shakeDuration = 0.3;
let state = 'menu'; // menu | playing | over

function currentScore() { return kills * SCORE_PER_KILL + wavesCleared * SCORE_PER_WAVE + Math.round(castleHp); }

function updateDiffButtonStyles() { [...diffButtons.children].forEach((b) => b.classList.toggle('selected', b.dataset.d === difficulty)); }
diffButtons.addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (!b) return;
  difficulty = b.dataset.d;
  updateDiffButtonStyles();
});
updateDiffButtonStyles();

function showMenu() {
  state = 'menu';
  title.textContent = 'Trebuchet';
  subtitle.textContent = 'Defend the castle — pull back, let fly, break every wave';
  scoreLine.style.display = 'none';
  bestLine.textContent = 'Best score: ' + loadBest(difficulty);
  diffButtons.style.display = 'flex';
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function beginWaveCountdown(index) {
  waveIndex = index;
  waveState = 'countdown';
  countdownTimer = COUNTDOWN_DURATION;
}

function startGame() {
  preset = DIFFICULTY_PRESETS[difficulty];
  WAVES = buildWaves(preset);
  enemies = []; projectile = null; particles = []; popups = []; fx = [];
  gold = 0; kills = 0; wavesCleared = 0; castleHp = preset.startHp; castleFlash = 0;
  upgradeLevels = { reload: 0, blast: 0, power: 0 };
  aiming = false; aimPower = 0; reloadTimer = 0;
  beginWaveCountdown(0);
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}
startBtn.addEventListener('click', () => { if (state === 'menu' || state === 'over') startGame(); });

function finishRun(won) {
  state = 'over';
  const finalScore = currentScore();
  const best = loadBest(difficulty);
  const isNewBest = finalScore > best;
  if (isNewBest) saveBest(difficulty, finalScore);
  if (won) {
    playVictory();
    title.textContent = 'Castle Held!';
    subtitle.textContent = 'Every wave broke against your walls';
  } else {
    playFail();
    title.textContent = 'The Castle Has Fallen';
    subtitle.textContent = 'Wave ' + (waveIndex + 1) + ' / ' + WAVE_COUNT + ' overran you';
  }
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + finalScore + '  ·  Waves: ' + wavesCleared + '/' + WAVE_COUNT + '  ·  Kills: ' + kills;
  bestLine.textContent = isNewBest ? '🏆 New best score!' : 'Best score: ' + best;
  diffButtons.style.display = 'flex';
  updateDiffButtonStyles();
  startBtn.textContent = 'Play Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

// --- Input ---
function pointerToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}
canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing') return;
  const p = pointerToCanvas(e);
  const trayKey = trayButtonAt(p.x, p.y);
  if (trayKey) { buyUpgrade(trayKey); return; }
  if (projectile || reloadTimer > 0) return;
  if (Math.hypot(p.x - LAUNCHER.x, p.y - LAUNCHER.y) > 150) return;
  aiming = true;
  aimPointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  updateAim(p);
});
canvas.addEventListener('pointermove', (e) => {
  if (!aiming || e.pointerId !== aimPointerId) return;
  updateAim(pointerToCanvas(e));
});
function releaseAim() {
  if (!aiming) return;
  aiming = false;
  if (aimPower > 0.08) fireProjectile();
}
canvas.addEventListener('pointerup', releaseAim);
canvas.addEventListener('pointercancel', releaseAim);

function updateAim(p) {
  const dx = LAUNCHER.x - p.x, dy = LAUNCHER.y - p.y;
  const pull = Math.min(Math.hypot(dx, dy), MAX_PULL);
  aimPower = pull / MAX_PULL;
  aimAngle = clamp(Math.atan2(dy, dx), MIN_ANGLE, MAX_ANGLE);
}

function fireProjectile() {
  const speed = aimPower * MAX_LAUNCH_SPEED;
  projectile = {
    x: LAUNCHER.x, y: LAUNCHER.y,
    vx: Math.cos(aimAngle) * speed,
    vy: Math.sin(aimAngle) * speed,
    spin: 0, age: 0
  };
  reloadTimer = reloadDuration();
  playThwack();
  playWhoosh();
  aimPower = 0;
}

// --- Enemies ---
function spawnEnemy(wave) {
  const type = pickType(wave.mix);
  const t = ENEMY_TYPES[type];
  const hp = Math.max(1, Math.round(t.hp * wave.hpMult));
  enemies.push({
    type, hp, maxHp: hp,
    x: W + 20 + Math.random() * 24,
    y: GROUND_Y - t.size * 0.55,
    speed: t.speed * wave.speedMult * (0.9 + Math.random() * 0.2),
    size: t.size, dead: false, bobPhase: Math.random() * Math.PI * 2
  });
}

function addPopup(x, y, text, color) { popups.push({ x, y, text, color, t: 0 }); }
function addBurst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 40 + Math.random() * 90;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0, maxLife: 300 + Math.random() * 200, color, size: 2 + Math.random() * 2.5 });
  }
}
function spawnFx(x, y, maxRadius, color, life) { fx.push({ x, y, maxRadius, color, life, age: 0 }); }
function triggerShake(mag) {
  const m = clamp(mag, 2, 12);
  if (m > shakeMag) { shakeMag = m; shakeTimer = 0.25; shakeDuration = 0.25; }
}

function hitEnemy(e, dmg, hx, hy) {
  if (e.dead) return;
  e.hp -= dmg;
  if (e.hp <= 0) {
    e.dead = true;
    kills++;
    gold += preset.killReward;
    addPopup(e.x, e.y - e.size, '+' + preset.killReward, '#ffd76a');
    addBurst(e.x, e.y, ENEMY_TYPES[e.type].color, 12);
    playKill();
  } else {
    spawnFx(hx, hy, 10, 'rgba(255,255,255,0.5)', 0.12);
  }
}

function explodeProjectile(x, y) {
  const r = currentSplashRadius();
  for (const e of enemies) {
    if (e.dead) continue;
    if (Math.hypot(e.x - x, e.y - y) <= r + e.size * 0.5) hitEnemy(e, shotDamage(), x, y);
  }
  addBurst(x, y, '#ffb703', 16);
  spawnFx(x, y, r, 'rgba(255,183,3,0.45)', 0.32);
  playImpact();
  triggerShake(5);
  projectile = null;
}

function updateProjectile(dt) {
  if (!projectile) return;
  const p = projectile;
  p.age += dt;
  p.vy += GRAVITY * dt;
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.spin += dt * 14;

  for (const e of enemies) {
    if (e.dead) continue;
    if (Math.hypot(p.x - e.x, p.y - e.y) < e.size * 0.75 + PROJECTILE_R) { explodeProjectile(p.x, p.y); return; }
  }
  if (p.y + PROJECTILE_R > GROUND_Y) { explodeProjectile(p.x, GROUND_Y); return; }
  if (p.x > W + 40 || p.x < -40 || p.age > 5) { projectile = null; return; }
}

// --- Waves ---
function updateWaves(dt) {
  if (waveState === 'countdown') {
    countdownTimer -= dt;
    if (countdownTimer <= 0) {
      waveState = 'spawning';
      enemiesToSpawn = WAVES[waveIndex].count;
      spawnTimer = 0;
      playWaveStart();
    }
    return;
  }
  if (waveState === 'spawning') {
    spawnTimer -= dt;
    if (spawnTimer <= 0 && enemiesToSpawn > 0) {
      spawnEnemy(WAVES[waveIndex]);
      enemiesToSpawn--;
      spawnTimer = WAVES[waveIndex].interval;
    }
    if (enemiesToSpawn <= 0 && enemies.length === 0) {
      waveState = 'cleared';
      wavesCleared++;
      countdownTimer = WAVE_CLEARED_PAUSE;
      const bonus = 50 + waveIndex * 10;
      addPopup(GATE_X + 50, GROUND_Y - 70, 'Wave ' + (waveIndex + 1) + ' repelled! +' + bonus, '#ffe28a');
      gold += bonus;
      playWaveClear();
    }
    return;
  }
  if (waveState === 'cleared') {
    countdownTimer -= dt;
    if (countdownTimer <= 0) {
      if (waveIndex + 1 >= WAVE_COUNT) finishRun(true);
      else beginWaveCountdown(waveIndex + 1);
    }
  }
}

function update(dt) {
  particles.forEach((p) => { p.life += dt * 1000; p.vy += 200 * dt; p.x += p.vx * dt; p.y += p.vy * dt; });
  particles = particles.filter((p) => p.life < p.maxLife);
  popups.forEach((p) => { p.t += dt * 1000; });
  popups = popups.filter((p) => p.t < 900);
  fx.forEach((f) => { f.age += dt; });
  fx = fx.filter((f) => f.age < f.life);
  if (shakeTimer > 0) shakeTimer -= dt;
  if (castleFlash > 0) castleFlash -= dt;
  if (reloadTimer > 0) reloadTimer -= dt;

  if (state !== 'playing') return;

  updateWaves(dt);
  if (state !== 'playing') return; // a win can end the run inside updateWaves()

  for (const e of enemies) e.x -= e.speed * dt;

  for (const e of enemies) {
    if (e.dead || e.x - e.size > GATE_X) continue;
    const dmg = ENEMY_TYPES[e.type].dmg;
    e.dead = true;
    castleHp = Math.max(0, castleHp - dmg);
    castleFlash = 0.35;
    addPopup(GATE_X + 14, GROUND_Y - 46, '-' + dmg, '#e6543b');
    playCastleHit();
    triggerShake(7);
  }
  enemies = enemies.filter((e) => !e.dead);
  if (castleHp <= 0) { finishRun(false); return; }

  updateProjectile(dt);
}

// --- Drawing ---
function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#8fd3e8');
  g.addColorStop(1, '#c9ecd8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND_Y);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 3; i++) {
    const cx = 90 + i * 110, cy = 56 + (i % 2) * 26;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 24, 10, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 16, cy + 3, 16, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawGround() {
  const g = ctx.createLinearGradient(0, GROUND_Y, 0, H - TRAY_H);
  g.addColorStop(0, '#7cb342');
  g.addColorStop(0.3, '#5b3d22');
  g.addColorStop(1, '#3a2814');
  ctx.fillStyle = g;
  ctx.fillRect(0, GROUND_Y, W, H - TRAY_H - GROUND_Y);
  ctx.strokeStyle = '#4a7a2e';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
}

function drawCastle() {
  const bx = CASTLE_X, by = GROUND_Y;
  const flash = castleFlash > 0;
  ctx.fillStyle = flash ? 'rgba(230,84,59,0.55)' : 'rgba(110,110,120,0.55)';
  ctx.fillRect(bx, by - 92, CASTLE_W, 92);
  for (let i = 0; i < 4; i++) ctx.fillRect(bx + 4 + i * 18, by - 106, 11, 14);
  ctx.fillStyle = flash ? 'rgba(200,60,40,0.6)' : 'rgba(80,80,92,0.55)';
  ctx.fillRect(bx + CASTLE_W - 30, by - 56, 22, 56);
  ctx.beginPath();
  ctx.moveTo(bx + CASTLE_W - 30, by - 56); ctx.lineTo(bx + CASTLE_W - 19, by - 72); ctx.lineTo(bx + CASTLE_W - 8, by - 56);
  ctx.fill();

  // Health bar above the ramparts - the clearest "how close am I to losing" readout
  const hpFrac = clamp(castleHp / preset.startHp, 0, 1);
  const barW = CASTLE_W, barX = bx, barY = by - 116;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(barX, barY, barW, 6);
  ctx.fillStyle = hpFrac > 0.4 ? '#7cb342' : '#e6543b';
  ctx.fillRect(barX, barY, barW * hpFrac, 6);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, 6);
}

function drawLauncher() {
  const px = LAUNCHER.x, py = LAUNCHER.y - 14;
  ctx.save();

  ctx.fillStyle = '#4a3320';
  ctx.fillRect(LAUNCHER.x - 34, GROUND_Y - 6, 20, 6);
  ctx.fillRect(LAUNCHER.x + 10, GROUND_Y - 6, 20, 6);

  ctx.strokeStyle = '#6b4a2b';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(LAUNCHER.x - 28, GROUND_Y - 4);
  ctx.lineTo(px, py);
  ctx.lineTo(LAUNCHER.x + 24, GROUND_Y - 4);
  ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.strokeStyle = '#5b3d22';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(LAUNCHER.x - 18, GROUND_Y - 26);
  ctx.lineTo(LAUNCHER.x + 15, GROUND_Y - 26);
  ctx.stroke();

  let longDir;
  if (aiming) {
    longDir = { x: -Math.cos(aimAngle), y: -Math.sin(aimAngle) };
  } else {
    const m = Math.hypot(0.85, 0.45);
    longDir = { x: -0.85 / m, y: 0.45 / m };
  }
  const LONG_ARM = 34, SHORT_ARM = 15;
  const tipX = px + longDir.x * LONG_ARM, tipY = py + longDir.y * LONG_ARM;
  const cwX = px - longDir.x * SHORT_ARM, cwY = py - longDir.y * SHORT_ARM;

  ctx.strokeStyle = '#3a2814';
  ctx.lineWidth = 4.5;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(cwX, cwY); ctx.lineTo(tipX, tipY); ctx.stroke();
  ctx.lineCap = 'butt';

  ctx.save();
  ctx.translate(cwX, cwY);
  ctx.rotate(Math.atan2(longDir.y, longDir.x));
  ctx.fillStyle = '#5a5a5a';
  ctx.fillRect(-7, -7, 14, 14);
  ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
  ctx.strokeRect(-7, -7, 14, 14);
  ctx.restore();

  ctx.fillStyle = '#2a2a2a';
  ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fill();

  if (!projectile && reloadTimer <= 0) {
    ctx.strokeStyle = '#3a2814';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(tipX - 4, tipY); ctx.lineTo(tipX, tipY + 9); ctx.lineTo(tipX + 4, tipY);
    ctx.stroke();
    const grad = ctx.createLinearGradient(tipX - 7, tipY, tipX + 7, tipY + 16);
    grad.addColorStop(0, '#6a6a6a'); grad.addColorStop(1, '#3a3a3a');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(tipX, tipY + 9, 7, 0, Math.PI * 2); ctx.fill();
  } else if (reloadTimer > 0) {
    const frac = 1 - reloadTimer / reloadDuration();
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px, py, 20, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawAimGuide() {
  if (!aiming || aimPower <= 0.02) return;
  const speed = aimPower * MAX_LAUNCH_SPEED;
  let x = LAUNCHER.x, y = LAUNCHER.y;
  let vx = Math.cos(aimAngle) * speed, vy = Math.sin(aimAngle) * speed;
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  for (let i = 0; i < 14; i++) {
    const t = i * 0.045;
    const px = x + vx * t;
    const py = y + vy * t + 0.5 * GRAVITY * t * t;
    if (py > GROUND_Y) break;
    ctx.beginPath(); ctx.arc(px, py, 2.6, 0, Math.PI * 2); ctx.fill();
  }
  ctx.strokeStyle = 'rgba(230,57,70,0.8)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(LAUNCHER.x, LAUNCHER.y);
  ctx.lineTo(LAUNCHER.x - Math.cos(aimAngle) * aimPower * MAX_PULL, LAUNCHER.y - Math.sin(aimAngle) * aimPower * MAX_PULL);
  ctx.stroke();
}

function drawEnemies() {
  for (const e of enemies) {
    const def = ENEMY_TYPES[e.type];
    const bob = Math.sin(performance.now() / 140 + e.bobPhase) * 2;
    ctx.save();
    ctx.translate(e.x, e.y + bob);
    const grad = ctx.createLinearGradient(-def.size, -def.size, def.size, def.size);
    grad.addColorStop(0, def.color); grad.addColorStop(1, def.darkColor);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, def.size, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.5; ctx.stroke();
    if (e.maxHp > 1) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(-def.size, -def.size - 9, def.size * 2, 3);
      ctx.fillStyle = '#4caf50';
      ctx.fillRect(-def.size, -def.size - 9, def.size * 2 * (e.hp / e.maxHp), 3);
    }
    ctx.restore();
  }
}

function drawProjectile() {
  if (!projectile) return;
  ctx.save();
  ctx.translate(projectile.x, projectile.y);
  ctx.rotate(projectile.spin);
  ctx.fillStyle = '#4a4a4a';
  ctx.beginPath(); ctx.arc(0, 0, PROJECTILE_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-4, -4); ctx.lineTo(4, 4); ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 1 - t;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}
function drawFx() {
  for (const f of fx) {
    const t = f.age / f.life;
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 1 - t;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.maxRadius * t, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }
}
function drawPopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Arial';
  for (const p of popups) {
    const t = p.t / 900;
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - t * 26);
    ctx.globalAlpha = 1;
  }
}

function drawHud() {
  ctx.font = 'bold 14px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const goldText = '💰 ' + gold;
  ctx.strokeText(goldText, 14, 24);
  ctx.fillText(goldText, 14, 24);
  ctx.textAlign = 'right';
  const scoreText = 'Score: ' + currentScore();
  ctx.strokeText(scoreText, W - 14, 24);
  ctx.fillText(scoreText, W - 14, 24);
  ctx.textAlign = 'center';
  ctx.font = 'bold 12px Arial';
  const waveText = waveState === 'countdown'
    ? 'Wave ' + (waveIndex + 1) + '/' + WAVE_COUNT + ' in ' + Math.ceil(countdownTimer) + 's'
    : 'Wave ' + (waveIndex + 1) + '/' + WAVE_COUNT;
  ctx.strokeText(waveText, W / 2, 24);
  ctx.fillText(waveText, W / 2, 24);
}

function drawUpgradeTray() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, H - TRAY_H, W, TRAY_H);
  for (const key of UPGRADE_ORDER) {
    const r = TRAY_BUTTONS[key];
    const u = UPGRADES[key];
    const lvl = upgradeLevels[key];
    const cost = upgradeCost(key);
    const maxed = cost === null;
    const affordable = !maxed && gold >= cost;
    ctx.fillStyle = maxed ? 'rgba(255,255,255,0.06)' : affordable ? 'rgba(255,183,3,0.22)' : 'rgba(255,255,255,0.1)';
    ctx.strokeStyle = maxed ? 'rgba(255,255,255,0.2)' : affordable ? '#ffb703' : 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 8); ctx.fill(); ctx.stroke();

    ctx.textAlign = 'center';
    ctx.fillStyle = 'white';
    ctx.font = 'bold 11px Arial';
    ctx.fillText(u.name + ' Lv' + lvl, r.x + r.w / 2, r.y + 14);
    ctx.font = 'bold 11px Arial';
    ctx.fillStyle = maxed ? 'rgba(255,255,255,0.5)' : '#ffe28a';
    ctx.fillText(maxed ? 'MAX' : '💰' + cost, r.x + r.w / 2, r.y + 30);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  if (state === 'menu') { ctx.fillStyle = '#3a2814'; ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y); return; }
  ctx.save();
  const mag = shakeTimer > 0 ? (shakeTimer / shakeDuration) * shakeMag : 0;
  if (mag > 0) ctx.translate((Math.random() * 2 - 1) * mag, (Math.random() * 2 - 1) * mag);
  drawGround();
  drawCastle();
  drawLauncher();
  drawEnemies();
  drawProjectile();
  drawAimGuide();
  drawFx();
  drawParticles();
  drawPopups();
  ctx.restore();
  drawHud();
  drawUpgradeTray();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
