<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trebuchet</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1a1710;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #8fd3e8;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(27px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.9; }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  #startBtn {
    margin-top: calc(16px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #c9853a;
    color: #2a1a00;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #e8b96b; }
  #backToArcade {
    display: none;
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Trebuchet</h1>
    <p id="subtitle">Pull back and let fly — topple every target</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('trebuchetMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playThwack() { tone(160, 0.09, 'square', 0.15); tone(90, 0.14, 'sine', 0.12, 0.02); }
function playWhoosh() {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  const now = audioCtx.currentTime;
  osc.frequency.setValueAtTime(700, now);
  osc.frequency.exponentialRampToValueAtTime(140, now + 0.5);
  gain.gain.setValueAtTime(0.06, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now + 0.55);
}
function playClatter(mag) {
  const v = clamp(mag, 0.05, 0.16);
  tone(200 + Math.random() * 60, 0.1, 'square', v);
  tone(120 + Math.random() * 40, 0.14, 'sawtooth', v * 0.8, 0.04);
  tone(80, 0.16, 'sine', v * 0.7, 0.08);
}
function playTargetHit() { tone(700, 0.1, 'sine', 0.13); tone(1000, 0.12, 'sine', 0.11, 0.07); tone(1300, 0.14, 'triangle', 0.1, 0.14); }
function playLevelClear() {
  tone(523, 0.14, 'triangle', 0.14);
  tone(659, 0.14, 'triangle', 0.13, 0.13);
  tone(784, 0.16, 'triangle', 0.13, 0.26);
  tone(1047, 0.26, 'triangle', 0.14, 0.4);
}
function playFail() { tone(200, 0.2, 'sawtooth', 0.12); tone(140, 0.3, 'sawtooth', 0.1, 0.1); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('trebuchetMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest() { return parseInt(sessionStorage.getItem('trebuchetBest') || '0', 10); }
function saveBest(v) { try { sessionStorage.setItem('trebuchetBest', v); } catch (e) {} }

// --- World constants ---
const GRAVITY = 640;
const GROUND_Y = 480;
const LAUNCHER = { x: 54, y: 452 };
const MAX_PULL = 70;
const MAX_LAUNCH_SPEED = 480;
const MIN_ANGLE = -1.5, MAX_ANGLE = -0.12; // radians, always up-and-right
const PROJECTILE_R = 9;
const AMMO_PER_LEVEL = 3;

function block(x, y, w, h) { return { x, y, w, h, vx: 0, vy: 0, angle: 0, angVel: 0, hitFlash: 0 }; }
function target(blockIndex, offsetX, offsetY) { return { blockIndex, offsetX, offsetY, x: 0, y: 0, r: 11, attached: true, vx: 0, vy: 0, angle: 0, angVel: 0, cleared: false }; }

const LEVELS = [
  {
    blocks: [block(260, 465, 44, 30)],
    targets: [target(0, 0, 0)]
  },
  {
    blocks: [block(220, 465, 40, 30), block(300, 465, 40, 30)],
    targets: [target(0, 0, 0), target(1, 0, 0)]
  },
  {
    blocks: [block(230, 466, 40, 28), block(290, 466, 40, 28), block(260, 438, 76, 28)],
    targets: [target(2, 0, 0), target(0, 26, 14)]
  },
  {
    blocks: [
      block(230, 466, 40, 28), block(290, 466, 40, 28),
      block(260, 438, 76, 28),
      block(260, 408, 40, 28)
    ],
    targets: [target(3, 0, 0), target(0, -28, 14)]
  }
];

let levelIdx = 0, blocks = [], targets = [], ammo = AMMO_PER_LEVEL, score = 0;
let projectile = null, projectileRestTimer = 0;
let aiming = false, aimAngle = -0.6, aimPower = 0, aimPointerId = null;
let shakeTimer = 0, shakeMag = 0, shakeDuration = 0.3;
let state = 'menu'; // menu | playing | levelClear | levelFailed | campaignDone

function loadLevel(idx) {
  const def = LEVELS[idx % LEVELS.length];
  blocks = def.blocks.map((b) => block(b.x, b.y, b.w, b.h));
  targets = def.targets.map((t) => target(t.blockIndex, t.offsetX, t.offsetY));
  ammo = AMMO_PER_LEVEL;
  projectile = null;
  updateTargetPositions();
}

function updateTargetPositions() {
  for (const t of targets) {
    if (!t.attached) continue;
    const b = blocks[t.blockIndex];
    const cos = Math.cos(b.angle), sin = Math.sin(b.angle);
    const lx = t.offsetX, ly = -b.h / 2 - t.r + t.offsetY;
    t.x = b.x + lx * cos - ly * sin;
    t.y = b.y + lx * sin + ly * cos;
  }
}

function showMenu() {
  state = 'menu';
  title.textContent = 'Trebuchet';
  subtitle.textContent = 'Pull back and let fly — topple every target';
  scoreLine.style.display = 'none';
  bestLine.textContent = 'Best score: ' + loadBest();
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  overlay.style.display = 'flex';
}

function startGame() {
  levelIdx = 0;
  score = 0;
  loadLevel(levelIdx);
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

function nextLevel() {
  levelIdx++;
  if (levelIdx >= LEVELS.length) {
    finishCampaign();
    return;
  }
  loadLevel(levelIdx);
  state = 'playing';
  overlay.style.display = 'none';
}

function retryLevel() {
  loadLevel(levelIdx);
  state = 'playing';
  overlay.style.display = 'none';
}

function finishCampaign() {
  state = 'campaignDone';
  const best = loadBest();
  const isNewBest = score > best;
  if (isNewBest) saveBest(score);
  playLevelClear();
  title.textContent = 'Campaign Clear!';
  subtitle.textContent = 'Every stronghold has fallen';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Final score: ' + score;
  bestLine.textContent = isNewBest ? '🏆 New best score!' : 'Best score: ' + best;
  startBtn.textContent = 'Play Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

startBtn.addEventListener('click', () => {
  if (state === 'menu' || state === 'campaignDone') startGame();
});

function allTargetsCleared() { return targets.every((t) => t.cleared); }

function onLevelClearScreen() {
  state = 'levelClear';
  const bonus = ammo * 50;
  score += bonus;
  playLevelClear();
  title.textContent = 'Level Clear!';
  subtitle.textContent = 'Stones saved: ' + ammo + ' (+' + bonus + ')';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score;
  bestLine.textContent = '';
  startBtn.textContent = levelIdx + 1 >= LEVELS.length ? 'Finish' : 'Next Level';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}
function onLevelFailedScreen() {
  state = 'levelFailed';
  playFail();
  title.textContent = 'Out of Stones!';
  subtitle.textContent = 'Give this stronghold another go';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score so far: ' + score;
  bestLine.textContent = '';
  startBtn.textContent = 'Retry Level';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}
startBtn.addEventListener('click', () => {
  if (state === 'levelClear') nextLevel();
  else if (state === 'levelFailed') retryLevel();
});

function pointerToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing' || projectile || ammo <= 0) return;
  const p = pointerToCanvas(e);
  if (Math.hypot(p.x - LAUNCHER.x, p.y - LAUNCHER.y) > 140) return;
  aiming = true;
  aimPointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  updateAim(p);
});
canvas.addEventListener('pointermove', (e) => {
  if (!aiming || e.pointerId !== aimPointerId) return;
  updateAim(pointerToCanvas(e));
});
function releaseAim() {
  if (!aiming) return;
  aiming = false;
  if (aimPower > 0.08) fireProjectile();
}
canvas.addEventListener('pointerup', releaseAim);
canvas.addEventListener('pointercancel', releaseAim);

function updateAim(p) {
  const dx = LAUNCHER.x - p.x, dy = LAUNCHER.y - p.y;
  const pull = Math.min(Math.hypot(dx, dy), MAX_PULL);
  aimPower = pull / MAX_PULL;
  // dx/dy already point from the drag position back to the pivot, which is
  // the launch direction (pull down-left of the pivot to fire up-right).
  aimAngle = clamp(Math.atan2(dy, dx), MIN_ANGLE, MAX_ANGLE);
}

function fireProjectile() {
  const speed = aimPower * MAX_LAUNCH_SPEED;
  projectile = {
    x: LAUNCHER.x, y: LAUNCHER.y,
    vx: Math.cos(aimAngle) * speed,
    vy: Math.sin(aimAngle) * speed,
    spin: 0
  };
  ammo--;
  playThwack();
  playWhoosh();
  aimPower = 0;
}

function detachTarget(t, fromBlock) {
  if (t.cleared) return;
  t.cleared = true;
  t.attached = false;
  if (fromBlock) { t.vx = fromBlock.vx * 0.6; t.vy = -90; }
  else { t.vx = (Math.random() * 2 - 1) * 60; t.vy = -140; }
  t.angVel = (Math.random() * 2 - 1) * 6;
  playTargetHit();
}

function resolveBlockCollisions() {
  for (let i = 0; i < blocks.length; i++) {
    for (let j = i + 1; j < blocks.length; j++) {
      const a = blocks[i], b = blocks[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const overlapX = (a.w + b.w) / 2 - Math.abs(dx);
      const overlapY = (a.h + b.h) / 2 - Math.abs(dy);
      if (overlapX > 0 && overlapY > 0) {
        if (overlapX < overlapY) {
          const push = overlapX / 2 * Math.sign(dx || 1);
          a.x -= push; b.x += push;
          const rel = (b.vx - a.vx) * 0.5;
          a.vx -= rel * 0.4; b.vx += rel * 0.4;
        } else {
          const push = overlapY / 2 * Math.sign(dy || 1);
          a.y -= push; b.y += push;
          if (dy > 0) { b.vy = Math.min(b.vy, 0); } else { a.vy = Math.min(a.vy, 0); }
        }
      }
    }
  }
}

function updateBlock(b, dt) {
  b.vy += GRAVITY * dt;
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  b.angle += b.angVel * dt;
  b.vx *= Math.max(0, 1 - 1.4 * dt);
  b.angVel *= Math.max(0, 1 - 1.6 * dt);
  if (b.hitFlash > 0) b.hitFlash -= dt;

  const halfH = b.h / 2;
  if (b.y + halfH > GROUND_Y) {
    const impact = b.vy;
    b.y = GROUND_Y - halfH;
    b.vy = impact > 60 ? -impact * 0.12 : 0;
    b.vx *= 0.82;
    b.angVel *= 0.6;
    if (impact > 200) { playClatter(impact / 700); triggerShake(impact / 26); }
  }
  b.x = clamp(b.x, b.w / 2 + 4, W - b.w / 2 - 4);
}

function triggerShake(mag) {
  const m = clamp(mag, 2, 12);
  if (m > shakeMag) { shakeMag = m; shakeTimer = 0.25; shakeDuration = 0.25; }
}

function circleRectCollide(cx, cy, r, b) {
  const halfW = b.w / 2, halfH = b.h / 2;
  const closestX = clamp(cx, b.x - halfW, b.x + halfW);
  const closestY = clamp(cy, b.y - halfH, b.y + halfH);
  const dx = cx - closestX, dy = cy - closestY;
  if (dx * dx + dy * dy >= r * r) return null;
  return { dx, dy, closestX, closestY };
}

function updateProjectile(dt) {
  if (!projectile) return;
  const p = projectile;
  p.vy += GRAVITY * dt;
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  p.spin += dt * 14;

  for (const t of targets) {
    if (t.cleared) continue;
    if (Math.hypot(p.x - t.x, p.y - t.y) < t.r + PROJECTILE_R) {
      detachTarget(t, null);
      p.vx *= 0.4; p.vy *= 0.4;
    }
  }

  for (const b of blocks) {
    const hit = circleRectCollide(p.x, p.y, PROJECTILE_R, b);
    if (hit) {
      const speed = Math.hypot(p.vx, p.vy);
      b.vx += p.vx * 0.55;
      b.vy += p.vy * 0.25 - 40;
      const hitOffsetY = clamp((hit.closestY - b.y) / (b.h / 2), -1, 1);
      b.angVel += (hitOffsetY * -1) * Math.sign(p.vx || 1) * (speed / 90);
      b.hitFlash = 0.15;
      playClatter(speed / 900);
      if (speed > 260) triggerShake(speed / 60);
      p.vx *= 0.32; p.vy *= 0.32;
      const pushDist = (PROJECTILE_R + 2) - Math.hypot(hit.dx, hit.dy);
      if (pushDist > 0 && (hit.dx !== 0 || hit.dy !== 0)) {
        const n = Math.hypot(hit.dx, hit.dy) || 1;
        p.x += (hit.dx / n) * pushDist;
        p.y += (hit.dy / n) * pushDist;
      }
    }
  }

  if (p.y + PROJECTILE_R > GROUND_Y) {
    p.y = GROUND_Y - PROJECTILE_R;
    p.vy = Math.abs(p.vy) > 50 ? -p.vy * 0.15 : 0;
    p.vx *= 0.85;
    if (Math.abs(p.vx) < 6 && Math.abs(p.vy) < 6) {
      projectileRestTimer += dt;
      if (projectileRestTimer > 0.35) { projectile = null; projectileRestTimer = 0; }
    }
  }
  if (p.x > W + 30 || p.x < -30) projectile = null;
}

function updateTargetsFree(dt) {
  for (const t of targets) {
    if (t.attached || !t.cleared) continue;
    t.vy += GRAVITY * dt;
    t.x += t.vx * dt;
    t.y += t.vy * dt;
    t.angle += t.angVel * dt;
    if (t.y + t.r > GROUND_Y) { t.y = GROUND_Y - t.r; t.vy *= -0.2; t.vx *= 0.7; }
  }
}

function update(dt) {
  if (state !== 'playing') return;

  for (const b of blocks) updateBlock(b, dt);
  resolveBlockCollisions();
  updateTargetPositions();

  for (const t of targets) {
    if (t.attached) {
      const b = blocks[t.blockIndex];
      if (Math.abs(b.angle) > 0.85) detachTarget(t, b);
    }
  }
  updateTargetsFree(dt);

  updateProjectile(dt);

  if (shakeTimer > 0) shakeTimer -= dt;

  if (allTargetsCleared()) { onLevelClearScreen(); return; }
  if (ammo <= 0 && !projectile) { onLevelFailedScreen(); return; }
}

function drawGround() {
  const g = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  g.addColorStop(0, '#7cb342');
  g.addColorStop(0.15, '#5b3d22');
  g.addColorStop(1, '#3a2814');
  ctx.fillStyle = g;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = '#4a7a2e';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  g.addColorStop(0, '#8fd3e8');
  g.addColorStop(1, '#c9ecd8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GROUND_Y);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 3; i++) {
    const cx = 70 + i * 110, cy = 60 + (i % 2) * 30;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 26, 11, 0, 0, Math.PI * 2);
    ctx.ellipse(cx + 18, cy + 3, 18, 9, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawLauncher() {
  ctx.save();
  ctx.translate(LAUNCHER.x, LAUNCHER.y);
  ctx.fillStyle = '#5b3d22';
  ctx.fillRect(-8, 0, 16, GROUND_Y - LAUNCHER.y);
  ctx.strokeStyle = '#3a2814';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, 10);
  ctx.lineTo(Math.cos(aiming ? aimAngle + Math.PI : -2.3) * 46, 10 + Math.sin(aiming ? aimAngle + Math.PI : -2.3) * 46);
  ctx.stroke();
  ctx.fillStyle = '#c9853a';
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawAimGuide() {
  if (!aiming || aimPower <= 0.02) return;
  const speed = aimPower * MAX_LAUNCH_SPEED;
  let x = LAUNCHER.x, y = LAUNCHER.y;
  let vx = Math.cos(aimAngle) * speed, vy = Math.sin(aimAngle) * speed;
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  for (let i = 0; i < 14; i++) {
    const t = i * 0.045;
    const px = x + vx * t;
    const py = y + vy * t + 0.5 * GRAVITY * t * t;
    if (py > GROUND_Y) break;
    ctx.beginPath(); ctx.arc(px, py, 2.6, 0, Math.PI * 2); ctx.fill();
  }
  ctx.strokeStyle = 'rgba(230,57,70,0.8)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(LAUNCHER.x, LAUNCHER.y);
  ctx.lineTo(LAUNCHER.x - Math.cos(aimAngle) * aimPower * MAX_PULL, LAUNCHER.y - Math.sin(aimAngle) * aimPower * MAX_PULL);
  ctx.stroke();
}

function drawBlocks() {
  for (const b of blocks) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);
    const grad = ctx.createLinearGradient(-b.w / 2, -b.h / 2, b.w / 2, b.h / 2);
    const flash = b.hitFlash > 0;
    grad.addColorStop(0, flash ? '#ffe28a' : '#c9853a');
    grad.addColorStop(1, flash ? '#ffb703' : '#8a5a28');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(-b.w / 2, -b.h / 2, b.w, b.h, 4);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-b.w / 2 + 4, 0); ctx.lineTo(b.w / 2 - 4, 0); ctx.stroke();
    ctx.restore();
  }
}

function drawTargets() {
  for (const t of targets) {
    if (t.cleared && !t.attached && t.y > GROUND_Y - t.r - 2 && Math.abs(t.vx) < 4) continue;
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle);
    ctx.fillStyle = t.cleared ? '#8a8a8a' : '#e63946';
    ctx.beginPath(); ctx.arc(0, 0, t.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = t.cleared ? '#6a6a6a' : '#c0392b';
    ctx.beginPath(); ctx.arc(0, -3, t.r * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.restore();
  }
}

function drawProjectile() {
  if (!projectile) return;
  ctx.save();
  ctx.translate(projectile.x, projectile.y);
  ctx.rotate(projectile.spin);
  ctx.fillStyle = '#4a4a4a';
  ctx.beginPath(); ctx.arc(0, 0, PROJECTILE_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-4, -4); ctx.lineTo(4, 4); ctx.stroke();
  ctx.restore();
}

function drawHud() {
  ctx.font = 'bold 15px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const ammoText = 'Stones: ' + '●'.repeat(Math.max(0, ammo)) + '○'.repeat(Math.max(0, AMMO_PER_LEVEL - ammo));
  ctx.strokeText(ammoText, 14, 26);
  ctx.fillText(ammoText, 14, 26);
  ctx.textAlign = 'right';
  const scoreText = 'Score: ' + score;
  ctx.strokeText(scoreText, W - 14, 26);
  ctx.fillText(scoreText, W - 14, 26);
  ctx.textAlign = 'center';
  ctx.font = 'bold 12px Arial';
  const lvlText = 'Level ' + (levelIdx + 1) + '/' + LEVELS.length;
  ctx.strokeText(lvlText, W / 2, 26);
  ctx.fillText(lvlText, W / 2, 26);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  if (state === 'menu') return;
  ctx.save();
  const mag = shakeTimer > 0 ? (shakeTimer / shakeDuration) * shakeMag : 0;
  if (mag > 0) ctx.translate((Math.random() * 2 - 1) * mag, (Math.random() * 2 - 1) * mag);
  drawGround();
  drawLauncher();
  drawBlocks();
  drawTargets();
  drawProjectile();
  drawAimGuide();
  ctx.restore();
  drawHud();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
