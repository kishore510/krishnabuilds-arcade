<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crate Stack</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1c2a1f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #cfe3d0;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
  }
  /* Crate Stack's background is a pale sky gradient (unlike the other
     games' consistently dark scenes), so white text alone can wash out.
     A solid panel behind the overlay copy guarantees contrast no matter
     what's rendering on the canvas underneath. */
  #overlayPanel {
    background: rgba(10, 12, 8, 0.62);
    border: 1.5px solid rgba(255,255,255,0.14);
    border-radius: calc(18px * var(--game-scale, 1));
    padding: calc(22px * var(--game-scale, 1)) calc(26px * var(--game-scale, 1));
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #overlay h1 { margin: 0 0 8px; font-size: calc(30px * var(--game-scale, 1)); }
  #overlay p { margin: 4px 0; font-size: calc(15px * var(--game-scale, 1)); opacity: 0.9; }
  #diffButtons {
    display: flex;
    gap: calc(14px * var(--game-scale, 1));
    margin-top: calc(18px * var(--game-scale, 1));
    pointer-events: auto;
  }
  #diffButtons button {
    font-family: inherit;
    font-size: calc(15px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(22px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  #diffButtons button:active { background: rgba(255,255,255,0.3); }
  #diffButtons button.selected {
    background: #c9853a;
    border-color: #c9853a;
    color: #2a1608;
  }
  #backToArcade {
    display: none;
    margin-top: calc(18px * var(--game-scale, 1));
    font-size: calc(14px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <div id="overlayPanel">
      <h1 id="title">Crate Stack</h1>
      <p id="subtitle">Tap, click, or press space to drop the crate</p>
      <p id="scoreLine" style="display:none;"></p>
      <div id="diffButtons">
        <button id="easyBtn" type="button">Easy</button>
        <button id="hardBtn" type="button">Hard</button>
      </div>
      <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const easyBtn = document.getElementById('easyBtn');
const hardBtn = document.getElementById('hardBtn');
const diffButtons = document.getElementById('diffButtons');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;
const BLOCK_H = 32;
const BASE_WIDTH = 210;
const EDGE_MARGIN = 14;
const STACK_BASE_Y = H - 90;
const ACTIVE_SCREEN_Y = 150;
const HUD_H = 54;
const CAMERA_SMOOTH = 8;
const GRAVITY = 900;
const PERFECT_STREAK_CELEBRATE = 3;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

// --- Slide speed ramps with height like every other reflex game here, and
// like all of them it's clamped to a hard cap - a tower can get arbitrarily
// tall but never physically unreactable. Hard just starts faster, ramps
// faster, and demands tighter alignment for a "perfect" drop. ---
const DIFFICULTY_PRESETS = {
  easy: { baseSpeed: 80, speedGrowth: 1.6, maxSpeed: 200, perfectThreshold: 6 },
  hard: { baseSpeed: 112, speedGrowth: 2.4, maxSpeed: 280, perfectThreshold: 3.5 }
};
const CRATE_COLORS = [
  { base: '#c98a4b', dark: '#9c6530', plank: '#b57a3e' },
  { base: '#d9975a', dark: '#a86f36', plank: '#c4854a' },
  { base: '#bd7d42', dark: '#8f5c28', plank: '#a86f36' }
];

let difficulty = 'easy';
let preset = DIFFICULTY_PRESETS.easy;
let stack, active, debris, popups;
let score, best, streak, state, scrollY, scrollYTarget, elapsedTime, celebrateTimer;

// --- Audio: generated on the fly with the Web Audio API, no external files ---
let audioCtx = null;
let muted = sessionStorage.getItem('crateStackMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
// Pitch climbs with height so the tower audibly feels like it's getting taller.
function playThunk(height) {
  const freq = 130 + Math.min(height, 40) * 5;
  tone(freq, 0.09, 'square', 0.14);
}
function playSlice() { tone(1400, 0.05, 'sawtooth', 0.06); tone(900, 0.08, 'sawtooth', 0.07, 0.02); }
function playPerfect() { tone(880, 0.08, 'triangle', 0.1); tone(1180, 0.09, 'triangle', 0.08, 0.05); }
function playCelebrate() { tone(660, 0.09, 'triangle', 0.12); tone(880, 0.1, 'triangle', 0.11, 0.07); tone(1100, 0.14, 'triangle', 0.1, 0.15); }
function playGameOver() { tone(200, 0.2, 'sawtooth', 0.14); tone(140, 0.26, 'sawtooth', 0.11, 0.1); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('crateStackMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest(diff) { return parseInt(sessionStorage.getItem('crateStackBest_' + diff) || '0', 10); }
function saveBest(diff, v) { try { sessionStorage.setItem('crateStackBest_' + diff, v); } catch (e) {} }

function clampNum(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function addPopup(text, x, y, color) {
  popups.push({ text, x, y, life: 40, color });
}

// blockWorldSpan(i) works for both placed blocks (i < stack.length) and the
// hypothetical next block (i === stack.length) - the active crate always
// renders one slot above the current top, so both callers share this.
function blockWorldSpan(i) {
  return { top: STACK_BASE_Y - (i + 1) * BLOCK_H, bottom: STACK_BASE_Y - i * BLOCK_H };
}

function currentSlideSpeed() {
  return clampNum(preset.baseSpeed + stack.length * preset.speedGrowth, preset.baseSpeed, preset.maxSpeed);
}

function spawnActiveBlock() {
  const top = stack[stack.length - 1];
  const width = top.width;
  const fromLeft = Math.random() < 0.5;
  const left = fromLeft ? EDGE_MARGIN : W - EDGE_MARGIN - width;
  const speed = currentSlideSpeed();
  active = { left, width, vx: fromLeft ? speed : -speed };
  scrollYTarget = Math.max(0, ACTIVE_SCREEN_Y - blockWorldSpan(stack.length).top);
}

function spawnDebris(x, w, y, side) {
  const color = CRATE_COLORS[stack.length % CRATE_COLORS.length];
  debris.push({
    x, y, w, h: BLOCK_H, color,
    vx: (side === 'left' ? -1 : 1) * (40 + Math.random() * 40),
    vy: -60 - Math.random() * 40,
    rot: 0, vrot: (side === 'left' ? -1 : 1) * (2 + Math.random() * 2)
  });
}

function resetRunState() {
  stack = [{ left: (W - BASE_WIDTH) / 2, width: BASE_WIDTH }];
  debris = [];
  popups = [];
  score = 0;
  streak = 0;
  scrollY = 0;
  elapsedTime = 0;
  celebrateTimer = 0;
  spawnActiveBlock();
}

function reset() {
  preset = DIFFICULTY_PRESETS[difficulty];
  resetRunState();
  state = 'ready';
  title.textContent = 'Crate Stack';
  subtitle.textContent = 'Tap, click, or press space to drop the crate';
  scoreLine.style.display = 'none';
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'none';
  best = loadBest(difficulty);
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function updateDiffButtonStyles() {
  easyBtn.classList.toggle('selected', difficulty === 'easy');
  hardBtn.classList.toggle('selected', difficulty === 'hard');
}

function startGame(diff) {
  difficulty = diff;
  preset = DIFFICULTY_PRESETS[diff];
  best = loadBest(difficulty);
  resetRunState();
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

easyBtn.addEventListener('click', () => startGame('easy'));
hardBtn.addEventListener('click', () => startGame('hard'));

function endGame() {
  state = 'over';
  playGameOver();
  if (score > best) { best = score; saveBest(difficulty, best); }
  title.textContent = 'Crate missed the stack!';
  subtitle.textContent = 'Choose a mode to try again';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score + '   Best (' + (difficulty === 'easy' ? 'Easy' : 'Hard') + '): ' + best;
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'inline-block';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function dropActiveBlock() {
  if (state !== 'playing') return;
  const top = stack[stack.length - 1];
  const overlapLeft = Math.max(active.left, top.left);
  const overlapRight = Math.min(active.left + active.width, top.left + top.width);
  const overlapWidth = overlapRight - overlapLeft;

  const activeSpan = blockWorldSpan(stack.length);
  const activeScreenY = activeSpan.top + scrollY;

  if (overlapWidth <= 0) {
    // Total miss: the whole crate becomes debris and tips off the tower.
    spawnDebris(active.left, active.width, activeScreenY, active.left < top.left ? 'left' : 'right');
    endGame();
    return;
  }

  const misalign = Math.abs(active.left - top.left) + Math.abs((active.left + active.width) - (top.left + top.width));
  let placedLeft, placedWidth, perfect = false;
  if (misalign <= preset.perfectThreshold) {
    perfect = true;
    placedLeft = top.left;
    placedWidth = top.width;
    streak++;
  } else {
    placedLeft = overlapLeft;
    placedWidth = overlapWidth;
    streak = 0;
    if (active.left < overlapLeft) spawnDebris(active.left, overlapLeft - active.left, activeScreenY, 'left');
    if (active.left + active.width > overlapRight) spawnDebris(overlapRight, (active.left + active.width) - overlapRight, activeScreenY, 'right');
  }

  stack.push({ left: placedLeft, width: placedWidth });
  score += perfect ? 2 : 1;
  playThunk(stack.length);
  const popupX = placedLeft + placedWidth / 2, popupY = activeScreenY;
  if (perfect) {
    playPerfect();
    addPopup('Perfect! +2', popupX, popupY, '#ffd76a');
    if (streak >= PERFECT_STREAK_CELEBRATE) { celebrateTimer = 0.6; playCelebrate(); }
  } else {
    playSlice();
    addPopup('+1', popupX, popupY, '#ffffff');
  }

  spawnActiveBlock();
}

canvas.addEventListener('pointerdown', () => dropActiveBlock());
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); dropActiveBlock(); }
});

function update(dt) {
  elapsedTime += dt;
  scrollY += (scrollYTarget - scrollY) * (1 - Math.exp(-CAMERA_SMOOTH * dt));
  celebrateTimer = Math.max(0, celebrateTimer - dt);

  if (state === 'playing') {
    active.left += active.vx * dt;
    const boundLeft = EDGE_MARGIN, boundRight = W - EDGE_MARGIN - active.width;
    if (active.left < boundLeft) { active.left = boundLeft; active.vx = Math.abs(active.vx); }
    if (active.left > boundRight) { active.left = boundRight; active.vx = -Math.abs(active.vx); }
  }

  for (const d of debris) {
    d.vy += GRAVITY * dt;
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.rot += d.vrot * dt;
  }
  debris = debris.filter(d => d.y < H + 80);

  popups = popups.filter(p => { p.life--; p.y -= 0.6; return p.life > 0; });
}

function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#bfe0e8');
  g.addColorStop(0.6, '#cfe3d0');
  g.addColorStop(1, '#8a6a42');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Distant fence line, a hint of allotment beyond the crates.
  const fenceY = H - 70 + scrollY * 0.15;
  ctx.strokeStyle = 'rgba(120,90,55,0.35)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, fenceY);
  ctx.lineTo(W, fenceY);
  ctx.stroke();
  for (let x = 10; x < W; x += 34) {
    ctx.fillStyle = 'rgba(120,90,55,0.3)';
    ctx.fillRect(x, fenceY - 22, 5, 26);
  }
}

function drawCrate(x, y, w, h, colorIdx, highlight) {
  const c = CRATE_COLORS[colorIdx % CRATE_COLORS.length];
  ctx.fillStyle = c.base;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = c.dark;
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 1, y + 1, w - 2, h - 2);
  ctx.strokeStyle = c.plank;
  ctx.lineWidth = 1;
  for (let px = x + w * 0.25; px < x + w; px += w * 0.5) {
    ctx.beginPath();
    ctx.moveTo(px, y + 2);
    ctx.lineTo(px, y + h - 2);
    ctx.stroke();
  }
  ctx.strokeStyle = c.dark;
  ctx.beginPath();
  ctx.moveTo(x + 2, y + h / 2);
  ctx.lineTo(x + w - 2, y + h / 2);
  ctx.stroke();
  if (highlight) {
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 2.5;
    ctx.strokeRect(x, y, w, h);
  }
}

function drawStack() {
  for (let i = 0; i < stack.length; i++) {
    const span = blockWorldSpan(i);
    const y = span.top + scrollY;
    if (y > H + BLOCK_H) continue;
    if (y < -BLOCK_H) continue;
    drawCrate(stack[i].left, y, stack[i].width, BLOCK_H, i, false);
  }
}

function drawActive() {
  if (state === 'over') return;
  const span = blockWorldSpan(stack.length);
  const y = span.top + scrollY;
  const glow = 0.5 + 0.5 * Math.sin(elapsedTime * 6);
  ctx.save();
  ctx.shadowColor = 'rgba(255,255,255,' + (0.4 + glow * 0.3).toFixed(2) + ')';
  ctx.shadowBlur = 10;
  drawCrate(active.left, y, active.width, BLOCK_H, stack.length, true);
  ctx.restore();
}

function drawDebris() {
  for (const d of debris) {
    ctx.save();
    ctx.translate(d.x + d.w / 2, d.y + d.h / 2);
    ctx.rotate(d.rot);
    drawCrate(-d.w / 2, -d.h / 2, d.w, d.h, 0, false);
    ctx.restore();
  }
}

// The sky-gradient background swings from pale blue to brown as the camera
// scrolls, so plain fill+stroke text can wash out against the light end of
// it (this is what made the HUD score hard to read). A solid pill behind
// any in-play text guarantees contrast no matter what's scrolling underneath.
function drawTextPill(text, cx, cy, font, textColor, alpha) {
  ctx.font = font;
  ctx.textAlign = 'center';
  const w = ctx.measureText(text).width;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(20,14,8,0.72)';
  ctx.beginPath();
  ctx.roundRect(cx - w / 2 - 10, cy - 15, w + 20, 22, 11);
  ctx.fill();
  ctx.fillStyle = textColor;
  ctx.fillText(text, cx, cy + 2);
  ctx.globalAlpha = 1;
}

function drawPopups() {
  for (const p of popups) {
    drawTextPill(p.text, p.x, p.y, 'bold 14px Arial', p.color, clampNum(p.life / 40, 0, 1));
  }
}

function drawCelebrate() {
  if (celebrateTimer <= 0) return;
  drawTextPill('🔥 Streak x' + streak, W / 2, 96, 'bold 16px Arial', '#ffd76a', clampNum(celebrateTimer / 0.6, 0, 1));
}

function drawHud() {
  ctx.fillStyle = '#2a1608';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(0, HUD_H - 3, W, 3);

  // Left/right-aligned (not centered) so the score never sits directly
  // under the top-center mute button.
  ctx.font = 'bold 20px Arial';
  ctx.fillStyle = 'white';
  ctx.textAlign = 'left';
  ctx.fillText(String(score), 14, 33);

  ctx.font = 'bold 12px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.textAlign = 'right';
  const bestText = 'Best (' + (difficulty === 'easy' ? 'Easy' : 'Hard') + '): ' + best;
  ctx.fillText(bestText, W - 14, 33);
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);

  update(dt);

  drawBg();
  drawStack();
  drawActive();
  drawDebris();
  drawPopups();
  drawCelebrate();
  drawHud();

  requestAnimationFrame(loop);
}

reset();
requestAnimationFrame(loop);
</script>
<script src="../../assets/version.js"></script>
<script src="../../assets/game-embed.js" data-coffee-url="https://buymeacoffee.com/Krishnabuilds"></script>
</body>
