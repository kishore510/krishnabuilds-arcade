<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hoops</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #1a1410;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #3a2416;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(27px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.9; }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  #startBtn {
    margin-top: calc(16px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #e8891a;
    color: #2a1a00;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #ffb703; }
  #backToArcade {
    display: none;
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Hoops</h1>
    <p id="subtitle">Swipe up to shoot — get the power AND the aim right</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('hoopsMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playSwish() { tone(700, 0.07, 'sine', 0.09); tone(1000, 0.1, 'sine', 0.08, 0.05); tone(1300, 0.12, 'triangle', 0.07, 0.1); }
function playMake() { tone(600, 0.08, 'sine', 0.1); tone(880, 0.1, 'sine', 0.09, 0.06); }
function playClank() { tone(280, 0.09, 'square', 0.12); tone(200, 0.12, 'square', 0.09, 0.04); }
function playBoard() { tone(150, 0.1, 'sine', 0.11); }
function playMiss() { tone(180, 0.14, 'sawtooth', 0.08); }
function playCombo(n) { tone(500 + Math.min(n, 6) * 90, 0.09, 'triangle', 0.1); }
function playBonus() { tone(600, 0.1, 'triangle', 0.13); tone(900, 0.12, 'triangle', 0.12, 0.08); tone(1200, 0.16, 'triangle', 0.11, 0.16); }
function playStageChange() { tone(440, 0.1, 'sine', 0.1); tone(330, 0.14, 'sine', 0.09, 0.08); }
function playGameOver() {
  tone(523, 0.14, 'triangle', 0.13);
  tone(659, 0.14, 'triangle', 0.12, 0.13);
  tone(784, 0.2, 'triangle', 0.13, 0.26);
}

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('hoopsMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest() { return parseInt(sessionStorage.getItem('hoopsBest') || '0', 10); }
function saveBest(v) { try { sessionStorage.setItem('hoopsBest', v); } catch (e) {} }

// --- World: front-on view - the hoop faces the player instead of sitting
// off to one side, so the rim is drawn as a squashed ellipse (a circle seen
// from below) and the ball's job is lining up BOTH the arc and the left-right
// aim on a target that starts still and gets progressively less cooperative.
//
// Ball/rim proportions are the real ones: a regulation ball is ~24cm across
// a ~45.7cm rim, roughly 52-53% of the rim's width - not the ~30-40% it was
// before, which read as a golf ball.
//
// The flight itself uses a two-component model instead of one 2D parabola:
// `depthT` (0->1, how far along the shot is toward the hoop's distance)
// advances at a fixed rate independent of shot power, while `archHeight`
// (a real gravity arc, vy0 set by swipe strength) is a SEPARATE vertical
// offset layered on top and scaled down with depth. Conflating "distance
// covered" and "arc height" into a single Y-axis parabola (the old model)
// is what produced the "doesn't look like it's going in, last-second drop"
// complaint - a shot's height and how far it's traveled toward the hoop
// are different physical quantities, and real perspective-shooter games
// (the "front-on" basketball genre this is drawing from) keep them
// separate for exactly this reason. This also means shot POWER now has to
// be right, not just direction - too weak comes up short, too strong
// sails past/hits the board, matching how the real shot works. ---
const GRAVITY = 780;
const BALL_R = 21;
const START_POS = { x: 180, y: 458 };
const TIME_LIMIT = 60000;
const BONUS_TIME = 5000;
const RIM_R = 4.5;
const RIM_RESTITUTION = 0.5;
const BOARD_RESTITUTION = 0.45;
const MIN_SWIPE_DIST = 14;

const DEPTH_DURATION = 0.82;        // seconds for a shot to reach the hoop's distance
const ARC_GRAVITY = 820;
const REFERENCE_SWIPE_DIST = 110;   // swipe length that produces "perfect" arc power
const PERFECT_VY0 = 0.5 * ARC_GRAVITY * DEPTH_DURATION; // returns archHeight to 0 exactly at DEPTH_DURATION
const HORIZONTAL_SENSITIVITY = 2.3;
const MAX_VX = 480;
const HOOP_SCALE = 0.56;            // how small the ball renders once it reaches the hoop's depth
const HEIGHT_TOLERANCE = 16;        // how close the arc's height has to be to the rim when the ball arrives

// hoopY is now a variable, not a constant - the hoop moves on both axes, and
// the backboard/net are positioned relative to it so they track wherever the
// rim currently is.
const HOOP_Y_BASE = 168;
const RIM_RX = 40;
const BOARD_H = 58, BOARD_GAP = 18, BOARD_HALF_W = 46;
function boardBottom() { return hoopY - BOARD_GAP; }
function boardTop() { return boardBottom() - BOARD_H; }

// --- Hoop movement ramps in three stages: dead still to learn the arc, then
// jumping between fixed spots between shots, then genuinely sliding while
// you're mid-aim - each stage is a hard threshold on shots taken, not luck,
// so it's always the same for every player at the same point in a run.
// Spots and the moving-stage path now cover both axes, not just left-right. ---
const STAGE2_AT = 5;   // shots taken before the hoop starts relocating between shots
const STAGE3_AT = 14;  // shots taken before it moves continuously
const HOOP_SPOTS = [
  { x: 110, y: 155 }, { x: 145, y: 182 }, { x: 180, y: 158 },
  { x: 215, y: 182 }, { x: 250, y: 155 }, { x: 180, y: 195 }
];

let hoopX = 180, hoopY = HOOP_Y_BASE, moveTime = 0;
let shotsTaken = 0, announcedStage = 1;

function pickNewHoopPosition() {
  const pool = HOOP_SPOTS.filter((s) => Math.hypot(s.x - hoopX, s.y - hoopY) > 30);
  const pick = pool.length ? pool[Math.floor(Math.random() * pool.length)] : HOOP_SPOTS[0];
  hoopX = pick.x; hoopY = pick.y;
}

function stageFor(shots) { return shots >= STAGE3_AT ? 3 : shots >= STAGE2_AT ? 2 : 1; }

function updateHoop(dt) {
  const stage = stageFor(shotsTaken);
  if (stage === 3) {
    moveTime += dt;
    const ramp = clamp(shotsTaken - STAGE3_AT, 0, 20);
    const ampX = clamp(38 + ramp * 2.2, 38, 85);
    const ampY = clamp(14 + ramp * 1.1, 14, 32);
    const speed = clamp(0.55 + ramp * 0.03, 0.55, 1.5);
    hoopX = 180 + Math.sin(moveTime * speed) * ampX;
    hoopY = HOOP_Y_BASE + Math.sin(moveTime * speed * 1.3 + 1.4) * ampY;
  }
  if (stage !== announcedStage) {
    announcedStage = stage;
    playStageChange();
    if (stage === 2) addPopup(W / 2, 60, 'Hoop’s on the move!', '#ffe28a');
    else if (stage === 3) addPopup(W / 2, 60, 'It won’t hold still now!', '#ff8a4a');
  }
}

// Four collision points instead of two - the true left/right rim edges plus
// two lower/inward points tracing the front curve - so a ball can graze the
// rim at an angle and catch/roll instead of only ever bouncing off a single
// fixed edge point.
function rimCollisionPoints() {
  return [
    { x: hoopX - RIM_RX, y: hoopY },
    { x: hoopX + RIM_RX, y: hoopY },
    { x: hoopX - RIM_RX * 0.72, y: hoopY + 9 },
    { x: hoopX + RIM_RX * 0.72, y: hoopY + 9 }
  ];
}

let ball = null;
let dragStart = null, dragCurrent = null, dragPointerId = null;
let score = 0, combo = 0, timeLeft = TIME_LIMIT;
let popups = [];
let netFlash = 0;
let state = 'menu'; // menu | playing | over

function addPopup(x, y, text, color) { popups.push({ x, y, text, color, t: 0 }); }

function showMenu() {
  state = 'menu';
  title.textContent = 'Hoops';
  subtitle.textContent = 'Swipe up to shoot — get the power AND the aim right';
  scoreLine.style.display = 'none';
  bestLine.textContent = 'Best score: ' + loadBest();
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  overlay.style.display = 'flex';
}

function startGame() {
  hoopX = 180; hoopY = HOOP_Y_BASE; moveTime = 0;
  shotsTaken = 0; announcedStage = 1;
  ball = null;
  score = 0;
  combo = 0;
  timeLeft = TIME_LIMIT;
  popups = [];
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

startBtn.addEventListener('click', () => { if (state === 'menu' || state === 'over') startGame(); });

function pointerToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing' || ball) return;
  dragStart = pointerToCanvas(e);
  dragCurrent = dragStart;
  dragPointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e) => {
  if (!dragStart || e.pointerId !== dragPointerId) return;
  dragCurrent = pointerToCanvas(e);
});
canvas.addEventListener('pointerup', (e) => {
  if (!dragStart || e.pointerId !== dragPointerId) return;
  const end = pointerToCanvas(e);
  const dx = end.x - dragStart.x, dy = end.y - dragStart.y;
  const dist = Math.hypot(dx, dy);
  dragStart = null;
  dragCurrent = null;
  if (dist < MIN_SWIPE_DIST || dy >= -2) return;
  launchBall(dx, dy, dist);
});

// The target Y is captured once, at launch - the ball flies toward where
// the hoop WAS when you released, not where it currently is. If the hoop
// has moved by the time the ball arrives (stage 2/3), that's the shot
// missing because you didn't lead it, not a bug.
function launchBall(dx, dy, dist) {
  const powerRatio = clamp(dist / REFERENCE_SWIPE_DIST, 0.55, 1.6);
  const vx = clamp(dx * HORIZONTAL_SENSITIVITY, -MAX_VX, MAX_VX);
  ball = {
    x: START_POS.x, y: START_POS.y,
    vx, vy: 0,
    mode: 'flight', depthT: 0, flightTime: 0,
    vy0: PERFECT_VY0 * powerRatio, targetY: hoopY,
    currentScale: 1, age: 0,
    spin: 0, touchedRim: false, touchedBoard: false, scored: false, sinkTimer: 0, prevY: START_POS.y
  };
}

function circlePointCollide(pt, restitution) {
  const dx = ball.x - pt.x, dy = ball.y - pt.y;
  const minDist = BALL_R + RIM_R;
  const dist = Math.hypot(dx, dy);
  if (dist >= minDist || dist < 0.0001) return false;
  const nx = dx / dist, ny = dy / dist;
  const overlap = minDist - dist;
  ball.x += nx * overlap; ball.y += ny * overlap;
  const vDotN = ball.vx * nx + ball.vy * ny;
  if (vDotN < 0) {
    ball.vx -= (1 + restitution) * vDotN * nx;
    ball.vy -= (1 + restitution) * vDotN * ny;
  }
  // A bit of speed bleeds off on every rim touch (friction) - that's what
  // lets a grazing shot slow down enough to catch, wobble along the rim,
  // and either drop in or roll off, instead of one clean carom every time.
  ball.vx *= 0.94; ball.vy *= 0.985;
  ball.touchedRim = true;
  return true;
}

function afterShotResolved() {
  shotsTaken++;
  if (stageFor(shotsTaken) === 2) pickNewHoopPosition();
}

function endShot(made) {
  if (made) {
    combo++;
    const swish = !ball.touchedRim && !ball.touchedBoard;
    let pts;
    if (swish) {
      pts = 3 * Math.min(combo, 5);
      addPopup(hoopX, hoopY, 'SWISH +' + pts, '#ffe28a');
      playSwish();
      netFlash = 0.25;
    } else {
      pts = 1;
      addPopup(hoopX, hoopY, '+1', '#a8e8c8');
      playMake();
      netFlash = 0.2;
    }
    score += pts;
    if (combo > 1) playCombo(combo);
    if (combo % 4 === 0) {
      timeLeft += BONUS_TIME;
      addPopup(hoopX, hoopY - 30, '🔥 +' + (BONUS_TIME / 1000) + 's', '#ff8a4a');
      playBonus();
    }
  } else {
    combo = 0;
  }
  ball = null;
  afterShotResolved();
}

function updateBall(dt) {
  if (!ball) return;

  // Once a shot is confirmed through the gap, switch to a slow, controlled
  // straight drop through the net for a beat instead of resolving instantly -
  // an immediate vanish the moment it crossed the rim line read as a glitch
  // ("sudden drop"), and continuing full gravity/momentum here could send it
  // rocketing off past the net looking uncontrolled. A fixed gentle fall
  // always looks the same, clean "swish" regardless of the shot's speed.
  if (ball.scored) {
    ball.sinkTimer += dt;
    ball.y += 95 * dt;
    ball.spin += 3 * dt;
    if (ball.sinkTimer > 0.22) endShot(true);
    return;
  }

  ball.prevY = ball.y;
  ball.age += dt;

  if (ball.mode === 'flight') {
    // On rails until something interrupts it: depthT is distance-to-hoop
    // progress (constant rate - power doesn't change how LONG the shot
    // takes, only how high it arcs), archHeight is a real gravity arc
    // layered on top and scaled down with depth so it reads as genuine
    // perspective rather than a flat 2D bounce.
    ball.flightTime += dt;
    ball.depthT = ball.flightTime / DEPTH_DURATION;
    const baseY = lerp(START_POS.y, ball.targetY, ball.depthT);
    const scale = clamp(lerp(1, HOOP_SCALE, ball.depthT), 0.35, 1.3);
    const archHeight = ball.vy0 * ball.flightTime - 0.5 * ARC_GRAVITY * ball.flightTime * ball.flightTime;
    ball.x += ball.vx * dt;
    ball.y = baseY - archHeight * scale;
    ball.currentScale = scale;
    ball.spin += ball.vx * dt * 0.05;
  } else {
    // Free physics once something's been hit - the smooth flight curve no
    // longer applies once the ball's course has been knocked off it.
    ball.vy += GRAVITY * dt;
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    ball.spin += ball.vx * dt * 0.05;
  }

  const frameVy = ball.mode === 'free' ? ball.vy : (ball.y - ball.prevY) / dt;
  const speed = Math.hypot(ball.vx, frameVy);
  // Slower ball = less energy to bounce with = more likely to catch on the
  // rim and wobble/roll instead of cleanly deflecting - real physics, and
  // exactly what makes borderline shots feel alive instead of binary.
  const rimRestitution = clamp(RIM_RESTITUTION * (0.4 + speed / 600), 0.18, RIM_RESTITUTION);
  // circlePointCollide reads/writes ball.vy directly - keep it holding the
  // real current vertical speed even while in 'flight' mode (where it's
  // otherwise unused) so a collision this frame has a correct velocity to
  // bounce from and hand off to 'free' mode with.
  ball.vy = frameVy;
  for (const pt of rimCollisionPoints()) {
    if (circlePointCollide(pt, rimRestitution)) {
      playClank();
      ball.mode = 'free';
      break;
    }
  }

  if (!ball.touchedBoard && ball.y > boardTop() && ball.y < boardBottom() && Math.abs(ball.x - hoopX) < BOARD_HALF_W) {
    ball.mode = 'free';
    ball.y = boardBottom();
    ball.vy = Math.abs(ball.vy) * BOARD_RESTITUTION;
    ball.touchedBoard = true;
    playBoard();
  }

  // Scoring: flight mode is a scripted curve where depth and height are
  // separate quantities, so "the ball arrived at the rim" isn't a simple Y
  // line crossing any more (baseY sweeps straight through hoopY regardless
  // of arc height, so a directional crossing check can never fire
  // correctly here) - it's "did it get close to the rim's exact height
  // around the time it reached the rim's distance." Free mode (after a
  // bounce) is real integrated physics again, so the traditional crossing
  // check is correct there.
  const gapLeft = hoopX - RIM_RX + BALL_R + 2;
  const gapRight = hoopX + RIM_RX - BALL_R - 2;
  if (ball.mode === 'flight') {
    if (ball.depthT > 0.93 && ball.depthT < 1.07 && Math.abs(ball.y - hoopY) < HEIGHT_TOLERANCE && ball.x > gapLeft && ball.x < gapRight) {
      ball.scored = true;
      ball.sinkTimer = 0;
      return;
    }
  } else if (ball.prevY < hoopY && ball.y >= hoopY && ball.x > gapLeft && ball.x < gapRight) {
    ball.scored = true;
    ball.sinkTimer = 0;
    return;
  }

  if (ball.y > H + 30 || ball.x < -30 || ball.x > W + 30 || ball.age > 4) {
    playMiss();
    endShot(false);
  }
}

function update(dt) {
  if (state !== 'playing') return;
  timeLeft -= dt * 1000;
  if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }
  updateHoop(dt);
  updateBall(dt);
  if (netFlash > 0) netFlash -= dt;
  popups.forEach((p) => { p.t += dt * 1000; });
  popups = popups.filter((p) => p.t < 900);
}

function endGame() {
  state = 'over';
  playGameOver();
  const best = loadBest();
  const isNewBest = score > best;
  if (isNewBest) saveBest(score);
  title.textContent = "Time's Up!";
  subtitle.textContent = 'Swipe up to shoot — get the power AND the aim right';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score;
  bestLine.textContent = isNewBest ? '🏆 New best score!' : 'Best score: ' + best;
  startBtn.textContent = 'Play Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

function drawCourt() {
  // Arena backdrop behind the hoop
  const g = ctx.createLinearGradient(0, 0, 0, 340);
  g.addColorStop(0, '#2a1c30');
  g.addColorStop(1, '#3a2416');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, 340);
  const spot = ctx.createRadialGradient(hoopX, hoopY - 15, 20, hoopX, hoopY - 15, 220);
  spot.addColorStop(0, 'rgba(255,220,160,0.14)');
  spot.addColorStop(1, 'rgba(255,220,160,0)');
  ctx.fillStyle = spot;
  ctx.fillRect(0, 0, W, 340);

  // Perspective hardwood floor, planks converging toward the hoop base
  const floorTop = 330, vanishX = 180, vanishY = 250;
  const floorGrad = ctx.createLinearGradient(0, floorTop, 0, H);
  floorGrad.addColorStop(0, '#8a5a30');
  floorGrad.addColorStop(1, '#5b3a1c');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, floorTop, W, H - floorTop);
  ctx.strokeStyle = 'rgba(0,0,0,0.22)';
  ctx.lineWidth = 1.5;
  for (let i = -6; i <= 6; i++) {
    const bx = W / 2 + i * 34;
    ctx.beginPath();
    ctx.moveTo(vanishX + (bx - vanishX) * 0.06, floorTop);
    ctx.lineTo(bx, H);
    ctx.stroke();
  }
  for (let y = floorTop + 14; y < H; y += 22) {
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(20, H - 20); ctx.lineTo(W - 20, H - 20); ctx.stroke();
}

function drawHoop() {
  // Backboard - white with the standard red inner box, viewed face-on
  const bTop = boardTop(), bBottom = boardBottom();
  const bw = BOARD_HALF_W * 2 + 8, bx = hoopX - bw / 2, by = bTop - 4, bh = bBottom - bTop + 12;
  ctx.fillStyle = '#f0ece0';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 2;
  ctx.stroke();
  ctx.strokeStyle = '#e63946'; ctx.lineWidth = 2.5;
  ctx.strokeRect(hoopX - 20, by + bh - 34, 40, 24);

  // Rim: an ellipse (a circle seen from below-front) with the pole/arm behind it
  ctx.strokeStyle = '#8a4a10'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(hoopX, by + bh); ctx.lineTo(hoopX, hoopY); ctx.stroke();

  const netBottom = hoopY + 40;
  ctx.strokeStyle = netFlash > 0 ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.3;
  for (let i = 0; i <= 7; i++) {
    const t = i / 7;
    const x = hoopX - RIM_RX + RIM_RX * 2 * t;
    const nx = hoopX + (x - hoopX) * 0.3;
    ctx.beginPath(); ctx.moveTo(x, hoopY + 1); ctx.lineTo(nx, netBottom); ctx.stroke();
  }
  for (let i = 1; i <= 2; i++) {
    const ny = hoopY + (netBottom - hoopY) * (i / 3);
    const rx = RIM_RX * (1 - i / 3.6) * 0.85;
    ctx.beginPath(); ctx.ellipse(hoopX, ny, rx, rx * 0.28, 0, 0, Math.PI * 2); ctx.stroke();
  }

  const rimGrad = ctx.createLinearGradient(hoopX - RIM_RX, hoopY - 6, hoopX + RIM_RX, hoopY + 6);
  rimGrad.addColorStop(0, '#ff8a3c');
  rimGrad.addColorStop(0.5, '#e8891a');
  rimGrad.addColorStop(1, '#c9660c');
  ctx.strokeStyle = rimGrad;
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.ellipse(hoopX, hoopY, RIM_RX, 13, 0, 0, Math.PI * 2); ctx.stroke();
  // Front lip drawn brighter/thicker to sell the "ring facing you" perspective
  ctx.strokeStyle = '#ffb703';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(hoopX, hoopY, RIM_RX, 13, 0, 0.15, Math.PI - 0.15); ctx.stroke();
}

function ballScale() {
  if (!ball) return 1;
  // Flight mode already computed the correct depth-based scale each frame;
  // free mode (post-bounce) has no depthT anymore, so fall back to reading
  // scale off the ball's screen position instead.
  if (ball.mode === 'flight') return ball.currentScale;
  return clamp(lerp(HOOP_SCALE, 1, (ball.y - hoopY) / (START_POS.y - hoopY)), HOOP_SCALE * 0.85, 1.25);
}

function drawBasketball(x, y, scale, spin) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.rotate(spin);
  const grad = ctx.createRadialGradient(-BALL_R * 0.35, -BALL_R * 0.4, 1, 0, 0, BALL_R * 1.3);
  grad.addColorStop(0, '#ff6b52');
  grad.addColorStop(0.55, '#e6342a');
  grad.addColorStop(1, '#a41f18');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(20,5,5,0.75)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(-BALL_R, 0); ctx.lineTo(BALL_R, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -BALL_R); ctx.lineTo(0, BALL_R); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, -0.6, 0.6); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, Math.PI - 0.6, Math.PI + 0.6); ctx.stroke();
  ctx.restore();
}

function drawBall() {
  // Rest the ball at the launch spot when there's nothing in flight, rather
  // than having it only appear the instant a shot is released - it should
  // always be visibly "in your hands" and ready.
  if (!ball) { drawBasketball(START_POS.x, START_POS.y, 1, 0); return; }
  drawBasketball(ball.x, ball.y, ballScale(), ball.spin);
}

function drawAimHint() {
  if (ball || !dragStart || !dragCurrent) return;
  const dx = dragCurrent.x - dragStart.x, dy = dragCurrent.y - dragStart.y;
  const dist = Math.hypot(dx, dy);
  if (dist < MIN_SWIPE_DIST || dy >= -2) return;
  // Traces the same depth+arc formula updateBall() actually flies on, so
  // the preview is a true prediction rather than an approximation of it.
  const powerRatio = clamp(dist / REFERENCE_SWIPE_DIST, 0.55, 1.6);
  const vx = clamp(dx * HORIZONTAL_SENSITIVITY, -MAX_VX, MAX_VX);
  const vy0 = PERFECT_VY0 * powerRatio;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 1; i <= 14; i++) {
    const depthT = i * 0.07;
    const flightTime = depthT * DEPTH_DURATION;
    const baseY = lerp(START_POS.y, hoopY, depthT);
    const scale = clamp(lerp(1, HOOP_SCALE, depthT), 0.35, 1.3);
    const archHeight = vy0 * flightTime - 0.5 * ARC_GRAVITY * flightTime * flightTime;
    const px = START_POS.x + vx * flightTime;
    const py = baseY - archHeight * scale;
    if (py > H || depthT > 1.3) break;
    ctx.beginPath(); ctx.arc(px, py, 2.4 * scale, 0, Math.PI * 2); ctx.fill();
  }
}

function drawPopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 14px Arial';
  for (const p of popups) {
    const t = p.t / 900;
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - 20 - t * 30);
    ctx.globalAlpha = 1;
  }
}

function drawHud() {
  ctx.font = 'bold 16px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const scoreText = 'Score: ' + score;
  ctx.strokeText(scoreText, 14, 26);
  ctx.fillText(scoreText, 14, 26);
  ctx.textAlign = 'right';
  const timeText = Math.ceil(timeLeft / 1000) + 's';
  ctx.strokeText(timeText, W - 14, 26);
  ctx.fillText(timeText, W - 14, 26);
  if (combo > 1) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#ffe28a';
    const comboText = combo + '× combo!';
    ctx.strokeText(comboText, W / 2, 46);
    ctx.fillText(comboText, W / 2, 46);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawCourt();
  if (state === 'menu') return;
  drawHoop();
  drawBall();
  drawAimHint();
  drawPopups();
  drawHud();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
