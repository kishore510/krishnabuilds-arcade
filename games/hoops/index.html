<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hoops</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #d9622c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #ffb96b;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(27px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.9; }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  #startBtn {
    margin-top: calc(16px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #ff8c1a;
    color: #3a1c00;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #ffb703; }
  #backToArcade {
    display: none;
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.3);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Hoops</h1>
    <p id="subtitle">Flick the ball — swipe direction aims, swipe length is power</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('hoopsMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playSwish() { tone(700, 0.07, 'sine', 0.09); tone(1000, 0.1, 'sine', 0.08, 0.05); tone(1300, 0.12, 'triangle', 0.07, 0.1); }
function playMake() { tone(600, 0.08, 'sine', 0.1); tone(880, 0.1, 'sine', 0.09, 0.06); }
function playClank() { tone(280, 0.09, 'square', 0.12); tone(200, 0.12, 'square', 0.09, 0.04); }
function playBoard() { tone(150, 0.1, 'sine', 0.11); }
function playMiss() { tone(180, 0.14, 'sawtooth', 0.08); }
function playCombo(n) { tone(500 + Math.min(n, 6) * 90, 0.09, 'triangle', 0.1); }
function playBonus() { tone(600, 0.1, 'triangle', 0.13); tone(900, 0.12, 'triangle', 0.12, 0.08); tone(1200, 0.16, 'triangle', 0.11, 0.16); }
function playStageChange() { tone(440, 0.1, 'sine', 0.1); tone(330, 0.14, 'sine', 0.09, 0.08); }
function playGameOver() {
  tone(523, 0.14, 'triangle', 0.13);
  tone(659, 0.14, 'triangle', 0.12, 0.13);
  tone(784, 0.2, 'triangle', 0.13, 0.26);
}

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('hoopsMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest() { return parseInt(sessionStorage.getItem('hoopsBest') || '0', 10); }
function saveBest(v) { try { sessionStorage.setItem('hoopsBest', v); } catch (e) {} }

// --- World: flat, front-on view. The ball is a real 2D projectile (gravity +
// initial velocity from the flick) - no perspective depth, no scripted path.
// The rim is modelled as just TWO small circular collision points (its left
// and right ends); the gap between them is open air, so an angled shot that's
// on target drops straight through instead of clanging off an invisible
// front bar. A basket is a downward crossing of the line between those two
// points while inside the gap - not merely touching the rim. ---
const GRAVITY = 1500;
const START_POS = { x: 180, y: 472 };
const TIME_LIMIT = 60000;
const BONUS_TIME = 5000;

const RIM_HALF_W = 38;         // half the rim's inner opening
const BALL_R = 23;             // ~60% of the rim's inner width (2*RIM_HALF_W)
const RIM_POINT_R = 6;
const RIM_RESTITUTION = 0.5;
const BOARD_RESTITUTION = 0.45;
const BOARD_HALF_W = 55, BOARD_H = 64, RIM_BOARD_GAP = 10;

const MIN_SWIPE_DIST = 18;
const MAX_SWIPE_DIST = 260;
const FLICK_SENS_Y = 6.8;      // swipe length -> shot power (vertical)
const FLICK_SENS_X = 1.6;      // swipe horizontal component -> steering

// hoopX/hoopY drift smoothly (delta-time sine waves), never teleport. The two
// axes of difficulty are introduced one at a time: side-to-side first (aim),
// then up/down (power/distance) once the player has had a chance to learn
// the flick feel on a hoop that isn't fighting them on both axes at once.
const HOOP_X_BASE = 180, HOOP_Y_BASE = 128;
const STAGE2_MAKES = 4;   // side-to-side movement begins
const STAGE3_MAKES = 10;  // up/down movement also begins
const AMP_X_BASE = 45, AMP_X_GROWTH = 4, AMP_X_MAX = 95;
const SPEED_X_BASE = 0.5, SPEED_X_GROWTH = 0.045, SPEED_X_MAX = 1.7;
const AMP_Y_BASE = 18, AMP_Y_GROWTH = 3, AMP_Y_MAX = 46;
const SPEED_Y_BASE = 0.65, SPEED_Y_GROWTH = 0.05, SPEED_Y_MAX = 1.9;

let hoopX = HOOP_X_BASE, hoopY = HOOP_Y_BASE, moveTime = 0;
let makes = 0, announcedStage = 1;

function boardBottom() { return hoopY - RIM_BOARD_GAP; }
function boardTop() { return boardBottom() - BOARD_H; }

function stageFor(m) { return m >= STAGE3_MAKES ? 3 : m >= STAGE2_MAKES ? 2 : 1; }

function updateHoop(dt) {
  const stage = stageFor(makes);
  moveTime += dt;
  if (stage >= 2) {
    const rampX = clamp(makes - STAGE2_MAKES, 0, 40);
    const ampX = clamp(AMP_X_BASE + rampX * AMP_X_GROWTH, AMP_X_BASE, AMP_X_MAX);
    const speedX = clamp(SPEED_X_BASE + rampX * SPEED_X_GROWTH, SPEED_X_BASE, SPEED_X_MAX);
    hoopX = HOOP_X_BASE + Math.sin(moveTime * speedX) * ampX;
  } else {
    hoopX = HOOP_X_BASE;
  }
  if (stage >= 3) {
    const rampY = clamp(makes - STAGE3_MAKES, 0, 40);
    const ampY = clamp(AMP_Y_BASE + rampY * AMP_Y_GROWTH, AMP_Y_BASE, AMP_Y_MAX);
    const speedY = clamp(SPEED_Y_BASE + rampY * SPEED_Y_GROWTH, SPEED_Y_BASE, SPEED_Y_MAX);
    hoopY = HOOP_Y_BASE + Math.sin(moveTime * speedY + 1.4) * ampY;
  } else {
    hoopY = HOOP_Y_BASE;
  }
  if (stage !== announcedStage) {
    announcedStage = stage;
    playStageChange();
    if (stage === 2) addPopup(W / 2, 60, 'Hoop’s on the move!', '#ffe28a');
    else if (stage === 3) addPopup(W / 2, 60, 'Now it shifts height too!', '#ff8a4a');
  }
}

function rimPoints() {
  return [
    { x: hoopX - RIM_HALF_W, y: hoopY },
    { x: hoopX + RIM_HALF_W, y: hoopY }
  ];
}

let ball = null;
let dragStart = null, dragCurrent = null, dragPointerId = null;
let score = 0, combo = 0, timeLeft = TIME_LIMIT;
let popups = [];
let netFlash = 0;
let idleT = 0;
let state = 'menu'; // menu | playing | over

function addPopup(x, y, text, color) { popups.push({ x, y, text, color, t: 0 }); }

function showMenu() {
  state = 'menu';
  title.textContent = 'Hoops';
  subtitle.textContent = 'Flick the ball — swipe direction aims, swipe length is power';
  scoreLine.style.display = 'none';
  bestLine.textContent = 'Best score: ' + loadBest();
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  overlay.style.display = 'flex';
}

function startGame() {
  hoopX = HOOP_X_BASE; hoopY = HOOP_Y_BASE; moveTime = 0;
  makes = 0; announcedStage = 1;
  ball = null;
  score = 0;
  combo = 0;
  timeLeft = TIME_LIMIT;
  popups = [];
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

startBtn.addEventListener('click', () => { if (state === 'menu' || state === 'over') startGame(); });

function pointerToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing' || ball) return;
  dragStart = pointerToCanvas(e);
  dragCurrent = dragStart;
  dragPointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e) => {
  if (!dragStart || e.pointerId !== dragPointerId) return;
  dragCurrent = pointerToCanvas(e);
});
canvas.addEventListener('pointerup', (e) => {
  if (!dragStart || e.pointerId !== dragPointerId) return;
  const end = pointerToCanvas(e);
  const dx = end.x - dragStart.x, dy = end.y - dragStart.y;
  const dist = Math.hypot(dx, dy);
  dragStart = null;
  dragCurrent = null;
  if (dist < MIN_SWIPE_DIST || dy >= -6) return;
  launchBall(dx, dy, dist);
});

function launchVelocity(dx, dy, dist) {
  const clamped = clamp(dist, MIN_SWIPE_DIST, MAX_SWIPE_DIST);
  const scale = clamped / dist;
  return { vx: dx * scale * FLICK_SENS_X, vy: dy * scale * FLICK_SENS_Y };
}

function launchBall(dx, dy, dist) {
  const v = launchVelocity(dx, dy, dist);
  ball = {
    x: START_POS.x, y: START_POS.y,
    vx: v.vx, vy: v.vy,
    prevY: START_POS.y, age: 0, spin: 0,
    touchedRim: false, touchedBoard: false, scored: false, sinkTimer: 0
  };
}

function circlePointCollide(pt, restitution) {
  const dx = ball.x - pt.x, dy = ball.y - pt.y;
  const minDist = BALL_R + RIM_POINT_R;
  const dist = Math.hypot(dx, dy);
  if (dist >= minDist || dist < 0.0001) return false;
  const nx = dx / dist, ny = dy / dist;
  const overlap = minDist - dist;
  ball.x += nx * overlap; ball.y += ny * overlap;
  const vDotN = ball.vx * nx + ball.vy * ny;
  if (vDotN < 0) {
    ball.vx -= (1 + restitution) * vDotN * nx;
    ball.vy -= (1 + restitution) * vDotN * ny;
  }
  // A little energy bleeds off every rim touch so a grazing shot can catch,
  // wobble, and either drop in or roll off - not one clean carom every time.
  ball.vx *= 0.94; ball.vy *= 0.985;
  ball.touchedRim = true;
  return true;
}

function boardCollide() {
  const bLeft = hoopX - BOARD_HALF_W, bRight = hoopX + BOARD_HALF_W;
  const bTop = boardTop(), bBottom = boardBottom();
  const closestX = clamp(ball.x, bLeft, bRight);
  const closestY = clamp(ball.y, bTop, bBottom);
  const dx = ball.x - closestX, dy = ball.y - closestY;
  const dist = Math.hypot(dx, dy);
  if (dist >= BALL_R || dist < 0.0001) return;
  const nx = dx / dist, ny = dy / dist;
  const overlap = BALL_R - dist;
  ball.x += nx * overlap; ball.y += ny * overlap;
  const vDotN = ball.vx * nx + ball.vy * ny;
  if (vDotN < 0) {
    ball.vx -= (1 + BOARD_RESTITUTION) * vDotN * nx;
    ball.vy -= (1 + BOARD_RESTITUTION) * vDotN * ny;
  }
  ball.touchedBoard = true;
  playBoard();
}

function endShot(made) {
  if (made) {
    makes++;
    combo++;
    const swish = !ball.touchedRim && !ball.touchedBoard;
    let pts;
    if (swish) {
      pts = 3 * Math.min(combo, 5);
      addPopup(hoopX, hoopY, 'SWISH +' + pts, '#ffe28a');
      playSwish();
      netFlash = 0.25;
    } else {
      pts = 1;
      addPopup(hoopX, hoopY, '+1', '#a8e8c8');
      playMake();
      netFlash = 0.2;
    }
    score += pts;
    if (combo > 1) playCombo(combo);
    if (combo % 4 === 0) {
      timeLeft += BONUS_TIME;
      addPopup(hoopX, hoopY - 30, '🔥 +' + (BONUS_TIME / 1000) + 's', '#ff8a4a');
      playBonus();
    }
  } else {
    combo = 0;
  }
  ball = null;
}

function updateBall(dt) {
  if (!ball) return;

  if (ball.scored) {
    ball.sinkTimer += dt;
    ball.y += 100 * dt;
    ball.spin += 3 * dt;
    if (ball.sinkTimer > 0.2) endShot(true);
    return;
  }

  ball.prevY = ball.y;
  ball.age += dt;

  // Real projectile motion: gravity + the velocity set at launch. No scripted
  // curve - collisions below just change vx/vy and the same integrator keeps
  // going, so a rim rattle or a backboard bank is a genuine physical bounce.
  ball.vy += GRAVITY * dt;
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;
  ball.spin += ball.vx * dt * 0.05;

  const speed = Math.hypot(ball.vx, ball.vy);
  const rimRestitution = clamp(RIM_RESTITUTION * (0.4 + speed / 600), 0.18, RIM_RESTITUTION);
  for (const pt of rimPoints()) {
    if (circlePointCollide(pt, rimRestitution)) { playClank(); break; }
  }
  boardCollide();

  // Scored = a downward crossing of the rim-to-rim line, fully inside the
  // open gap (ball edges clear of both rim points), not merely touching.
  const gapLeft = hoopX - RIM_HALF_W + BALL_R;
  const gapRight = hoopX + RIM_HALF_W - BALL_R;
  if (!ball.scored && ball.prevY < hoopY && ball.y >= hoopY && ball.x > gapLeft && ball.x < gapRight) {
    ball.scored = true;
    ball.sinkTimer = 0;
    return;
  }

  if (ball.y > H + 40 || ball.x < -40 || ball.x > W + 40 || ball.age > 4) {
    playMiss();
    endShot(false);
  }
}

function update(dt) {
  if (state !== 'playing') return;
  timeLeft -= dt * 1000;
  if (timeLeft <= 0) { timeLeft = 0; endGame(); return; }
  updateHoop(dt);
  updateBall(dt);
  idleT += dt;
  if (netFlash > 0) netFlash -= dt;
  popups.forEach((p) => { p.t += dt * 1000; });
  popups = popups.filter((p) => p.t < 900);
}

function endGame() {
  state = 'over';
  playGameOver();
  const best = loadBest();
  const isNewBest = score > best;
  if (isNewBest) saveBest(score);
  title.textContent = "Time's Up!";
  subtitle.textContent = 'Flick the ball — swipe direction aims, swipe length is power';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score;
  bestLine.textContent = isNewBest ? '🏆 New best score!' : 'Best score: ' + best;
  startBtn.textContent = 'Play Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

// --- Rendering: warm flat-design look. Depth comes from one soft diagonal
// drop shadow behind the backboard/rim assembly, not a 3D floor or grid. ---
function drawBackdrop() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#ffc27a');
  g.addColorStop(0.6, '#ff9a4d');
  g.addColorStop(1, '#f2793a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // flat warm floor band (no perspective) just to ground the scene
  ctx.fillStyle = '#c9622f';
  ctx.fillRect(0, H - 46, W, 46);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(0, H - 46, W, 4);
}

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
}

function drawHoopShadow() {
  const bTop = boardTop(), bBottom = boardBottom();
  const bw = BOARD_HALF_W * 2 + 10, bx = hoopX - bw / 2, bh = bBottom - bTop + 14;
  ctx.save();
  ctx.fillStyle = 'rgba(60,25,10,0.22)';
  roundRectPath(bx + 9, bTop + 12, bw, bh, 10);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(hoopX + 10, hoopY + 12, RIM_HALF_W + 10, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBackboard() {
  const bTop = boardTop(), bBottom = boardBottom();
  const bw = BOARD_HALF_W * 2, bx = hoopX - BOARD_HALF_W, by = bTop, bh = bBottom - bTop;
  ctx.fillStyle = '#fff8ef';
  roundRectPath(bx, by, bw, bh, 12);
  ctx.fill();
  ctx.strokeStyle = '#3d2a1e';
  ctx.lineWidth = 5;
  ctx.lineJoin = 'round';
  roundRectPath(bx, by, bw, bh, 12);
  ctx.stroke();
  ctx.strokeStyle = '#e8483a';
  ctx.lineWidth = 5;
  roundRectPath(hoopX - 22, by + bh - 30, 44, 22, 5);
  ctx.stroke();

  // short post connecting board to rim, chunky and rounded
  ctx.strokeStyle = '#c9622f';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(hoopX, bBottom); ctx.lineTo(hoopX, hoopY); ctx.stroke();
}

const RIM_RX = RIM_HALF_W + 5, RIM_RY = 13;

function drawRimBack() {
  ctx.strokeStyle = '#c9430f';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.ellipse(hoopX, hoopY, RIM_RX, RIM_RY, 0, Math.PI, Math.PI * 2);
  ctx.stroke();

  // net, drawn mostly behind the ball
  const netBottom = hoopY + 42;
  ctx.strokeStyle = netFlash > 0 ? 'rgba(255,255,255,0.98)' : 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  for (let i = 0; i <= 6; i++) {
    const t = i / 6;
    const x = hoopX - RIM_HALF_W + RIM_HALF_W * 2 * t;
    const nx = hoopX + (x - hoopX) * 0.32;
    ctx.beginPath(); ctx.moveTo(x, hoopY); ctx.lineTo(nx, netBottom); ctx.stroke();
  }
  for (let i = 1; i <= 2; i++) {
    const ny = hoopY + (netBottom - hoopY) * (i / 3);
    const rx = RIM_HALF_W * (1 - i / 3.6) * 0.85;
    ctx.beginPath(); ctx.ellipse(hoopX, ny, rx, rx * 0.26, 0, 0, Math.PI * 2); ctx.stroke();
  }
}

function drawRimFront() {
  ctx.strokeStyle = '#ff8c1a';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.ellipse(hoopX, hoopY, RIM_RX, RIM_RY, 0, 0, Math.PI);
  ctx.stroke();
  // bright highlight lip to sell the chunky glossy look
  ctx.strokeStyle = '#ffc670';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(hoopX, hoopY, RIM_RX, RIM_RY, 0, 0.25, Math.PI - 0.25);
  ctx.stroke();
  // the two collision points, drawn as small solid caps at the rim ends
  ctx.fillStyle = '#e86a12';
  for (const pt of rimPoints()) {
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2); ctx.fill();
  }
}

function drawBasketball(x, y, spin, squash) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(spin);
  ctx.scale(1 / squash, squash);
  const grad = ctx.createRadialGradient(-BALL_R * 0.35, -BALL_R * 0.4, 2, 0, 0, BALL_R * 1.4);
  grad.addColorStop(0, '#ffa869');
  grad.addColorStop(0.45, '#f47a2e');
  grad.addColorStop(1, '#c9500f');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(90,35,5,0.8)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-BALL_R, 0); ctx.lineTo(BALL_R, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -BALL_R); ctx.lineTo(0, BALL_R); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, -0.6, 0.6); ctx.stroke();
  ctx.beginPath(); ctx.arc(0, 0, BALL_R, Math.PI - 0.6, Math.PI + 0.6); ctx.stroke();
  // glossy highlight
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.ellipse(-BALL_R * 0.32, -BALL_R * 0.38, BALL_R * 0.28, BALL_R * 0.18, -0.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawBall() {
  if (!ball) {
    const bob = Math.sin(idleT * 2.4) * 2.5;
    drawBasketball(START_POS.x, START_POS.y + bob, 0, 1);
    return;
  }
  // slight squash along the velocity direction for a bit of weight/juice
  const speed = Math.hypot(ball.vx, ball.vy);
  const squash = ball.scored ? 1 : clamp(1 - speed / 4000, 0.9, 1.05);
  drawBasketball(ball.x, ball.y, ball.spin, squash);
}

function drawAimArrow() {
  if (ball || !dragStart || !dragCurrent) return;
  const dx = dragCurrent.x - dragStart.x, dy = dragCurrent.y - dragStart.y;
  const dist = Math.hypot(dx, dy);
  if (dist < MIN_SWIPE_DIST || dy >= -6) return;
  const len = Math.min(dist, 90);
  const ux = dx / dist, uy = dy / dist;
  const ex = START_POS.x + ux * len, ey = START_POS.y + uy * len;
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(START_POS.x, START_POS.y); ctx.lineTo(ex, ey); ctx.stroke();
  const ang = Math.atan2(uy, ux);
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - 10 * Math.cos(ang - 0.5), ey - 10 * Math.sin(ang - 0.5));
  ctx.lineTo(ex - 10 * Math.cos(ang + 0.5), ey - 10 * Math.sin(ang + 0.5));
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.fill();
}

function drawPopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 14px Arial';
  for (const p of popups) {
    const t = p.t / 900;
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - 20 - t * 30);
    ctx.globalAlpha = 1;
  }
}

function drawHud() {
  ctx.font = 'bold 16px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'rgba(90,35,5,0.9)';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const scoreText = 'Score: ' + score;
  ctx.strokeText(scoreText, 14, 26);
  ctx.fillText(scoreText, 14, 26);
  ctx.textAlign = 'right';
  const timeText = Math.ceil(timeLeft / 1000) + 's';
  ctx.strokeText(timeText, W - 14, 26);
  ctx.fillText(timeText, W - 14, 26);
  if (combo > 1) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#ffe28a';
    const comboText = combo + '× combo!';
    ctx.strokeText(comboText, W / 2, 46);
    ctx.fillText(comboText, W / 2, 46);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackdrop();
  if (state === 'menu') return;
  drawHoopShadow();
  drawBackboard();
  drawRimBack();
  drawBall();
  drawRimFront();
  drawAimArrow();
  drawPopups();
  drawHud();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
