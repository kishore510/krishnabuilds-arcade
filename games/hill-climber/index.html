<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hill Climber</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #10141f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #8fd3e8;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(28px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.9; }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  #startBtn {
    margin-top: calc(16px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #2aa9c9;
    color: #04121c;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #5ed4ea; }
  #backToArcade {
    display: none;
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
  .ctrlBtn {
    position: absolute;
    bottom: calc(26px * var(--game-scale, 1));
    width: calc(72px * var(--game-scale, 1));
    height: calc(72px * var(--game-scale, 1));
    border-radius: 50%;
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    color: white;
    font-size: calc(26px * var(--game-scale, 1));
    font-weight: bold;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5;
    touch-action: none;
    user-select: none;
  }
  #brakeBtn { left: calc(18px * var(--game-scale, 1)); background: rgba(230,57,70,0.35); }
  #throttleBtn { right: calc(18px * var(--game-scale, 1)); background: rgba(76,175,80,0.35); }
  .ctrlBtn.active { filter: brightness(1.4); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <button class="ctrlBtn" id="brakeBtn" type="button">◀</button>
  <button class="ctrlBtn" id="throttleBtn" type="button">▶</button>
  <div id="overlay">
    <h1 id="title">Hill Climber</h1>
    <p id="subtitle">Throttle to climb, brake to balance — don't flip!</p>
    <p>Gas on the right, brake on the left. Arrow keys work too.</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');
const brakeBtn = document.getElementById('brakeBtn');
const throttleBtn = document.getElementById('throttleBtn');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('hillClimberMuted') === '1';
let engineOsc = null, engineGain = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playBounce(mag) { tone(140, 0.09, 'sine', clamp(mag, 0.03, 0.16)); }
function playWhoomph() { tone(90, 0.28, 'sawtooth', 0.12); tone(60, 0.3, 'sine', 0.1, 0.03); }
function playCrash() { tone(110, 0.35, 'sawtooth', 0.18); tone(70, 0.4, 'square', 0.14, 0.05); }
function playPickup() { tone(700, 0.08, 'sine', 0.1); tone(1000, 0.1, 'sine', 0.08, 0.06); }
function playMilestone() { tone(880, 0.07, 'triangle', 0.08); }

function startEngineSound() {
  if (muted) return;
  ensureAudio();
  stopEngineSound();
  engineOsc = audioCtx.createOscillator();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 60;
  engineGain = audioCtx.createGain();
  engineGain.gain.value = 0.0001;
  engineOsc.connect(engineGain);
  engineGain.connect(audioCtx.destination);
  engineOsc.start();
}
function stopEngineSound() {
  if (engineOsc) { try { engineOsc.stop(); } catch (e) {} engineOsc = null; engineGain = null; }
}
function updateEngineSound(throttleAmt, speedFrac) {
  if (!engineOsc || !engineGain || muted) return;
  const now = audioCtx.currentTime;
  engineOsc.frequency.setTargetAtTime(55 + throttleAmt * 90 + speedFrac * 60, now, 0.08);
  engineGain.gain.setTargetAtTime(0.015 + throttleAmt * 0.045, now, 0.08);
}

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('hillClimberMuted', muted ? '1' : '0');
  updateMuteBtn();
  if (muted) stopEngineSound(); else if (state === 'playing') startEngineSound();
});

function loadBest() { return parseFloat(sessionStorage.getItem('hillClimberBest') || '0'); }
function saveBest(v) { try { sessionStorage.setItem('hillClimberBest', v); } catch (e) {} }

// --- Procedural terrain: value noise (cosine-interpolated control points), amplitude/bumpiness ramp with distance ---
const SEGMENT_LEN = 50;
const FLAT_START = 420;
const RAMP_DISTANCE = 5000;
const BASE_AMP = 10;
const MAX_AMP = 90;

function hash(i) {
  const s = Math.sin(i * 12.9898) * 43758.5453;
  return (s - Math.floor(s)) * 2 - 1;
}
function ampAt(x) {
  const t = clamp((x - FLAT_START) / RAMP_DISTANCE, 0, 1);
  return BASE_AMP + (MAX_AMP - BASE_AMP) * t;
}
function terrainY(x) {
  const seg = x / SEGMENT_LEN;
  const idx = Math.floor(seg);
  const frac = seg - idx;
  const h0 = hash(idx), h1 = hash(idx + 1);
  const smooth = h0 + (h1 - h0) * (0.5 - 0.5 * Math.cos(frac * Math.PI));
  let y = 300 + smooth * ampAt(x);
  const bumpAmp = clamp((x - FLAT_START) / RAMP_DISTANCE, 0, 1) * 6;
  y += Math.sin(x * 0.15) * bumpAmp * 0.5 + Math.sin(x * 0.37 + 1.7) * bumpAmp * 0.3;
  return y;
}

// --- Physics constants ---
const GRAVITY = 520;
const WHEEL_OFFSET = 24;
const WHEEL_R = 11;
const ENGINE_ACCEL = 130;
const BRAKE_DECEL = 170;
const MAX_SPEED = 230;
const MAX_REVERSE = -90;
const ROLL_DRAG = 0.6;
const SLOPE_GRAVITY_COEF = 55;
const THROTTLE_TORQUE = 3.2;
const BRAKE_TORQUE = 3.2;
const ANGULAR_DAMPING = 1.1;
const LEVEL_RESTORE = 0.6;
const CRASH_ANGLE = 1.78; // ~102 degrees
const FUEL_MAX = 100;
const FUEL_DRAIN_IDLE = 1.1;
const FUEL_DRAIN_THROTTLE = 3.4;
const PICKUP_R = 26;

let bike, fuel, distance, cans, camX, camY;
let throttleHeld = false, brakeHeld = false;
let grounded = false, airTime = 0, whoomphPlayed = false;
let shakeTimer = 0, shakeMag = 0;
let wheelSpin = 0;
let milestoneCount = 0;
let state = 'menu'; // menu | playing | over

bestLine.textContent = 'Best distance: ' + loadBest().toFixed(0) + 'm';

function makeCans() {
  cans = [];
  let x = 900;
  while (x < 40000) {
    cans.push({ x, collected: false });
    x += 900 + Math.random() * 500;
  }
}

function reset() {
  bike = { x: 60, y: terrainY(60) - WHEEL_R, vy: 0, angle: 0, angVel: 0, speed: 0 };
  fuel = FUEL_MAX;
  distance = 0;
  grounded = true;
  airTime = 0;
  whoomphPlayed = false;
  shakeTimer = 0;
  wheelSpin = 0;
  milestoneCount = 0;
  camX = bike.x;
  camY = bike.y;
  makeCans();
}

function showMenu() {
  state = 'menu';
  stopEngineSound();
  title.textContent = 'Hill Climber';
  subtitle.textContent = "Throttle to climb, brake to balance — don't flip!";
  scoreLine.style.display = 'none';
  bestLine.textContent = 'Best distance: ' + loadBest().toFixed(0) + 'm';
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  brakeBtn.style.display = 'none';
  throttleBtn.style.display = 'none';
  overlay.style.display = 'flex';
}

function startGame() {
  reset();
  state = 'playing';
  overlay.style.display = 'none';
  brakeBtn.style.display = 'flex';
  throttleBtn.style.display = 'flex';
  ensureAudio();
  startEngineSound();
}

startBtn.addEventListener('click', () => { if (state === 'menu' || state === 'over') startGame(); });

function bindCtrl(btn, setter) {
  btn.addEventListener('pointerdown', (e) => { btn.setPointerCapture(e.pointerId); setter(true); btn.classList.add('active'); });
  const release = () => { setter(false); btn.classList.remove('active'); };
  btn.addEventListener('pointerup', release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('pointerleave', release);
}
bindCtrl(throttleBtn, (v) => throttleHeld = v);
bindCtrl(brakeBtn, (v) => brakeHeld = v);

document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowRight' || e.code === 'ArrowUp') { throttleHeld = true; e.preventDefault(); }
  if (e.code === 'ArrowLeft' || e.code === 'ArrowDown') { brakeHeld = true; e.preventDefault(); }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowRight' || e.code === 'ArrowUp') throttleHeld = false;
  if (e.code === 'ArrowLeft' || e.code === 'ArrowDown') brakeHeld = false;
});

function endRun(reason) {
  state = 'over';
  stopEngineSound();
  if (reason === 'crash') { playCrash(); shakeTimer = 0.35; shakeMag = 14; }
  const dist = Math.floor(distance);
  const best = loadBest();
  const isNewBest = dist > best;
  if (isNewBest) saveBest(dist);
  title.textContent = reason === 'crash' ? 'Crashed!' : 'Out of fuel!';
  subtitle.textContent = 'Throttle to climb, brake to balance — try again';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Distance: ' + dist + 'm';
  bestLine.textContent = isNewBest ? '🏆 New best distance!' : 'Best distance: ' + best.toFixed(0) + 'm';
  startBtn.textContent = 'Try Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  brakeBtn.style.display = 'none';
  throttleBtn.style.display = 'none';
  overlay.style.display = 'flex';
}

function updatePhysics(dt) {
  const canThrottle = throttleHeld && fuel > 0;
  if (canThrottle) {
    bike.speed += ENGINE_ACCEL * dt;
    bike.angVel -= THROTTLE_TORQUE * dt;
    fuel -= FUEL_DRAIN_THROTTLE * dt;
  } else if (brakeHeld) {
    bike.speed -= BRAKE_DECEL * dt;
    bike.angVel += BRAKE_TORQUE * dt;
    fuel -= FUEL_DRAIN_IDLE * dt;
  } else {
    bike.speed *= Math.max(0, 1 - ROLL_DRAG * dt);
    fuel -= FUEL_DRAIN_IDLE * dt;
  }
  fuel = clamp(fuel, 0, FUEL_MAX);
  bike.speed = clamp(bike.speed, MAX_REVERSE, MAX_SPEED);

  if (grounded) {
    const slope = (terrainY(bike.x + 8) - terrainY(bike.x - 8)) / 16;
    bike.speed += slope * SLOPE_GRAVITY_COEF * dt;
    bike.speed = clamp(bike.speed, MAX_REVERSE, MAX_SPEED);
  }

  bike.x += bike.speed * dt;
  wheelSpin += (bike.speed / WHEEL_R) * dt;

  bike.angVel += (0 - bike.angle) * LEVEL_RESTORE * dt;
  bike.angVel *= Math.max(0, 1 - ANGULAR_DAMPING * dt);
  bike.angle += bike.angVel * dt;

  bike.vy += GRAVITY * dt;
  bike.y += bike.vy * dt;

  const rearGroundY = terrainY(bike.x - WHEEL_OFFSET) - WHEEL_R;
  const frontGroundY = terrainY(bike.x + WHEEL_OFFSET) - WHEEL_R;
  const flushY = (rearGroundY + frontGroundY) / 2;
  const flushAngle = Math.atan2(frontGroundY - rearGroundY, WHEEL_OFFSET * 2);

  if (bike.y >= flushY) {
    const impactSpeed = bike.vy;
    if (!grounded) {
      if (airTime > 550 && whoomphPlayed === false) { playWhoomph(); whoomphPlayed = true; }
      if (impactSpeed > 60) playBounce(impactSpeed / 900);
    }
    bike.y = flushY;
    bike.vy = impactSpeed > 40 ? -impactSpeed * 0.18 : 0;
    bike.angle += (flushAngle - bike.angle) * 0.4;
    bike.angVel *= 0.5;
    grounded = true;
    airTime = 0;
    whoomphPlayed = false;
  } else {
    grounded = false;
    airTime += dt * 1000;
  }

  if (Math.abs(bike.angle) > CRASH_ANGLE) { endRun('crash'); return; }

  for (const can of cans) {
    if (!can.collected && Math.abs(bike.x - can.x) < PICKUP_R) {
      can.collected = true;
      fuel = clamp(fuel + 35, 0, FUEL_MAX);
      playPickup();
    }
  }

  distance = bike.x / 10;
  const ms = Math.floor(distance / 100);
  if (ms > milestoneCount) { milestoneCount = ms; playMilestone(); }

  if (fuel <= 0 && Math.abs(bike.speed) < 2) { endRun('fuel'); return; }

  camX += (bike.x - camX - 100) * Math.min(1, dt * 4);
  camY += (bike.y - camY) * Math.min(1, dt * 5);

  updateEngineSound(canThrottle ? 1 : 0, Math.abs(bike.speed) / MAX_SPEED);

  if (shakeTimer > 0) shakeTimer -= dt;
}

function worldToScreen(x, y) { return { x: x - camX + 120, y: y - camY + H / 2 }; }

function drawSky() {
  const t = clamp((bike ? bike.x : 0) / 20000, 0, 1);
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, t < 0.5 ? '#8fd3e8' : '#f2a65a');
  g.addColorStop(1, '#eaf6e8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawTerrain() {
  const startX = camX - 130;
  const endX = camX + W + 60;
  ctx.beginPath();
  ctx.moveTo(worldToScreen(startX, 0).x, H + 20);
  for (let x = startX; x <= endX; x += 8) {
    const s = worldToScreen(x, terrainY(x));
    ctx.lineTo(s.x, s.y);
  }
  ctx.lineTo(worldToScreen(endX, 0).x, H + 20);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, H * 0.4, 0, H);
  grad.addColorStop(0, '#7cb342');
  grad.addColorStop(0.12, '#5b3d22');
  grad.addColorStop(1, '#3a2814');
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.strokeStyle = '#4a7a2e';
  ctx.lineWidth = 4;
  ctx.beginPath();
  for (let x = startX; x <= endX; x += 8) {
    const s = worldToScreen(x, terrainY(x));
    if (x === startX) ctx.moveTo(s.x, s.y); else ctx.lineTo(s.x, s.y);
  }
  ctx.stroke();
}

function drawCans() {
  for (const can of cans) {
    if (can.collected) continue;
    if (can.x < camX - 150 || can.x > camX + W + 50) continue;
    const y = terrainY(can.x) - 14;
    const s = worldToScreen(can.x, y);
    ctx.fillStyle = '#e63946';
    ctx.fillRect(s.x - 6, s.y - 9, 12, 16);
    ctx.fillStyle = '#ffe28a';
    ctx.fillRect(s.x - 6, s.y - 9, 12, 4);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(s.x - 6, s.y - 9, 12, 16);
  }
}

function drawWheel(cx, cy) {
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(cx, cy, WHEEL_R, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(cx, cy, WHEEL_R * 0.45, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const a = wheelSpin + i * (Math.PI * 2 / 3);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * WHEEL_R * 0.85, cy + Math.sin(a) * WHEEL_R * 0.85);
    ctx.stroke();
  }
}

function drawBike() {
  const s = worldToScreen(bike.x, bike.y);
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(bike.angle);
  drawWheel(-WHEEL_OFFSET, 0);
  drawWheel(WHEEL_OFFSET, 0);
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-WHEEL_OFFSET, 0); ctx.lineTo(-6, -22); ctx.lineTo(WHEEL_OFFSET, 0);
  ctx.stroke();
  const grad = ctx.createLinearGradient(-14, -30, 14, -8);
  grad.addColorStop(0, '#c9853a');
  grad.addColorStop(1, '#e8b96b');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(-16, -28, 32, 16, 5);
  ctx.fill();
  ctx.fillStyle = '#3a2a1a';
  ctx.beginPath(); ctx.arc(-6, -38, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2f5f28';
  ctx.beginPath(); ctx.roundRect(-14, -34, 16, 10, 3); ctx.fill();
  ctx.restore();
}

function drawHud() {
  ctx.font = 'bold 15px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const distText = Math.floor(distance) + 'm';
  ctx.strokeText(distText, 16, 30);
  ctx.fillText(distText, 16, 30);

  const barX = W - 116, barY = 18, barW = 100, barH = 12;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(barX, barY, barW, barH);
  const fuelT = fuel / FUEL_MAX;
  ctx.fillStyle = fuelT > 0.4 ? '#4caf50' : fuelT > 0.18 ? '#e6b800' : '#e63946';
  ctx.fillRect(barX, barY, barW * fuelT, barH);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.textAlign = 'right';
  ctx.font = 'bold 10px Arial';
  ctx.fillStyle = 'white';
  ctx.fillText('FUEL', barX + barW, barY - 4);
}

function update(dt) {
  if (state !== 'playing') return;
  updatePhysics(dt);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  if (state === 'menu') return;
  ctx.save();
  const mag = shakeTimer > 0 ? (shakeTimer / 0.35) * shakeMag : 0;
  if (mag > 0) ctx.translate((Math.random() * 2 - 1) * mag, (Math.random() * 2 - 1) * mag);
  drawTerrain();
  drawCans();
  drawBike();
  ctx.restore();
  drawHud();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
<script src="../../assets/version.js"></script>
