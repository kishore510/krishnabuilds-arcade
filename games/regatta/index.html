<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Regatta</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #041420;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #0a3550;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(8px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 4px; font-size: calc(26px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(12.5px * var(--game-scale, 1)); opacity: 0.9; }
  #scoreLine { font-weight: bold; font-size: calc(14px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.75; }
  .rowLabel {
    font-size: calc(10.5px * var(--game-scale, 1));
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
    margin-top: calc(8px * var(--game-scale, 1));
  }
  .btnRow {
    display: flex;
    gap: calc(8px * var(--game-scale, 1));
    margin-top: calc(5px * var(--game-scale, 1));
    pointer-events: auto;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btnRow button {
    font-family: inherit;
    font-size: calc(12px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(7px * var(--game-scale, 1)) calc(13px * var(--game-scale, 1));
    border-radius: calc(18px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  .btnRow button:active { background: rgba(255,255,255,0.3); }
  .btnRow button.selected {
    background: #ffb703;
    border-color: #ffb703;
    color: #04121c;
  }
  #startBtn {
    margin-top: calc(12px * var(--game-scale, 1));
    font-size: calc(16px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(9px * var(--game-scale, 1)) calc(28px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #2aa9c9;
    color: #04121c;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #5ed4ea; }
  #backToArcade {
    display: none;
    margin-top: calc(12px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
  .steerBtn {
    position: absolute;
    bottom: calc(26px * var(--game-scale, 1));
    width: calc(64px * var(--game-scale, 1));
    height: calc(64px * var(--game-scale, 1));
    border-radius: 50%;
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.14);
    color: white;
    font-size: calc(24px * var(--game-scale, 1));
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 5;
    touch-action: none;
    user-select: none;
  }
  .steerBtn.active { background: rgba(255,183,3,0.4); border-color: #ffb703; }
  #steerLeftBtn { left: calc(18px * var(--game-scale, 1)); }
  #steerRightBtn { right: calc(18px * var(--game-scale, 1)); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <button class="steerBtn" id="steerLeftBtn" type="button">◀</button>
  <button class="steerBtn" id="steerRightBtn" type="button">▶</button>
  <div id="overlay">
    <h1 id="title">Regatta</h1>
    <p id="subtitle">Round every buoy, then cross the line</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine" style="display:none;"></p>
    <div class="rowLabel">Course</div>
    <div class="btnRow" id="courseButtons">
      <button data-c="0" type="button">Harbor Loop</button>
      <button data-c="1" type="button">Coastal Run</button>
      <button data-c="2" type="button">Storm Reach</button>
    </div>
    <div class="rowLabel">Difficulty</div>
    <div class="btnRow" id="diffButtons">
      <button data-d="easy" type="button">Easy</button>
      <button data-d="hard" type="button">Hard</button>
    </div>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const courseButtons = document.getElementById('courseButtons');
const diffButtons = document.getElementById('diffButtons');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');
const steerLeftBtn = document.getElementById('steerLeftBtn');
const steerRightBtn = document.getElementById('steerRightBtn');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function normalize(v) { const m = Math.hypot(v.x, v.y) || 1; return { x: v.x / m, y: v.y / m }; }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('regattaMuted') === '1';
let noiseSource = null, noiseFilter = null, noiseGain = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playBuoy() { tone(700, 0.09, 'sine', 0.11); tone(950, 0.11, 'sine', 0.08, 0.06); }
function playCut() { tone(180, 0.22, 'sawtooth', 0.13); }
function playSplash() { tone(240, 0.15, 'sine', 0.06); }
function playFanfare() {
  tone(523, 0.14, 'triangle', 0.14);
  tone(659, 0.14, 'triangle', 0.13, 0.12);
  tone(784, 0.16, 'triangle', 0.13, 0.24);
  tone(1047, 0.28, 'triangle', 0.14, 0.38);
}

function startEngineSound() {
  if (muted) return;
  ensureAudio();
  stopEngineSound();
  const bufSize = audioCtx.sampleRate * 2;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  noiseSource = audioCtx.createBufferSource();
  noiseSource.buffer = buf;
  noiseSource.loop = true;
  noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 200;
  noiseFilter.Q.value = 0.7;
  noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0;
  noiseSource.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noiseSource.start();
}
function stopEngineSound() {
  if (noiseSource) { try { noiseSource.stop(); } catch (e) {} noiseSource = null; }
}
function updateEngineSound(speedFrac) {
  if (!noiseFilter || !noiseGain || muted) return;
  const now = audioCtx.currentTime;
  noiseFilter.frequency.setTargetAtTime(180 + speedFrac * 900, now, 0.08);
  noiseGain.gain.setTargetAtTime(0.02 + speedFrac * 0.05, now, 0.08);
}

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('regattaMuted', muted ? '1' : '0');
  updateMuteBtn();
  if (muted) stopEngineSound(); else if (state === 'playing') startEngineSound();
});

function loadBest(c, d) {
  const v = sessionStorage.getItem('regattaBest_' + c + '_' + d);
  return v ? parseFloat(v) : null;
}
function saveBest(c, d, v) { try { sessionStorage.setItem('regattaBest_' + c + '_' + d, v); } catch (e) {} }
function formatTime(ms) {
  const total = ms / 1000;
  const m = Math.floor(total / 60);
  const s = total - m * 60;
  return m + ':' + (s < 10 ? '0' : '') + s.toFixed(1);
}

// --- Courses (world space, y decreases "forward") ---
// Wildlife is purely decorative atmosphere - it never touches the boat's
// physics or the race rules, just gives the open water something alive to
// look at. period/window define a repeating cycle in seconds; window is the
// fraction of that cycle the animal spends leaping/surfacing.
const COURSES = [
  {
    name: 'Harbor Loop',
    buoys: [{ x: 250, y: -300 }, { x: 250, y: -750 }, { x: -250, y: -750 }, { x: -250, y: -300 }],
    waves: [],
    laps: 2,
    wildlife: [
      { type: 'dolphin', home: { x: -120, y: -520 }, radius: 90, period: 7, phase: 0.1 },
      { type: 'dolphin', home: { x: -60, y: -560 }, radius: 70, period: 7, phase: 0.4 },
      { type: 'whale', home: { x: 60, y: -900 }, radius: 60, period: 16, phase: 0.2 }
    ]
  },
  {
    name: 'Coastal Run',
    buoys: [{ x: 200, y: -280 }, { x: 340, y: -620 }, { x: 80, y: -880 }, { x: -220, y: -680 }, { x: -260, y: -320 }],
    waves: [{ x: 260, y: -460, r: 85 }],
    laps: 2,
    wildlife: [
      { type: 'dolphin', home: { x: -60, y: -420 }, radius: 100, period: 6.5, phase: 0 },
      { type: 'dolphin', home: { x: -10, y: -460 }, radius: 80, period: 6.5, phase: 0.35 },
      { type: 'shark', home: { x: 120, y: -760 }, radius: 130, period: 20, phase: 0 },
      { type: 'whale', home: { x: -180, y: -900 }, radius: 70, period: 15, phase: 0.5 }
    ]
  },
  {
    name: 'Storm Reach',
    buoys: [{ x: 160, y: -260 }, { x: 300, y: -520 }, { x: 180, y: -820 }, { x: -120, y: -950 }, { x: -320, y: -680 }, { x: -260, y: -320 }],
    waves: [{ x: 240, y: -420, r: 90 }, { x: -160, y: -760, r: 100 }, { x: 0, y: -600, r: 80 }],
    laps: 2,
    wildlife: [
      { type: 'dolphin', home: { x: -20, y: -500 }, radius: 110, period: 6, phase: 0.15 },
      { type: 'dolphin', home: { x: 40, y: -540 }, radius: 90, period: 6, phase: 0.5 },
      { type: 'shark', home: { x: -220, y: -450 }, radius: 140, period: 18, phase: 0 },
      { type: 'shark', home: { x: 60, y: -880 }, radius: 120, period: 18, phase: 0.6 },
      { type: 'whale', home: { x: -260, y: -900 }, radius: 80, period: 15, phase: 0.35 }
    ]
  }
];
const START = { x: 0, y: 0 };

const DIFFICULTY_PRESETS = {
  easy: { turnMul: 1.15, lateralDragMul: 1.3, roundRMul: 1.25 },
  hard: { turnMul: 0.82, lateralDragMul: 0.72, roundRMul: 0.85 }
};

const ACCEL = 95;
const BASE_TURN_RATE = 2.5;
const DRAG_FORWARD = 0.55;
const DRAG_LATERAL_BASE = 1.9;
const ROUND_R_BASE = 55;
const WAVE_DRAG = 0.9;
const WAVE_PUSH = 26;

let courseIdx = 0, difficulty = 'easy', preset = DIFFICULTY_PRESETS.easy;
let course = COURSES[0];
let boat, camX = 0, camY = 0;
let nextBuoyIndex = 0, lapsRemaining = 2, minDistToTarget = Infinity, prevProj = -1;
let penaltyMs = 0, raceStartTime = 0;
let steerLeft = false, steerRight = false;
let wakeTrail = [];
let state = 'menu'; // menu | playing | finished
let cutFlashUntil = 0, cutFlashText = '';
let buoyFlashes = []; // {x,y,t}
let wildlife = [];
let splashes = []; // {x,y,vx,vy,life,maxLife,size}

function hash2(ix, iy) {
  const s = Math.sin(ix * 127.1 + iy * 311.7) * 43758.5453;
  return s - Math.floor(s);
}

function spawnSplash(x, y, count, spread) {
  for (let i = 0; i < count; i++) {
    splashes.push({
      x, y,
      vx: (Math.random() * 2 - 1) * spread,
      vy: -Math.random() * spread - 15,
      life: 0,
      maxLife: 400 + Math.random() * 300,
      size: 2 + Math.random() * 2.5
    });
  }
  if (splashes.length > 150) splashes.splice(0, splashes.length - 150);
}

function initWildlife() {
  wildlife = course.wildlife.map((w) => ({
    ...w,
    cyclePos: w.phase,
    wasActive: false,
    x: w.home.x + w.radius,
    y: w.home.y,
    heading: 0
  }));
}

function updateWildlife(dt) {
  for (const w of wildlife) {
    w.cyclePos = (w.cyclePos + dt / w.period) % 1;
    const angle = w.cyclePos * Math.PI * 2;
    w.x = w.home.x + Math.cos(angle) * w.radius;
    w.y = w.home.y + Math.sin(angle) * w.radius * 0.55;
    w.heading = angle + Math.PI / 2;

    if (w.type === 'dolphin') {
      const windowFrac = 0.12;
      const active = w.cyclePos < windowFrac;
      w.activeT = active ? w.cyclePos / windowFrac : 0;
      if (active && !w.wasActive) spawnSplash(w.x, w.y, 5, 32);
      if (!active && w.wasActive) spawnSplash(w.x, w.y, 5, 32);
      w.wasActive = active;
    } else if (w.type === 'whale') {
      const windowFrac = 0.22;
      const active = w.cyclePos < windowFrac;
      w.activeT = active ? w.cyclePos / windowFrac : 0;
      if (active && !w.wasActive) spawnSplash(w.x, w.y, 4, 18);
      if (active && Math.random() < dt * 2.5) spawnSplash(w.x, w.y - 6, 1, 8);
      w.wasActive = active;
    }
  }
}

function drawDolphin(w, s) {
  const leap = w.activeT > 0 ? Math.sin(w.activeT * Math.PI) : 0;
  ctx.save();
  ctx.translate(s.x, s.y - leap * 16);
  ctx.rotate(w.heading);
  if (leap > 0.05) {
    ctx.fillStyle = '#7a95a3';
    ctx.beginPath();
    ctx.ellipse(0, 0, 13, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e8f2f5';
    ctx.beginPath();
    ctx.ellipse(0, 3, 8, 2.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#7a95a3';
    ctx.beginPath();
    ctx.moveTo(-11, 0); ctx.lineTo(-17, -4); ctx.lineTo(-17, 4); ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(1, -4); ctx.lineTo(4, -11); ctx.lineTo(6, -3); ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillStyle = 'rgba(90,120,135,0.4)';
    ctx.beginPath(); ctx.ellipse(0, 0, 11, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(70,100,115,0.6)';
    ctx.beginPath();
    ctx.moveTo(1, -1); ctx.lineTo(3, -6); ctx.lineTo(5, -1); ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawWhale(w, s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(w.heading);
  if (w.activeT > 0) {
    const rise = Math.sin(w.activeT * Math.PI);
    ctx.fillStyle = '#3a4a52';
    ctx.beginPath();
    ctx.ellipse(0, -rise * 3, 26, 11, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(0, -rise * 3 - 6, 16, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = 'rgba(50,65,72,0.32)';
    ctx.beginPath(); ctx.ellipse(0, 0, 24, 9, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawShark(w, s) {
  const bob = Math.sin(performance.now() / 480 + w.home.x) * 1.4;
  ctx.save();
  ctx.translate(s.x, s.y + bob);
  ctx.rotate(w.heading);
  ctx.fillStyle = 'rgba(50,60,65,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 1, 20, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3d4a4f';
  ctx.beginPath();
  ctx.moveTo(0, -1); ctx.lineTo(5, -13); ctx.lineTo(-3, -2); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-14, 3); ctx.lineTo(-22, 6); ctx.stroke();
  ctx.restore();
}

function drawWildlife() {
  for (const w of wildlife) {
    const s = worldToScreen(w.x, w.y);
    if (s.x < -40 || s.x > W + 40 || s.y < -40 || s.y > H + 40) continue;
    if (w.type === 'dolphin') drawDolphin(w, s);
    else if (w.type === 'whale') drawWhale(w, s);
    else if (w.type === 'shark') drawShark(w, s);
  }
}

function drawSplashes() {
  for (const p of splashes) {
    const t = p.life / p.maxLife;
    const s = worldToScreen(p.x, p.y);
    ctx.fillStyle = 'rgba(230,245,250,' + (0.55 * (1 - t)) + ')';
    ctx.beginPath();
    ctx.arc(s.x, s.y, p.size * (1 - t * 0.4), 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateCourseButtonStyles() { [...courseButtons.children].forEach(b => b.classList.toggle('selected', parseInt(b.dataset.c, 10) === courseIdx)); }
function updateDiffButtonStyles() { [...diffButtons.children].forEach(b => b.classList.toggle('selected', b.dataset.d === difficulty)); }
courseButtons.addEventListener('click', (e) => { const b = e.target.closest('button'); if (!b) return; courseIdx = parseInt(b.dataset.c, 10); updateCourseButtonStyles(); });
diffButtons.addEventListener('click', (e) => { const b = e.target.closest('button'); if (!b) return; difficulty = b.dataset.d; updateDiffButtonStyles(); });
updateCourseButtonStyles();
updateDiffButtonStyles();

function getTangent(idx) {
  const prevPoint = idx === 0 ? START : course.buoys[idx - 1];
  const target = course.buoys[idx];
  return normalize({ x: target.x - prevPoint.x, y: target.y - prevPoint.y });
}
function getFinishTangent() {
  const lastBuoy = course.buoys[course.buoys.length - 1];
  return normalize({ x: START.x - lastBuoy.x, y: START.y - lastBuoy.y });
}
function currentTargetPos() {
  if (nextBuoyIndex < course.buoys.length) return course.buoys[nextBuoyIndex];
  return START;
}
function currentTargetTangent() {
  if (nextBuoyIndex < course.buoys.length) return getTangent(nextBuoyIndex);
  return getFinishTangent();
}
function resetTargetTracking() {
  minDistToTarget = Infinity;
  const target = currentTargetPos();
  const tangent = currentTargetTangent();
  prevProj = (boat.x - target.x) * tangent.x + (boat.y - target.y) * tangent.y;
}

function showMenu() {
  state = 'menu';
  stopEngineSound();
  title.textContent = 'Regatta';
  subtitle.textContent = 'Round every buoy, then cross the line';
  scoreLine.style.display = 'none';
  bestLine.style.display = 'none';
  courseButtons.style.display = 'flex';
  diffButtons.style.display = 'flex';
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  steerLeftBtn.style.display = 'none';
  steerRightBtn.style.display = 'none';
  overlay.style.display = 'flex';
}

function startRace() {
  course = COURSES[courseIdx];
  preset = DIFFICULTY_PRESETS[difficulty];
  boat = { x: START.x, y: START.y, vx: 0, vy: 0, heading: Math.atan2(course.buoys[0].x - START.x, -(course.buoys[0].y - START.y)) };
  nextBuoyIndex = 0;
  lapsRemaining = course.laps;
  penaltyMs = 0;
  raceStartTime = performance.now();
  wakeTrail = [];
  buoyFlashes = [];
  splashes = [];
  cutFlashUntil = 0;
  initWildlife();
  resetTargetTracking();
  state = 'playing';
  overlay.style.display = 'none';
  steerLeftBtn.style.display = 'flex';
  steerRightBtn.style.display = 'flex';
  ensureAudio();
  startEngineSound();
}

startBtn.addEventListener('click', () => { if (state === 'finished' || state === 'menu') startRace(); });

function bindSteer(btn, setter) {
  btn.addEventListener('pointerdown', (e) => { btn.setPointerCapture(e.pointerId); setter(true); btn.classList.add('active'); });
  const release = () => { setter(false); btn.classList.remove('active'); };
  btn.addEventListener('pointerup', release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('pointerleave', release);
}
bindSteer(steerLeftBtn, (v) => steerLeft = v);
bindSteer(steerRightBtn, (v) => steerRight = v);

document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowLeft') { steerLeft = true; e.preventDefault(); }
  if (e.code === 'ArrowRight') { steerRight = true; e.preventDefault(); }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowLeft') steerLeft = false;
  if (e.code === 'ArrowRight') steerRight = false;
});

function registerRound(clean) {
  const isFinish = nextBuoyIndex >= course.buoys.length;
  buoyFlashes.push({ x: currentTargetPos().x, y: currentTargetPos().y, t: performance.now() });
  if (!clean) {
    penaltyMs += 3000;
    cutFlashText = 'CUT! +3.0s';
    cutFlashUntil = performance.now() + 1200;
    playCut();
  } else {
    playBuoy();
  }
  if (isFinish) {
    lapsRemaining--;
    if (lapsRemaining <= 0) { finishRace(); return; }
    nextBuoyIndex = 0;
  } else {
    nextBuoyIndex++;
  }
  resetTargetTracking();
}

function finishRace() {
  state = 'finished';
  stopEngineSound();
  const finalTime = performance.now() - raceStartTime + penaltyMs;
  const prevBest = loadBest(courseIdx, difficulty);
  const isNewBest = prevBest === null || finalTime < prevBest;
  if (isNewBest) saveBest(courseIdx, difficulty, finalTime);
  playFanfare();
  title.textContent = 'Course Complete!';
  subtitle.textContent = course.name + ' · ' + (difficulty === 'easy' ? 'Easy' : 'Hard');
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Time: ' + formatTime(finalTime) + (penaltyMs > 0 ? '  (incl. ' + (penaltyMs / 1000).toFixed(1) + 's penalty)' : '');
  bestLine.style.display = 'block';
  bestLine.textContent = isNewBest ? '🏆 New best time!' : 'Best: ' + formatTime(prevBest);
  courseButtons.style.display = 'flex';
  diffButtons.style.display = 'flex';
  updateCourseButtonStyles();
  updateDiffButtonStyles();
  startBtn.textContent = 'Race Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  steerLeftBtn.style.display = 'none';
  steerRightBtn.style.display = 'none';
  overlay.style.display = 'flex';
}

function updateBoat(dt) {
  let turnInput = 0;
  if (steerLeft) turnInput -= 1;
  if (steerRight) turnInput += 1;
  const speed = Math.hypot(boat.vx, boat.vy);
  const turnEff = clamp(speed / 40, 0.3, 1);
  boat.heading += turnInput * BASE_TURN_RATE * preset.turnMul * turnEff * dt;

  const hx = Math.sin(boat.heading), hy = -Math.cos(boat.heading);
  const rx = hy, ry = -hx;

  boat.vx += hx * ACCEL * dt;
  boat.vy += hy * ACCEL * dt;

  for (const wz of course.waves) {
    const d = Math.hypot(boat.x - wz.x, boat.y - wz.y);
    if (d < wz.r) {
      const inside = 1 - d / wz.r;
      const now = performance.now() / 1000;
      const push = Math.sin(now * 3 + wz.x) * WAVE_PUSH * inside;
      boat.vx += rx * push * dt;
      boat.vy += ry * push * dt;
      boat.vx *= (1 - WAVE_DRAG * inside * dt);
      boat.vy *= (1 - WAVE_DRAG * inside * dt);
      if (Math.random() < 0.06) playSplash();
    }
  }

  const fwd = boat.vx * hx + boat.vy * hy;
  const lat = boat.vx * rx + boat.vy * ry;
  const fwdDecayed = fwd * Math.max(0, 1 - DRAG_FORWARD * dt);
  const latDecayed = lat * Math.max(0, 1 - DRAG_LATERAL_BASE * preset.lateralDragMul * dt);
  boat.vx = hx * fwdDecayed + rx * latDecayed;
  boat.vy = hy * fwdDecayed + ry * latDecayed;

  boat.x += boat.vx * dt;
  boat.y += boat.vy * dt;

  updateEngineSound(clamp(Math.hypot(boat.vx, boat.vy) / 150, 0, 1));

  wakeTrail.push({ x: boat.x, y: boat.y, t: performance.now() });
  if (wakeTrail.length > 40) wakeTrail.shift();

  const target = currentTargetPos();
  const d2 = dist(boat, target);
  minDistToTarget = Math.min(minDistToTarget, d2);
  const effRoundR = ROUND_R_BASE * preset.roundRMul;
  if (d2 < effRoundR) {
    registerRound(true);
  } else {
    const tangent = currentTargetTangent();
    const proj = (boat.x - target.x) * tangent.x + (boat.y - target.y) * tangent.y;
    if (prevProj < 0 && proj >= 0) registerRound(false);
    prevProj = proj;
  }
}

function worldToScreen(x, y) { return { x: x - boat.x + W / 2, y: y - boat.y + H / 2 }; }

function drawWater() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0f5273');
  grad.addColorStop(0.45, '#0a3550');
  grad.addColorStop(1, '#072840');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  const offset = (boat.y * 0.3) % 40;
  for (let y = -40; y < H + 40; y += 40) {
    const ly = ((y - offset) % (H + 80)) - 40;
    ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
  }

  // Foam flecks scattered across the water, anchored to world position (via
  // a deterministic hash) so they scroll naturally with the camera instead
  // of swimming in place - the cheapest way to kill the "flat empty blue"
  // look without any per-frame state.
  const cell = 46;
  const worldLeft = boat.x - W / 2 - cell, worldRight = boat.x + W / 2 + cell;
  const worldTop = boat.y - H / 2 - cell, worldBottom = boat.y + H / 2 + cell;
  const now = performance.now() / 1000;
  for (let gx = Math.floor(worldLeft / cell); gx * cell < worldRight; gx++) {
    for (let gy = Math.floor(worldTop / cell); gy * cell < worldBottom; gy++) {
      const h = hash2(gx, gy);
      if (h > 0.22) continue;
      const wx = gx * cell + (h * cell), wy = gy * cell + (hash2(gy, gx) * cell);
      const s = worldToScreen(wx, wy);
      const bob = Math.sin(now * 1.4 + h * 20) * 2;
      ctx.strokeStyle = 'rgba(220,240,248,' + (0.12 + h * 0.5) + ')';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(s.x - 4, s.y + bob);
      ctx.quadraticCurveTo(s.x, s.y + bob - 2, s.x + 4, s.y + bob);
      ctx.stroke();
    }
  }

  // A couple of slow, soft sun-glint patches drifting across the surface.
  ctx.save();
  for (let i = 0; i < 3; i++) {
    const gx = (W * 0.2 + i * W * 0.35 + Math.sin(now * 0.15 + i * 2) * 40);
    const gy = H * 0.25 + i * H * 0.22 + Math.cos(now * 0.12 + i) * 30;
    const glintGrad = ctx.createRadialGradient(gx, gy, 0, gx, gy, 70);
    glintGrad.addColorStop(0, 'rgba(255,255,255,' + (0.10 + 0.04 * Math.sin(now * 0.6 + i)) + ')');
    glintGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glintGrad;
    ctx.beginPath(); ctx.arc(gx, gy, 70, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawWaves() {
  for (const wz of course.waves) {
    const s = worldToScreen(wz.x, wz.y);
    if (s.x < -wz.r - 20 || s.x > W + wz.r + 20 || s.y < -wz.r - 20 || s.y > H + wz.r + 20) continue;
    const now = performance.now() / 500;
    ctx.strokeStyle = 'rgba(180,220,240,0.35)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const rr = wz.r * (0.5 + i * 0.25) + Math.sin(now + i) * 4;
      ctx.beginPath(); ctx.arc(s.x, s.y, rr, 0, Math.PI * 2); ctx.stroke();
    }
  }
}

function drawFinishLine() {
  const tangent = getFinishTangent();
  const perp = { x: -tangent.y, y: tangent.x };
  const half = 60;
  const p1 = worldToScreen(START.x + perp.x * half, START.y + perp.y * half);
  const p2 = worldToScreen(START.x - perp.x * half, START.y - perp.y * half);
  ctx.save();
  ctx.strokeStyle = nextBuoyIndex >= course.buoys.length ? '#ffe28a' : 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 4;
  ctx.setLineDash([8, 6]);
  ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  ctx.restore();
}

function drawBuoys() {
  course.buoys.forEach((b, i) => {
    const s = worldToScreen(b.x, b.y);
    if (s.x < -40 || s.x > W + 40 || s.y < -40 || s.y > H + 40) return;
    const isNext = i === nextBuoyIndex;
    const isPast = i < nextBuoyIndex;
    ctx.save();
    if (isNext) {
      const pulse = 1 + 0.15 * Math.sin(performance.now() / 220);
      ctx.strokeStyle = 'rgba(255,183,3,0.7)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(s.x, s.y, (ROUND_R_BASE * preset.roundRMul) * pulse, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.fillStyle = isNext ? '#ffb703' : isPast ? 'rgba(255,255,255,0.35)' : 'rgba(230,120,60,0.85)';
    ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, s.x, s.y + 0.5);
    ctx.restore();
  });
}

function drawBuoyFlashes() {
  const now = performance.now();
  buoyFlashes = buoyFlashes.filter(f => now - f.t < 500);
  for (const f of buoyFlashes) {
    const t = (now - f.t) / 500;
    const s = worldToScreen(f.x, f.y);
    ctx.save();
    ctx.globalAlpha = 1 - t;
    ctx.strokeStyle = '#ffe28a';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(s.x, s.y, 10 + t * 30, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}

function drawWake() {
  const now = performance.now();
  for (const p of wakeTrail) {
    const age = (now - p.t) / 900;
    if (age > 1) continue;
    const s = worldToScreen(p.x, p.y);
    ctx.fillStyle = 'rgba(220,240,250,' + (0.28 * (1 - age)) + ')';
    ctx.beginPath(); ctx.arc(s.x, s.y, 3 + age * 4, 0, Math.PI * 2); ctx.fill();
  }
}

function drawBoat() {
  const s = { x: W / 2, y: H / 2 };
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(boat.heading);
  const speed = Math.hypot(boat.vx, boat.vy);
  if (speed > 20) {
    ctx.fillStyle = 'rgba(230,245,250,0.55)';
    ctx.beginPath();
    ctx.moveTo(-4, 12); ctx.lineTo(-9, 22 + Math.random() * 4); ctx.lineTo(-2, 16); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(4, 12); ctx.lineTo(9, 22 + Math.random() * 4); ctx.lineTo(2, 16); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = '#e8e0d0';
  ctx.beginPath();
  ctx.moveTo(0, -16);
  ctx.lineTo(7, 6);
  ctx.quadraticCurveTo(7, 14, 0, 16);
  ctx.quadraticCurveTo(-7, 14, -7, 6);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#c9853a';
  ctx.beginPath();
  ctx.moveTo(0, -13); ctx.lineTo(4, 3); ctx.lineTo(-4, 3); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#3a2a1a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, 4); ctx.stroke();
  ctx.restore();
}

function drawOffscreenArrow() {
  const target = currentTargetPos();
  const s = worldToScreen(target.x, target.y);
  const margin = 30;
  if (s.x >= margin && s.x <= W - margin && s.y >= margin && s.y <= H - margin) return;
  const cx = W / 2, cy = H / 2;
  const dx = s.x - cx, dy = s.y - cy;
  const angle = Math.atan2(dy, dx);
  const tx = Math.cos(angle), ty = Math.sin(angle);
  let t = Infinity;
  if (tx !== 0) t = Math.min(t, ((tx > 0 ? W - margin : margin) - cx) / tx);
  if (ty !== 0) t = Math.min(t, ((ty > 0 ? H - margin : margin) - cy) / ty);
  const ax = cx + tx * t, ay = cy + ty * t;
  ctx.save();
  ctx.translate(ax, ay);
  ctx.rotate(angle);
  ctx.fillStyle = '#ffb703';
  ctx.beginPath();
  ctx.moveTo(12, 0); ctx.lineTo(-8, -8); ctx.lineTo(-8, 8); ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawHud() {
  ctx.font = 'bold 14px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const buoyNum = Math.min(nextBuoyIndex + 1, course.buoys.length);
  const label = nextBuoyIndex >= course.buoys.length ? 'Finish!' : 'Buoy ' + buoyNum + '/' + course.buoys.length;
  const lapLabel = course.laps > 1 ? '  Lap ' + (course.laps - lapsRemaining + 1) + '/' + course.laps : '';
  ctx.strokeText(label + lapLabel, 14, 30);
  ctx.fillText(label + lapLabel, 14, 30);
  ctx.textAlign = 'right';
  const elapsed = performance.now() - raceStartTime + penaltyMs;
  const timeText = formatTime(elapsed);
  ctx.strokeText(timeText, W - 14, 30);
  ctx.fillText(timeText, W - 14, 30);

  if (performance.now() < cutFlashUntil) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 20px Arial';
    ctx.fillStyle = '#ff6b5e';
    ctx.strokeText(cutFlashText, W / 2, 70);
    ctx.fillText(cutFlashText, W / 2, 70);
  }
}

function update(dt) {
  if (state !== 'playing') return;
  updateBoat(dt);
  updateWildlife(dt);
  splashes.forEach((p) => {
    p.life += dt * 1000;
    p.vy += 70 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  });
  splashes = splashes.filter((p) => p.life < p.maxLife);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  if (state === 'menu') return;
  drawWater();
  drawWildlife();
  drawWaves();
  drawFinishLine();
  drawWake();
  drawSplashes();
  drawBuoys();
  drawBuoyFlashes();
  drawBoat();
  drawOffscreenArrow();
  drawHud();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
