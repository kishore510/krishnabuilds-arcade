    align-items: center;

const QUESTIONS_PER_ROUND = 15;
const TIME_PER_Q = 10000;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions(category) {
  const pool = shuffle(COUNTRIES).slice(0, QUESTIONS_PER_ROUND);
  return pool.map(entry => {
    const distractorPool = COUNTRIES.filter(c => c.country !== entry.country);
    const distractors = shuffle(distractorPool).slice(0, 2);
    if (category === 'capitals') {
      const options = shuffle([entry.capital, distractors[0].capital, distractors[1].capital]);
      return {
        prompt: 'What is the capital of ' + entry.country + '?',
        flag: null,
        options,
        correct: entry.capital
      };
    }
    const options = shuffle([entry.country, distractors[0].country, distractors[1].country]);
    return {
      prompt: 'Which country is this?',
      flag: entry.flag,
      options,
      correct: entry.country
    };
  });
}

// --- Audio: generated on the fly, no external files ---
let audioCtx = null;
let muted = sessionStorage.getItem('globeQuizMuted') === '1';
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playCorrect() { tone(880, 0.12, 'sine', 0.12); }
function playWrong() { tone(180, 0.25, 'square', 0.1); }
function playComplete() { tone(660, 0.3, 'sawtooth', 0.12); tone(880, 0.35, 'sawtooth', 0.1, 0.1); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }

muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('globeQuizMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest(cat) { return parseInt(sessionStorage.getItem('globeQuizBest_' + cat) || '0', 10); }
function saveBest(cat, v) { try { sessionStorage.setItem('globeQuizBest_' + cat, v); } catch (e) {} }

  const bc = loadBest('capitals');
  const bf = loadBest('flags');
  bestCapitals.textContent = bc > 0 ? ('Best: ' + bc + '/' + QUESTIONS_PER_ROUND) : '';
  bestFlags.textContent = bf > 0 ? ('Best: ' + bf + '/' + QUESTIONS_PER_ROUND) : '';
}

  category = cat;

function loadQuestion() {
  if (qIndex >= questions.length) { finishRound(); return; }
  answered = false;
  const q = questions[qIndex];

  qScore.textContent = 'Score: ' + score;

    ? '<div class="flag-display">' + q.flag + '</div>' + q.prompt
    : q.prompt;

  answersEl.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.type = 'button';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectAnswer(opt, btn));
    answersEl.appendChild(btn);
  });

  timerInner.style.transition = 'none';
  timerInner.style.width = '100%';
  timerInner.classList.remove('urgent');
  // Force reflow so the transition below actually animates from 100%.
  void timerInner.offsetWidth;
  timerInner.style.transition = 'width ' + (TIME_PER_Q / 1000) + 's linear';
  timerInner.style.width = '0%';

  clearTimeout(questionTimeout);
  questionTimeout = setTimeout(() => selectAnswer(null, null), TIME_PER_Q);
  setTimeout(() => { if (!answered) timerInner.classList.add('urgent'); }, TIME_PER_Q - 3000);
}

function selectAnswer(chosen, btnEl) {
  if (answered) return;
  answered = true;
  clearTimeout(questionTimeout);
  timerInner.style.transition = 'none';
  timerInner.style.width = '0%';

  const q = questions[qIndex];
  const correct = chosen === q.correct;
  if (correct) { score++; playCorrect(); } else { playWrong(); }

  Array.from(answersEl.children).forEach(btn => {
    btn.classList.add('disabled');
    if (btn.textContent === q.correct) btn.classList.add('correct');
    else if (btn === btnEl) btn.classList.add('wrong');
  });

  setTimeout(() => { qIndex++; loadQuestion(); }, 900);
}

function finishRound() {
  const best = loadBest(category);
  if (score > best) saveBest(category, score);
  playComplete();

  const pct = score / questions.length;
  let emoji, msg;
  if (pct >= 0.9) { emoji = '🏆'; msg = 'Trivia master!'; }
  else if (pct >= 0.65) { emoji = '👍'; msg = 'Solid run!'; }
  else if (pct >= 0.4) { emoji = '🙂'; msg = 'Not bad — try again!'; }
  else { emoji = '📚'; msg = 'Keep practicing!'; }

  resultsEmoji.textContent = emoji;
  resultsScore.textContent = 'Score: ' + score + ' / ' + questions.length;
  resultsMsg.textContent = msg;
  resultsBest.textContent = 'Best (' + (category === 'capitals' ? 'Capitals' : 'Flags') + '): ' + loadBest(category) + '/' + questions.length;
  showScreen(screenResults);
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => startRound(btn.dataset.category));
});
playAgainBtn.addEventListener('click', () => startRound(category));
changeCategoryBtn.addEventListener('click', () => {
  refreshBestLabels();
  showScreen(screenCategory);
});
</script>
