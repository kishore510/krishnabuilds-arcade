<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Salvo</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #3fa8d4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #bfe8f5;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #0f3244;
    text-shadow: 0 2px 6px rgba(255,255,255,0.4);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(27px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.85; }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  .rowLabel {
    font-size: calc(10.5px * var(--game-scale, 1));
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.7;
    margin-top: calc(8px * var(--game-scale, 1));
  }
  .btnRow {
    display: flex;
    gap: calc(8px * var(--game-scale, 1));
    margin-top: calc(5px * var(--game-scale, 1));
    pointer-events: auto;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btnRow button {
    font-family: inherit;
    font-size: calc(12.5px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(7px * var(--game-scale, 1)) calc(15px * var(--game-scale, 1));
    border-radius: calc(18px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid #1c4a5e;
    background: rgba(255,255,255,0.5);
    color: #1c4a5e;
    cursor: pointer;
  }
  .btnRow button:active { background: rgba(255,255,255,0.8); }
  .btnRow button.selected { background: #ffb703; border-color: #ffb703; color: #3a2400; }
  #startBtn {
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #ffb703;
    color: #3a2400;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #ffcb42; }
  #backToArcade {
    display: none;
    margin-top: calc(12px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: #0f3244;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(28,74,94,0.5);
    background: rgba(255,255,255,0.55);
    color: #1c4a5e;
    cursor: pointer;
    z-index: 5;
  }
  #setupBar {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 0; right: 0;
    text-align: center;
    display: none;
    z-index: 4;
    pointer-events: none;
  }
  #setupBar .shipName {
    font-size: calc(15px * var(--game-scale, 1));
    font-weight: bold;
    color: #0f3244;
  }
  #setupBar .shipHint {
    display: block;
    font-size: calc(10.5px * var(--game-scale, 1));
    color: #2a5b70;
    margin-top: 1px;
  }
  #setupControls {
    position: absolute;
    bottom: calc(12px * var(--game-scale, 1));
    left: 0; right: 0;
    display: none;
    justify-content: center;
    gap: calc(6px * var(--game-scale, 1));
    z-index: 4;
    flex-wrap: wrap;
    padding: 0 calc(8px * var(--game-scale, 1));
  }
  #setupControls button {
    font-family: inherit;
    font-size: calc(12px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(8px * var(--game-scale, 1)) calc(12px * var(--game-scale, 1));
    border-radius: calc(18px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid #1c4a5e;
    background: rgba(255,255,255,0.65);
    color: #1c4a5e;
    cursor: pointer;
  }
  #setupControls button:disabled { opacity: 0.4; }
  #setupControls #startBattleBtn { background: #ffb703; border-color: #ffb703; color: #3a2400; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="380" height="580"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="setupBar">
    <span class="shipName" id="shipNameText">Place your fleet</span>
    <span class="shipHint" id="shipHintText">Drag ships to move &middot; tap to rotate</span>
  </div>
  <div id="setupControls">
    <button id="rotateBtn" type="button">⟳ Rotate</button>
    <button id="randomizeBtn" type="button">🎲 Auto-place</button>
    <button id="clearBtn" type="button">✕ Clear</button>
    <button id="startBattleBtn" type="button" disabled>Start Battle</button>
  </div>
  <div id="overlay">
    <h1 id="title">Salvo</h1>
    <p id="subtitle">Sink the enemy fleet before they sink yours</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <div class="rowLabel">Difficulty</div>
    <div class="btnRow" id="diffButtons">
      <button data-d="easy" type="button">Easy</button>
      <button data-d="hard" type="button">Hard</button>
    </div>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');
const diffButtons = document.getElementById('diffButtons');
const setupBar = document.getElementById('setupBar');
const shipNameText = document.getElementById('shipNameText');
const shipHintText = document.getElementById('shipHintText');
const setupControls = document.getElementById('setupControls');
const rotateBtn = document.getElementById('rotateBtn');
const randomizeBtn = document.getElementById('randomizeBtn');
const clearBtn = document.getElementById('clearBtn');
const startBattleBtn = document.getElementById('startBattleBtn');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('salvoMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playFire() { tone(180, 0.08, 'square', 0.12); }
function playSplash() { tone(320, 0.12, 'sine', 0.08); tone(220, 0.14, 'sine', 0.06, 0.05); }
function playExplosion() { tone(140, 0.16, 'sawtooth', 0.15); tone(90, 0.22, 'square', 0.13, 0.05); }
function playSunk() {
  tone(110, 0.3, 'sawtooth', 0.16);
  tone(80, 0.35, 'square', 0.14, 0.08);
  tone(60, 0.4, 'sine', 0.12, 0.18);
}
function playInvalid() { tone(160, 0.08, 'square', 0.08); }
function playWin() {
  tone(523, 0.14, 'triangle', 0.14);
  tone(659, 0.14, 'triangle', 0.13, 0.13);
  tone(784, 0.18, 'triangle', 0.13, 0.26);
  tone(1047, 0.28, 'triangle', 0.14, 0.4);
}
function playLose() { tone(200, 0.3, 'sawtooth', 0.14); tone(140, 0.4, 'sawtooth', 0.12, 0.15); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('salvoMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest() { const v = sessionStorage.getItem('salvoBest'); return v ? parseInt(v, 10) : null; }
function saveBest(v) { try { sessionStorage.setItem('salvoBest', v); } catch (e) {} }

// --- Board setup: standard 10x10, standard 5-ship fleet ---
const GRID_N = 10;
const BOARD_CELL = 30;
const BOARD_PX = GRID_N * BOARD_CELL;
const BOARD_GX = Math.round((W - BOARD_PX) / 2);
const SETUP_GY = 70;

const MINI_CELL = 12;
const MINI_PX = GRID_N * MINI_CELL;
const MINI_GX = 20;
const MINI_GY = 372;
const ENEMY_GY = 54;
const LEGEND_X = MINI_GX + MINI_PX + 18;
const LEGEND_Y = MINI_GY;
const LEGEND_H = MINI_PX;

const TRAY_X = 20, TRAY_Y = 384, TRAY_W = W - 40, TRAY_H = 58;

const SHIP_DEFS = [
  { name: 'Carrier', short: 'Carrier', length: 5, color: '#3a5068' },
  { name: 'Battleship', short: 'B\'ship', length: 4, color: '#3a6b82' },
  { name: 'Cruiser', short: 'Cruiser', length: 3, color: '#4a7a5a' },
  { name: 'Submarine', short: 'Sub', length: 3, color: '#7a5a8a' },
  { name: 'Destroyer', short: 'D\'stroy', length: 2, color: '#e8834a' }
];

const SEA = '#4db6e0', SEA2 = '#3fa8d4';
const HIT_COLOR = '#ff5a4d', MISS_COLOR = '#eaf6ff', SUNK_OVERLAY = 'rgba(160,20,20,0.45)';

function makeGrid(fill) { return Array.from({ length: GRID_N }, () => Array(GRID_N).fill(fill)); }

function canPlaceOn(grid, x, y, length, dir) {
  for (let i = 0; i < length; i++) {
    const cx = dir === 'h' ? x + i : x;
    const cy = dir === 'h' ? y : y + i;
    if (cx < 0 || cx >= GRID_N || cy < 0 || cy >= GRID_N) return false;
    if (grid[cy][cx] !== null) return false;
  }
  return true;
}
function placeOn(grid, ships, id, length, x, y, dir) {
  const cells = [];
  for (let i = 0; i < length; i++) {
    const cx = dir === 'h' ? x + i : x;
    const cy = dir === 'h' ? y : y + i;
    grid[cy][cx] = id;
    cells.push({ x: cx, y: cy });
  }
  ships.push({ id, name: SHIP_DEFS[id].name, short: SHIP_DEFS[id].short, length, cells, hits: 0, sunk: false });
}

function randomFleet() {
  const grid = makeGrid(null);
  const ships = [];
  SHIP_DEFS.forEach((def, id) => {
    let placed = false;
    while (!placed) {
      const dir = Math.random() < 0.5 ? 'h' : 'v';
      const x = Math.floor(Math.random() * GRID_N);
      const y = Math.floor(Math.random() * GRID_N);
      if (canPlaceOn(grid, x, y, def.length, dir)) { placeOn(grid, ships, id, def.length, x, y, dir); placed = true; }
    }
  });
  return { grid, ships };
}

function shipAt(ships, x, y) { return ships.find((s) => s.cells.some((c) => c.x === x && c.y === y)) || null; }

// --- Game state ---
let difficulty = 'hard';
let playerGrid, playerShips, cpuGrid, cpuShips;
let playerShots, cpuShots;
let turn = 'player'; // player | cpu | over
let cpuThinkTimer = 0;
let cpuHits = [];
let cpuMode = 'hunt';
let shotsTaken = 0;
let particles = [];
let popups = [];
let state = 'menu'; // menu | setup | battle | over
let shake = 0;

// --- Setup: ships are freely rearrangeable until Start Battle is pressed.
// Each ship is either placed (has a live x/y/dir on the board) or sitting in
// the tray (placed: false). Nothing is committed - dragging always shows a
// live preview, and only a currently-valid position ever actually moves the
// real ship; an invalid drop just leaves it where it last validly was. ---
let setupShips = [];
let dragShipId = null, dragGrabOffset = 0, dragMoved = false;
let dragGhost = null; // {x,y,dir,length,valid} - the position/validity under the pointer while dragging
let selectedShipId = null;

function shipCells(x, y, dir, length) {
  const cells = [];
  for (let i = 0; i < length; i++) cells.push(dir === 'h' ? { x: x + i, y } : { x, y: y + i });
  return cells;
}
function cellsInBounds(cells) { return cells.every((c) => c.x >= 0 && c.x < GRID_N && c.y >= 0 && c.y < GRID_N); }
function setupValidAt(movingId, x, y, dir, length) {
  const cells = shipCells(x, y, dir, length);
  if (!cellsInBounds(cells)) return false;
  for (const s of setupShips) {
    if (s.id === movingId || !s.placed) continue;
    const other = shipCells(s.x, s.y, s.dir, s.length);
    if (cells.some((c) => other.some((o) => o.x === c.x && o.y === c.y))) return false;
  }
  return true;
}
function allPlaced() { return setupShips.every((s) => s.placed); }
function shipAtSetupCell(x, y) {
  for (const s of setupShips) {
    if (!s.placed) continue;
    if (shipCells(s.x, s.y, s.dir, s.length).some((c) => c.x === x && c.y === y)) return s;
  }
  return null;
}
function unplacedShips() { return setupShips.filter((s) => !s.placed); }

function randomizeSetup() {
  let ok = false, guard = 0;
  while (!ok && guard < 60) {
    guard++;
    const next = SHIP_DEFS.map((def, id) => ({ id, length: def.length, color: def.color, dir: 'h', x: 0, y: 0, placed: false }));
    let allGood = true;
    for (const ship of next) {
      let placedOne = false, tries = 0;
      while (!placedOne && tries < 300) {
        tries++;
        const dir = Math.random() < 0.5 ? 'h' : 'v';
        const x = Math.floor(Math.random() * GRID_N), y = Math.floor(Math.random() * GRID_N);
        const cells = shipCells(x, y, dir, ship.length);
        if (!cellsInBounds(cells)) continue;
        let clash = false;
        for (const other of next) {
          if (other === ship || !other.placed) continue;
          const oc = shipCells(other.x, other.y, other.dir, other.length);
          if (cells.some((c) => oc.some((o) => o.x === c.x && o.y === c.y))) { clash = true; break; }
        }
        if (!clash) { ship.x = x; ship.y = y; ship.dir = dir; ship.placed = true; placedOne = true; }
      }
      if (!placedOne) { allGood = false; break; }
    }
    if (allGood) { setupShips = next; ok = true; }
  }
}

function refreshStartEnabled() { startBattleBtn.disabled = !allPlaced(); }

function updateDiffButtonStyles() { [...diffButtons.children].forEach((b) => b.classList.toggle('selected', b.dataset.d === difficulty)); }
diffButtons.addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (!b) return;
  difficulty = b.dataset.d;
  updateDiffButtonStyles();
});
updateDiffButtonStyles();

function showMenu() {
  state = 'menu';
  title.textContent = 'Salvo';
  subtitle.textContent = 'Sink the enemy fleet before they sink yours';
  scoreLine.style.display = 'none';
  const best = loadBest();
  bestLine.textContent = best !== null ? 'Best: ' + best + ' shots to win' : '';
  diffButtons.style.display = 'flex';
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  setupBar.style.display = 'none';
  setupControls.style.display = 'none';
  overlay.style.display = 'flex';
}

function beginSetup() {
  randomizeSetup();
  selectedShipId = setupShips[0].id;
  dragShipId = null;
  dragGhost = null;
  const cpuFleet = randomFleet();
  cpuGrid = cpuFleet.grid;
  cpuShips = cpuFleet.ships;
  playerShots = makeGrid(null);
  cpuShots = makeGrid(null);
  cpuHits = [];
  cpuMode = 'hunt';
  shotsTaken = 0;
  particles = [];
  popups = [];
  turn = 'player';
  state = 'setup';
  overlay.style.display = 'none';
  setupBar.style.display = 'block';
  setupControls.style.display = 'flex';
  refreshStartEnabled();
  ensureAudio();
}

function commitPlayerFleet() {
  playerGrid = makeGrid(null);
  playerShips = [];
  setupShips.forEach((s) => placeOn(playerGrid, playerShips, s.id, s.length, s.x, s.y, s.dir));
}

startBtn.addEventListener('click', () => { if (state === 'menu' || state === 'over') beginSetup(); });
rotateBtn.addEventListener('click', () => {
  const ship = setupShips.find((s) => s.id === selectedShipId) || setupShips[0];
  if (!ship) return;
  const newDir = ship.dir === 'h' ? 'v' : 'h';
  if (!ship.placed || setupValidAt(ship.id, ship.x, ship.y, newDir, ship.length)) { ship.dir = newDir; playFire(); }
  else playInvalid();
});
randomizeBtn.addEventListener('click', () => { randomizeSetup(); refreshStartEnabled(); });
clearBtn.addEventListener('click', () => {
  setupShips.forEach((s) => { s.placed = false; });
  refreshStartEnabled();
});
startBattleBtn.addEventListener('click', () => {
  if (!allPlaced()) return;
  commitPlayerFleet();
  state = 'battle';
  setupBar.style.display = 'none';
  setupControls.style.display = 'none';
  turn = 'player';
});

function pointerToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}
function pointToCell(p, gx, gy, cellSize) {
  return { x: Math.floor((p.x - gx) / cellSize), y: Math.floor((p.y - gy) / cellSize) };
}
function inRect(p, x, y, w, h) { return p.x >= x && p.x < x + w && p.y >= y && p.y < y + h; }

function traySlotIndexAt(p) {
  if (!inRect(p, TRAY_X, TRAY_Y, TRAY_W, TRAY_H)) return null;
  const idx = Math.floor((p.x - TRAY_X) / (TRAY_W / 5));
  return clamp(idx, 0, 4);
}

function setupPointerDown(p) {
  dragMoved = false;
  if (inRect(p, BOARD_GX, SETUP_GY, BOARD_PX, BOARD_PX)) {
    const cell = pointToCell(p, BOARD_GX, SETUP_GY, BOARD_CELL);
    const ship = shipAtSetupCell(cell.x, cell.y);
    if (ship) {
      dragShipId = ship.id;
      selectedShipId = ship.id;
      dragGrabOffset = ship.dir === 'h' ? cell.x - ship.x : cell.y - ship.y;
      dragGhost = { x: ship.x, y: ship.y, dir: ship.dir, length: ship.length, valid: true };
    }
    return;
  }
  const slot = traySlotIndexAt(p);
  if (slot !== null) {
    const ship = unplacedShips()[slot];
    if (ship) {
      dragShipId = ship.id;
      selectedShipId = ship.id;
      dragGrabOffset = 0;
      dragGhost = null;
    }
  }
}

function setupPointerMove(p) {
  if (dragShipId === null) return;
  dragMoved = true;
  const ship = setupShips.find((s) => s.id === dragShipId);
  if (!ship) return;
  if (inRect(p, BOARD_GX, SETUP_GY, BOARD_PX, BOARD_PX)) {
    const cell = pointToCell(p, BOARD_GX, SETUP_GY, BOARD_CELL);
    let x = ship.dir === 'h' ? cell.x - dragGrabOffset : cell.x;
    let y = ship.dir === 'v' ? cell.y - dragGrabOffset : cell.y;
    if (ship.dir === 'h') y = ship.placed ? ship.y : cell.y;
    if (ship.dir === 'v') x = ship.placed ? ship.x : cell.x;
    const valid = setupValidAt(ship.id, x, y, ship.dir, ship.length);
    dragGhost = { x, y, dir: ship.dir, length: ship.length, valid };
    if (valid) { ship.x = x; ship.y = y; ship.placed = true; }
  } else {
    dragGhost = null;
  }
}

function setupPointerUp(p) {
  if (dragShipId === null) return;
  const ship = setupShips.find((s) => s.id === dragShipId);
  const onBoard = inRect(p, BOARD_GX, SETUP_GY, BOARD_PX, BOARD_PX);
  if (ship) {
    if (!dragMoved) {
      const newDir = ship.dir === 'h' ? 'v' : 'h';
      if (ship.placed) {
        if (setupValidAt(ship.id, ship.x, ship.y, newDir, ship.length)) { ship.dir = newDir; playFire(); }
        else playInvalid();
      } else {
        ship.dir = newDir;
      }
    } else if (!onBoard) {
      ship.placed = false;
    }
  }
  dragShipId = null;
  dragGhost = null;
  dragMoved = false;
  refreshStartEnabled();
}

canvas.addEventListener('pointerdown', (e) => {
  const p = pointerToCanvas(e);
  if (state === 'setup') {
    setupPointerDown(p);
  } else if (state === 'battle' && turn === 'player') {
    const cell = pointToCell(p, BOARD_GX, ENEMY_GY, BOARD_CELL);
    if (cell.x >= 0 && cell.x < GRID_N && cell.y >= 0 && cell.y < GRID_N) firePlayer(cell.x, cell.y);
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (state === 'setup') setupPointerMove(pointerToCanvas(e));
});
canvas.addEventListener('pointerup', (e) => {
  if (state === 'setup') setupPointerUp(pointerToCanvas(e));
});

function addPopup(x, y, text, color) { popups.push({ x, y, text, color, t: 0 }); }
function addBurst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 40 + Math.random() * 80;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0, maxLife: 350 + Math.random() * 200, color, size: 2 + Math.random() * 2 });
  }
}

function checkWin() { return cpuShips.every((s) => s.sunk); }
function checkLose() { return playerShips.every((s) => s.sunk); }

function firePlayer(x, y) {
  if (playerShots[y][x] !== null) return;
  shotsTaken++;
  playFire();
  const ship = shipAt(cpuShips, x, y);
  const px = BOARD_GX + x * BOARD_CELL + BOARD_CELL / 2, py = ENEMY_GY + y * BOARD_CELL + BOARD_CELL / 2;
  if (ship) {
    playerShots[y][x] = 'hit';
    ship.hits++;
    addBurst(px, py, '#ff8a4a', 14);
    playExplosion();
    if (ship.hits >= ship.length) {
      ship.sunk = true;
      addPopup(px, py, ship.name + ' sunk!', '#1c4a5e');
      playSunk();
      shake = 0.3;
    }
    if (checkWin()) { endBattle(true); return; }
  } else {
    playerShots[y][x] = 'miss';
    addBurst(px, py, '#ffffff', 6);
    playSplash();
  }
  turn = 'cpu';
  cpuThinkTimer = 650;
}

// --- CPU AI: probability-density hunting + hit-chasing target mode (kept
// from the previous build - this part was already good). ---
function cpuCanPlace(x, y, length, dir) {
  for (let i = 0; i < length; i++) {
    const cx = dir === 'h' ? x + i : x;
    const cy = dir === 'h' ? y : y + i;
    if (cx < 0 || cx >= GRID_N || cy < 0 || cy >= GRID_N) return false;
    const status = cpuShots[cy][cx];
    if (status === 'miss') return false;
    if (status === 'hit') {
      const s = shipAt(playerShips, cx, cy);
      if (s && s.sunk) return false;
    }
  }
  return true;
}
function computeDensity() {
  const density = makeGrid(0);
  const remaining = playerShips.filter((s) => !s.sunk).map((s) => s.length);
  for (const length of remaining) {
    for (let y = 0; y < GRID_N; y++) {
      for (let x = 0; x <= GRID_N - length; x++) {
        if (cpuCanPlace(x, y, length, 'h')) for (let i = 0; i < length; i++) density[y][x + i]++;
      }
    }
    for (let x = 0; x < GRID_N; x++) {
      for (let y = 0; y <= GRID_N - length; y++) {
        if (cpuCanPlace(x, y, length, 'v')) for (let i = 0; i < length; i++) density[y + i][x]++;
      }
    }
  }
  return density;
}
function bestCellAmong(candidates, density) {
  let best = [], bestScore = -1;
  for (const c of candidates) {
    if (c.x < 0 || c.x >= GRID_N || c.y < 0 || c.y >= GRID_N) continue;
    if (cpuShots[c.y][c.x] !== null) continue;
    const score = density[c.y][c.x];
    if (score > bestScore) { bestScore = score; best = [c]; }
    else if (score === bestScore) best.push(c);
  }
  if (!best.length) return null;
  return best[Math.floor(Math.random() * best.length)];
}
function pickHuntCell(density) {
  if (difficulty === 'easy') {
    const unknown = [];
    for (let y = 0; y < GRID_N; y++) for (let x = 0; x < GRID_N; x++) if (cpuShots[y][x] === null) unknown.push({ x, y });
    return unknown[Math.floor(Math.random() * unknown.length)];
  }
  let best = [], bestScore = -1;
  for (let y = 0; y < GRID_N; y++) {
    for (let x = 0; x < GRID_N; x++) {
      if (cpuShots[y][x] !== null) continue;
      const s = density[y][x];
      if (s > bestScore) { bestScore = s; best = [{ x, y }]; }
      else if (s === bestScore) best.push({ x, y });
    }
  }
  return best[Math.floor(Math.random() * best.length)];
}
function pickTargetCell(density) {
  const easyRandomize = difficulty === 'easy' && Math.random() < 0.35;
  if (cpuHits.length === 1 || easyRandomize) {
    const h = cpuHits[cpuHits.length - 1];
    const neighbors = [{ x: h.x + 1, y: h.y }, { x: h.x - 1, y: h.y }, { x: h.x, y: h.y + 1 }, { x: h.x, y: h.y - 1 }];
    if (easyRandomize) {
      const valid = neighbors.filter((c) => c.x >= 0 && c.x < GRID_N && c.y >= 0 && c.y < GRID_N && cpuShots[c.y][c.x] === null);
      return valid.length ? valid[Math.floor(Math.random() * valid.length)] : pickHuntCell(density);
    }
    return bestCellAmong(neighbors, density) || pickHuntCell(density);
  }
  const sameRow = cpuHits.every((h) => h.y === cpuHits[0].y);
  const sameCol = cpuHits.every((h) => h.x === cpuHits[0].x);
  if (sameRow) {
    const y = cpuHits[0].y;
    const xs = cpuHits.map((h) => h.x);
    const candidates = [{ x: Math.min(...xs) - 1, y }, { x: Math.max(...xs) + 1, y }];
    return bestCellAmong(candidates, density) || pickHuntCell(density);
  }
  if (sameCol) {
    const x = cpuHits[0].x;
    const ys = cpuHits.map((h) => h.y);
    const candidates = [{ x, y: Math.min(...ys) - 1 }, { x, y: Math.max(...ys) + 1 }];
    return bestCellAmong(candidates, density) || pickHuntCell(density);
  }
  const h = cpuHits[cpuHits.length - 1];
  const neighbors = [{ x: h.x + 1, y: h.y }, { x: h.x - 1, y: h.y }, { x: h.x, y: h.y + 1 }, { x: h.x, y: h.y - 1 }];
  return bestCellAmong(neighbors, density) || pickHuntCell(density);
}

function cpuFire() {
  const density = computeDensity();
  cpuMode = cpuHits.length > 0 ? 'target' : 'hunt';
  const cell = cpuMode === 'target' ? pickTargetCell(density) : pickHuntCell(density);
  if (!cell) { turn = 'player'; return; }
  const { x, y } = cell;
  playFire();
  const ship = shipAt(playerShips, x, y);
  const px = MINI_GX + x * MINI_CELL + MINI_CELL / 2, py = MINI_GY + y * MINI_CELL + MINI_CELL / 2;
  if (ship) {
    cpuShots[y][x] = 'hit';
    ship.hits++;
    cpuHits.push({ x, y });
    addBurst(px, py, '#ff8a4a', 10);
    playExplosion();
    if (ship.hits >= ship.length) {
      ship.sunk = true;
      addPopup(px, py - 10, ship.name + ' sunk!', '#ff5a4d');
      playSunk();
      shake = 0.3;
      cpuHits = cpuHits.filter((h) => !ship.cells.some((c) => c.x === h.x && c.y === h.y));
    }
    if (checkLose()) { endBattle(false); return; }
  } else {
    cpuShots[y][x] = 'miss';
    addBurst(px, py, '#ffffff', 4);
    playSplash();
  }
  turn = 'player';
}

function endBattle(won) {
  state = 'over';
  turn = 'over';
  if (won) {
    playWin();
    const best = loadBest();
    const isNewBest = best === null || shotsTaken < best;
    if (isNewBest) saveBest(shotsTaken);
    title.textContent = 'Victory!';
    subtitle.textContent = 'Enemy fleet destroyed';
    scoreLine.style.display = 'block';
    scoreLine.textContent = 'Shots taken: ' + shotsTaken;
    bestLine.textContent = isNewBest ? '🏆 New best!' : 'Best: ' + best + ' shots to win';
  } else {
    playLose();
    title.textContent = 'Defeat';
    subtitle.textContent = 'Your fleet has been sunk';
    scoreLine.style.display = 'block';
    scoreLine.textContent = 'Shots taken: ' + shotsTaken;
    const best = loadBest();
    bestLine.textContent = best !== null ? 'Best: ' + best + ' shots to win' : '';
  }
  diffButtons.style.display = 'flex';
  updateDiffButtonStyles();
  startBtn.textContent = 'Play Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

function update(dt) {
  particles.forEach((p) => {
    p.life += dt * 1000;
    p.vy += 200 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  });
  particles = particles.filter((p) => p.life < p.maxLife);
  popups.forEach((p) => { p.t += dt * 1000; });
  popups = popups.filter((p) => p.t < 900);
  if (shake > 0) shake -= dt;

  if (state !== 'battle' || turn !== 'cpu') return;
  cpuThinkTimer -= dt * 1000;
  if (cpuThinkTimer <= 0) cpuFire();
}

// --- Rendering: bright, warm, high-contrast palette. Chunky rounded ships,
// bold coral/white hit-miss markers, checkerboard sea for readability. ---
function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
}

function drawSea(gx, gy, cellSize) {
  for (let y = 0; y < GRID_N; y++) {
    for (let x = 0; x < GRID_N; x++) {
      ctx.fillStyle = (x + y) % 2 === 0 ? SEA : SEA2;
      ctx.fillRect(gx + x * cellSize, gy + y * cellSize, cellSize, cellSize);
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID_N; i++) {
    ctx.beginPath(); ctx.moveTo(gx + i * cellSize, gy); ctx.lineTo(gx + i * cellSize, gy + GRID_N * cellSize); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx, gy + i * cellSize); ctx.lineTo(gx + GRID_N * cellSize, gy + i * cellSize); ctx.stroke();
  }
}

function drawShipHull(gx, gy, cellSize, x, y, dir, length, color) {
  const w = dir === 'h' ? length * cellSize : cellSize;
  const h = dir === 'h' ? cellSize : length * cellSize;
  const px = gx + x * cellSize, py = gy + y * cellSize;
  const pad = Math.max(1.5, cellSize * 0.09);
  ctx.fillStyle = color;
  roundRectPath(px + pad, py + pad, w - pad * 2, h - pad * 2, cellSize * 0.32);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  if (dir === 'h') roundRectPath(px + pad, py + pad, w - pad * 2, (h - pad * 2) * 0.42, cellSize * 0.26);
  else roundRectPath(px + pad, py + pad, (w - pad * 2) * 0.42, h - pad * 2, cellSize * 0.26);
  ctx.fill();
  if (cellSize >= 18) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < length; i++) {
      const cx = dir === 'h' ? px + cellSize * i + cellSize / 2 : px + cellSize / 2;
      const cy = dir === 'h' ? py + cellSize / 2 : py + cellSize * i + cellSize / 2;
      ctx.beginPath(); ctx.arc(cx, cy, cellSize * 0.06, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawMarker(cx, cy, cellSize, kind) {
  if (kind === 'miss') {
    ctx.fillStyle = MISS_COLOR;
    ctx.strokeStyle = 'rgba(28,74,94,0.35)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, cellSize * 0.14, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  } else if (kind === 'hit') {
    ctx.fillStyle = HIT_COLOR;
    ctx.beginPath(); ctx.arc(cx, cy, cellSize * 0.32, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = Math.max(1.3, cellSize * 0.08);
    const r = cellSize * 0.15;
    ctx.beginPath(); ctx.moveTo(cx - r, cy - r); ctx.lineTo(cx + r, cy + r); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + r, cy - r); ctx.lineTo(cx - r, cy + r); ctx.stroke();
  }
}

function drawShotsAndSunk(gx, gy, cellSize, shots, ships) {
  for (let y = 0; y < GRID_N; y++) {
    for (let x = 0; x < GRID_N; x++) {
      const s = shots[y][x];
      if (!s) continue;
      drawMarker(gx + x * cellSize + cellSize / 2, gy + y * cellSize + cellSize / 2, cellSize, s);
    }
  }
  if (ships) {
    for (const ship of ships) {
      if (!ship.sunk) continue;
      ctx.fillStyle = SUNK_OVERLAY;
      for (const c of ship.cells) ctx.fillRect(gx + c.x * cellSize + 1, gy + c.y * cellSize + 1, cellSize - 2, cellSize - 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 1.5;
      const xs = ship.cells.map((c) => c.x), ys = ship.cells.map((c) => c.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      ctx.strokeRect(gx + minX * cellSize + 1, gy + minY * cellSize + 1, (maxX - minX + 1) * cellSize - 2, (maxY - minY + 1) * cellSize - 2);
    }
  }
}

function drawBoardLabel(gx, gy, text, color) {
  ctx.font = 'bold 13px Arial';
  ctx.fillStyle = color;
  ctx.textAlign = 'left';
  ctx.fillText(text, gx, gy - 8);
}

function drawLegend(x, y, w, h, ships) {
  const rowH = h / ships.length;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ships.forEach((ship, i) => {
    const ry = y + i * rowH + rowH / 2;
    ctx.globalAlpha = ship.sunk ? 0.4 : 1;
    ctx.font = ship.sunk ? '10px Arial' : 'bold 10px Arial';
    ctx.fillStyle = ship.sunk ? '#6a8a98' : '#1c4a5e';
    ctx.fillText(ship.short, x, ry);
    let px = x + 46;
    for (let i2 = 0; i2 < ship.length; i2++) {
      ctx.fillStyle = ship.sunk ? '#c0392b' : ship.color || '#3a6b82';
      ctx.beginPath(); ctx.arc(px, ry, 3, 0, Math.PI * 2); ctx.fill();
      px += 9;
    }
    ctx.globalAlpha = 1;
  });
}

function drawSetup() {
  drawSea(BOARD_GX, SETUP_GY, BOARD_CELL);
  // real (last-valid) ship positions
  for (const s of setupShips) {
    if (!s.placed) continue;
    const dim = dragShipId === s.id;
    ctx.globalAlpha = dim ? 0.55 : 1;
    drawShipHull(BOARD_GX, SETUP_GY, BOARD_CELL, s.x, s.y, s.dir, s.length, s.color);
    ctx.globalAlpha = 1;
  }
  // drag ghost - green if the attempted spot is valid, red if not
  if (dragGhost) {
    const cells = shipCells(dragGhost.x, dragGhost.y, dragGhost.dir, dragGhost.length);
    ctx.fillStyle = dragGhost.valid ? 'rgba(90,200,140,0.5)' : 'rgba(230,57,70,0.55)';
    ctx.strokeStyle = dragGhost.valid ? '#5ac88c' : '#e63946';
    ctx.lineWidth = 2;
    for (const c of cells) {
      if (c.x < 0 || c.x >= GRID_N || c.y < 0 || c.y >= GRID_N) continue;
      ctx.fillRect(BOARD_GX + c.x * BOARD_CELL + 1, SETUP_GY + c.y * BOARD_CELL + 1, BOARD_CELL - 2, BOARD_CELL - 2);
      ctx.strokeRect(BOARD_GX + c.x * BOARD_CELL + 1, SETUP_GY + c.y * BOARD_CELL + 1, BOARD_CELL - 2, BOARD_CELL - 2);
    }
  }

  // tray
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  roundRectPath(TRAY_X, TRAY_Y, TRAY_W, TRAY_H, 10);
  ctx.fill();
  const unplaced = unplacedShips();
  const slotW = TRAY_W / 5;
  unplaced.forEach((s, i) => {
    if (dragShipId === s.id) return; // being dragged - don't also draw it resting in the tray
    const slotX = TRAY_X + i * slotW;
    const cs = 14;
    const w = s.dir === 'h' ? s.length * cs : cs;
    const h = s.dir === 'h' ? cs : s.length * cs;
    const ox = slotX + (slotW - w) / 2 - (s.dir === 'h' ? 0 : 0);
    const oy = TRAY_Y + (TRAY_H - h) / 2;
    drawShipHull(ox, oy, cs, 0, 0, s.dir, s.length, s.color);
  });
}

function drawBattle() {
  drawBoardLabel(BOARD_GX, ENEMY_GY, 'Enemy waters — tap to fire', '#0f3244');
  drawSea(BOARD_GX, ENEMY_GY, BOARD_CELL);
  if (state === 'over') {
    for (let y = 0; y < GRID_N; y++) {
      for (let x = 0; x < GRID_N; x++) {
        if (cpuGrid[y][x] !== null && playerShots[y][x] === null) {
          ctx.fillStyle = 'rgba(255,255,255,0.22)';
          ctx.fillRect(BOARD_GX + x * BOARD_CELL + 1, ENEMY_GY + y * BOARD_CELL + 1, BOARD_CELL - 2, BOARD_CELL - 2);
        }
      }
    }
  }
  drawShotsAndSunk(BOARD_GX, ENEMY_GY, BOARD_CELL, playerShots, cpuShips);

  drawBoardLabel(MINI_GX, MINI_GY, 'Your fleet', '#0f3244');
  drawSea(MINI_GX, MINI_GY, MINI_CELL);
  for (const ship of playerShips) {
    drawShipHull(MINI_GX, MINI_GY, MINI_CELL, ship.cells[0].x, ship.cells[0].y, ship.cells.length > 1 && ship.cells[1].x !== ship.cells[0].x ? 'h' : (ship.cells.length > 1 ? 'v' : 'h'), ship.length, SHIP_DEFS[ship.id].color);
  }
  drawShotsAndSunk(MINI_GX, MINI_GY, MINI_CELL, cpuShots, playerShips);

  ctx.font = 'bold 10px Arial';
  ctx.fillStyle = '#0f3244';
  ctx.textAlign = 'left';
  ctx.fillText('Enemy fleet', LEGEND_X, LEGEND_Y - 8);
  drawLegend(LEGEND_X, LEGEND_Y, W - LEGEND_X - 20, LEGEND_H, cpuShips.map((s) => ({ ...s, color: SHIP_DEFS[s.id].color })));

  drawTurnHud();
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 1 - t;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}
function drawPopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Arial';
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 3;
  for (const p of popups) {
    const t = p.t / 900;
    ctx.globalAlpha = 1 - t;
    ctx.strokeText(p.text, p.x, p.y - t * 26);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - t * 26);
    ctx.globalAlpha = 1;
  }
}

function drawTurnHud() {
  ctx.font = 'bold 14px Arial';
  ctx.fillStyle = '#0f3244';
  ctx.textAlign = 'center';
  const text = turn === 'player' ? 'Your shot — tap enemy waters' : turn === 'cpu' ? 'Enemy is firing…' : '';
  ctx.fillText(text, W / 2, 26);
  ctx.textAlign = 'left';
  ctx.font = 'bold 12px Arial';
  ctx.fillText('Shots: ' + shotsTaken, 14, 26);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#bfe8f5';
  ctx.fillRect(0, 0, W, H);
  if (state === 'menu') return;
  ctx.save();
  const mag = shake > 0 ? shake * 10 : 0;
  if (mag > 0) ctx.translate((Math.random() * 2 - 1) * mag, (Math.random() * 2 - 1) * mag);
  if (state === 'setup') {
    drawSetup();
  } else {
    drawBattle();
  }
  drawParticles();
  drawPopups();
  ctx.restore();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
