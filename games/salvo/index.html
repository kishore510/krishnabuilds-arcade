<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Salvo</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #051824;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #0a3550;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(27px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.9; }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  .rowLabel {
    font-size: calc(10.5px * var(--game-scale, 1));
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
    margin-top: calc(8px * var(--game-scale, 1));
  }
  .btnRow {
    display: flex;
    gap: calc(8px * var(--game-scale, 1));
    margin-top: calc(5px * var(--game-scale, 1));
    pointer-events: auto;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btnRow button {
    font-family: inherit;
    font-size: calc(12.5px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(7px * var(--game-scale, 1)) calc(15px * var(--game-scale, 1));
    border-radius: calc(18px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  .btnRow button:active { background: rgba(255,255,255,0.3); }
  .btnRow button.selected { background: #ffb703; border-color: #ffb703; color: #04121c; }
  #startBtn {
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #2aa9c9;
    color: #04121c;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #5ed4ea; }
  #backToArcade {
    display: none;
    margin-top: calc(12px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
  #setupBar {
    position: absolute;
    top: calc(10px * var(--game-scale, 1));
    left: 0; right: 0;
    text-align: center;
    display: none;
    z-index: 4;
    pointer-events: none;
  }
  #setupBar .shipName {
    font-size: calc(16px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }
  #setupBar .shipHint {
    display: block;
    font-size: calc(11px * var(--game-scale, 1));
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }
  #setupControls {
    position: absolute;
    bottom: calc(14px * var(--game-scale, 1));
    left: 0; right: 0;
    display: none;
    justify-content: center;
    gap: calc(8px * var(--game-scale, 1));
    z-index: 4;
  }
  #setupControls button {
    font-family: inherit;
    font-size: calc(12.5px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(8px * var(--game-scale, 1)) calc(14px * var(--game-scale, 1));
    border-radius: calc(18px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.4);
    color: white;
    cursor: pointer;
  }
  #setupControls button:disabled { opacity: 0.4; }
  #setupControls #startBattleBtn { background: #2aa9c9; border-color: #2aa9c9; color: #04121c; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="380" height="600"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="setupBar">
    <span class="shipName" id="shipNameText"></span>
    <span class="shipHint" id="shipHintText">Drag on the grid to preview, release to place</span>
  </div>
  <div id="setupControls">
    <button id="rotateBtn" type="button">⟳ Rotate</button>
    <button id="randomizeBtn" type="button">🎲 Randomize</button>
    <button id="startBattleBtn" type="button" disabled>Start Battle</button>
  </div>
  <div id="overlay">
    <h1 id="title">Salvo</h1>
    <p id="subtitle">Sink the enemy fleet before they sink yours</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <div class="rowLabel">Difficulty</div>
    <div class="btnRow" id="diffButtons">
      <button data-d="easy" type="button">Easy</button>
      <button data-d="hard" type="button">Hard</button>
    </div>
    <button id="startBtn" type="button">Start</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');
const diffButtons = document.getElementById('diffButtons');
const setupBar = document.getElementById('setupBar');
const shipNameText = document.getElementById('shipNameText');
const shipHintText = document.getElementById('shipHintText');
const setupControls = document.getElementById('setupControls');
const rotateBtn = document.getElementById('rotateBtn');
const randomizeBtn = document.getElementById('randomizeBtn');
const startBattleBtn = document.getElementById('startBattleBtn');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('salvoMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playFire() { tone(180, 0.08, 'square', 0.12); }
function playSplash() { tone(320, 0.12, 'sine', 0.08); tone(220, 0.14, 'sine', 0.06, 0.05); }
function playExplosion() { tone(140, 0.16, 'sawtooth', 0.15); tone(90, 0.22, 'square', 0.13, 0.05); }
function playSunk() {
  tone(110, 0.3, 'sawtooth', 0.16);
  tone(80, 0.35, 'square', 0.14, 0.08);
  tone(60, 0.4, 'sine', 0.12, 0.18);
}
function playInvalid() { tone(160, 0.08, 'square', 0.08); }
function playWin() {
  tone(523, 0.14, 'triangle', 0.14);
  tone(659, 0.14, 'triangle', 0.13, 0.13);
  tone(784, 0.18, 'triangle', 0.13, 0.26);
  tone(1047, 0.28, 'triangle', 0.14, 0.4);
}
function playLose() { tone(200, 0.3, 'sawtooth', 0.14); tone(140, 0.4, 'sawtooth', 0.12, 0.15); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('salvoMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest() { const v = sessionStorage.getItem('salvoBest'); return v ? parseInt(v, 10) : null; }
function saveBest(v) { try { sessionStorage.setItem('salvoBest', v); } catch (e) {} }

// --- Board setup ---
// 12x12 (up from the original 10x10): same five-ship fleet spread over more
// water lowers ship density symmetrically for both sides, so games run
// longer and feel less like an instant coin-flip without actually tuning
// either side's aim to be worse - "bigger, not easier."
const GRID_N = 12;
const CELL = 19;
const BOARD_PX = GRID_N * CELL;
const SIDEBAR_W = 66;
const SIDEBAR_GAP = 8;
const GRID_X = 38 + SIDEBAR_W + SIDEBAR_GAP;
const SIDEBAR_X = 38;
const ENEMY_GRID_Y = 54;
const PLAYER_GRID_Y = ENEMY_GRID_Y + BOARD_PX + 40;

const SHIP_DEFS = [
  { name: 'Carrier', short: 'Carrier', length: 5 },
  { name: 'Battleship', short: 'B\'ship', length: 4 },
  { name: 'Cruiser', short: 'Cruiser', length: 3 },
  { name: 'Submarine', short: 'Sub', length: 3 },
  { name: 'Destroyer', short: 'D\'stroy', length: 2 }
];

function makeGrid(fill) { return Array.from({ length: GRID_N }, () => Array(GRID_N).fill(fill)); }

function canPlaceOn(grid, x, y, length, dir) {
  for (let i = 0; i < length; i++) {
    const cx = dir === 'h' ? x + i : x;
    const cy = dir === 'h' ? y : y + i;
    if (cx < 0 || cx >= GRID_N || cy < 0 || cy >= GRID_N) return false;
    if (grid[cy][cx] !== null) return false;
  }
  return true;
}
function placeOn(grid, ships, id, length, x, y, dir) {
  const cells = [];
  for (let i = 0; i < length; i++) {
    const cx = dir === 'h' ? x + i : x;
    const cy = dir === 'h' ? y : y + i;
    grid[cy][cx] = id;
    cells.push({ x: cx, y: cy });
  }
  ships.push({ id, name: SHIP_DEFS[id].name, short: SHIP_DEFS[id].short, length, cells, hits: 0, sunk: false });
}

function randomFleet() {
  const grid = makeGrid(null);
  const ships = [];
  SHIP_DEFS.forEach((def, id) => {
    let placed = false;
    while (!placed) {
      const dir = Math.random() < 0.5 ? 'h' : 'v';
      const x = Math.floor(Math.random() * GRID_N);
      const y = Math.floor(Math.random() * GRID_N);
      if (canPlaceOn(grid, x, y, def.length, dir)) { placeOn(grid, ships, id, def.length, x, y, dir); placed = true; }
    }
  });
  return { grid, ships };
}

function shipAt(ships, x, y) { return ships.find((s) => s.cells.some((c) => c.x === x && c.y === y)) || null; }

// --- Game state ---
let difficulty = 'hard';
let playerGrid, playerShips, cpuGrid, cpuShips;
let playerShots, cpuShots; // what each side has learned about the OTHER's board
const SETUP_GRID_Y = Math.round((H - BOARD_PX) / 2);
let placingShipIndex = 0, placingDir = 'h';
let previewAnchor = null;
let turn = 'player'; // player | cpu | over
let cpuThinkTimer = 0;
let cpuHits = []; // unresolved hit cells (not yet part of a sunk ship) on the player's board
let cpuMode = 'hunt';
let shotsTaken = 0;
let particles = [];
let popups = [];
let state = 'menu'; // menu | setup | battle | over
let shake = 0;

function updateDiffButtonStyles() { [...diffButtons.children].forEach((b) => b.classList.toggle('selected', b.dataset.d === difficulty)); }
diffButtons.addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (!b) return;
  difficulty = b.dataset.d;
  updateDiffButtonStyles();
});
updateDiffButtonStyles();

function showMenu() {
  state = 'menu';
  title.textContent = 'Salvo';
  subtitle.textContent = 'Sink the enemy fleet before they sink yours';
  scoreLine.style.display = 'none';
  const best = loadBest();
  bestLine.textContent = best !== null ? 'Best: ' + best + ' shots to win' : '';
  diffButtons.style.display = 'flex';
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  setupBar.style.display = 'none';
  setupControls.style.display = 'none';
  overlay.style.display = 'flex';
}

function beginSetup() {
  playerGrid = makeGrid(null);
  playerShips = [];
  placingShipIndex = 0;
  placingDir = 'h';
  previewAnchor = null;
  const cpuFleet = randomFleet();
  cpuGrid = cpuFleet.grid;
  cpuShips = cpuFleet.ships;
  playerShots = makeGrid(null);
  cpuShots = makeGrid(null);
  cpuHits = [];
  cpuMode = 'hunt';
  shotsTaken = 0;
  particles = [];
  popups = [];
  turn = 'player';
  state = 'setup';
  overlay.style.display = 'none';
  setupBar.style.display = 'block';
  setupControls.style.display = 'flex';
  startBattleBtn.disabled = true;
  updateSetupBar();
  ensureAudio();
}
function updateSetupBar() {
  if (placingShipIndex >= SHIP_DEFS.length) {
    shipNameText.textContent = 'Fleet ready!';
    shipHintText.style.display = 'none';
  } else {
    const def = SHIP_DEFS[placingShipIndex];
    shipNameText.textContent = 'Place: ' + def.name + ' (' + def.length + ')';
    shipHintText.style.display = 'block';
  }
}

startBtn.addEventListener('click', () => { if (state === 'menu' || state === 'over') beginSetup(); });
rotateBtn.addEventListener('click', () => { placingDir = placingDir === 'h' ? 'v' : 'h'; });
randomizeBtn.addEventListener('click', () => {
  playerGrid = makeGrid(null);
  playerShips = [];
  SHIP_DEFS.forEach((def, id) => {
    let placed = false;
    while (!placed) {
      const dir = Math.random() < 0.5 ? 'h' : 'v';
      const x = Math.floor(Math.random() * GRID_N);
      const y = Math.floor(Math.random() * GRID_N);
      if (canPlaceOn(playerGrid, x, y, def.length, dir)) { placeOn(playerGrid, playerShips, id, def.length, x, y, dir); placed = true; }
    }
  });
  placingShipIndex = SHIP_DEFS.length;
  previewAnchor = null;
  startBattleBtn.disabled = false;
  updateSetupBar();
});
startBattleBtn.addEventListener('click', () => {
  if (placingShipIndex < SHIP_DEFS.length) return;
  state = 'battle';
  setupBar.style.display = 'none';
  setupControls.style.display = 'none';
  turn = 'player';
});

function pointerToCanvas(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}
function cellFromPoint(p, gridY) {
  const cx = Math.floor((p.x - GRID_X) / CELL);
  const cy = Math.floor((p.y - gridY) / CELL);
  if (cx < 0 || cx >= GRID_N || cy < 0 || cy >= GRID_N) return null;
  return { x: cx, y: cy };
}

canvas.addEventListener('pointerdown', (e) => {
  const p = pointerToCanvas(e);
  if (state === 'setup') {
    updateSetupPreview(p);
  } else if (state === 'battle' && turn === 'player') {
    const cell = cellFromPoint(p, ENEMY_GRID_Y);
    if (cell) firePlayer(cell.x, cell.y);
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (state === 'setup') updateSetupPreview(pointerToCanvas(e));
});
canvas.addEventListener('pointerup', (e) => {
  if (state === 'setup') { updateSetupPreview(pointerToCanvas(e)); commitSetupPlacement(); }
});

// Setup placement is drag-to-preview: the ghost ship follows the pointer
// (hovering on desktop, dragging on touch) and only commits on release, so
// the player can see and rotate it before it's locked in - a plain tap that
// placed instantly left no way to reposition or preview a ship first.
function updateSetupPreview(p) {
  if (placingShipIndex >= SHIP_DEFS.length) { previewAnchor = null; return; }
  const cx = Math.floor((p.x - GRID_X) / CELL);
  const cy = Math.floor((p.y - SETUP_GRID_Y) / CELL);
  if (cx < 0 || cx >= GRID_N || cy < 0 || cy >= GRID_N) { previewAnchor = null; return; }
  previewAnchor = { x: cx, y: cy };
}

function commitSetupPlacement() {
  if (placingShipIndex >= SHIP_DEFS.length || !previewAnchor) return;
  const def = SHIP_DEFS[placingShipIndex];
  if (canPlaceOn(playerGrid, previewAnchor.x, previewAnchor.y, def.length, placingDir)) {
    placeOn(playerGrid, playerShips, placingShipIndex, def.length, previewAnchor.x, previewAnchor.y, placingDir);
    placingShipIndex++;
    playFire();
    previewAnchor = null;
    updateSetupBar();
    if (placingShipIndex >= SHIP_DEFS.length) startBattleBtn.disabled = false;
  } else {
    playInvalid();
  }
}

function addPopup(x, y, text, color) { popups.push({ x, y, text, color, t: 0 }); }
function addBurst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 40 + Math.random() * 80;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0, maxLife: 350 + Math.random() * 200, color, size: 2 + Math.random() * 2 });
  }
}

function checkWin() { return cpuShips.every((s) => s.sunk); }
function checkLose() { return playerShips.every((s) => s.sunk); }

function firePlayer(x, y) {
  if (playerShots[y][x] !== null) return;
  shotsTaken++;
  playFire();
  const ship = shipAt(cpuShips, x, y);
  const px = GRID_X + x * CELL + CELL / 2, py = ENEMY_GRID_Y + y * CELL + CELL / 2;
  if (ship) {
    playerShots[y][x] = 'hit';
    ship.hits++;
    addBurst(px, py, '#ff8a4a', 14);
    playExplosion();
    if (ship.hits >= ship.length) {
      ship.sunk = true;
      addPopup(px, py, ship.name + ' sunk!', '#ffe28a');
      playSunk();
      shake = 0.3;
    }
    if (checkWin()) { endBattle(true); return; }
  } else {
    playerShots[y][x] = 'miss';
    addBurst(px, py, '#bfe8f0', 6);
    playSplash();
  }
  turn = 'cpu';
  cpuThinkTimer = 650;
}

// --- CPU AI: probability-density hunting + hit-chasing target mode ---
function cpuCanPlace(x, y, length, dir) {
  for (let i = 0; i < length; i++) {
    const cx = dir === 'h' ? x + i : x;
    const cy = dir === 'h' ? y : y + i;
    if (cx < 0 || cx >= GRID_N || cy < 0 || cy >= GRID_N) return false;
    const status = cpuShots[cy][cx];
    if (status === 'miss') return false;
    if (status === 'hit') {
      const s = shipAt(playerShips, cx, cy);
      if (s && s.sunk) return false;
    }
  }
  return true;
}
function computeDensity() {
  const density = makeGrid(0);
  const remaining = playerShips.filter((s) => !s.sunk).map((s) => s.length);
  for (const length of remaining) {
    for (let y = 0; y < GRID_N; y++) {
      for (let x = 0; x <= GRID_N - length; x++) {
        if (cpuCanPlace(x, y, length, 'h')) for (let i = 0; i < length; i++) density[y][x + i]++;
      }
    }
    for (let x = 0; x < GRID_N; x++) {
      for (let y = 0; y <= GRID_N - length; y++) {
        if (cpuCanPlace(x, y, length, 'v')) for (let i = 0; i < length; i++) density[y + i][x]++;
      }
    }
  }
  return density;
}
function bestCellAmong(candidates, density) {
  let best = [], bestScore = -1;
  for (const c of candidates) {
    if (c.x < 0 || c.x >= GRID_N || c.y < 0 || c.y >= GRID_N) continue;
    if (cpuShots[c.y][c.x] !== null) continue;
    const score = density[c.y][c.x];
    if (score > bestScore) { bestScore = score; best = [c]; }
    else if (score === bestScore) best.push(c);
  }
  if (!best.length) return null;
  return best[Math.floor(Math.random() * best.length)];
}
function pickHuntCell(density) {
  if (difficulty === 'easy') {
    const unknown = [];
    for (let y = 0; y < GRID_N; y++) for (let x = 0; x < GRID_N; x++) if (cpuShots[y][x] === null) unknown.push({ x, y });
    return unknown[Math.floor(Math.random() * unknown.length)];
  }
  let best = [], bestScore = -1;
  for (let y = 0; y < GRID_N; y++) {
    for (let x = 0; x < GRID_N; x++) {
      if (cpuShots[y][x] !== null) continue;
      const s = density[y][x];
      if (s > bestScore) { bestScore = s; best = [{ x, y }]; }
      else if (s === bestScore) best.push({ x, y });
    }
  }
  return best[Math.floor(Math.random() * best.length)];
}
function pickTargetCell(density) {
  const easyRandomize = difficulty === 'easy' && Math.random() < 0.35;
  if (cpuHits.length === 1 || easyRandomize) {
    const h = cpuHits[cpuHits.length - 1];
    const neighbors = [{ x: h.x + 1, y: h.y }, { x: h.x - 1, y: h.y }, { x: h.x, y: h.y + 1 }, { x: h.x, y: h.y - 1 }];
    if (easyRandomize) {
      const valid = neighbors.filter((c) => c.x >= 0 && c.x < GRID_N && c.y >= 0 && c.y < GRID_N && cpuShots[c.y][c.x] === null);
      return valid.length ? valid[Math.floor(Math.random() * valid.length)] : pickHuntCell(density);
    }
    return bestCellAmong(neighbors, density) || pickHuntCell(density);
  }
  const sameRow = cpuHits.every((h) => h.y === cpuHits[0].y);
  const sameCol = cpuHits.every((h) => h.x === cpuHits[0].x);
  if (sameRow) {
    const y = cpuHits[0].y;
    const xs = cpuHits.map((h) => h.x);
    const candidates = [{ x: Math.min(...xs) - 1, y }, { x: Math.max(...xs) + 1, y }];
    return bestCellAmong(candidates, density) || pickHuntCell(density);
  }
  if (sameCol) {
    const x = cpuHits[0].x;
    const ys = cpuHits.map((h) => h.y);
    const candidates = [{ x, y: Math.min(...ys) - 1 }, { x, y: Math.max(...ys) + 1 }];
    return bestCellAmong(candidates, density) || pickHuntCell(density);
  }
  const h = cpuHits[cpuHits.length - 1];
  const neighbors = [{ x: h.x + 1, y: h.y }, { x: h.x - 1, y: h.y }, { x: h.x, y: h.y + 1 }, { x: h.x, y: h.y - 1 }];
  return bestCellAmong(neighbors, density) || pickHuntCell(density);
}

function cpuFire() {
  const density = computeDensity();
  cpuMode = cpuHits.length > 0 ? 'target' : 'hunt';
  const cell = cpuMode === 'target' ? pickTargetCell(density) : pickHuntCell(density);
  if (!cell) { turn = 'player'; return; }
  const { x, y } = cell;
  playFire();
  const ship = shipAt(playerShips, x, y);
  const px = GRID_X + x * CELL + CELL / 2, py = PLAYER_GRID_Y + y * CELL + CELL / 2;
  if (ship) {
    cpuShots[y][x] = 'hit';
    ship.hits++;
    cpuHits.push({ x, y });
    addBurst(px, py, '#ff8a4a', 14);
    playExplosion();
    if (ship.hits >= ship.length) {
      ship.sunk = true;
      addPopup(px, py, ship.name + ' sunk!', '#ff6b5e');
      playSunk();
      shake = 0.3;
      cpuHits = cpuHits.filter((h) => !ship.cells.some((c) => c.x === h.x && c.y === h.y));
    }
    if (checkLose()) { endBattle(false); return; }
  } else {
    cpuShots[y][x] = 'miss';
    addBurst(px, py, '#bfe8f0', 6);
    playSplash();
  }
  turn = 'player';
}

function endBattle(won) {
  state = 'over';
  turn = 'over';
  if (won) {
    playWin();
    const best = loadBest();
    const isNewBest = best === null || shotsTaken < best;
    if (isNewBest) saveBest(shotsTaken);
    title.textContent = 'Victory!';
    subtitle.textContent = 'Enemy fleet destroyed';
    scoreLine.style.display = 'block';
    scoreLine.textContent = 'Shots taken: ' + shotsTaken;
    bestLine.textContent = isNewBest ? '🏆 New best!' : 'Best: ' + best + ' shots to win';
  } else {
    playLose();
    title.textContent = 'Defeat';
    subtitle.textContent = 'Your fleet has been sunk';
    scoreLine.style.display = 'block';
    scoreLine.textContent = 'Shots taken: ' + shotsTaken;
    const best = loadBest();
    bestLine.textContent = best !== null ? 'Best: ' + best + ' shots to win' : '';
  }
  diffButtons.style.display = 'flex';
  updateDiffButtonStyles();
  startBtn.textContent = 'Play Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

function update(dt) {
  particles.forEach((p) => {
    p.life += dt * 1000;
    p.vy += 200 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  });
  particles = particles.filter((p) => p.life < p.maxLife);
  popups.forEach((p) => { p.t += dt * 1000; });
  popups = popups.filter((p) => p.t < 900);
  if (shake > 0) shake -= dt;

  if (state !== 'battle' || turn !== 'cpu') return;
  cpuThinkTimer -= dt * 1000;
  if (cpuThinkTimer <= 0) cpuFire();
}

// A small hull silhouette per ship reads as "a fleet roster" at a glance -
// a row of identical squares looked too much like a generic pegboard and
// didn't give each ship its own visual identity.
function drawShipIcon(cx, cy, length, sunk) {
  const w = 12 + length * 4.2, h = 8;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = sunk ? 'rgba(230,57,70,0.9)' : 'rgba(150,205,225,0.9)';
  ctx.strokeStyle = sunk ? '#7a1a1a' : 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-w / 2, -h / 2);
  ctx.lineTo(w / 2 - h * 0.7, -h / 2);
  ctx.lineTo(w / 2, 0);
  ctx.lineTo(w / 2 - h * 0.7, h / 2);
  ctx.lineTo(-w / 2, h / 2);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-w / 2 + 3, 0); ctx.lineTo(w / 2 - h * 0.9, 0);
  ctx.stroke();
  ctx.restore();
}

function drawPanelCard(x, y, w, h) {
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.strokeStyle = 'rgba(255,255,255,0.14)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 12);
  ctx.fill();
  ctx.stroke();
}

function drawFleetTracker(x, y, height, ships) {
  const rowH = height / ships.length;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ships.forEach((ship, i) => {
    const ry = y + i * rowH + rowH / 2;
    const sunk = ship.sunk;
    ctx.globalAlpha = sunk ? 0.45 : 1;
    ctx.font = (sunk ? '10px' : 'bold 10px') + ' Arial';
    ctx.fillStyle = sunk ? 'rgba(255,255,255,0.55)' : 'white';
    ctx.fillText(ship.short, x, ry - 9);
    const iconW = 12 + ship.length * 4.2;
    drawShipIcon(x + iconW / 2, ry + 6, ship.length, sunk);
    if (sunk) {
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x - 1, ry + 6); ctx.lineTo(x + iconW + 1, ry + 6); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  });
}

function drawGrid(gx, gy, label, shots, shipsGrid, revealShips, ships) {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(gx, gy, BOARD_PX, BOARD_PX);
  if (revealShips) {
    for (let y = 0; y < GRID_N; y++) {
      for (let x = 0; x < GRID_N; x++) {
        if (shipsGrid[y][x] !== null) {
          ctx.fillStyle = 'rgba(255,255,255,0.16)';
          ctx.fillRect(gx + x * CELL + 1, gy + y * CELL + 1, CELL - 2, CELL - 2);
        }
      }
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID_N; i++) {
    ctx.beginPath(); ctx.moveTo(gx + i * CELL, gy); ctx.lineTo(gx + i * CELL, gy + BOARD_PX); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx, gy + i * CELL); ctx.lineTo(gx + BOARD_PX, gy + i * CELL); ctx.stroke();
  }
  for (let y = 0; y < GRID_N; y++) {
    for (let x = 0; x < GRID_N; x++) {
      const s = shots[y][x];
      const cx = gx + x * CELL + CELL / 2, cy = gy + y * CELL + CELL / 2;
      if (s === 'miss') {
        // A splash ripple instead of a plain dot - reads as "water", not a
        // peg-board marker.
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 1.3;
        ctx.beginPath(); ctx.arc(cx, cy, 4.5, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.beginPath(); ctx.arc(cx, cy, 1.6, 0, Math.PI * 2); ctx.fill();
      } else if (s === 'hit') {
        ctx.fillStyle = '#e63946';
        ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#7a1a1a'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(cx - 4, cy - 4); ctx.lineTo(cx + 4, cy + 4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 4, cy - 4); ctx.lineTo(cx - 4, cy + 4); ctx.stroke();
      }
    }
  }
  // Outline sunk ships' footprints on the board itself - once a ship is
  // down, its cells are known information either way, so tracing its exact
  // shape answers "what did I just hit" at a glance instead of just a
  // cluster of red X's.
  if (ships) {
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    for (const ship of ships) {
      if (!ship.sunk) continue;
      const xs = ship.cells.map((c) => c.x), ys = ship.cells.map((c) => c.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);
      ctx.strokeRect(gx + minX * CELL + 1, gy + minY * CELL + 1, (maxX - minX + 1) * CELL - 2, (maxY - minY + 1) * CELL - 2);
    }
  }

  ctx.font = 'bold 11px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.textAlign = 'left';
  ctx.fillText(label, gx, gy - 6);
}

function drawSetupGrid() {
  const gx = GRID_X, gy = SETUP_GRID_Y;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(gx, gy, BOARD_PX, BOARD_PX);
  for (let y = 0; y < GRID_N; y++) {
    for (let x = 0; x < GRID_N; x++) {
      if (playerGrid[y][x] !== null) {
        ctx.fillStyle = '#4a7a9e';
        ctx.fillRect(gx + x * CELL + 1, gy + y * CELL + 1, CELL - 2, CELL - 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1;
        ctx.strokeRect(gx + x * CELL + 1, gy + y * CELL + 1, CELL - 2, CELL - 2);
      }
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= GRID_N; i++) {
    ctx.beginPath(); ctx.moveTo(gx + i * CELL, gy); ctx.lineTo(gx + i * CELL, gy + BOARD_PX); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx, gy + i * CELL); ctx.lineTo(gx + BOARD_PX, gy + i * CELL); ctx.stroke();
  }

  if (previewAnchor && placingShipIndex < SHIP_DEFS.length) {
    const def = SHIP_DEFS[placingShipIndex];
    const valid = canPlaceOn(playerGrid, previewAnchor.x, previewAnchor.y, def.length, placingDir);
    ctx.fillStyle = valid ? 'rgba(90,200,140,0.55)' : 'rgba(230,57,70,0.55)';
    ctx.strokeStyle = valid ? '#5ac88c' : '#e63946';
    ctx.lineWidth = 2;
    for (let i = 0; i < def.length; i++) {
      const cx = placingDir === 'h' ? previewAnchor.x + i : previewAnchor.x;
      const cy = placingDir === 'h' ? previewAnchor.y : previewAnchor.y + i;
      if (cx < 0 || cx >= GRID_N || cy < 0 || cy >= GRID_N) continue;
      ctx.fillRect(gx + cx * CELL + 1, gy + cy * CELL + 1, CELL - 2, CELL - 2);
      ctx.strokeRect(gx + cx * CELL + 1, gy + cy * CELL + 1, CELL - 2, CELL - 2);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 1 - t;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}
function drawPopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Arial';
  for (const p of popups) {
    const t = p.t / 900;
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - t * 26);
    ctx.globalAlpha = 1;
  }
}

function drawTurnHud() {
  ctx.font = 'bold 14px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'center';
  const text = turn === 'player' ? 'Your shot — tap enemy waters' : turn === 'cpu' ? 'Enemy is firing…' : '';
  ctx.strokeText(text, W / 2, 44);
  ctx.fillText(text, W / 2, 44);
  ctx.textAlign = 'left';
  ctx.font = 'bold 12px Arial';
  ctx.strokeText('Shots: ' + shotsTaken, 14, 24);
  ctx.fillText('Shots: ' + shotsTaken, 14, 24);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a3550';
  ctx.fillRect(0, 0, W, H);
  if (state === 'menu') return;
  ctx.save();
  const mag = shake > 0 ? shake * 10 : 0;
  if (mag > 0) ctx.translate((Math.random() * 2 - 1) * mag, (Math.random() * 2 - 1) * mag);
  if (state === 'setup') {
    drawSetupGrid();
  } else {
    // Grouping each grid + its fleet sidebar inside its own rounded card
    // reads as two distinct panels instead of loose canvas elements
    // floating in open water - a cleaner, more app-like layout.
    drawPanelCard(SIDEBAR_X - 10, ENEMY_GRID_Y - 10, BOARD_PX + SIDEBAR_GAP + SIDEBAR_W + 20, BOARD_PX + 20);
    drawPanelCard(SIDEBAR_X - 10, PLAYER_GRID_Y - 10, BOARD_PX + SIDEBAR_GAP + SIDEBAR_W + 20, BOARD_PX + 20);
    // Enemy board only reveals ship positions once the battle is over -
    // that's the "where did I miss" review the player can't get mid-game.
    drawGrid(GRID_X, ENEMY_GRID_Y, 'Enemy Waters', playerShots, cpuGrid, state === 'over', cpuShips);
    drawFleetTracker(SIDEBAR_X, ENEMY_GRID_Y, BOARD_PX, cpuShips);
    drawGrid(GRID_X, PLAYER_GRID_Y, 'Your Fleet', cpuShots, playerGrid, true, playerShips);
    drawFleetTracker(SIDEBAR_X, PLAYER_GRID_Y, BOARD_PX, playerShips);
    drawTurnHud();
  }
  drawParticles();
  drawPopups();
  ctx.restore();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
