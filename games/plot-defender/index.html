<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plot Defender</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #2b1e12;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #4a5a3a;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
  }
  /* Solid panel behind the overlay copy - learned from Crate Stack that
     text floating directly on a game-colored canvas can lose contrast. */
  #overlayPanel {
    background: rgba(10, 12, 8, 0.62);
    border: 1.5px solid rgba(255,255,255,0.14);
    border-radius: calc(18px * var(--game-scale, 1));
    padding: calc(22px * var(--game-scale, 1)) calc(26px * var(--game-scale, 1));
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #overlay h1 { margin: 0 0 8px; font-size: calc(30px * var(--game-scale, 1)); }
  #overlay p { margin: 4px 0; font-size: calc(15px * var(--game-scale, 1)); opacity: 0.9; }
  #diffButtons {
    display: flex;
    gap: calc(14px * var(--game-scale, 1));
    margin-top: calc(18px * var(--game-scale, 1));
    pointer-events: auto;
  }
  #diffButtons button {
    font-family: inherit;
    font-size: calc(15px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(28px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: #7cb342;
    border-color: #7cb342;
    color: #12200a;
    cursor: pointer;
  }
  #diffButtons button:active { filter: brightness(0.9); }
  #backToArcade {
    display: none;
    margin-top: calc(18px * var(--game-scale, 1));
    font-size: calc(14px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <div id="overlayPanel">
      <h1 id="title">Plot Defender</h1>
      <p id="subtitle">Match each defence to the pest it's strong against</p>
      <p id="scoreLine" style="display:none;"></p>
      <div id="diffButtons">
        <button id="playBtn" type="button">Play</button>
      </div>
      <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const playBtn = document.getElementById('playBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;
const HUD_H = 58;
const TRAY_H = 60;
const FIELD_BOTTOM = H - TRAY_H;
const PATH_WIDTH = 34;
const START_LIVES = 5;
const PEST_BASE_SPEED = 58;
const PEST_MAX_HP = 3;
const COMPOST_START = 100;
const KILL_REWARD = 15;
const DEFENCE_RADIUS = 13;
const MIN_BUILD_DIST_FROM_PATH = PATH_WIDTH / 2 + DEFENCE_RADIUS + 6;
const MAX_BUILD_DIST_FROM_PATH = 80;
const MIN_DEFENCE_SPACING = 32;
const HIT_RADIUS = 9;
const COUNTDOWN_DURATION = 3;
const WAVE_CLEARED_PAUSE = 1.4;
const SCORE_PER_KILL = 10;
const SCORE_PER_WAVE = 50;
const SCORE_PER_LIFE = 20;
const SPLASH_FALLOFF = 0.55;

// --- Three pest traits (spec: slow/tough, fast/weak, medium) layered on
// top of the base hp/speed - wave hpMult/speedMult still apply on top of
// these, so a late-wave slug is tougher than an early-wave slug too. ---
const PEST_TYPES = {
  rabbit: { key: 'rabbit', name: 'Rabbit', hpMult: 1.0, speedMult: 1.0 },
  bird: { key: 'bird', name: 'Bird', hpMult: 0.55, speedMult: 1.7 },
  slug: { key: 'slug', name: 'Slug', hpMult: 2.2, speedMult: 0.55 }
};

// --- Waves replace continuous spawning: each is a scripted count/pace of
// pests rather than an open tap. Count ramps up and the gap between
// spawns tightens each wave; hp/speed multipliers make later pests
// tougher. `mix` is the weighted odds of each pest type for that wave -
// early waves are all rabbit (the easy baseline), later ones fold in
// birds and slugs so no single defence type is enough on its own. ---
const WAVE_MIXES = [
  { rabbit: 1 },
  { rabbit: 0.8, bird: 0.2 },
  { rabbit: 0.6, bird: 0.25, slug: 0.15 },
  { rabbit: 0.5, bird: 0.25, slug: 0.25 },
  { rabbit: 0.4, bird: 0.3, slug: 0.3 },
  { rabbit: 0.35, bird: 0.3, slug: 0.35 },
  { rabbit: 0.3, bird: 0.35, slug: 0.35 },
  { rabbit: 0.25, bird: 0.35, slug: 0.4 },
  { rabbit: 0.2, bird: 0.4, slug: 0.4 },
  { rabbit: 0.2, bird: 0.4, slug: 0.4 }
];
const WAVE_COUNT = 10;
const WAVES = [];
for (let i = 0; i < WAVE_COUNT; i++) {
  WAVES.push({
    count: 5 + i,
    interval: clampNum(1.6 - i * 0.065, 0.95, 1.6),
    hpMult: 1 + i * 0.11,
    speedMult: 1 + i * 0.03,
    mix: WAVE_MIXES[i]
  });
}
function pickPestType(mix) {
  const total = Object.values(mix).reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (const key in mix) {
    r -= mix[key];
    if (r <= 0) return key;
  }
  return Object.keys(mix)[0];
}

// --- Four defence types, each keyed the same way so the tray, placement,
// and firing logic all read from one place. `mechanic` picks how it
// fires: 'single' homes on the nearest target, 'splash' does that plus
// falloff damage to nearby pests on impact, 'area' periodically pulses
// everything already in range instead of targeting one pest. `effectiveness`
// is a damage multiplier per pest type - the reason matching defence to
// pest matters instead of one type dominating every wave. ---
const DEFENCE_TYPES = {
  scarecrow: {
    key: 'scarecrow', name: 'Scarecrow', cost: 40, range: 88, damage: 1, fireInterval: 0.55,
    projectileSpeed: 260, mechanic: 'single', splashRadius: 0,
    effectiveness: { rabbit: 1, bird: 1, slug: 1 }
  },
  beerTrap: {
    key: 'beerTrap', name: 'Beer Trap', cost: 55, range: 68, damage: 2, fireInterval: 0.9,
    projectileSpeed: 220, mechanic: 'single', splashRadius: 0,
    effectiveness: { rabbit: 1, bird: 0.6, slug: 2.2 }
  },
  netting: {
    key: 'netting', name: 'Netting', cost: 65, range: 76, damage: 1, fireInterval: 1.1,
    projectileSpeed: 0, mechanic: 'area', splashRadius: 0,
    effectiveness: { rabbit: 1, bird: 1.8, slug: 0.5 }
  },
  spray: {
    key: 'spray', name: 'Spray', cost: 60, range: 82, damage: 1, fireInterval: 0.7,
    projectileSpeed: 240, mechanic: 'splash', splashRadius: 34,
    effectiveness: { rabbit: 1.4, bird: 1, slug: 1 }
  }
};
const DEFENCE_ORDER = ['scarecrow', 'beerTrap', 'netting', 'spray'];
const TRAY_BTN_W = 82, TRAY_BTN_GAP = 4, TRAY_BTN_H = TRAY_H - 16;
const TRAY_ROW_W = DEFENCE_ORDER.length * TRAY_BTN_W + (DEFENCE_ORDER.length - 1) * TRAY_BTN_GAP;
const TRAY_ROW_X = (W - TRAY_ROW_W) / 2;
const TRAY_BUTTONS = {};
DEFENCE_ORDER.forEach((key, i) => {
  TRAY_BUTTONS[key] = {
    x: TRAY_ROW_X + i * (TRAY_BTN_W + TRAY_BTN_GAP), y: H - TRAY_H + 8,
    w: TRAY_BTN_W, h: TRAY_BTN_H
  };
});

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

// --- The path pests walk: an off-screen entry, a winding S-curve through
// the plot, ending at the veg patch (the goal). Everything downstream
// (pest movement, drawing) works purely off this waypoint list, so later
// phases can reshape the route without touching the walking logic. ---
const WAYPOINTS = [
  { x: -20, y: 110 },
  { x: 95, y: 110 },
  { x: 95, y: 230 },
  { x: 275, y: 230 },
  { x: 275, y: 350 },
  { x: 65, y: 350 },
  { x: 65, y: 450 },
  { x: 255, y: 450 }
];
const segLengths = [];
const cumLengths = [0];
for (let i = 0; i < WAYPOINTS.length - 1; i++) {
  const dx = WAYPOINTS[i + 1].x - WAYPOINTS[i].x, dy = WAYPOINTS[i + 1].y - WAYPOINTS[i].y;
  const len = Math.hypot(dx, dy);
  segLengths.push(len);
  cumLengths.push(cumLengths[i] + len);
}
const PATH_TOTAL_LENGTH = cumLengths[cumLengths.length - 1];
const GOAL = WAYPOINTS[WAYPOINTS.length - 1];
const ENTRY = WAYPOINTS[0];

function pointAtDistance(d) {
  if (d >= PATH_TOTAL_LENGTH) return { x: GOAL.x, y: GOAL.y, angle: 0 };
  let i = 0;
  while (i < segLengths.length - 1 && cumLengths[i + 1] <= d) i++;
  const segLen = segLengths[i] || 1;
  const t = (d - cumLengths[i]) / segLen;
  const a = WAYPOINTS[i], b = WAYPOINTS[i + 1];
  return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t, angle: Math.atan2(b.y - a.y, b.x - a.x) };
}

let pests, lives, state, elapsedTime, best, pestId;
let compost, defences, projectiles, popups, fx, kills;
let selectedType, pointerField, denialMarker;
let waveIndex, waveState, countdownTimer, pestsToSpawn, spawnTimer, wavesCleared;

// --- Audio: generated on the fly with the Web Audio API, no external files ---
let audioCtx = null;
let muted = sessionStorage.getItem('plotDefenderMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playSpawn() { tone(340, 0.06, 'triangle', 0.06); }
function playLifeLost() { tone(220, 0.14, 'sawtooth', 0.13); tone(150, 0.18, 'sawtooth', 0.1, 0.06); }
function playGameOver() { tone(200, 0.2, 'sawtooth', 0.14); tone(140, 0.26, 'sawtooth', 0.11, 0.1); tone(95, 0.34, 'sawtooth', 0.1, 0.22); }
function playShoot() { tone(900, 0.04, 'square', 0.05); }
function playPulse() { tone(500, 0.1, 'sine', 0.07); tone(650, 0.12, 'sine', 0.05, 0.04); }
function playSplash() { tone(380, 0.08, 'sawtooth', 0.06); }
function playKill() { tone(700, 0.07, 'triangle', 0.1); tone(1000, 0.08, 'triangle', 0.08, 0.04); }
function playPlace() { tone(300, 0.05, 'square', 0.09); tone(450, 0.06, 'square', 0.07, 0.04); }
function playDenied() { tone(160, 0.1, 'square', 0.08); }
function playWaveStart() { tone(520, 0.08, 'triangle', 0.1); tone(700, 0.09, 'triangle', 0.09, 0.06); }
function playWaveCleared() { tone(660, 0.09, 'triangle', 0.12); tone(880, 0.1, 'triangle', 0.11, 0.07); tone(1100, 0.14, 'triangle', 0.1, 0.16); }
function playWin() { tone(660, 0.12, 'triangle', 0.13); tone(880, 0.14, 'triangle', 0.12, 0.09); tone(1100, 0.16, 'triangle', 0.11, 0.19); tone(1320, 0.22, 'triangle', 0.1, 0.32); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('plotDefenderMuted', muted ? '1' : '0');
  updateMuteBtn();
});

// "Best" now tracks best score (kills + waves + lives bonus) rather than
// survival time, now that phase 3 has a real scoring formula.
function loadBest() { return parseInt(sessionStorage.getItem('plotDefenderBest') || '0', 10); }
function saveBest(v) { try { sessionStorage.setItem('plotDefenderBest', v); } catch (e) {} }

function clampNum(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function currentScore() { return kills * SCORE_PER_KILL + wavesCleared * SCORE_PER_WAVE + lives * SCORE_PER_LIFE; }

function spawnPest(wave) {
  const type = pickPestType(wave.mix);
  const t = PEST_TYPES[type];
  const hp = Math.max(1, Math.round(PEST_MAX_HP * wave.hpMult * t.hpMult));
  pests.push({
    id: pestId++, dist: 0, type,
    speed: PEST_BASE_SPEED * wave.speedMult * t.speedMult * (0.9 + Math.random() * 0.25),
    hp, maxHp: hp,
    bobPhase: Math.random() * Math.PI * 2
  });
  playSpawn();
}

function addPopup(text, x, y, color) {
  popups.push({ text, x, y, life: 36, color });
}

// --- Placement geometry: defences must sit near the path (a real choke
// point) but not on top of it, and not stacked on each other. ---
function distToSegment(px, py, ax, ay, bx, by) {
  const abx = bx - ax, aby = by - ay;
  const t = clampNum(((px - ax) * abx + (py - ay) * aby) / ((abx * abx + aby * aby) || 1), 0, 1);
  const cx = ax + abx * t, cy = ay + aby * t;
  return Math.hypot(px - cx, py - cy);
}
function distanceToPath(x, y) {
  let min = Infinity;
  for (let i = 0; i < WAYPOINTS.length - 1; i++) {
    const a = WAYPOINTS[i], b = WAYPOINTS[i + 1];
    min = Math.min(min, distToSegment(x, y, a.x, a.y, b.x, b.y));
  }
  return min;
}
function isValidPlacement(x, y) {
  if (x < 14 || x > W - 14 || y < HUD_H + 14 || y > FIELD_BOTTOM - 14) return false;
  const dPath = distanceToPath(x, y);
  if (dPath < MIN_BUILD_DIST_FROM_PATH || dPath > MAX_BUILD_DIST_FROM_PATH) return false;
  for (const d of defences) {
    if (Math.hypot(d.x - x, d.y - y) < MIN_DEFENCE_SPACING) return false;
  }
  return true;
}

function pointInRect(x, y, r) { return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
function canvasPointFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

function trayButtonAt(x, y) {
  for (const key of DEFENCE_ORDER) {
    if (pointInRect(x, y, TRAY_BUTTONS[key])) return key;
  }
  return null;
}

canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing') return;
  const pt = canvasPointFromEvent(e);
  const tapped = trayButtonAt(pt.x, pt.y);
  if (tapped) {
    selectedType = selectedType === tapped ? null : tapped;
    return;
  }
  if (!selectedType) return;
  const def = DEFENCE_TYPES[selectedType];
  if (compost < def.cost || !isValidPlacement(pt.x, pt.y)) {
    playDenied();
    denialMarker = { x: pt.x, y: pt.y, timer: 0.35 };
    return;
  }
  defences.push({
    x: pt.x, y: pt.y, type: selectedType,
    range: def.range, damage: def.damage, fireInterval: def.fireInterval, projectileSpeed: def.projectileSpeed,
    mechanic: def.mechanic, splashRadius: def.splashRadius, effectiveness: def.effectiveness,
    cooldown: 0.15
  });
  compost -= def.cost;
  playPlace();
});
canvas.addEventListener('pointermove', (e) => {
  pointerField = (state === 'playing' && selectedType) ? canvasPointFromEvent(e) : null;
});
canvas.addEventListener('pointerleave', () => { pointerField = null; });

function resetRunState() {
  pests = [];
  lives = START_LIVES;
  elapsedTime = 0;
  pestId = 1;
  compost = COMPOST_START;
  defences = [];
  projectiles = [];
  popups = [];
  fx = [];
  kills = 0;
  wavesCleared = 0;
  selectedType = null;
  pointerField = null;
  denialMarker = null;
  beginWaveCountdown(0);
}

function beginWaveCountdown(index) {
  waveIndex = index;
  waveState = 'countdown';
  countdownTimer = COUNTDOWN_DURATION;
}

function reset() {
  resetRunState();
  state = 'ready';
  title.textContent = 'Plot Defender';
  subtitle.textContent = 'Match each defence to the pest it’s strong against';
  scoreLine.style.display = 'none';
  playBtn.textContent = 'Play';
  backToArcade.style.display = 'none';
  best = loadBest();
  overlay.style.display = 'flex';
}

function startGame() {
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

playBtn.addEventListener('click', () => {
  if (state === 'over') reset();
  startGame();
});

function finishRun(won) {
  state = 'over';
  const score = currentScore();
  if (score > best) { best = score; saveBest(best); }
  if (won) {
    playWin();
    title.textContent = 'Season complete!';
    subtitle.textContent = 'Every wave repelled - the veg patch is safe';
  } else {
    playGameOver();
    title.textContent = 'Plot overrun!';
    subtitle.textContent = 'Wave ' + (waveIndex + 1) + ' / ' + WAVE_COUNT + ' got through';
  }
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score + '   Waves: ' + wavesCleared + '/' + WAVE_COUNT + '   Kills: ' + kills + '   Best: ' + best;
  playBtn.textContent = 'Play Again';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

function update(dt) {
  if (state !== 'playing') return;
  elapsedTime += dt;

  updateWaves(dt);
  if (state !== 'playing') return; // a win can end the run inside updateWaves()

  for (const p of pests) {
    p.dist += p.speed * dt;
  }

  const reached = pests.filter(p => p.dist >= PATH_TOTAL_LENGTH);
  if (reached.length > 0) {
    pests = pests.filter(p => p.dist < PATH_TOTAL_LENGTH);
    lives -= reached.length;
    playLifeLost();
    if (lives <= 0) { lives = 0; finishRun(false); return; }
  }

  updateDefences(dt);
  updateProjectiles(dt);
  updateFx(dt);

  if (denialMarker) {
    denialMarker.timer -= dt;
    if (denialMarker.timer <= 0) denialMarker = null;
  }
  popups = popups.filter(p => { p.life--; p.y -= 0.5; return p.life > 0; });
}

// --- Wave state machine: countdown (prep time to place defences) ->
// spawning (scripted count/pace of pests) -> cleared (brief pause) ->
// next countdown, or a win once wave 10 clears. ---
function updateWaves(dt) {
  if (waveState === 'countdown') {
    countdownTimer -= dt;
    if (countdownTimer <= 0) {
      waveState = 'spawning';
      pestsToSpawn = WAVES[waveIndex].count;
      spawnTimer = 0;
      playWaveStart();
    }
    return;
  }
  if (waveState === 'spawning') {
    spawnTimer -= dt;
    if (spawnTimer <= 0 && pestsToSpawn > 0) {
      spawnPest(WAVES[waveIndex]);
      pestsToSpawn--;
      spawnTimer = WAVES[waveIndex].interval;
    }
    if (pestsToSpawn <= 0 && pests.length === 0) {
      waveState = 'cleared';
      wavesCleared++;
      countdownTimer = WAVE_CLEARED_PAUSE;
      playWaveCleared();
    }
    return;
  }
  if (waveState === 'cleared') {
    countdownTimer -= dt;
    if (countdownTimer <= 0) {
      if (waveIndex + 1 >= WAVE_COUNT) finishRun(true);
      else beginWaveCountdown(waveIndex + 1);
    }
  }
}

function findPestById(id) { return pests.find(p => p.id === id); }

function findNearestPestInRange(x, y, range) {
  let best = null, bestDist = range;
  for (const p of pests) {
    const pos = pointAtDistance(p.dist);
    const d = Math.hypot(pos.x - x, pos.y - y);
    if (d <= bestDist) { bestDist = d; best = p; }
  }
  return best;
}

// Shared by every mechanic (single-target hit, area pulse, splash) so kill
// rewards/removal only happen in one place. Guards against a pest that was
// already removed earlier the same frame by another hit.
function hitPest(pest, damage, hitPos) {
  if (!pests.includes(pest)) return;
  pest.hp -= damage;
  if (pest.hp <= 0) {
    pests.splice(pests.indexOf(pest), 1);
    compost += KILL_REWARD;
    kills++;
    playKill();
    addPopup('+' + KILL_REWARD, hitPos.x, hitPos.y - 10, '#ffd76a');
  }
}

function spawnFx(x, y, maxRadius, color, life) {
  fx.push({ x, y, maxRadius, color, life, age: 0 });
}

function updateDefences(dt) {
  for (const d of defences) {
    d.cooldown -= dt;
    if (d.cooldown > 0) continue;

    if (d.mechanic === 'area') {
      const inRange = pests.filter(p => Math.hypot(pointAtDistance(p.dist).x - d.x, pointAtDistance(p.dist).y - d.y) <= d.range);
      if (inRange.length === 0) { d.cooldown = 0.1; continue; }
      for (const p of inRange) hitPest(p, d.damage * (d.effectiveness[p.type] || 1), pointAtDistance(p.dist));
      spawnFx(d.x, d.y, d.range, 'rgba(143,211,232,0.5)', 0.35);
      d.cooldown = d.fireInterval;
      playPulse();
      continue;
    }

    const target = findNearestPestInRange(d.x, d.y, d.range);
    if (target) {
      projectiles.push({
        x: d.x, y: d.y, targetId: target.id, speed: d.projectileSpeed, damage: d.damage,
        mechanic: d.mechanic, splashRadius: d.splashRadius, effectiveness: d.effectiveness
      });
      d.cooldown = d.fireInterval;
      playShoot();
    } else {
      d.cooldown = 0.1; // no target yet - recheck shortly rather than every frame
    }
  }
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const pr = projectiles[i];
    const target = findPestById(pr.targetId);
    if (!target) { projectiles.splice(i, 1); continue; }
    const pos = pointAtDistance(target.dist);
    const dx = pos.x - pr.x, dy = pos.y - pr.y;
    const dist = Math.hypot(dx, dy);
    if (dist < HIT_RADIUS) {
      const splashTargets = (pr.mechanic === 'splash' && pr.splashRadius > 0)
        ? pests.filter(p => p !== target && Math.hypot(pointAtDistance(p.dist).x - pos.x, pointAtDistance(p.dist).y - pos.y) <= pr.splashRadius)
        : [];
      hitPest(target, pr.damage * (pr.effectiveness[target.type] || 1), pos);
      for (const other of splashTargets) {
        hitPest(other, pr.damage * (pr.effectiveness[other.type] || 1) * SPLASH_FALLOFF, pos);
      }
      if (pr.mechanic === 'splash') { spawnFx(pos.x, pos.y, pr.splashRadius, 'rgba(224,138,74,0.55)', 0.3); playSplash(); }
      projectiles.splice(i, 1);
      continue;
    }
    const step = pr.speed * dt;
    pr.x += (dx / dist) * step;
    pr.y += (dy / dist) * step;
  }
}

function updateFx(dt) {
  for (const f of fx) f.age += dt;
  fx = fx.filter(f => f.age < f.life);
}

function drawBg() {
  const g = ctx.createLinearGradient(0, HUD_H, 0, H);
  g.addColorStop(0, '#5a6f45');
  g.addColorStop(1, '#3d4c2c');
  ctx.fillStyle = g;
  ctx.fillRect(0, HUD_H, W, H - HUD_H);

  // Furrowed soil rows, same texture language as the other allotment games.
  ctx.strokeStyle = 'rgba(0,0,0,0.10)';
  ctx.lineWidth = 1;
  for (let y = HUD_H + 14; y < H; y += 20) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

function drawPath() {
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#6b4c2c';
  ctx.lineWidth = PATH_WIDTH;
  ctx.beginPath();
  ctx.moveTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
  for (let i = 1; i < WAYPOINTS.length; i++) ctx.lineTo(WAYPOINTS[i].x, WAYPOINTS[i].y);
  ctx.stroke();

  ctx.strokeStyle = '#8a6438';
  ctx.lineWidth = PATH_WIDTH - 8;
  ctx.stroke();

  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 10]);
  ctx.beginPath();
  ctx.moveTo(WAYPOINTS[0].x, WAYPOINTS[0].y);
  for (let i = 1; i < WAYPOINTS.length; i++) ctx.lineTo(WAYPOINTS[i].x, WAYPOINTS[i].y);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawEntry() {
  ctx.fillStyle = '#241a10';
  ctx.beginPath();
  ctx.ellipse(ENTRY.x + 18, ENTRY.y, 14, PATH_WIDTH / 2 - 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#4a3320';
  ctx.lineWidth = 3;
  ctx.stroke();
}

function drawGoal() {
  const gx = GOAL.x, gy = GOAL.y;
  ctx.fillStyle = '#7a5a34';
  ctx.beginPath();
  ctx.roundRect(gx - 44, gy - 26, 88, 40, 6);
  ctx.fill();
  ctx.strokeStyle = '#4a3320';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#3d2b18';
  ctx.beginPath();
  ctx.roundRect(gx - 38, gy - 20, 76, 30, 4);
  ctx.fill();

  const leaves = [
    { x: gx - 22, y: gy - 12 }, { x: gx, y: gy - 16 }, { x: gx + 22, y: gy - 12 },
    { x: gx - 10, y: gy - 2 }, { x: gx + 12, y: gy - 2 }
  ];
  for (const l of leaves) {
    ctx.fillStyle = '#6fa83e';
    ctx.beginPath();
    ctx.ellipse(l.x, l.y, 9, 12, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4d7a24';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
}

function drawRabbit(bob) {
  ctx.fillStyle = '#a67c52';
  ctx.beginPath();
  ctx.ellipse(0, bob, 9, 6.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#6e4f30';
  ctx.lineWidth = 1.3;
  ctx.stroke();
  ctx.fillStyle = '#a67c52';
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.ellipse(-4, bob - 8, 2.2, 7, 0.15 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#e8c9a8';
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.ellipse(-4 + s * 2, bob - 8, 1, 5, 0.15 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#f2e6d8';
  ctx.beginPath();
  ctx.ellipse(9, bob + 1, 2.4, 2.4, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawBird(bob) {
  ctx.fillStyle = '#6a8fae';
  ctx.beginPath();
  ctx.ellipse(0, bob, 7.5, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#3f5c73';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  const wingFlap = Math.sin(elapsedTime * 18) * 4;
  ctx.fillStyle = '#4f7392';
  ctx.beginPath();
  ctx.moveTo(-2, bob - 2);
  ctx.lineTo(-10, bob - 6 - wingFlap);
  ctx.lineTo(-4, bob + 3);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-2, bob + 2);
  ctx.lineTo(-10, bob + 6 + wingFlap);
  ctx.lineTo(-4, bob - 3);
  ctx.fill();
  ctx.fillStyle = '#e8a23c';
  ctx.beginPath();
  ctx.moveTo(7, bob - 1); ctx.lineTo(13, bob); ctx.lineTo(7, bob + 1.5);
  ctx.fill();
}

function drawSlug(bob) {
  ctx.fillStyle = '#a85c3c';
  ctx.beginPath();
  ctx.ellipse(0, bob + 2, 11, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#6e3620';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-1, bob, 6, 1.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#6e3620';
  ctx.lineWidth = 1.3;
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(8, bob + s * 1);
    ctx.lineTo(12, bob - 5 + s * 1);
    ctx.stroke();
    ctx.fillStyle = '#6e3620';
    ctx.beginPath();
    ctx.arc(12, bob - 5 + s * 1, 1.3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPest(p) {
  const pos = pointAtDistance(p.dist);
  const bob = Math.sin(elapsedTime * 8 + p.bobPhase) * 1.4;
  ctx.save();
  ctx.translate(pos.x, pos.y);
  ctx.rotate(pos.angle);
  if (p.type === 'bird') drawBird(bob);
  else if (p.type === 'slug') drawSlug(bob * 0.4);
  else drawRabbit(bob);
  ctx.restore();

  if (p.hp < p.maxHp) {
    const barW = 18;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(pos.x - barW / 2, pos.y - 16, barW, 3);
    ctx.fillStyle = '#e6543b';
    ctx.fillRect(pos.x - barW / 2, pos.y - 16, barW * clampNum(p.hp / p.maxHp, 0, 1), 3);
  }
}

function drawScarecrowIcon(size) {
  ctx.strokeStyle = '#5a3a1e';
  ctx.lineWidth = size * 0.16;
  ctx.beginPath();
  ctx.moveTo(0, -size); ctx.lineTo(0, size * 0.6);
  ctx.moveTo(-size * 0.7, -size * 0.35); ctx.lineTo(size * 0.7, -size * 0.35);
  ctx.stroke();
  ctx.fillStyle = '#e8b96b';
  ctx.beginPath();
  ctx.arc(0, -size * 1.15, size * 0.42, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#7a5a34';
  ctx.beginPath();
  ctx.ellipse(0, -size * 1.35, size * 0.55, size * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawBeerTrapIcon(size) {
  ctx.fillStyle = '#c9853a';
  ctx.beginPath();
  ctx.roundRect(-size * 0.5, -size * 0.9, size, size * 1.5, size * 0.15);
  ctx.fill();
  ctx.strokeStyle = '#7a5a1e';
  ctx.lineWidth = size * 0.1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,224,140,0.8)';
  ctx.beginPath();
  ctx.roundRect(-size * 0.5, -size * 0.55, size, size * 0.5, 0);
  ctx.fill();
  ctx.strokeStyle = '#7a5a1e';
  ctx.beginPath();
  ctx.moveTo(size * 0.5, -size * 0.4); ctx.lineTo(size * 0.85, -size * 0.4);
  ctx.lineTo(size * 0.85, size * 0.1); ctx.lineTo(size * 0.5, size * 0.1);
  ctx.stroke();
}

function drawNettingIcon(size) {
  ctx.strokeStyle = '#3f5c73';
  ctx.lineWidth = size * 0.1;
  ctx.strokeRect(-size * 0.7, -size * 1.2, size * 1.4, size * 1.4);
  for (let i = 1; i < 4; i++) {
    const gx = -size * 0.7 + (size * 1.4 / 4) * i;
    ctx.beginPath(); ctx.moveTo(gx, -size * 1.2); ctx.lineTo(gx, size * 0.2); ctx.stroke();
    const gy = -size * 1.2 + (size * 1.4 / 4) * i;
    ctx.beginPath(); ctx.moveTo(-size * 0.7, gy); ctx.lineTo(size * 0.7, gy); ctx.stroke();
  }
}

function drawSprayIcon(size) {
  ctx.fillStyle = '#4a8a5a';
  ctx.beginPath();
  ctx.roundRect(-size * 0.35, -size * 0.5, size * 0.7, size * 1.1, size * 0.12);
  ctx.fill();
  ctx.fillStyle = '#2f5c3a';
  ctx.fillRect(-size * 0.18, -size * 0.9, size * 0.36, size * 0.45);
  ctx.strokeStyle = '#1f3d26';
  ctx.lineWidth = size * 0.08;
  ctx.beginPath();
  ctx.moveTo(size * 0.18, -size * 0.75); ctx.lineTo(size * 0.55, -size * 0.95);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(143,211,232,0.85)';
  ctx.lineWidth = size * 0.06;
  for (const a of [-0.5, 0, 0.5]) {
    ctx.beginPath();
    ctx.moveTo(size * 0.6, -size * 1.0);
    ctx.lineTo(size * 0.6 + Math.cos(a) * size * 0.4, -size * 1.0 + Math.sin(a) * size * 0.4 - size * 0.15);
    ctx.stroke();
  }
}

function drawDefenceIcon(type, cx, cy, size) {
  ctx.save();
  ctx.translate(cx, cy);
  if (type === 'beerTrap') drawBeerTrapIcon(size);
  else if (type === 'netting') drawNettingIcon(size);
  else if (type === 'spray') drawSprayIcon(size);
  else drawScarecrowIcon(size);
  ctx.restore();
}

// --- Every defence draws a permanently faint range ring (so coverage is
// readable at a glance without tapping anything), plus a stronger one for
// whichever ring is currently under the placement cursor/finger. ---
function drawDefences() {
  for (const d of defences) {
    ctx.fillStyle = 'rgba(255,255,255,0.055)';
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.range, 0, Math.PI * 2);
    ctx.fill();
    drawDefenceIcon(d.type, d.x, d.y + DEFENCE_RADIUS * 0.6, DEFENCE_RADIUS);
  }
}

function drawProjectiles() {
  ctx.fillStyle = '#f2e6c8';
  for (const pr of projectiles) {
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFx() {
  for (const f of fx) {
    const t = f.age / f.life;
    ctx.globalAlpha = 1 - t;
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.maxRadius * t, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawPlacementPreview() {
  if (!selectedType || !pointerField) return;
  const def = DEFENCE_TYPES[selectedType];
  const valid = compost >= def.cost && isValidPlacement(pointerField.x, pointerField.y);
  ctx.fillStyle = valid ? 'rgba(124,179,66,0.18)' : 'rgba(230,84,59,0.16)';
  ctx.beginPath();
  ctx.arc(pointerField.x, pointerField.y, def.range, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = valid ? 'rgba(168,216,106,0.7)' : 'rgba(230,84,59,0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(pointerField.x, pointerField.y, DEFENCE_RADIUS, 0, Math.PI * 2);
  ctx.stroke();
}

function drawDenialMarker() {
  if (!denialMarker) return;
  const a = clampNum(denialMarker.timer / 0.35, 0, 1);
  ctx.strokeStyle = 'rgba(230,84,59,' + (a * 0.9).toFixed(2) + ')';
  ctx.lineWidth = 3;
  const r = 14 + (1 - a) * 8;
  ctx.beginPath();
  ctx.moveTo(denialMarker.x - r, denialMarker.y - r);
  ctx.lineTo(denialMarker.x + r, denialMarker.y + r);
  ctx.moveTo(denialMarker.x + r, denialMarker.y - r);
  ctx.lineTo(denialMarker.x - r, denialMarker.y + r);
  ctx.stroke();
}

// Pill-backed popups so "+compost" text stays readable over the busy
// field, same fix applied to Crate Stack's in-play text.
function drawPopups() {
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  for (const p of popups) {
    const w = ctx.measureText(p.text).width;
    ctx.globalAlpha = clampNum(p.life / 36, 0, 1);
    ctx.fillStyle = 'rgba(20,14,8,0.7)';
    ctx.beginPath();
    ctx.roundRect(p.x - w / 2 - 8, p.y - 13, w + 16, 19, 9);
    ctx.fill();
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y + 1);
  }
  ctx.globalAlpha = 1;
}

function drawTray() {
  const trayY = H - TRAY_H;
  ctx.fillStyle = '#2a1f14';
  ctx.fillRect(0, trayY, W, TRAY_H);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(0, trayY, W, 3);

  for (const key of DEFENCE_ORDER) {
    const def = DEFENCE_TYPES[key];
    const r = TRAY_BUTTONS[key];
    const affordable = compost >= def.cost;
    const selected = selectedType === key;

    ctx.fillStyle = selected ? 'rgba(124,179,66,0.35)' : 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.roundRect(r.x, r.y, r.w, r.h, 9);
    ctx.fill();
    ctx.strokeStyle = selected ? '#a8d86a' : 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();

    drawDefenceIcon(key, r.x + r.w / 2, r.y + 15, 9);

    ctx.textAlign = 'center';
    ctx.font = 'bold 9.5px Arial';
    ctx.fillStyle = affordable ? '#eaf5d8' : 'rgba(234,245,216,0.4)';
    ctx.fillText(def.name, r.x + r.w / 2, r.y + 30);
    ctx.font = 'bold 9px Arial';
    ctx.fillStyle = affordable ? '#ffd76a' : 'rgba(255,215,106,0.4)';
    ctx.fillText(def.cost + ' 🌾', r.x + r.w / 2, r.y + 41);
  }
}

function drawHud() {
  ctx.fillStyle = '#233a12';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(0, HUD_H - 3, W, 3);

  ctx.font = 'bold 17px Arial';
  ctx.fillStyle = '#eaf5d8';
  ctx.textAlign = 'left';
  ctx.fillText('Lives: ' + lives, 14, 24);
  ctx.font = 'bold 11px Arial';
  ctx.fillStyle = 'rgba(234,245,216,0.75)';
  ctx.fillText('Kills: ' + kills, 14, 44);

  ctx.font = 'bold 17px Arial';
  ctx.fillStyle = '#ffd76a';
  ctx.textAlign = 'right';
  ctx.fillText(compost + ' 🌾', W - 14, 24);
  ctx.font = 'bold 11px Arial';
  ctx.fillStyle = 'rgba(234,245,216,0.75)';
  ctx.fillText('Wave ' + (waveIndex + 1) + ' / ' + WAVE_COUNT, W - 14, 44);
}

// A non-blocking banner (place/adjust defences underneath it are still
// tappable) for the countdown before a wave and the pause after clearing
// one - pill-backed for the same reason every other in-play text here is.
function drawWaveBanner() {
  let text = null;
  if (waveState === 'countdown') {
    text = 'Wave ' + (waveIndex + 1) + ' / ' + WAVE_COUNT + ' - starting in ' + Math.ceil(countdownTimer) + 's';
  } else if (waveState === 'cleared') {
    text = 'Wave ' + (waveIndex + 1) + ' cleared!';
  }
  if (!text) return;
  ctx.font = 'bold 15px Arial';
  ctx.textAlign = 'center';
  const w = ctx.measureText(text).width;
  const cx = W / 2, cy = HUD_H + 30;
  ctx.fillStyle = 'rgba(20,14,8,0.72)';
  ctx.beginPath();
  ctx.roundRect(cx - w / 2 - 14, cy - 15, w + 28, 28, 14);
  ctx.fill();
  ctx.fillStyle = waveState === 'cleared' ? '#a8d86a' : '#eaf5d8';
  ctx.fillText(text, cx, cy + 5);
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);

  update(dt);

  drawBg();
  drawPath();
  drawEntry();
  drawGoal();
  drawDefences();
  for (const p of pests) drawPest(p);
  drawProjectiles();
  drawFx();
  drawPlacementPreview();
  drawDenialMarker();
  drawPopups();
  drawWaveBanner();
  drawTray();
  drawHud();

  requestAnimationFrame(loop);
}

reset();
requestAnimationFrame(loop);
</script>
