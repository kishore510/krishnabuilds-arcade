<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Garden Snake</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #2b1e12;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #4a3420;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
  }
  #overlay h1 { margin: 0 0 8px; font-size: calc(30px * var(--game-scale, 1)); }
  #overlay p { margin: 4px 0; font-size: calc(15px * var(--game-scale, 1)); opacity: 0.9; }
  #diffButtons {
    display: flex;
    gap: calc(14px * var(--game-scale, 1));
    margin-top: calc(18px * var(--game-scale, 1));
    pointer-events: auto;
  }
  #diffButtons button {
    font-family: inherit;
    font-size: calc(15px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(22px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  #diffButtons button:active { background: rgba(255,255,255,0.3); }
  #diffButtons button.selected {
    background: #7cb342;
    border-color: #7cb342;
    color: #12200a;
  }
  #backToArcade {
    display: none;
    margin-top: calc(18px * var(--game-scale, 1));
    font-size: calc(14px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Garden Snake</h1>
    <p id="subtitle">Swipe, arrow keys, or WASD to steer the caterpillar</p>
    <p id="scoreLine" style="display:none;"></p>
    <div id="diffButtons">
      <button id="easyBtn" type="button" data-kb-play>Easy</button>
      <button id="hardBtn" type="button" data-kb-play>Hard</button>
    </div>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const easyBtn = document.getElementById('easyBtn');
const hardBtn = document.getElementById('hardBtn');
const diffButtons = document.getElementById('diffButtons');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;
const CELL = 20;
const COLS = W / CELL;               // 18
const HUD_H = 40;
const ROWS = (H - HUD_H) / CELL;     // 25
const LEAF_SCORE = 10;
const GROW_ANIM_DURATION = 0.22;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

// --- Step interval shrinks with length (the caterpillar speeds up as it eats)
// but is always clamped to a floor, same "ramp with a hard cap" rule every
// other reflex game in this arcade follows so a long run never becomes
// physically unreactable. ---
const DIFFICULTY_PRESETS = {
  easy: { baseInterval: 0.150, minInterval: 0.075, shrinkPerSeg: 0.003 },
  hard: { baseInterval: 0.115, minInterval: 0.058, shrinkPerSeg: 0.003 }
};

let difficulty = 'easy';
let preset = DIFFICULTY_PRESETS.easy;
let segments, prevSegments, dir, queuedDir;
let leaf, score, best, state, stepAcc, stepInterval;
let tailGrowTimer, popups, elapsedTime;

// --- Audio: generated on the fly with the Web Audio API, no external files ---
let audioCtx = null;
let muted = sessionStorage.getItem('gardenSnakeMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playChomp() { tone(520, 0.07, 'square', 0.13); tone(700, 0.06, 'square', 0.09, 0.04); }
function playGameOver() { tone(220, 0.18, 'sawtooth', 0.14); tone(160, 0.22, 'sawtooth', 0.12, 0.1); tone(110, 0.3, 'sawtooth', 0.1, 0.22); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('gardenSnakeMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest(diff) { return parseInt(sessionStorage.getItem('gardenSnakeBest_' + diff) || '0', 10); }
function saveBest(diff, v) { try { sessionStorage.setItem('gardenSnakeBest_' + diff, v); } catch (e) {} }

function clampNum(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

function cellX(x) { return x * CELL + CELL / 2; }
function cellY(y) { return HUD_H + y * CELL + CELL / 2; }

function addPopup(text, x, y, color) {
  popups.push({ text, x, y, life: 36, color });
}

function occupiedByBody(x, y, list) {
  return list.some(s => s.x === x && s.y === y);
}

function spawnLeaf() {
  let x, y, tries = 0;
  do {
    x = Math.floor(Math.random() * COLS);
    y = Math.floor(Math.random() * ROWS);
    tries++;
  } while (occupiedByBody(x, y, segments) && tries < 200);
  leaf = { x, y, pulse: Math.random() * Math.PI * 2 };
}

function resetRunState() {
  const startY = Math.floor(ROWS / 2);
  segments = [{ x: 4, y: startY }, { x: 3, y: startY }, { x: 2, y: startY }];
  prevSegments = segments.map(s => ({ x: s.x, y: s.y }));
  dir = { x: 1, y: 0 };
  queuedDir = { x: 1, y: 0 };
  score = 0;
  stepAcc = 0;
  stepInterval = preset.baseInterval;
  tailGrowTimer = 0;
  popups = [];
  elapsedTime = 0;
  spawnLeaf();
}

function reset() {
  preset = DIFFICULTY_PRESETS[difficulty];
  resetRunState();
  state = 'ready';
  title.textContent = 'Garden Snake';
  subtitle.textContent = 'Swipe, arrow keys, or WASD to steer the caterpillar';
  scoreLine.style.display = 'none';
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'none';
  best = loadBest(difficulty);
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function updateDiffButtonStyles() {
  easyBtn.classList.toggle('selected', difficulty === 'easy');
  hardBtn.classList.toggle('selected', difficulty === 'hard');
}

function startGame(diff) {
  difficulty = diff;
  preset = DIFFICULTY_PRESETS[diff];
  best = loadBest(difficulty);
  resetRunState();
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

function setDir(x, y) {
  if (state !== 'playing') return;
  // Reject a direct 180 against the caterpillar's actual current heading
  // (not just the last queued key) so a fast double-tap can't reverse into
  // its own neck.
  if (dir.x === -x && dir.y === -y) return;
  queuedDir = { x, y };
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); setDir(0, -1); }
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); setDir(0, 1); }
  else if (e.code === 'ArrowLeft' || e.code === 'KeyA') { e.preventDefault(); setDir(-1, 0); }
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') { e.preventDefault(); setDir(1, 0); }
});

let touchStart = null;
canvas.addEventListener('pointerdown', (e) => { touchStart = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('pointerup', (e) => {
  if (!touchStart) return;
  const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
  touchStart = null;
  const SWIPE_THRESHOLD = 18;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < SWIPE_THRESHOLD) return;
  if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
  else setDir(0, dy > 0 ? 1 : -1);
});

function endGame() {
  state = 'over';
  playGameOver();
  if (score > best) { best = score; saveBest(difficulty, best); }
  title.textContent = 'Munched itself!';
  subtitle.textContent = 'Choose a mode to try again';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score + '   Best (' + (difficulty === 'easy' ? 'Easy' : 'Hard') + '): ' + best;
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'inline-block';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

easyBtn.addEventListener('click', () => startGame('easy'));
hardBtn.addEventListener('click', () => startGame('hard'));

function step() {
  const oldSegments = segments;
  const oldLength = oldSegments.length;
  dir = queuedDir;

  const newHead = { x: oldSegments[0].x + dir.x, y: oldSegments[0].y + dir.y };

  if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
    endGame();
    return;
  }

  const grow = newHead.x === leaf.x && newHead.y === leaf.y;
  // The tail cell vacates this step unless we're growing into it, so it's
  // safe to move onto - excluding it from the collision check is what lets
  // the caterpillar "chase its own tail" instead of the wall being the only
  // way to lose.
  const collideBody = grow ? oldSegments : oldSegments.slice(0, -1);
  if (occupiedByBody(newHead.x, newHead.y, collideBody)) {
    endGame();
    return;
  }

  let newSegments;
  if (grow) {
    newSegments = [newHead, ...oldSegments];
    score += LEAF_SCORE;
    tailGrowTimer = GROW_ANIM_DURATION;
    addPopup('+' + LEAF_SCORE, cellX(leaf.x), cellY(leaf.y) - 6, '#c7e878');
    playChomp();
    spawnLeaf();
    stepInterval = clampNum(preset.baseInterval - newSegments.length * preset.shrinkPerSeg, preset.minInterval, preset.baseInterval);
  } else {
    newSegments = [newHead, ...oldSegments.slice(0, oldLength - 1)];
  }

  // Every new segment's pre-step position is simply where it (or, for a
  // freshly grown tail, its donor cell) sat last frame - min() below reuses
  // the same old-array entry for the newly grown segment so it "appears" in
  // place rather than jumping in from nowhere, which is what makes the grow
  // animation read as organic instead of glitchy.
  prevSegments = newSegments.map((s, i) => oldSegments[Math.min(i, oldLength - 1)]);
  segments = newSegments;
}

function update(dt) {
  if (state !== 'playing') { popups = popups.filter(p => { p.life--; p.y -= 0.5; return p.life > 0; }); return; }
  elapsedTime += dt;
  stepAcc += dt;
  while (stepAcc >= stepInterval && state === 'playing') {
    stepAcc -= stepInterval;
    step();
  }
  tailGrowTimer = Math.max(0, tailGrowTimer - dt);
  leaf.pulse += dt * 4;
  popups = popups.filter(p => { p.life--; p.y -= 0.5; return p.life > 0; });
}

function drawBg() {
  const g = ctx.createLinearGradient(0, HUD_H, 0, H);
  g.addColorStop(0, '#5a4028');
  g.addColorStop(1, '#3d2b18');
  ctx.fillStyle = g;
  ctx.fillRect(0, HUD_H, W, H - HUD_H);

  // Furrowed soil rows, allotment-bed style.
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 1;
  for (let y = 0; y < ROWS; y += 2) {
    ctx.beginPath();
    ctx.moveTo(0, cellY(y) - CELL / 2 + 1);
    ctx.lineTo(W, cellY(y) - CELL / 2 + 1);
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for (let y = 1; y < ROWS; y += 2) {
    ctx.beginPath();
    ctx.moveTo(0, cellY(y) - CELL / 2 + 1);
    ctx.lineTo(W, cellY(y) - CELL / 2 + 1);
    ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 3;
  ctx.strokeRect(2, HUD_H + 2, W - 4, H - HUD_H - 4);
}

function drawLeaf() {
  const x = cellX(leaf.x), y = cellY(leaf.y);
  const s = 1 + Math.sin(leaf.pulse) * 0.08;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.fillStyle = 'rgba(140,220,90,0.25)';
  ctx.beginPath();
  ctx.arc(0, 0, 11, 0, Math.PI * 2);
  ctx.fill();
  ctx.rotate(-0.5);
  ctx.fillStyle = '#79c24a';
  ctx.beginPath();
  ctx.moveTo(0, -8);
  ctx.quadraticCurveTo(9, -6, 0, 8);
  ctx.quadraticCurveTo(-9, -6, 0, -8);
  ctx.fill();
  ctx.strokeStyle = '#4d8a2c';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(0, -7);
  ctx.lineTo(0, 7);
  ctx.stroke();
  ctx.restore();
}

const BODY_COLOR_A = '#7cb342';
const BODY_COLOR_B = '#8fca55';
function drawCaterpillar(t) {
  const points = segments.map((s, i) => {
    const p = prevSegments[i];
    return { x: lerp(p.x, s.x, t), y: lerp(p.y, s.y, t) };
  });

  for (let i = points.length - 1; i >= 0; i--) {
    const gx = cellX(points[i].x), gy = cellY(points[i].y);
    let radius = CELL * 0.42;
    if (i === points.length - 1 && tailGrowTimer > 0) {
      radius *= 1 - (tailGrowTimer / GROW_ANIM_DURATION) * 0.7;
    }
    ctx.fillStyle = i % 2 === 0 ? BODY_COLOR_A : BODY_COLOR_B;
    ctx.beginPath();
    ctx.arc(gx, gy, radius, 0, Math.PI * 2);
    ctx.fill();
    if (i > 0) {
      ctx.strokeStyle = 'rgba(30,60,10,0.25)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Head detail: eyes + antennae oriented with current heading.
  const head = points[0];
  const hx = cellX(head.x), hy = cellY(head.y);
  const ang = Math.atan2(dir.y, dir.x);
  ctx.save();
  ctx.translate(hx, hy);
  ctx.rotate(ang);
  const blink = state === 'over' && Math.floor(elapsedTime * 8) % 2 === 0;
  ctx.strokeStyle = '#3d6b1f';
  ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(-2, -6); ctx.quadraticCurveTo(-8, -12, -10, -16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2, -6); ctx.quadraticCurveTo(8, -12, 10, -16); ctx.stroke();
  ctx.fillStyle = '#3d6b1f';
  ctx.beginPath(); ctx.arc(-10, -16, 1.8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, -16, 1.8, 0, Math.PI * 2); ctx.fill();
  if (!blink) {
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(-4, -3, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -3, 3.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(-3.4, -3, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4.6, -3, 1.5, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-7, -3); ctx.lineTo(-1, -3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1, -3); ctx.lineTo(7, -3); ctx.stroke();
  }
  ctx.restore();
}

function drawPopups() {
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  for (const p of popups) {
    ctx.globalAlpha = clampNum(p.life / 36, 0, 1);
    ctx.fillStyle = p.color;
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function drawHud() {
  ctx.fillStyle = '#233a12';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(0, HUD_H - 3, W, 3);

  ctx.font = 'bold 18px Arial';
  ctx.fillStyle = '#eaf5d8';
  ctx.textAlign = 'left';
  ctx.fillText('Score: ' + score, 12, 26);

  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'right';
  ctx.fillStyle = 'rgba(234,245,216,0.75)';
  ctx.fillText('Best: ' + best, W - 12, 25);
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);

  update(dt);

  const t = stepInterval > 0 ? clampNum(stepAcc / stepInterval, 0, 1) : 0;

  drawBg();
  drawLeaf();
  drawCaterpillar(t);
  drawPopups();
  drawHud();

  requestAnimationFrame(loop);
}

reset();
requestAnimationFrame(loop);
</script>
<script src="../../assets/version.js"></script>
<script src="../../assets/game-embed.js" data-coffee-url="https://buymeacoffee.com/Krishnabuilds"></script>
</body>
</html>
