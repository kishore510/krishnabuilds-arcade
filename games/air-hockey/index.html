<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Air Hockey</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #06111c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #0b2233;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
  }
  #overlay h1 { margin: 0 0 8px; font-size: calc(30px * var(--game-scale, 1)); }
  #overlay p { margin: 4px 0; font-size: calc(15px * var(--game-scale, 1)); opacity: 0.9; }
  #statLine { font-size: calc(13px * var(--game-scale, 1)); opacity: 0.75; }
  #diffButtons {
    display: flex;
    gap: calc(14px * var(--game-scale, 1));
    margin-top: calc(18px * var(--game-scale, 1));
    pointer-events: auto;
  }
  #diffButtons button {
    font-family: inherit;
    font-size: calc(15px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(22px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  #diffButtons button:active { background: rgba(255,255,255,0.3); }
  #diffButtons button.selected {
    background: #ffb703;
    border-color: #ffb703;
    color: #04121c;
  }
  #backToArcade {
    display: none;
    margin-top: calc(18px * var(--game-scale, 1));
    font-size: calc(14px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Air Hockey</h1>
    <p id="subtitle">Choose a mode to start</p>
    <p id="statLine">Wins: 0</p>
    <div id="diffButtons">
      <button id="easyBtn" type="button">Easy</button>
      <button id="hardBtn" type="button">Hard</button>
    </div>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const statLine = document.getElementById('statLine');
const easyBtn = document.getElementById('easyBtn');
const hardBtn = document.getElementById('hardBtn');
const diffButtons = document.getElementById('diffButtons');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;
const CENTER_Y = H / 2;
const WALL = 12;
const R_MALLET = 24;
const R_PUCK = 11;
const GOAL_WIDTH = 116;
const GOAL_LEFT = W / 2 - GOAL_WIDTH / 2;
const GOAL_RIGHT = W / 2 + GOAL_WIDTH / 2;
const WIN_SCORE = 7;
const FRICTION = 0.994;
const MAX_SPEED = 13;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

// --- Difficulty tunes the AI's reflexes, not just its speed: reactionFrames
// simulates a delayed read of the puck's position, error adds aim jitter it
// re-rolls periodically, and predictFactor is how far ahead of the puck's
// current velocity it aims (0 = no prediction at all on Easy) ---
const AI_PRESETS = {
  easy: { reactionFrames: 16, error: 42, maxSpeed: 2.6, predictFactor: 0, thinkInterval: 26 },
  hard: { reactionFrames: 3, error: 6, maxSpeed: 5.6, predictFactor: 7, thinkInterval: 10 }
};

let difficulty = 'easy';
let aiPreset = AI_PRESETS.easy;
let state = 'ready'; // ready | serving | playing | over
let playerScore = 0, aiScore = 0;
let serveTimeoutId = null;
let aiThinkTimer = 0;
let aiJitter = 0;

const puck = { x: W / 2, y: H / 2, vx: 0, vy: 0 };
let puckHistory = [];
let puckTrail = [];
let puckHitCooldown = 0;
const HISTORY_MAX = 30;

const playerMallet = { x: W / 2, y: H - 90 };
const playerTarget = { x: W / 2, y: H - 90 };
let playerVel = { x: 0, y: 0 };
let dragging = false;

const aiMallet = { x: W / 2, y: WALL + R_MALLET + 30 };
let aiVel = { x: 0, y: 0 };

// --- Audio: generated on the fly with the Web Audio API, no external files ---
let audioCtx = null;
let muted = sessionStorage.getItem('airHockeyMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playHit() { tone(500, 0.07, 'square', 0.13); }
function playWallHit() { tone(320, 0.05, 'sine', 0.07); }
function playGoal() { tone(700, 0.12, 'triangle', 0.14); tone(940, 0.14, 'triangle', 0.11, 0.07); }
function playMatchEnd(won) {
  if (won) { tone(660, 0.14, 'triangle', 0.14); tone(880, 0.16, 'triangle', 0.13, 0.1); tone(1100, 0.2, 'triangle', 0.12, 0.2); }
  else { tone(300, 0.3, 'sawtooth', 0.13); tone(220, 0.35, 'sawtooth', 0.11, 0.1); }
}

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('airHockeyMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadWins(diff) { return parseInt(sessionStorage.getItem('airHockeyWins_' + diff) || '0', 10); }
function saveWins(diff, v) { try { sessionStorage.setItem('airHockeyWins_' + diff, v); } catch (e) {} }

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (canvas.width / rect.width),
    y: (clientY - rect.top) * (canvas.height / rect.height)
  };
}

function setPlayerTarget(clientX, clientY) {
  const p = getCanvasPos(clientX, clientY);
  playerTarget.x = clamp(p.x, WALL + R_MALLET, W - WALL - R_MALLET);
  playerTarget.y = clamp(p.y, CENTER_Y + R_MALLET + 6, H - WALL - R_MALLET);
}

canvas.addEventListener('pointerdown', (e) => {
  dragging = true;
  canvas.setPointerCapture(e.pointerId);
  setPlayerTarget(e.clientX, e.clientY);
  if (state === 'ready') { /* no-op: mode buttons start the game */ }
});
canvas.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  setPlayerTarget(e.clientX, e.clientY);
});
canvas.addEventListener('pointerup', () => { dragging = false; });
canvas.addEventListener('pointercancel', () => { dragging = false; });

function resolveMalletPuckCollision(mallet, vel, malletYMin, malletYMax) {
  // A recoil alone only buys ~1 frame of separation - if the AI's approach
  // speed can close that gap in a single frame (easily true near a wall,
  // where its target and the puck are both pinned close together), it
  // re-collides before the puck's escape velocity had any real time to
  // carry it away, producing an endless micro-oscillation right at the
  // corner. A short cooldown guarantees genuine travel time instead.
  if (puckHitCooldown > 0) return;
  const dx = puck.x - mallet.x, dy = puck.y - mallet.y;
  const dist = Math.hypot(dx, dy) || 0.001;
  const minDist = R_MALLET + R_PUCK;
  if (dist >= minDist) return;
  puckHitCooldown = 8;
  const nx = dx / dist, ny = dy / dist;
  const overlap = minDist - dist;
  puck.x += nx * overlap;
  puck.y += ny * overlap;
  // Near a corner, "away from the mallet" and "into the wall" can be the
  // same direction - if only the puck moves, a stationary mallet and a
  // cornered puck can end up re-colliding every single frame forever.
  // Recoiling the mallet too guarantees real separation, not just a
  // mathematically-exact touch, so the deadlock can't reoccur next frame.
  const RECOIL = 5;
  mallet.x = clamp(mallet.x - nx * RECOIL, WALL + R_MALLET, W - WALL - R_MALLET);
  mallet.y = clamp(mallet.y - ny * RECOIL, malletYMin, malletYMax);
  // Never let the resolved position push the puck outside the legal play
  // area, even when the escape normal points straight into a wall/corner.
  puck.x = clamp(puck.x, WALL + R_PUCK, W - WALL - R_PUCK);
  puck.y = clamp(puck.y, WALL + R_PUCK, H - WALL - R_PUCK);

  const speedAlongNormal = puck.vx * nx + puck.vy * ny;
  if (speedAlongNormal < 0) {
    puck.vx -= 2 * speedAlongNormal * nx;
    puck.vy -= 2 * speedAlongNormal * ny;
  }
  puck.vx += vel.x * 1.4;
  puck.vy += vel.y * 1.4;

  const speed = Math.hypot(puck.vx, puck.vy);
  const MIN_POKE = 3.4;
  if (speed < MIN_POKE) {
    puck.vx = nx * MIN_POKE;
    puck.vy = ny * MIN_POKE;
  } else if (speed > MAX_SPEED) {
    puck.vx = (puck.vx / speed) * MAX_SPEED;
    puck.vy = (puck.vy / speed) * MAX_SPEED;
  }
  playHit();
}

function recordPuckHistory() {
  puckHistory.push({ x: puck.x, y: puck.y, vx: puck.vx, vy: puck.vy });
  if (puckHistory.length > HISTORY_MAX) puckHistory.shift();
  puckTrail.push({ x: puck.x, y: puck.y });
  if (puckTrail.length > 7) puckTrail.shift();
}
function getDelayedPuck(delayFrames) {
  const idx = puckHistory.length - 1 - delayFrames;
  return puckHistory[Math.max(0, idx)] || puck;
}

function updatePuck() {
  if (puckHitCooldown > 0) puckHitCooldown--;
  puck.x += puck.vx;
  puck.y += puck.vy;
  puck.vx *= FRICTION;
  puck.vy *= FRICTION;

  if (puck.x - R_PUCK < WALL) {
    puck.x = WALL + R_PUCK;
    puck.vx = Math.abs(puck.vx) * 0.9;
    if (Math.abs(puck.vx) > 0.3) playWallHit();
  } else if (puck.x + R_PUCK > W - WALL) {
    puck.x = W - WALL - R_PUCK;
    puck.vx = -Math.abs(puck.vx) * 0.9;
    if (Math.abs(puck.vx) > 0.3) playWallHit();
  }

  const inGoalX = puck.x > GOAL_LEFT + R_PUCK * 0.3 && puck.x < GOAL_RIGHT - R_PUCK * 0.3;

  if (puck.y - R_PUCK < WALL) {
    if (inGoalX) {
      if (puck.y < -R_PUCK) scoreGoal('player');
    } else {
      puck.y = WALL + R_PUCK;
      puck.vy = Math.abs(puck.vy) * 0.9;
      if (Math.abs(puck.vy) > 0.3) playWallHit();
    }
  }
  if (puck.y + R_PUCK > H - WALL) {
    if (inGoalX) {
      if (puck.y > H + R_PUCK) scoreGoal('ai');
    } else {
      puck.y = H - WALL - R_PUCK;
      puck.vy = -Math.abs(puck.vy) * 0.9;
      if (Math.abs(puck.vy) > 0.3) playWallHit();
    }
  }
}

function updateAI() {
  aiThinkTimer--;
  if (aiThinkTimer <= 0) {
    aiThinkTimer = aiPreset.thinkInterval;
    aiJitter = (Math.random() * 2 - 1) * aiPreset.error;
  }
  const sample = getDelayedPuck(aiPreset.reactionFrames);
  let targetX = sample.x + sample.vx * aiPreset.predictFactor + aiJitter;
  targetX = clamp(targetX, WALL + R_MALLET, W - WALL - R_MALLET);

  const homeY = WALL + R_MALLET + 30;
  let targetY = homeY;
  if (sample.y < CENTER_Y - 10) {
    // Puck is anywhere on the AI's half - go meet it and hit it back into
    // play, even if it's stopped or drifting rather than actively
    // approaching. Only retreat home once it's back on the player's side.
    targetY = Math.min(CENTER_Y - R_MALLET - 6, Math.max(WALL + R_MALLET, sample.y + 10));
  }

  const prevX = aiMallet.x, prevY = aiMallet.y;
  aiMallet.x += clamp(targetX - aiMallet.x, -aiPreset.maxSpeed, aiPreset.maxSpeed);
  aiMallet.y += clamp(targetY - aiMallet.y, -aiPreset.maxSpeed, aiPreset.maxSpeed);
  aiMallet.x = clamp(aiMallet.x, WALL + R_MALLET, W - WALL - R_MALLET);
  aiMallet.y = clamp(aiMallet.y, WALL + R_MALLET, CENTER_Y - R_MALLET - 6);
  aiVel = { x: aiMallet.x - prevX, y: aiMallet.y - prevY };

  resolveMalletPuckCollision(aiMallet, aiVel, WALL + R_MALLET, CENTER_Y - R_MALLET - 6);
}

function updatePlayer() {
  const prevX = playerMallet.x, prevY = playerMallet.y;
  playerMallet.x = playerTarget.x;
  playerMallet.y = playerTarget.y;
  playerVel = { x: playerMallet.x - prevX, y: playerMallet.y - prevY };
  resolveMalletPuckCollision(playerMallet, playerVel, CENTER_Y + R_MALLET + 6, H - WALL - R_MALLET);
}

function scoreGoal(who) {
  if (who === 'player') playerScore++; else aiScore++;
  playGoal();
  if (playerScore >= WIN_SCORE || aiScore >= WIN_SCORE) {
    endMatch(playerScore >= WIN_SCORE);
  } else {
    servePuck();
  }
}

function servePuck() {
  puck.x = W / 2; puck.y = H / 2; puck.vx = 0; puck.vy = 0;
  puckTrail = [];
  puckHitCooldown = 0;
  state = 'serving';
  clearTimeout(serveTimeoutId);
  serveTimeoutId = setTimeout(() => {
    const angle = Math.random() * 0.6 - 0.3;
    const dirY = Math.random() < 0.5 ? 1 : -1;
    const speed = 4.2;
    puck.vx = Math.sin(angle) * speed;
    puck.vy = Math.cos(angle) * speed * dirY;
    state = 'playing';
  }, 650);
}

function reset() {
  state = 'ready';
  playerScore = 0;
  aiScore = 0;
  clearTimeout(serveTimeoutId);
  puck.x = W / 2; puck.y = H / 2; puck.vx = 0; puck.vy = 0;
  puckTrail = [];
  playerMallet.x = playerTarget.x = W / 2; playerMallet.y = playerTarget.y = H - 90;
  aiMallet.x = W / 2; aiMallet.y = WALL + R_MALLET + 30;
  title.textContent = 'Air Hockey';
  subtitle.textContent = 'Choose a mode to start';
  statLine.textContent = 'Wins: ' + loadWins(difficulty);
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'none';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function updateDiffButtonStyles() {
  easyBtn.classList.toggle('selected', difficulty === 'easy');
  hardBtn.classList.toggle('selected', difficulty === 'hard');
}

function startGame(diff) {
  difficulty = diff;
  aiPreset = AI_PRESETS[diff];
  playerScore = 0;
  aiScore = 0;
  overlay.style.display = 'none';
  ensureAudio();
  servePuck();
}

function endMatch(playerWon) {
  state = 'over';
  clearTimeout(serveTimeoutId);
  playMatchEnd(playerWon);
  if (playerWon) {
    saveWins(difficulty, loadWins(difficulty) + 1);
  }
  title.textContent = playerWon ? 'You win!' : 'CPU wins';
  subtitle.textContent = 'You ' + playerScore + ' — ' + aiScore + ' CPU';
  statLine.textContent = 'Wins: ' + loadWins(difficulty);
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'inline-block';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

easyBtn.addEventListener('click', () => startGame('easy'));
hardBtn.addEventListener('click', () => startGame('hard'));

function drawTable() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#12435f');
  g.addColorStop(0.5, '#0d3450');
  g.addColorStop(1, '#12435f');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // center line + circle
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 8]);
  ctx.beginPath();
  ctx.moveTo(WALL, CENTER_Y);
  ctx.lineTo(W - WALL, CENTER_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(W / 2, CENTER_Y, 46, 0, Math.PI * 2);
  ctx.stroke();

  // walls
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = WALL;
  ctx.strokeRect(WALL / 2, WALL / 2, W - WALL, H - WALL);

  // goal mouths (drawn over the wall line to show the opening)
  ctx.fillStyle = '#06141f';
  ctx.fillRect(GOAL_LEFT, 0, GOAL_WIDTH, WALL + 2);
  ctx.fillRect(GOAL_LEFT, H - WALL - 2, GOAL_WIDTH, WALL + 2);
  ctx.strokeStyle = 'rgba(255,183,3,0.8)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(GOAL_LEFT, 4); ctx.lineTo(GOAL_RIGHT, 4);
  ctx.moveTo(GOAL_LEFT, H - 4); ctx.lineTo(GOAL_RIGHT, H - 4);
  ctx.stroke();
}

function drawMallet(m, color, glow) {
  ctx.save();
  ctx.shadowColor = glow;
  ctx.shadowBlur = 12;
  const grad = ctx.createRadialGradient(m.x - 6, m.y - 8, 4, m.x, m.y, R_MALLET);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.25, color);
  grad.addColorStop(1, color);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(m.x, m.y, R_MALLET, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(m.x, m.y, R_MALLET * 0.32, 0, Math.PI * 2);
  ctx.fill();
}

function drawPuck() {
  for (let i = 0; i < puckTrail.length; i++) {
    const t = puckTrail[i];
    const alpha = (i + 1) / (puckTrail.length + 1) * 0.35;
    ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
    ctx.beginPath();
    ctx.arc(t.x, t.y, R_PUCK * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#1c1c1c';
  ctx.beginPath();
  ctx.arc(puck.x, puck.y, R_PUCK, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.arc(puck.x - 3, puck.y - 3, R_PUCK * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

function drawHud() {
  ctx.font = 'bold 16px Arial';
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'black';
  ctx.fillStyle = 'white';
  ctx.textAlign = 'left';
  const youText = 'You: ' + playerScore;
  ctx.strokeText(youText, 12, 26);
  ctx.fillText(youText, 12, 26);
  ctx.textAlign = 'right';
  const cpuText = 'CPU: ' + aiScore;
  ctx.strokeText(cpuText, W - 12, 26);
  ctx.fillText(cpuText, W - 12, 26);
}

function draw() {
  drawTable();
  drawMallet(aiMallet, '#e05a4e', 'rgba(224,90,78,0.6)');
  drawMallet(playerMallet, '#2aa9c9', 'rgba(42,169,201,0.6)');
  drawPuck();
  drawHud();
}

function loop() {
  if (state === 'playing') {
    recordPuckHistory();
    updatePuck();
    updateAI();
  }
  if (state === 'playing' || state === 'serving') {
    updatePlayer();
  }
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
<script src="../../assets/version.js"></script>
<script src="../../assets/game-embed.js" data-coffee-url="https://buymeacoffee.com/Krishnabuilds"></script>
