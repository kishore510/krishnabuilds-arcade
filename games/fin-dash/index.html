<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fin Dash</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #04121c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: linear-gradient(#0a3d62, #1e6091 60%, #2a9d8f);
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
  }
  #overlay h1 { margin: 0 0 8px; font-size: calc(30px * var(--game-scale, 1)); }
  #overlay p { margin: 4px 0; font-size: calc(15px * var(--game-scale, 1)); opacity: 0.9; }
  #diffButtons {
    display: flex;
    gap: calc(14px * var(--game-scale, 1));
    margin-top: calc(18px * var(--game-scale, 1));
    pointer-events: auto;
  }
  #diffButtons button {
    font-family: inherit;
    font-size: calc(15px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(22px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  #diffButtons button:active {
    background: rgba(255,255,255,0.3);
  }
  #diffButtons button.selected {
    background: #ffb703;
    border-color: #ffb703;
    color: #04121c;
  }
  #backToArcade {
    display: none;
    margin-top: calc(18px * var(--game-scale, 1));
    font-size: calc(14px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Fin Dash</h1>
    <p id="subtitle">Choose a mode to start</p>
    <p id="scoreLine" style="display:none;"></p>
    <div id="diffButtons">
      <button id="easyBtn" type="button">Easy</button>
      <button id="hardBtn" type="button">Hard</button>
    </div>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const easyBtn = document.getElementById('easyBtn');
const hardBtn = document.getElementById('hardBtn');
const diffButtons = document.getElementById('diffButtons');
const muteBtn = document.getElementById('muteBtn');
const backToArcade = document.getElementById('backToArcade');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = window.kbNavbarHeight || 0;
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

// --- Buoyant physics: gravity is weak, water drag brings it to a gentle terminal
// speed naturally instead of a hard cap, so it settles/floats rather than plummets ---
const GRAVITY = 0.16;
const DRAG = 0.955;          // per-frame velocity damping (buoyancy/water resistance)
const FLAP = -6.2;
const SAFETY_CAP = 9;        // just a hard backstop, rarely reached with drag active

const DIFFICULTY_PRESETS = {
  easy: { gap: 175, speed: 2.0, interval: 120 },
  hard: { gap: 100, speed: 4.2, interval: 62 }
};

let difficulty = 'easy';
let GAP = DIFFICULTY_PRESETS.easy.gap;
let OBST_SPEED = DIFFICULTY_PRESETS.easy.speed;
let OBST_INTERVAL = DIFFICULTY_PRESETS.easy.interval;
const OBST_WIDTH = 60;

// --- Audio: everything here is generated on the fly with the Web Audio API,
// no external files or licensed music, so there's nothing to source or embed ---
let audioCtx = null;
let muted = sessionStorage.getItem('finDashMuted') === '1';
let ambientNodes = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}

function playFlap() { tone(520, 0.09, 'sine', 0.10); }
function playScore() { tone(880, 0.1, 'triangle', 0.12); tone(1180, 0.12, 'triangle', 0.09, 0.05); }
function playHit() { tone(180, 0.35, 'sawtooth', 0.15); }

function startAmbient() {
  if (muted || ambientNodes) return;
  ensureAudio();
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc1.type = 'sine'; osc1.frequency.value = 96;
  osc2.type = 'sine'; osc2.frequency.value = 120;
  gain.gain.value = 0.025;
  osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
  osc1.start(); osc2.start();
  ambientNodes = { osc1, osc2, gain };
}

function stopAmbient() {
  if (ambientNodes) {
    ambientNodes.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.15);
    const nodes = ambientNodes;
    setTimeout(() => { nodes.osc1.stop(); nodes.osc2.stop(); }, 400);
    ambientNodes = null;
  }
}

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('finDashMuted', muted ? '1' : '0');
  updateMuteBtn();
  if (muted) stopAmbient(); else if (state === 'playing') startAmbient();
});

let fish, obstacles, frame, score, best, state;
let bubbles = [], reefDecor = [], distantReef = [];

function loadBest(diff) { return parseInt(sessionStorage.getItem('finDashBest_' + diff) || '0', 10); }
function saveBest(diff, v) { try { sessionStorage.setItem('finDashBest_' + diff, v); } catch(e) {} }

function initReefDecor() {
  reefDecor = [];
  let x = 20;
  while (x < W + 40) {
    const type = ['seaweed', 'starfish', 'crab', 'rockpile'][Math.floor(Math.random()*4)];
    reefDecor.push({ x, type, sway: Math.random()*Math.PI*2 });
    x += 90 + Math.random()*70;
  }
}

function initDistantReef() {
  distantReef = [];
  let x = -20;
  while (x < W + 60) {
    const shapes = ['dome', 'spire', 'fan'];
    distantReef.push({
      x,
      shape: shapes[Math.floor(Math.random()*shapes.length)],
      h: 40 + Math.random()*70,
      w: 30 + Math.random()*40
    });
    x += 50 + Math.random()*60;
  }
}

function reset() {
  fish = { x: 90, y: H/2, r: 14, vy: 0, rot: 0 };
  obstacles = [];
  bubbles = [];
  frame = 0;
  score = 0;
  state = 'ready';
  initReefDecor();
  initDistantReef();
  title.textContent = 'Fin Dash';
  subtitle.textContent = 'Choose a mode to start';
  scoreLine.style.display = 'none';
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'none';
  best = loadBest(difficulty);
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function updateDiffButtonStyles() {
  easyBtn.classList.toggle('selected', difficulty === 'easy');
  hardBtn.classList.toggle('selected', difficulty === 'hard');
}

function startGame(diff) {
  difficulty = diff;
  const preset = DIFFICULTY_PRESETS[diff];
  GAP = preset.gap;
  OBST_SPEED = preset.speed;
  OBST_INTERVAL = preset.interval;
  best = loadBest(difficulty);
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
  startAmbient();
}

easyBtn.addEventListener('click', () => startGame('easy'));
hardBtn.addEventListener('click', () => startGame('hard'));

function flap() {
  if (state === 'playing') { fish.vy = FLAP; playFlap(); }
  if (state === 'over') reset();
}

function spawnObstacle() {
  const margin = 60;
  const gapY = margin + Math.random() * (H - margin*2 - GAP);
  const kinds = ['coral', 'rock', 'kelp'];
  obstacles.push({ x: W, gapY, passed: false, kind: kinds[Math.floor(Math.random()*kinds.length)] });
}

function rectCircleCollide(cx, cy, cr, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX, dy = cy - closestY;
  return (dx*dx + dy*dy) < (cr*cr);
}

function update() {
  if (state !== 'playing') {
    // gentle ambient life still drifts on the ready screen
    updateAmbient();
    return;
  }
  frame++;

  fish.vy += GRAVITY;
  fish.vy *= DRAG;
  fish.vy = Math.max(-SAFETY_CAP, Math.min(SAFETY_CAP, fish.vy));
  fish.y += fish.vy;
  fish.rot = Math.max(-0.5, Math.min(0.8, fish.vy / 7));

  if (frame % OBST_INTERVAL === 0) spawnObstacle();

  updateAmbient();

  for (const o of obstacles) {
    o.x -= OBST_SPEED;
    if (!o.passed && o.x + OBST_WIDTH < fish.x - fish.r) {
      o.passed = true;
      score++;
      playScore();
    }
  }
  obstacles = obstacles.filter(o => o.x > -OBST_WIDTH);

  for (const d of reefDecor) d.x -= OBST_SPEED;
  reefDecor = reefDecor.filter(d => d.x > -40);
  if (reefDecor.length === 0 || reefDecor[reefDecor.length-1].x < W - 60) {
    const lastX = reefDecor.length ? reefDecor[reefDecor.length-1].x : W;
    const type = ['seaweed', 'starfish', 'crab', 'rockpile'][Math.floor(Math.random()*4)];
    reefDecor.push({ x: lastX + 90 + Math.random()*70, type, sway: Math.random()*Math.PI*2 });
  }

  if (fish.y + fish.r > H - 20 || fish.y - fish.r < 0) { endGame(); return; }
  for (const o of obstacles) {
    const topH = o.gapY;
    const botY = o.gapY + GAP;
    if (rectCircleCollide(fish.x, fish.y, fish.r, o.x, 0, OBST_WIDTH, topH) ||
        rectCircleCollide(fish.x, fish.y, fish.r, o.x, botY, OBST_WIDTH, H - botY - 20)) {
      endGame();
      return;
    }
  }
}

function updateAmbient() {
  if (frame % 24 === 0) {
    bubbles.push({ x: Math.random()*W, y: H - 25, r: 2 + Math.random()*3, vy: -1 - Math.random()*1.5 });
  }
  for (const b of bubbles) b.y += b.vy;
  bubbles = bubbles.filter(b => b.y > -10);

  // distant reef drifts slowly for parallax depth, no motion distraction
  for (const d of distantReef) d.x -= OBST_SPEED * 0.3;
  distantReef = distantReef.filter(d => d.x > -80);
  if (distantReef.length === 0 || distantReef[distantReef.length-1].x < W - 40) {
    const lastX = distantReef.length ? distantReef[distantReef.length-1].x : W;
    const shapes = ['dome', 'spire', 'fan'];
    distantReef.push({
      x: lastX + 50 + Math.random()*60,
      shape: shapes[Math.floor(Math.random()*shapes.length)],
      h: 40 + Math.random()*70,
      w: 30 + Math.random()*40
    });
  }
}

function endGame() {
  state = 'over';
  playHit();
  stopAmbient();
  if (score > best) { best = score; saveBest(difficulty, best); }
  title.textContent = 'Caught!';
  subtitle.textContent = 'Choose a mode to swim again';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score + '   Best (' + (difficulty === 'easy' ? 'Easy' : 'Hard') + '): ' + best;
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'inline-block';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a3d62');
  grad.addColorStop(0.6, '#1e6091');
  grad.addColorStop(1, '#2a9d8f');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (const b of bubbles) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawDistantReef() {
  ctx.fillStyle = 'rgba(9, 60, 74, 0.55)';
  const baseY = H - 20;
  for (const d of distantReef) {
    if (d.shape === 'dome') {
      ctx.beginPath();
      ctx.ellipse(d.x, baseY, d.w/2, d.h, 0, Math.PI, 0);
      ctx.fill();
    } else if (d.shape === 'spire') {
      ctx.beginPath();
      ctx.moveTo(d.x - d.w/2, baseY);
      ctx.lineTo(d.x, baseY - d.h);
      ctx.lineTo(d.x + d.w/2, baseY);
      ctx.closePath();
      ctx.fill();
    } else if (d.shape === 'fan') {
      ctx.beginPath();
      ctx.moveTo(d.x, baseY);
      for (let i = 0; i <= 6; i++) {
        const a = Math.PI + (i/6) * Math.PI;
        ctx.lineTo(d.x + Math.cos(a) * d.w/2, baseY + Math.sin(a) * d.h * 0.6);
      }
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawSeabed() {
  ctx.fillStyle = '#d9c98a';
  ctx.fillRect(0, H - 20, W, 20);
  ctx.fillStyle = '#c2b06f';
  ctx.fillRect(0, H - 20, W, 5);

  for (const d of reefDecor) {
    const baseY = H - 20;
    if (d.type === 'seaweed') {
      ctx.strokeStyle = '#2f9e44';
      ctx.lineWidth = 4;
      for (let s = -1; s <= 1; s += 2) {
        ctx.beginPath();
        ctx.moveTo(d.x + s*4, baseY);
        const sway = Math.sin(frame*0.05 + d.sway + s) * 8;
        ctx.quadraticCurveTo(d.x + s*4 + sway, baseY - 20, d.x + s*4, baseY - 34);
        ctx.stroke();
      }
    } else if (d.type === 'starfish') {
      ctx.fillStyle = '#ff8fa3';
      ctx.save();
      ctx.translate(d.x, baseY - 4);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI*2 - Math.PI/2;
        const a2 = a + Math.PI/5;
        ctx.lineTo(Math.cos(a)*8, Math.sin(a)*8);
        ctx.lineTo(Math.cos(a2)*3, Math.sin(a2)*3);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    } else if (d.type === 'crab') {
      ctx.fillStyle = '#e8590c';
      ctx.beginPath();
      ctx.ellipse(d.x, baseY - 5, 8, 5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#e8590c';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(d.x-9, baseY-5); ctx.lineTo(d.x-13, baseY-9);
      ctx.moveTo(d.x+9, baseY-5); ctx.lineTo(d.x+13, baseY-9);
      ctx.moveTo(d.x-6, baseY); ctx.lineTo(d.x-10, baseY+3);
      ctx.moveTo(d.x+6, baseY); ctx.lineTo(d.x+10, baseY+3);
      ctx.stroke();
    } else if (d.type === 'rockpile') {
      ctx.fillStyle = '#7a7f8c';
      ctx.beginPath();
      ctx.ellipse(d.x, baseY - 3, 12, 8, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#8f95a3';
      ctx.beginPath();
      ctx.ellipse(d.x - 8, baseY - 2, 6, 5, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawObstacles() {
  for (const o of obstacles) {
    const topH = o.gapY;
    const botY = o.gapY + GAP;

    if (o.kind === 'kelp') {
      ctx.strokeStyle = '#2f9e44';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      const segs = 5;
      // top strand
      ctx.beginPath();
      ctx.moveTo(o.x + OBST_WIDTH/2, 0);
      for (let i = 1; i <= segs; i++) {
        const py = (topH / segs) * i;
        const sway = Math.sin(frame*0.04 + i) * 10;
        ctx.lineTo(o.x + OBST_WIDTH/2 + sway, py);
      }
      ctx.stroke();
      // bottom strand
      ctx.beginPath();
      ctx.moveTo(o.x + OBST_WIDTH/2, H - 20);
      for (let i = 1; i <= segs; i++) {
        const py = (H-20) - ((H - 20 - botY) / segs) * i;
        const sway = Math.sin(frame*0.04 + i + 2) * 10;
        ctx.lineTo(o.x + OBST_WIDTH/2 + sway, py);
      }
      ctx.stroke();
      continue;
    }

    if (o.kind === 'rock') {
      ctx.fillStyle = '#5a6472';
      ctx.strokeStyle = '#3a414c';
    } else {
      ctx.fillStyle = '#e0715a';
      ctx.strokeStyle = '#b04f3c';
    }
    ctx.lineWidth = 3;
    ctx.fillRect(o.x, 0, OBST_WIDTH, topH);
    ctx.strokeRect(o.x, 0, OBST_WIDTH, topH);
    ctx.fillRect(o.x, botY, OBST_WIDTH, H - botY - 20);
    ctx.strokeRect(o.x, botY, OBST_WIDTH, H - botY - 20);

    ctx.fillStyle = o.kind === 'rock' ? '#717c8c' : '#f08a70';
    for (let i = 0; i < 4; i++) {
      const bx = o.x + 6 + i * 14;
      ctx.beginPath();
      ctx.moveTo(bx, topH);
      ctx.lineTo(bx + 6, topH - 10 - (i % 2) * 6);
      ctx.lineTo(bx + 12, topH);
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(bx, botY);
      ctx.lineTo(bx + 6, botY + 10 + (i % 2) * 6);
      ctx.lineTo(bx + 12, botY);
      ctx.fill();
    }
  }
}

function drawFish() {
  ctx.save();
  ctx.translate(fish.x, fish.y);
  ctx.rotate(fish.rot);

  const wag = Math.sin(frame * 0.3) * 6;
  ctx.fillStyle = '#f4a300';
  ctx.beginPath();
  ctx.moveTo(-fish.r, 0);
  ctx.lineTo(-fish.r - 12, -8 + wag);
  ctx.lineTo(-fish.r - 12, 8 + wag);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#ffb703';
  ctx.beginPath();
  ctx.ellipse(0, 0, fish.r, fish.r * 0.75, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#e08e00';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#f4a300';
  ctx.beginPath();
  ctx.moveTo(-2, -fish.r * 0.7);
  ctx.lineTo(4, -fish.r * 1.3);
  ctx.lineTo(8, -fish.r * 0.6);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(6, -3, 4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(7.5, -3, 2, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawScore() {
  // Running score, front and center, while actively playing
  if (state === 'playing') {
    ctx.fillStyle = 'white';
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 3;
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.strokeText(score, W/2, 60);
    ctx.fillText(score, W/2, 60);
  }

  // Small persistent HUD, top-left score / top-right best, visible in every state
  ctx.font = 'bold 14px Arial';
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'black';
  ctx.fillStyle = 'white';

  ctx.textAlign = 'left';
  const scoreText = 'Score: ' + score;
  ctx.strokeText(scoreText, 12, 24);
  ctx.fillText(scoreText, 12, 24);

  ctx.textAlign = 'right';
  const bestText = 'Best: ' + best;
  ctx.strokeText(bestText, W - 12, 24);
  ctx.fillText(bestText, W - 12, 24);
}

function loop() {
  update();
  drawBackground();
  drawDistantReef();
  drawObstacles();
  drawSeabed();
  drawFish();
  drawScore();
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousedown', flap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});

reset();
loop();
</script>
<script src="../../assets/version.js"></script>
<script src="../../assets/game-embed.js" data-coffee-url="https://buymeacoffee.com/Krishnabuilds"></script>
</body>
