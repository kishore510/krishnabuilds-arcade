<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brick Breaker</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0c0f1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #10152a;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
  }
  #overlay h1 { margin: 0 0 8px; font-size: calc(30px * var(--game-scale, 1)); }
  #overlay p { margin: 4px 0; font-size: calc(15px * var(--game-scale, 1)); opacity: 0.9; }
  #diffButtons {
    display: flex;
    gap: calc(14px * var(--game-scale, 1));
    margin-top: calc(18px * var(--game-scale, 1));
    pointer-events: auto;
  }
  #diffButtons button {
    font-family: inherit;
    font-size: calc(15px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(22px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  #diffButtons button:active { background: rgba(255,255,255,0.3); }
  #diffButtons button.selected {
    background: #ffb703;
    border-color: #ffb703;
    color: #04121c;
  }
  #backToArcade {
    display: none;
    margin-top: calc(18px * var(--game-scale, 1));
    font-size: calc(14px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="overlay">
    <h1 id="title">Brick Breaker</h1>
    <p id="subtitle">Drag to steer, tap to launch</p>
    <p id="scoreLine" style="display:none;"></p>
    <div id="diffButtons">
      <button id="easyBtn" type="button">Easy</button>
      <button id="hardBtn" type="button">Hard</button>
    </div>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const easyBtn = document.getElementById('easyBtn');
const hardBtn = document.getElementById('hardBtn');
const diffButtons = document.getElementById('diffButtons');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');

const W = canvas.width, H = canvas.height;
const WALL = 8;
const BALL_R = 7;
const PADDLE_H = 12;
const PADDLE_Y = H - 46;
const LIVES_START = 3;
const BRICK_COLS = 7;
const BRICK_TOP = 64;
const BRICK_GAP = 5;
const BRICK_H = 18;
const ROW_COLORS = ['#e05a4e', '#ff9f4a', '#ffd76a', '#8fd35a', '#4ac9d3', '#5a8ce8'];
const ROW_POINTS = [50, 40, 30, 20, 15, 10];

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

const DIFFICULTY_PRESETS = {
  easy: { paddleWidth: 78, ballSpeed: 4.6, rows: 4 },
  hard: { paddleWidth: 56, ballSpeed: 6.3, rows: 6 }
};

let difficulty = 'easy';
let preset = DIFFICULTY_PRESETS.easy;
let paddle, ball, bricks, lives, score, best, state, launched;

// --- Audio: generated on the fly with the Web Audio API, no external files ---
let audioCtx = null;
let muted = sessionStorage.getItem('brickBreakerMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playPaddle() { tone(300, 0.06, 'sine', 0.1); }
function playBrick(row) { tone(500 + row * 60, 0.08, 'square', 0.11); }
function playWall() { tone(260, 0.05, 'sine', 0.06); }
function playLoseLife() { tone(180, 0.3, 'sawtooth', 0.14); }
function playWin() { tone(660, 0.12, 'triangle', 0.13); tone(880, 0.14, 'triangle', 0.12, 0.09); tone(1100, 0.18, 'triangle', 0.11, 0.19); }

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('brickBreakerMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest(diff) { return parseInt(sessionStorage.getItem('brickBreakerBest_' + diff) || '0', 10); }
function saveBest(diff, v) { try { sessionStorage.setItem('brickBreakerBest_' + diff, v); } catch (e) {} }

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function buildBricks() {
  bricks = [];
  const brickW = (W - WALL * 2 - BRICK_GAP * (BRICK_COLS - 1)) / BRICK_COLS;
  for (let row = 0; row < preset.rows; row++) {
    for (let col = 0; col < BRICK_COLS; col++) {
      bricks.push({
        x: WALL + col * (brickW + BRICK_GAP),
        y: BRICK_TOP + row * (BRICK_H + BRICK_GAP),
        w: brickW,
        h: BRICK_H,
        row,
        alive: true
      });
    }
  }
}

function placeBallOnPaddle() {
  ball = { x: paddle.x, y: PADDLE_Y - BALL_R - 1, vx: 0, vy: 0 };
  launched = false;
}

function reset() {
  paddle = { x: W / 2, targetX: W / 2, w: preset.paddleWidth };
  placeBallOnPaddle();
  bricks = [];
  lives = LIVES_START;
  score = 0;
  state = 'ready';
  title.textContent = 'Brick Breaker';
  subtitle.textContent = 'Drag to steer, tap to launch';
  scoreLine.style.display = 'none';
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'none';
  best = loadBest(difficulty);
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function updateDiffButtonStyles() {
  easyBtn.classList.toggle('selected', difficulty === 'easy');
  hardBtn.classList.toggle('selected', difficulty === 'hard');
}

function startGame(diff) {
  difficulty = diff;
  preset = DIFFICULTY_PRESETS[diff];
  best = loadBest(difficulty);
  paddle = { x: W / 2, targetX: W / 2, w: preset.paddleWidth };
  buildBricks();
  placeBallOnPaddle();
  lives = LIVES_START;
  score = 0;
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

function launchBall() {
  if (launched) return;
  launched = true;
  const angle = (Math.random() * 0.5 - 0.25);
  ball.vx = Math.sin(angle) * preset.ballSpeed;
  ball.vy = -Math.cos(angle) * preset.ballSpeed;
}

function setTarget(clientX) {
  const rect = canvas.getBoundingClientRect();
  const x = (clientX - rect.left) * (canvas.width / rect.width);
  paddle.targetX = clamp(x, WALL + paddle.w / 2, W - WALL - paddle.w / 2);
}
canvas.addEventListener('pointerdown', (e) => {
  canvas.setPointerCapture(e.pointerId);
  setTarget(e.clientX);
  if (state === 'playing' && !launched) launchBall();
  else if (state === 'over') reset();
});
canvas.addEventListener('pointermove', (e) => { if (e.pressure > 0 || e.buttons > 0) setTarget(e.clientX); });
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); if (state === 'playing' && !launched) launchBall(); else if (state === 'over') reset(); }
  if (e.code === 'ArrowLeft') paddle.targetX = clamp(paddle.targetX - 30, WALL + paddle.w / 2, W - WALL - paddle.w / 2);
  if (e.code === 'ArrowRight') paddle.targetX = clamp(paddle.targetX + 30, WALL + paddle.w / 2, W - WALL - paddle.w / 2);
});

easyBtn.addEventListener('click', () => startGame('easy'));
hardBtn.addEventListener('click', () => startGame('hard'));

function ballBrickHit(brick) {
  const closestX = clamp(ball.x, brick.x, brick.x + brick.w);
  const closestY = clamp(ball.y, brick.y, brick.y + brick.h);
  const dx = ball.x - closestX, dy = ball.y - closestY;
  if (dx * dx + dy * dy >= BALL_R * BALL_R) return false;
  const overlapX = BALL_R - Math.abs(dx);
  const overlapY = BALL_R - Math.abs(dy);
  if (overlapX < overlapY) ball.vx = -ball.vx; else ball.vy = -ball.vy;
  return true;
}

function loseLife() {
  lives--;
  playLoseLife();
  if (lives <= 0) {
    endGame(false);
  } else {
    placeBallOnPaddle();
  }
}

function endGame(won) {
  state = 'over';
  if (won) playWin();
  if (score > best) { best = score; saveBest(difficulty, best); }
  title.textContent = won ? 'Cleared!' : 'Out of lives';
  subtitle.textContent = 'Choose a mode to play again';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score + '   Best (' + (difficulty === 'easy' ? 'Easy' : 'Hard') + '): ' + best;
  diffButtons.style.display = 'flex';
  backToArcade.style.display = 'inline-block';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function update() {
  if (state !== 'playing') return;
  paddle.x += (paddle.targetX - paddle.x) * 0.5;

  if (!launched) {
    ball.x = paddle.x;
    ball.y = PADDLE_Y - BALL_R - 1;
    return;
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.x - BALL_R < WALL) { ball.x = WALL + BALL_R; ball.vx = Math.abs(ball.vx); playWall(); }
  else if (ball.x + BALL_R > W - WALL) { ball.x = W - WALL - BALL_R; ball.vx = -Math.abs(ball.vx); playWall(); }
  if (ball.y - BALL_R < WALL) { ball.y = WALL + BALL_R; ball.vy = Math.abs(ball.vy); playWall(); }

  if (ball.vy > 0) {
    const withinPaddleX = ball.x + BALL_R > paddle.x - paddle.w / 2 && ball.x - BALL_R < paddle.x + paddle.w / 2;
    const withinPaddleY = ball.y + BALL_R > PADDLE_Y - PADDLE_H / 2 && ball.y - BALL_R < PADDLE_Y + PADDLE_H / 2;
    if (withinPaddleX && withinPaddleY) {
      const hitPos = clamp((ball.x - paddle.x) / (paddle.w / 2), -1, 1);
      const speed = Math.hypot(ball.vx, ball.vy);
      const angle = hitPos * 0.9;
      ball.vx = Math.sin(angle) * speed;
      ball.vy = -Math.abs(Math.cos(angle) * speed);
      ball.y = PADDLE_Y - PADDLE_H / 2 - BALL_R;
      playPaddle();
    }
  }

  for (const b of bricks) {
    if (!b.alive) continue;
    if (ballBrickHit(b)) {
      b.alive = false;
      score += ROW_POINTS[Math.min(b.row, ROW_POINTS.length - 1)];
      playBrick(b.row);
      break;
    }
  }

  if (bricks.every(b => !b.alive)) { endGame(true); return; }
  if (ball.y - BALL_R > H) loseLife();
}

function drawBricks() {
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = ROW_COLORS[Math.min(b.row, ROW_COLORS.length - 1)];
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(b.x, b.y, b.w, 4);
  }
}

function drawPaddle() {
  const grad = ctx.createLinearGradient(paddle.x - paddle.w / 2, 0, paddle.x + paddle.w / 2, 0);
  grad.addColorStop(0, '#2aa9c9');
  grad.addColorStop(1, '#5ed4ea');
  ctx.fillStyle = grad;
  ctx.fillRect(paddle.x - paddle.w / 2, PADDLE_Y - PADDLE_H / 2, paddle.w, PADDLE_H);
}

function drawBall() {
  ctx.save();
  ctx.shadowColor = 'rgba(255,255,255,0.6)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff6d8';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHud() {
  ctx.font = 'bold 16px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const scoreText = 'Score: ' + score;
  ctx.strokeText(scoreText, 12, 26);
  ctx.fillText(scoreText, 12, 26);
  ctx.textAlign = 'right';
  const livesText = 'Lives: ' + '●'.repeat(Math.max(0, lives)) + '○'.repeat(LIVES_START - Math.max(0, lives));
  ctx.strokeText(livesText, W - 12, 26);
  ctx.fillText(livesText, W - 12, 26);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBricks();
  drawPaddle();
  drawBall();
  drawHud();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
<script src="../../assets/version.js"></script>
<script src="../../assets/game-embed.js" data-coffee-url="https://buymeacoffee.com/Krishnabuilds"></script>
</body>
</html>
