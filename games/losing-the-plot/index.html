<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Losing the Plot</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #12200f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  body {
    box-sizing: border-box;
    padding-top: var(--kb-navbar-h, 0px);
    padding-bottom: var(--kb-bottom-reserve, 0px);
  }
  #wrap { position: relative; }
  canvas {
    background: #3a2a18;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    touch-action: none;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: calc(10px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  #overlay h1 { margin: 0 0 6px; font-size: calc(27px * var(--game-scale, 1)); }
  #overlay p { margin: 3px 0; font-size: calc(13px * var(--game-scale, 1)); opacity: 0.9; }
  #scoreLine { font-weight: bold; font-size: calc(15px * var(--game-scale, 1)) !important; }
  #bestLine { opacity: 0.8; }
  #startBtn {
    margin-top: calc(16px * var(--game-scale, 1));
    font-size: calc(17px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(10px * var(--game-scale, 1)) calc(30px * var(--game-scale, 1));
    border-radius: calc(24px * var(--game-scale, 1));
    border: none;
    background: #4a7a2e;
    color: #f4fbe8;
    cursor: pointer;
    pointer-events: auto;
  }
  #startBtn:active { background: #5f9a3c; }
  #backToArcade {
    display: none;
    margin-top: calc(14px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    color: white;
    text-decoration: underline;
    text-underline-offset: 3px;
    opacity: 0.85;
    pointer-events: auto;
  }
  #backToArcade:active { opacity: 1; }
  #muteBtn {
    position: absolute;
    top: calc(8px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(13px * var(--game-scale, 1));
    padding: calc(4px * var(--game-scale, 1)) calc(10px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(0,0,0,0.35);
    color: white;
    cursor: pointer;
    z-index: 5;
  }
  .rowLabel {
    font-size: calc(10.5px * var(--game-scale, 1));
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.6;
    margin-top: calc(8px * var(--game-scale, 1));
  }
  .btnRow {
    display: flex;
    gap: calc(8px * var(--game-scale, 1));
    margin-top: calc(5px * var(--game-scale, 1));
    pointer-events: auto;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btnRow button {
    font-family: inherit;
    font-size: calc(12.5px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(7px * var(--game-scale, 1)) calc(15px * var(--game-scale, 1));
    border-radius: calc(18px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.12);
    color: white;
    cursor: pointer;
  }
  .btnRow button:active { background: rgba(255,255,255,0.3); }
  .btnRow button.selected { background: #ffb703; border-color: #ffb703; color: #04121c; }
  #shopBtn {
    margin-top: calc(10px * var(--game-scale, 1));
    font-size: calc(13.5px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(8px * var(--game-scale, 1)) calc(18px * var(--game-scale, 1));
    border-radius: calc(20px * var(--game-scale, 1));
    border: calc(2px * var(--game-scale, 1)) solid #ffb703;
    background: rgba(255,183,3,0.15);
    color: #ffe28a;
    cursor: pointer;
    pointer-events: auto;
  }
  #shopBtn:active { background: rgba(255,183,3,0.35); }
  #moneyLine { color: #ffe28a; font-weight: bold; }
  .panelOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(6,10,4,0.78);
    z-index: 6;
    padding: calc(14px * var(--game-scale, 1));
    box-sizing: border-box;
  }
  .panelBox {
    background: #1c2a1f;
    border: calc(2px * var(--game-scale, 1)) solid rgba(255,183,3,0.5);
    border-radius: calc(14px * var(--game-scale, 1));
    padding: calc(16px * var(--game-scale, 1)) calc(18px * var(--game-scale, 1));
    max-width: 100%;
    max-height: 100%;
    overflow-y: auto;
    color: white;
    text-align: center;
    font-size: calc(13px * var(--game-scale, 1));
  }
  .panelBox h2 { margin: 0 0 4px; font-size: calc(20px * var(--game-scale, 1)); }
  .panelBox p { margin: 2px 0 10px; opacity: 0.85; }
  .upgradeRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: calc(10px * var(--game-scale, 1));
    background: rgba(255,255,255,0.06);
    border-radius: calc(10px * var(--game-scale, 1));
    padding: calc(8px * var(--game-scale, 1)) calc(12px * var(--game-scale, 1));
    margin-bottom: calc(8px * var(--game-scale, 1));
    text-align: left;
  }
  .upgradeRow .info { flex: 1; min-width: 0; }
  .upgradeRow .info strong { display: block; font-size: calc(13.5px * var(--game-scale, 1)); }
  .upgradeRow .info span { display: block; font-size: calc(11px * var(--game-scale, 1)); opacity: 0.7; margin-top: 2px; }
  .upgradeRow .level { font-size: calc(10.5px * var(--game-scale, 1)); opacity: 0.6; margin-top: 3px; }
  .upgradeRow button {
    font-family: inherit;
    font-weight: bold;
    font-size: calc(12px * var(--game-scale, 1));
    padding: calc(7px * var(--game-scale, 1)) calc(12px * var(--game-scale, 1));
    border-radius: calc(16px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid #4a7a2e;
    background: #4a7a2e;
    color: #f4fbe8;
    cursor: pointer;
    white-space: nowrap;
  }
  .upgradeRow button:disabled { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); cursor: default; }
  #shopCloseBtn {
    margin-top: calc(6px * var(--game-scale, 1));
    font-size: calc(13px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(8px * var(--game-scale, 1)) calc(20px * var(--game-scale, 1));
    border-radius: calc(18px * var(--game-scale, 1));
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
  }
  #weatherBanner {
    position: absolute;
    top: calc(50px * var(--game-scale, 1));
    left: 50%;
    transform: translateX(-50%);
    font-size: calc(12px * var(--game-scale, 1));
    font-weight: bold;
    padding: calc(5px * var(--game-scale, 1)) calc(14px * var(--game-scale, 1));
    border-radius: calc(14px * var(--game-scale, 1));
    background: rgba(0,0,0,0.55);
    border: calc(1.5px * var(--game-scale, 1)) solid rgba(255,255,255,0.4);
    color: white;
    display: none;
    z-index: 3;
    white-space: nowrap;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="360" height="540"></canvas>
  <button id="muteBtn" type="button">🔊</button>
  <div id="weatherBanner"></div>
  <div id="overlay">
    <h1 id="title">Losing the Plot</h1>
    <p id="subtitle">One gardener, one job at a time — plan your route</p>
    <p id="scoreLine" style="display:none;"></p>
    <p id="bestLine"></p>
    <p id="moneyLine"></p>
    <div class="rowLabel">Difficulty</div>
    <div class="btnRow" id="diffButtons">
      <button data-d="easy" type="button">Easy</button>
      <button data-d="hard" type="button">Hard</button>
    </div>
    <button id="startBtn" type="button">Start</button>
    <button id="shopBtn" type="button">🛒 Shop</button>
    <a id="backToArcade" href="../../index.html">&larr; Back to Arcade</a>
  </div>
  <div class="panelOverlay" id="shopOverlay">
    <div class="panelBox">
      <h2>Shop</h2>
      <p id="shopMoney"></p>
      <div id="shopList"></div>
      <button id="shopCloseBtn" type="button">Close</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const title = document.getElementById('title');
const subtitle = document.getElementById('subtitle');
const scoreLine = document.getElementById('scoreLine');
const bestLine = document.getElementById('bestLine');
const startBtn = document.getElementById('startBtn');
const backToArcade = document.getElementById('backToArcade');
const muteBtn = document.getElementById('muteBtn');
const moneyLine = document.getElementById('moneyLine');
const diffButtons = document.getElementById('diffButtons');
const shopBtn = document.getElementById('shopBtn');
const shopOverlay = document.getElementById('shopOverlay');
const shopMoney = document.getElementById('shopMoney');
const shopList = document.getElementById('shopList');
const shopCloseBtn = document.getElementById('shopCloseBtn');
const weatherBanner = document.getElementById('weatherBanner');

const W = canvas.width, H = canvas.height;

function fitCanvas() {
  const reserved = (window.kbNavbarHeight || 0) + (window.kbBottomReserve || 0);
  const availH = window.innerHeight - reserved;
  const scale = Math.min(window.innerWidth / W, availH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('wrap').style.setProperty('--game-scale', scale);
}
window.addEventListener('resize', fitCanvas);
window.addEventListener('kb-navbar-ready', fitCanvas);
fitCanvas();

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function randRange(lo, hi) { return lo + Math.random() * (hi - lo); }

// --- Audio ---
let audioCtx = null;
let muted = sessionStorage.getItem('losingThePlotMuted') === '1';

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, duration, type, volume, delay) {
  if (muted) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.value = volume || 0.12;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const startTime = audioCtx.currentTime + (delay || 0);
  osc.start(startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.stop(startTime + duration + 0.03);
}
function playStartTend() { tone(380, 0.05, 'square', 0.07); }
function playWater() { tone(560, 0.09, 'sine', 0.1); tone(760, 0.08, 'sine', 0.07, 0.05); }
function playFeed() { tone(660, 0.1, 'triangle', 0.1); tone(880, 0.1, 'triangle', 0.08, 0.06); }
function playWeed() { tone(300, 0.06, 'square', 0.09); }
function playHarvest() { tone(660, 0.1, 'triangle', 0.12); tone(880, 0.12, 'triangle', 0.11, 0.08); tone(1100, 0.16, 'triangle', 0.1, 0.16); }
function playBad() { tone(160, 0.28, 'sawtooth', 0.13); }
function playSpread() { tone(220, 0.12, 'square', 0.1); tone(180, 0.14, 'square', 0.09, 0.07); }
function playSeasonEnd() {
  tone(523, 0.14, 'triangle', 0.13);
  tone(659, 0.14, 'triangle', 0.12, 0.13);
  tone(784, 0.18, 'triangle', 0.12, 0.26);
  tone(988, 0.26, 'triangle', 0.13, 0.4);
}

function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
updateMuteBtn();
muteBtn.addEventListener('click', () => {
  muted = !muted;
  sessionStorage.setItem('losingThePlotMuted', muted ? '1' : '0');
  updateMuteBtn();
});

function loadBest() { return parseInt(sessionStorage.getItem('losingThePlotBest') || '0', 10); }
function saveBest(v) { try { sessionStorage.setItem('losingThePlotBest', v); } catch (e) {} }

// --- Economy: money and upgrades persist across runs within the session,
// same storage mechanism as every other game's "best" score. ---
function loadMoney() { return parseInt(sessionStorage.getItem('losingThePlotMoney') || '0', 10); }
function saveMoney(v) { try { sessionStorage.setItem('losingThePlotMoney', v); } catch (e) {} }
function loadUpgrades() {
  const fallback = { water: 0, plot: 0, tools: 0, seeds: 0, boots: 0 };
  try {
    const raw = sessionStorage.getItem('losingThePlotUpgrades');
    return raw ? Object.assign(fallback, JSON.parse(raw)) : fallback;
  } catch (e) { return fallback; }
}
function saveUpgrades(u) { try { sessionStorage.setItem('losingThePlotUpgrades', JSON.stringify(u)); } catch (e) {} }
function loadDifficulty() { return sessionStorage.getItem('losingThePlotDifficulty') || 'easy'; }
function saveDifficulty(d) { try { sessionStorage.setItem('losingThePlotDifficulty', d); } catch (e) {} }

const UPGRADES = {
  water: { name: 'Water Butts', desc: 'Water lasts longer before wilting', maxLevel: 3, baseCost: 40, costMul: 1.8 },
  plot: { name: 'Bigger Plot', desc: 'Unlocks extra beds sooner', maxLevel: 3, baseCost: 60, costMul: 2.0 },
  tools: { name: 'Better Tools', desc: 'Tend every bed faster', maxLevel: 3, baseCost: 35, costMul: 1.8 },
  seeds: { name: 'Better Seeds', desc: 'Harvests are worth more', maxLevel: 4, baseCost: 30, costMul: 1.7 },
  boots: { name: 'Sturdy Boots', desc: 'Your gardener moves faster between beds', maxLevel: 3, baseCost: 45, costMul: 1.8 }
};

let money = loadMoney();
let upgradeLevels = loadUpgrades();
let difficulty = loadDifficulty();

function upgradeCost(key) {
  const u = UPGRADES[key];
  const lvl = upgradeLevels[key];
  if (lvl >= u.maxLevel) return null;
  return Math.round(u.baseCost * Math.pow(u.costMul, lvl));
}
function waterUpgradeMul() { return 1 + upgradeLevels.water * 0.2; }
function harvestPointsMul() { return 1 + upgradeLevels.seeds * 0.2; }
function effectiveTendDuration() { return Math.max(200, TEND_DURATION - upgradeLevels.tools * 100); }
function gardenerSpeedMul() { return 1 + upgradeLevels.boots * 0.25; }
function effectiveUnlockAt(index) {
  const base = BED_SLOTS[index].unlockAt;
  const lvl = upgradeLevels.plot;
  if (index === 5) {
    if (lvl < 2) return Infinity;
    return lvl >= 3 ? 45000 : 90000;
  }
  if (base === 0) return 0;
  return Math.max(0, base - lvl * 12000);
}

// --- Tuning ---
const SEASON_LENGTH = 120000;
const CALM_DURATION = 20000;
const TEND_DURATION = 550;

const WATER_INTERVAL = [9000, 4200];
const FEED_INTERVAL = [12000, 5500];
const WEED_INTERVAL = [11000, 5000];
// Grace floors are a bit more generous than a pure reflex-tap version would
// need, since the gardener now has to physically walk to a bed before
// tending starts - that travel time already eats into the response window.
const WATER_GRACE = [7500, 4200];
const WEED_GRACE = [7000, 3900];
const FEED_GRACE = [6500, 3600];
const HARVEST_GRACE = [9000, 5000];

const DIFFICULTY_PRESETS = {
  easy: { intervalMul: 1.15, graceMul: 1.2 },
  hard: { intervalMul: 0.85, graceMul: 0.82 }
};

// --- Crops: different growth times, values, and need profiles. Picked at
// random (weighted) each time a bed starts a fresh growing cycle. ---
const CROPS = [
  { id: 'lettuce', name: 'Lettuce', growDuration: 10000, value: 14, waterMul: 1.3, feedMul: 1, weedMul: 1, color1: '#4a7a2e', color2: '#7cb342', weight: 35 },
  { id: 'tomato', name: 'Tomato', growDuration: 15000, value: 20, waterMul: 1, feedMul: 1, weedMul: 1, color1: '#7a3d1a', color2: '#e8891a', weight: 35 },
  { id: 'pumpkin', name: 'Pumpkin', growDuration: 24000, value: 34, waterMul: 0.85, feedMul: 1.3, weedMul: 1, color1: '#7a4a10', color2: '#e07a1a', weight: 20 },
  { id: 'garlic', name: 'Garlic', growDuration: 34000, value: 55, waterMul: 0.6, feedMul: 0.7, weedMul: 0.7, color1: '#5b3d22', color2: '#e8e0d0', weight: 10 }
];
const CROP_WEIGHT_TOTAL = CROPS.reduce((s, c) => s + c.weight, 0);
function pickCrop() {
  let r = Math.random() * CROP_WEIGHT_TOTAL;
  for (const c of CROPS) { if (r < c.weight) return c; r -= c.weight; }
  return CROPS[0];
}

// --- Seasons (cosmetic labels + a HUD readout) and weather events (heatwave
// speeds up water need; rain waters beds for you) layered on top. ---
const SEASON_LABELS = [
  { until: 30000, name: 'Spring', icon: '🌱' },
  { until: 70000, name: 'Summer', icon: '☀️' },
  { until: 100000, name: 'Autumn', icon: '🍂' },
  { until: Infinity, name: 'Winter', icon: '❄️' }
];
function seasonLabel(elapsedMs) { return SEASON_LABELS.find((s) => elapsedMs < s.until); }

const BED_SLOTS = [
  { x: 22, y: 96, unlockAt: 0 },
  { x: 132, y: 96, unlockAt: 0 },
  { x: 242, y: 96, unlockAt: 0 },
  { x: 22, y: 246, unlockAt: 40000 },
  { x: 132, y: 246, unlockAt: 80000 },
  { x: 242, y: 246, unlockAt: Infinity }
];
const BED_W = 96, BED_H = 92;

const NEED_ICON = { water: '💧', feed: '⭐', weed: '🌿', harvest: '🧺' };

// The gardener: a single actor who must physically walk to a bed before
// tending it. This is what actually enforces "only one thing at a time" -
// tapping a second urgent bed abandons whatever's in progress and sends the
// gardener there instead, so which bed to run to next (given where the
// gardener already is) is the real decision, not just "tap the reddest icon".
const GARDENER_SPEED = 150;
const SHED = { x: 180, y: 400 };

function rampT(elapsed) { return clamp((elapsed - CALM_DURATION) / (SEASON_LENGTH - CALM_DURATION), 0, 1); }
function intervalFor(range, elapsed) { const v = lerp(range[0], range[1], rampT(elapsed)); return randRange(v * 0.85, v * 1.15); }
function graceFor(range, elapsed) { return lerp(range[0], range[1], rampT(elapsed)); }

let diffPreset = DIFFICULTY_PRESETS[difficulty];

// Weather: a periodic random event layered on top of the base timers.
// Heatwave halves water interval/grace (needs water constantly and wilts
// fast); rain suspends water needs entirely (it's doing the watering).
let weather = null; // null | 'heatwave' | 'rain'
let weatherUntil = 0;
let nextWeatherAt = 0;

function scheduleNextWeather(fromTime) { nextWeatherAt = fromTime + randRange(22000, 34000); }

function updateWeather(dt) {
  if (weather && elapsed >= weatherUntil) {
    weather = null;
    scheduleNextWeather(elapsed);
  } else if (!weather && elapsed >= nextWeatherAt && elapsed > CALM_DURATION) {
    weather = Math.random() < 0.5 ? 'heatwave' : 'rain';
    weatherUntil = elapsed + randRange(11000, 16000);
  }
  if (weather === 'rain') {
    beds.forEach((bed) => {
      if (bed.active && bed.needs.water) {
        bed.rainClearAt = bed.rainClearAt || elapsed + 1000;
        if (elapsed >= bed.rainClearAt) { bed.needs.water = false; bed.rainClearAt = 0; scheduleNext(bed, 'water'); }
      } else {
        bed.rainClearAt = 0;
      }
    });
  }
  weatherBanner.style.display = weather ? 'block' : 'none';
  if (weather === 'heatwave') weatherBanner.textContent = '☀️ Heatwave — water needed fast!';
  else if (weather === 'rain') weatherBanner.textContent = '🌧️ Rain — watering itself!';
}

function waterInterval(bed) {
  let v = intervalFor(WATER_INTERVAL, elapsed) * waterUpgradeMul() * diffPreset.intervalMul * bed.crop.waterMul;
  if (weather === 'heatwave') v *= 0.5;
  return v;
}
function waterGrace(bed) {
  if (weather === 'rain') return Infinity;
  let v = graceFor(WATER_GRACE, elapsed) * waterUpgradeMul() * diffPreset.graceMul * bed.crop.waterMul;
  if (weather === 'heatwave') v *= 0.5;
  return v;
}
function feedInterval(bed) { return intervalFor(FEED_INTERVAL, elapsed) * diffPreset.intervalMul * bed.crop.feedMul; }
function feedGrace(bed) { return graceFor(FEED_GRACE, elapsed) * diffPreset.graceMul * bed.crop.feedMul; }
function weedInterval(bed) { return intervalFor(WEED_INTERVAL, elapsed) * diffPreset.intervalMul * bed.crop.weedMul; }
function weedGrace(bed) { return graceFor(WEED_GRACE, elapsed) * diffPreset.graceMul * bed.crop.weedMul; }
function harvestGrace() { return graceFor(HARVEST_GRACE, elapsed) * diffPreset.graceMul; }

let beds = [];
let score = 0, elapsed = 0, moneyEarnedThisRun = 0;
let popups = [];
let state = 'menu'; // menu | playing | over
let hintVisible = false, hintAlpha = 1;
let gardener = { x: SHED.x, y: SHED.y, targetIndex: null, state: 'idle', tendingNeed: null, tendProgress: 0, tendDuration: 0 };

function makeBed(slot, index) {
  return {
    slot, index,
    active: false,
    stage: 'growing',
    growStart: 0,
    quality: 1,
    crop: CROPS[0],
    rainClearAt: 0,
    needs: { water: false, feed: false, weed: false },
    activeSince: { water: 0, feed: 0, weed: 0, harvest: 0 },
    nextDue: { water: Infinity, feed: Infinity, weed: Infinity },
    weedSpread: false
  };
}

function initBed(bed, atTime, firstStagger) {
  bed.active = true;
  bed.stage = 'growing';
  bed.growStart = atTime;
  bed.quality = 1;
  bed.crop = pickCrop();
  bed.rainClearAt = 0;
  bed.needs.water = false; bed.needs.feed = false; bed.needs.weed = false;
  bed.weedSpread = false;
  if (gardener.targetIndex === bed.index) { gardener.targetIndex = null; gardener.state = 'idle'; }
  if (firstStagger !== undefined) {
    bed.nextDue.water = firstStagger + randRange(-1500, 1500);
    bed.nextDue.feed = firstStagger + randRange(2500, 5000);
    bed.nextDue.weed = firstStagger + randRange(1000, 4000);
  } else {
    bed.nextDue.water = atTime + waterInterval(bed);
    bed.nextDue.feed = atTime + feedInterval(bed);
    bed.nextDue.weed = atTime + weedInterval(bed);
  }
}

function reset() {
  diffPreset = DIFFICULTY_PRESETS[difficulty];
  beds = BED_SLOTS.map((slot, i) => makeBed(slot, i));
  score = 0;
  elapsed = 0;
  moneyEarnedThisRun = 0;
  popups = [];
  weather = null;
  scheduleNextWeather(0);
  gardener = { x: SHED.x, y: SHED.y, targetIndex: null, state: 'idle', tendingNeed: null, tendProgress: 0, tendDuration: 0 };
  hintVisible = sessionStorage.getItem('losingThePlotSeenHint') !== '1';
  hintAlpha = 1;
  beds.forEach((bed, i) => {
    if (effectiveUnlockAt(i) === 0) initBed(bed, 0, CALM_DURATION - 4000 + i * 3000);
  });
}

function updateDiffButtonStyles() { [...diffButtons.children].forEach((b) => b.classList.toggle('selected', b.dataset.d === difficulty)); }
diffButtons.addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (!b) return;
  difficulty = b.dataset.d;
  saveDifficulty(difficulty);
  updateDiffButtonStyles();
});
updateDiffButtonStyles();

function showMenu() {
  state = 'menu';
  title.textContent = 'Losing the Plot';
  subtitle.textContent = 'One gardener, one job at a time — plan your route';
  scoreLine.style.display = 'none';
  bestLine.textContent = 'Best score: ' + loadBest();
  moneyLine.textContent = '💰 ' + money;
  startBtn.textContent = 'Start';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'none';
  weatherBanner.style.display = 'none';
  updateDiffButtonStyles();
  overlay.style.display = 'flex';
}

function startGame() {
  reset();
  state = 'playing';
  overlay.style.display = 'none';
  ensureAudio();
}

startBtn.addEventListener('click', () => { if (state === 'menu' || state === 'over') startGame(); });

// --- Shop: spend money on permanent upgrades between runs ---
function renderShop() {
  shopMoney.textContent = '💰 ' + money;
  shopList.innerHTML = Object.keys(UPGRADES).map((key) => {
    const u = UPGRADES[key];
    const lvl = upgradeLevels[key];
    const cost = upgradeCost(key);
    const maxed = cost === null;
    const affordable = !maxed && money >= cost;
    return `
      <div class="upgradeRow">
        <div class="info">
          <strong>${u.name}</strong>
          <span>${u.desc}</span>
          <div class="level">Level ${lvl}/${u.maxLevel}</div>
        </div>
        <button type="button" data-key="${key}" ${maxed || !affordable ? 'disabled' : ''}>${maxed ? 'MAX' : cost + '💰'}</button>
      </div>
    `;
  }).join('');
}

function openShop() {
  renderShop();
  shopOverlay.style.display = 'flex';
}
shopBtn.addEventListener('click', openShop);
shopCloseBtn.addEventListener('click', () => { shopOverlay.style.display = 'none'; });
shopList.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn || btn.disabled) return;
  const key = btn.dataset.key;
  const cost = upgradeCost(key);
  if (cost === null || money < cost) return;
  money -= cost;
  upgradeLevels[key]++;
  saveMoney(money);
  saveUpgrades(upgradeLevels);
  renderShop();
  moneyLine.textContent = '💰 ' + money;
});

function addPopup(x, y, text, color) { popups.push({ x, y, text, color, t: 0 }); }

function scheduleNext(bed, key) {
  const fn = key === 'water' ? waterInterval : key === 'feed' ? feedInterval : weedInterval;
  bed.nextDue[key] = elapsed + fn(bed);
}

function wiltBed(bed) {
  score = Math.max(0, score - 5);
  addPopup(bed.slot.x + BED_W / 2, bed.slot.y, 'Wilted! -5', '#ff6b5e');
  playBad();
  initBed(bed, elapsed);
}

function rotBed(bed) {
  score = Math.max(0, score - 8);
  addPopup(bed.slot.x + BED_W / 2, bed.slot.y, 'Rotted! -8', '#ff6b5e');
  playBad();
  initBed(bed, elapsed);
}

function spreadWeed(bed) {
  const candidates = beds.filter((b) => b.index !== bed.index && b.active);
  if (!candidates.length) return;
  candidates.sort((a, b) => {
    const da = Math.hypot(a.slot.x - bed.slot.x, a.slot.y - bed.slot.y);
    const db = Math.hypot(b.slot.x - bed.slot.x, b.slot.y - bed.slot.y);
    return da - db;
  });
  const target = candidates.find((b) => !b.needs.weed) || candidates[0];
  if (!target.needs.weed) {
    target.needs.weed = true;
    target.activeSince.weed = elapsed;
    target.weedSpread = false;
    addPopup(target.slot.x + BED_W / 2, target.slot.y, 'Weeds spread!', '#e8891a');
  }
  playSpread();
}

function topNeed(bed) {
  if (bed.stage === 'ripe') return 'harvest';
  if (bed.needs.water) return 'water';
  if (bed.needs.weed) return 'weed';
  if (bed.needs.feed) return 'feed';
  return null;
}

function resolveTend(bed, need) {
  if (need === 'harvest') {
    const points = Math.round(bed.crop.value * bed.quality * harvestPointsMul());
    score += points;
    money += points;
    moneyEarnedThisRun += points;
    saveMoney(money);
    addPopup(bed.slot.x + BED_W / 2, bed.slot.y, '+' + points, '#ffe28a');
    playHarvest();
    initBed(bed, elapsed);
  } else if (need === 'water') {
    bed.needs.water = false;
    scheduleNext(bed, 'water');
    playWater();
  } else if (need === 'weed') {
    bed.needs.weed = false;
    bed.weedSpread = false;
    scheduleNext(bed, 'weed');
    playWeed();
  } else if (need === 'feed') {
    bed.needs.feed = false;
    bed.quality = Math.min(1, bed.quality + 0.15);
    scheduleNext(bed, 'feed');
    playFeed();
  }
}

function tapBed(bed) {
  if (!bed.active) return;
  const need = topNeed(bed);
  if (!need) return;
  // Re-tapping the bed the gardener is already heading to/working on is a
  // no-op rather than a reset, so an accidental double-tap doesn't throw
  // away progress that was already under way.
  if (gardener.targetIndex === bed.index && gardener.state !== 'idle') return;
  gardener.targetIndex = bed.index;
  gardener.state = 'walking';
  gardener.tendingNeed = null;
  gardener.tendProgress = 0;
  playStartTend();
  if (hintVisible) {
    hintVisible = false;
    try { sessionStorage.setItem('losingThePlotSeenHint', '1'); } catch (e) {}
  }
}

function updateGardener(dt) {
  if (gardener.targetIndex === null) return;
  const bed = beds[gardener.targetIndex];
  if (!bed || !bed.active) { gardener.targetIndex = null; gardener.state = 'idle'; return; }
  const targetX = bed.slot.x + BED_W / 2, targetY = bed.slot.y + BED_H / 2;
  if (gardener.state === 'walking') {
    const dx = targetX - gardener.x, dy = targetY - gardener.y;
    const dist = Math.hypot(dx, dy);
    const step = GARDENER_SPEED * gardenerSpeedMul() * dt;
    if (dist <= step) {
      gardener.x = targetX; gardener.y = targetY;
      const need = topNeed(bed);
      if (!need) { gardener.targetIndex = null; gardener.state = 'idle'; return; }
      gardener.state = 'tending';
      gardener.tendingNeed = need;
      gardener.tendProgress = 0;
      gardener.tendDuration = effectiveTendDuration();
    } else {
      gardener.x += (dx / dist) * step;
      gardener.y += (dy / dist) * step;
    }
  } else if (gardener.state === 'tending') {
    gardener.tendProgress += dt * 1000;
    if (gardener.tendProgress >= gardener.tendDuration) {
      resolveTend(bed, gardener.tendingNeed);
      gardener.targetIndex = null;
      gardener.state = 'idle';
      gardener.tendingNeed = null;
    }
  }
}

canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  for (const bed of beds) {
    if (!bed.active) continue;
    if (x >= bed.slot.x && x <= bed.slot.x + BED_W && y >= bed.slot.y - 28 && y <= bed.slot.y + BED_H) {
      tapBed(bed);
      break;
    }
  }
});

function endSeason() {
  state = 'over';
  playSeasonEnd();
  const best = loadBest();
  const isNewBest = score > best;
  if (isNewBest) saveBest(score);
  title.textContent = 'Season Over';
  subtitle.textContent = 'Earned 💰 ' + moneyEarnedThisRun + ' this season';
  scoreLine.style.display = 'block';
  scoreLine.textContent = 'Score: ' + score;
  bestLine.textContent = isNewBest ? '🏆 New best score!' : 'Best score: ' + best;
  moneyLine.textContent = '💰 ' + money + ' total — spend it in the shop';
  weatherBanner.style.display = 'none';
  updateDiffButtonStyles();
  startBtn.textContent = 'Play Again';
  startBtn.style.display = 'inline-block';
  backToArcade.style.display = 'inline-block';
  overlay.style.display = 'flex';
}

function updateBed(bed, dt) {
  if (!bed.active) return;

  if (bed.stage === 'growing' && elapsed >= bed.growStart + bed.crop.growDuration) {
    bed.stage = 'ripe';
    bed.activeSince.harvest = elapsed;
  }

  if (bed.stage === 'growing') {
    ['water', 'feed', 'weed'].forEach((k) => {
      if (!bed.needs[k] && elapsed >= bed.nextDue[k]) {
        bed.needs[k] = true;
        bed.activeSince[k] = elapsed;
        if (k === 'weed') bed.weedSpread = false;
      }
    });
  }

  if (bed.needs.water && elapsed - bed.activeSince.water > waterGrace(bed)) wiltBed(bed);
  else if (bed.needs.weed && !bed.weedSpread && elapsed - bed.activeSince.weed > weedGrace(bed)) {
    spreadWeed(bed);
    bed.weedSpread = true;
  } else if (bed.needs.feed && elapsed - bed.activeSince.feed > feedGrace(bed)) {
    bed.quality = Math.max(0.4, bed.quality - 0.3);
    bed.needs.feed = false;
    scheduleNext(bed, 'feed');
  } else if (bed.stage === 'ripe' && elapsed - bed.activeSince.harvest > harvestGrace()) rotBed(bed);
}

function update(dt) {
  if (state !== 'playing') return;
  elapsed += dt * 1000;
  if (elapsed >= SEASON_LENGTH) { endSeason(); return; }

  beds.forEach((bed) => {
    if (!bed.active && elapsed >= effectiveUnlockAt(bed.index)) initBed(bed, elapsed, elapsed + randRange(1500, 4000));
  });
  beds.forEach((bed) => updateBed(bed, dt));
  updateGardener(dt);
  updateWeather(dt);

  if (hintVisible && elapsed > CALM_DURATION + 6000) hintVisible = false;
  hintAlpha += ((hintVisible ? 1 : 0) - hintAlpha) * Math.min(1, dt * 5);

  popups.forEach((p) => { p.t += dt * 1000; });
  popups = popups.filter((p) => p.t < 900);
}

function drawSoil(bed) {
  ctx.fillStyle = '#5b3d22';
  ctx.beginPath();
  ctx.roundRect(bed.slot.x, bed.slot.y, BED_W, BED_H, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    const y = bed.slot.y + (BED_H / 4) * i;
    ctx.beginPath(); ctx.moveTo(bed.slot.x + 4, y); ctx.lineTo(bed.slot.x + BED_W - 4, y); ctx.stroke();
  }
}

function drawCrop(bed) {
  const cx = bed.slot.x + BED_W / 2, cy = bed.slot.y + BED_H / 2 + 6;
  const crop = bed.crop;
  if (bed.stage === 'growing') {
    const growthFrac = clamp((elapsed - bed.growStart) / crop.growDuration, 0, 1);
    const size = lerp(6, 22, growthFrac);
    ctx.fillStyle = crop.color1;
    ctx.beginPath(); ctx.ellipse(cx, cy - size * 0.6, size * 0.55, size, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = crop.color2;
    ctx.beginPath(); ctx.ellipse(cx - size * 0.4, cy - size * 0.3, size * 0.35, size * 0.55, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + size * 0.4, cy - size * 0.3, size * 0.35, size * 0.55, 0.4, 0, Math.PI * 2); ctx.fill();
  } else if (crop.id === 'garlic') {
    const pulse = 1 + 0.06 * Math.sin(performance.now() / 260);
    ctx.fillStyle = crop.color2;
    for (const [ox, oy] of [[-6, -2], [6, -2], [0, -10]]) {
      ctx.beginPath(); ctx.ellipse(cx + ox, cy + oy * pulse, 6, 8, 0, 0, Math.PI * 2); ctx.fill();
    }
    ctx.strokeStyle = crop.color1;
    ctx.lineWidth = 1.5;
    for (const [ox, oy] of [[-6, -2], [6, -2], [0, -10]]) {
      ctx.beginPath(); ctx.moveTo(cx + ox, cy + oy - 6); ctx.lineTo(cx + ox, cy + oy - 12); ctx.stroke();
    }
  } else {
    const pulse = 1 + 0.06 * Math.sin(performance.now() / 260);
    ctx.fillStyle = crop.color2;
    ctx.beginPath(); ctx.arc(cx, cy - 8, 15 * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = crop.color1;
    ctx.beginPath(); ctx.ellipse(cx, cy - 20, 4, 8, 0, 0, Math.PI * 2); ctx.fill();
  }
  if (bed.needs.weed) {
    ctx.strokeStyle = '#8a6d3a';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const wx = bed.slot.x + 10 + i * 12, wy = bed.slot.y + BED_H - 8;
      ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(wx - 3, wy - 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(wx + 4, wy - 10); ctx.stroke();
    }
  }
}

function drawNeedIcons(bed) {
  const active = [];
  if (bed.stage === 'ripe') active.push('harvest');
  if (bed.needs.water) active.push('water');
  if (bed.needs.weed) active.push('weed');
  if (bed.needs.feed) active.push('feed');
  if (!active.length) return;
  const top = topNeed(bed);
  const iconY = bed.slot.y - 16;
  const totalW = active.length * 22;
  let x = bed.slot.x + BED_W / 2 - totalW / 2 + 11;
  for (const need of active) {
    const isTop = need === top;
    const bob = isTop ? Math.sin(performance.now() / 180) * 2 : 0;
    ctx.save();
    ctx.font = (isTop ? 'bold 18px' : '14px') + ' Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (isTop) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.arc(x, iconY + bob, 13, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillText(NEED_ICON[need], x, iconY + bob + 1);
    ctx.restore();
    x += 22;
  }
}

function drawTendingRing(bed) {
  if (gardener.state !== 'tending' || gardener.targetIndex !== bed.index) return;
  const frac = gardener.tendProgress / gardener.tendDuration;
  const cx = bed.slot.x + BED_W / 2, cy = bed.slot.y + BED_H / 2;
  ctx.strokeStyle = '#ffe28a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cx, cy, Math.max(BED_W, BED_H) / 2 + 4, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
  ctx.stroke();
}

function drawBeds() {
  beds.forEach((bed) => {
    if (!bed.active) return;
    drawSoil(bed);
    drawCrop(bed);
    drawTendingRing(bed);
    drawNeedIcons(bed);
  });
}

function drawShed() {
  ctx.fillStyle = '#5b3d22';
  ctx.beginPath();
  ctx.roundRect(SHED.x - 26, SHED.y - 18, 52, 36, 4);
  ctx.fill();
  ctx.fillStyle = '#7a3d1a';
  ctx.beginPath();
  ctx.moveTo(SHED.x - 30, SHED.y - 18); ctx.lineTo(SHED.x, SHED.y - 34); ctx.lineTo(SHED.x + 30, SHED.y - 18);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(SHED.x - 7, SHED.y - 4, 14, 20);
}

function drawGardener() {
  const cx = gardener.x, cy = gardener.y;
  const bob = gardener.state === 'walking' ? Math.sin(performance.now() / 90) * 2 : 0;
  ctx.save();
  ctx.translate(cx, cy + bob);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(0, 20, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3a6b8a';
  ctx.beginPath(); ctx.roundRect(-9, -2, 18, 20, 4); ctx.fill();
  ctx.fillStyle = '#e8b96b';
  ctx.beginPath(); ctx.arc(0, -12, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#c9853a';
  ctx.beginPath(); ctx.arc(0, -16, 9.5, Math.PI, 0); ctx.fill();
  if (gardener.state === 'tending' && gardener.tendingNeed) {
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(14, -14, 11, 0, Math.PI * 2); ctx.fill();
    ctx.fillText(NEED_ICON[gardener.tendingNeed], 14, -13);
  }
  ctx.restore();
}

function drawPopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Arial';
  for (const p of popups) {
    const t = p.t / 900;
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - t * 26);
    ctx.globalAlpha = 1;
  }
}

function drawHud() {
  ctx.font = 'bold 16px Arial';
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'black';
  ctx.lineWidth = 3;
  ctx.textAlign = 'left';
  const scoreText = 'Score: ' + score;
  ctx.strokeText(scoreText, 16, 34);
  ctx.fillText(scoreText, 16, 34);
  ctx.textAlign = 'right';
  const remaining = Math.max(0, Math.ceil((SEASON_LENGTH - elapsed) / 1000));
  const timeText = remaining + 's';
  ctx.strokeText(timeText, W - 16, 34);
  ctx.fillText(timeText, W - 16, 34);

  const season = seasonLabel(elapsed);
  ctx.textAlign = 'center';
  ctx.font = 'bold 12px Arial';
  const seasonText = season.icon + ' ' + season.name;
  ctx.strokeText(seasonText, W / 2, 20);
  ctx.fillText(seasonText, W / 2, 20);
}

function drawHint() {
  if (hintAlpha <= 0.01) return;
  ctx.save();
  ctx.globalAlpha = hintAlpha;
  const text = 'Tap a bed to send your gardener over';
  ctx.font = 'bold 13px Arial';
  const tw = ctx.measureText(text).width;
  const pillW = tw + 28, pillH = 30, px = W / 2 - pillW / 2, py = 46;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.roundRect(px, py, pillW, pillH, 15);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, W / 2, py + pillH / 2 + 1);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#3a2a18';
  ctx.fillRect(0, 0, W, H);
  if (state === 'menu') return;
  drawShed();
  drawBeds();
  drawGardener();
  drawPopups();
  drawHud();
  drawHint();
}

let lastFrameTime = null;
function loop(now) {
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

showMenu();
requestAnimationFrame(loop);
</script>
